<style>
:root{
  --shu:#8A2D2D;
  --shu-light:#C0392B;
  --kin:#C9A961;
  --kin-deep:#A07B28;
  --sumi:#1a1108;

}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  color:var(--sand);
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(201,169,97,.15), transparent 60%),
    var(--bg);
  min-height:100vh;
  line-height:1.7;
}
.mincho{font-family:'Shippori Mincho','Noto Serif JP',serif;}

/* ── ヘッダ ── */
.page-header{
  padding:36px 24px 24px;
  text-align:center;
  border-bottom:1px solid rgba(201,169,97,.2);
}
.page-title{
  font-size:clamp(26px,5vw,44px);
  font-weight:900;
  color:var(--kin);
  letter-spacing:.24em;
  text-shadow:0 0 24px rgba(201,169,97,.3);
}
.page-subtitle{
  margin-top:8px;
  font-size:12px;
  color:rgba(201,169,97,.7);
  letter-spacing:.3em;
}
.page-lead{
  margin-top:18px;
  font-size:13px;
  color:rgba(255,240,200,.7);
}
.home-link{
  display:inline-block;
  margin-top:14px;
  font-size:12px;
  color:var(--kin);
  text-decoration:none;
  border:1px solid var(--kin);
  padding:6px 18px;
  border-radius:2px;
  letter-spacing:.12em;
  transition:all .2s;
}
.home-link:hover{background:var(--kin);color:var(--sumi);}

/* ── タブ ── */
.day-tabs{
  display:flex;
  justify-content:center;
  gap:2px;
  margin:32px auto 0;
  max-width:520px;
  padding:0 16px;
}
.day-tab{
  flex:1;
  background:rgba(26,17,8,.6);
  color:rgba(201,169,97,.55);
  border:1px solid rgba(201,169,97,.25);
  padding:14px 14px 12px;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  letter-spacing:.15em;
  cursor:pointer;
  transition:all .2s;
}
.day-tab:hover{color:var(--kin);background:rgba(201,169,97,.08);}
.day-tab.active{
  background:linear-gradient(180deg, var(--shu) 0%, var(--shu-light) 100%);
  color:var(--sand);
  border-color:var(--kin);
  box-shadow:0 0 0 1px var(--kin) inset, 0 4px 14px rgba(138,45,45,.4);
}
.day-tab .day-kanji{font-size:19px;display:block;margin-bottom:3px;}
.day-tab .day-date{font-size:11px;opacity:.85;letter-spacing:.12em;}

/* ── 神主御神託バナー ── */
.proverb-banner{
  max-width:760px;
  margin:8px auto 16px;
  padding:0 16px;
}
.proverb-frame{
  position:relative;
  background:linear-gradient(180deg,rgba(45,28,16,.55) 0%,rgba(26,17,8,.7) 100%);
  border:1px solid rgba(201,169,97,.35);
  border-radius:2px;
  padding:18px 28px 16px;
  text-align:center;
  box-shadow:0 2px 16px rgba(0,0,0,.35),inset 0 0 24px rgba(201,169,97,.05);
}
.proverb-frame::before,
.proverb-frame::after{
  content:'';position:absolute;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(201,169,97,.4) 50%,transparent 100%);
}
.proverb-frame::before{top:6px;}
.proverb-frame::after{bottom:6px;}
.proverb-label{
  display:inline-block;
  font-size:10.5px;letter-spacing:.55em;
  color:rgba(201,169,97,.85);font-weight:700;
  padding:0 12px;margin-bottom:10px;
  background:rgba(26,17,8,.6);
  position:relative;z-index:1;
}
.proverb-text{
  margin:6px 0 8px;padding:0;
  font-size:14.5px;letter-spacing:.06em;line-height:1.85;
  color:var(--sand);font-style:normal;font-weight:500;
  white-space:pre-line;
}
.proverb-author{
  font-size:11px;letter-spacing:.18em;
  color:rgba(201,169,97,.7);
  margin-top:4px;
}
@media(max-width:640px){
  .proverb-text{font-size:13px;line-height:1.7;}
  .proverb-frame{padding:14px 16px 12px;}
  .proverb-label{letter-spacing:.4em;font-size:10px;}
}

/* ── 五重塔 ── */
.tower-wrap{
  max-width:860px;
  margin:28px auto 32px;
  padding:0 16px;
}
.tower-wrap[hidden]{display:none;}
.tower{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}
.tower-floors{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
}
.tower-finial{
  font-size:34px;
  color:var(--kin);
  text-shadow:0 0 20px rgba(201,169,97,.6);
  line-height:1;
  margin-bottom:-2px;
  user-select:none;
}
.floor{
  width:100%;
  position:relative;
  margin-top:6px;
}
.floor-5{max-width:55%;}
.floor-4{max-width:65%;}
.floor-3{max-width:75%;}
.floor-2{max-width:85%;}
.floor-1{max-width:95%;}

.roof{
  height:22px;
  background:linear-gradient(180deg, var(--shu-light) 0%, var(--shu) 100%);
  clip-path:polygon(8% 100%, 0% 100%, 50% 0%, 100% 100%, 92% 100%);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.floor-body{
  background:linear-gradient(180deg, var(--wood) 0%, #1a1108 100%);
  border:1px solid rgba(201,169,97,.3);
  border-top:0;
  padding:16px 20px 18px;
  position:relative;
}
.floor-body::before{
  content:'';
  position:absolute;
  top:0; left:5%; right:5%;
  height:2px;
  background:var(--kin-deep);
  opacity:.6;
}
.floor-header{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:10px;
  margin-bottom:8px;
  padding-bottom:8px;
  border-bottom:1px solid rgba(201,169,97,.18);
  flex-wrap:wrap;
}
.floor-label{
  font-size:12px;
  color:var(--kin);
  letter-spacing:.22em;
  font-weight:700;
  white-space:nowrap;
}
.floor-race{
  font-size:16px;
  color:var(--sand);
  font-weight:700;
  letter-spacing:.04em;
}
.floor-meta{
  font-size:11px;
  color:rgba(255,240,200,.55);
  margin-bottom:10px;
  letter-spacing:.04em;
}
.floor-pick{
  font-size:13px;
  color:rgba(255,240,200,.88);
  letter-spacing:.04em;
}
.floor-pick .mark{
  color:var(--shu-light);
  font-weight:900;
  margin-right:4px;
}
.floor-pending{
  font-size:11px;
  color:rgba(201,169,97,.45);
  font-style:italic;
  letter-spacing:.08em;
}
/* 御託宣 picks */
.floor-picks{
  margin-top:4px;
}
.pick-row{
  display:flex;
  align-items:baseline;
  gap:6px;
  padding:4px 0;
  font-size:13px;
  border-bottom:1px dotted rgba(201,169,97,.1);
}
.pick-row:last-child{border-bottom:0;}
.pick-mark{
  font-size:17px;
  font-weight:900;
  width:24px;
  flex-shrink:0;
  text-align:center;
  line-height:1;
}
.pick-mark.honmei{color:var(--kin);text-shadow:0 0 8px rgba(201,169,97,.5);}
.pick-mark.taikou{color:var(--shu-light);}
.pick-mark.tana{color:rgba(255,240,200,.85);}
.pick-mark.renka{color:rgba(255,240,200,.6);}
.pick-mark.hoshi{color:rgba(201,169,97,.7);}
.pick-name{
  color:var(--sand);
  font-weight:700;
  letter-spacing:.04em;
}
.pick-note{
  color:rgba(255,240,200,.45);
  font-size:10px;
  margin-left:auto;
  letter-spacing:.04em;
  padding-left:6px;
  white-space:nowrap;
}
.floor-summary{
  margin-top:10px;
  padding-top:8px;
  border-top:1px dashed rgba(201,169,97,.15);
  font-size:10.5px;
  color:rgba(255,240,200,.5);
  font-style:italic;
  letter-spacing:.06em;
  line-height:1.5;
}
@media (max-width:640px){
  .pick-note{display:none;}

/* 礎石 */

/* ── 下部パネル ── */
.sum-panel{
  max-width:640px;

  letter-spacing:.28em;

}
.sum-line{

  justify-content:space-between;

}
.sum-line span:last-child{color:var(--kin);font-weight:700;}
.sum-line .sum-state{
  color:rgba(201,169,97,.75);

  font-style:italic;
  font-size:12.5px;
  letter-spacing:.06em;
}
.sum-total{
  margin-top:12px;
  padding-top:12px;
  border-top:1px dashed rgba(201,169,97,.25);
  font-size:15px;
  font-weight:700;
}
.sum-total span:first-child{color:var(--sand);}

.footer{
  text-align:center;
  padding:30px 20px 40px;
  font-size:11px;
  color:rgba(201,169,97,.4);
  letter-spacing:.18em;
}

@media (max-width:640px){
  .floor-5{max-width:72%;}
  .floor-4{max-width:80%;}
  .floor-3{max-width:88%;}

.combo-formula-row{

.combo-formula-row strong{

.combo-total-amt{

@media (max-width:640px){

<script>
// ═════════════════════════════════════
//  win5-gojunoto v2 (2026-04-25) — race-notes 連動

// ═════ 日替わり 神主御神託 ═════
const PROVERBS_BY_DAY = {
  sat: {
    text: '神託は静かに語る。\n聞く者は買い、聞かぬ者は漏らす。',
    author: '── 神宮の戒律',

    author: '── 神宮の悔恨（ギーニョ神主独白）',
  },
};
function applyProverb(day){
  const p = PROVERBS_BY_DAY[day] || PROVERBS_BY_DAY.sat;

  const a = document.getElementById('proverbAuthor');
  const b = document.getElementById('proverbBanner');
  if (t) t.textContent = '「' + p.text + '」';
  if (a) a.textContent = p.author;
  if (b) b.dataset.day = day;
}

const RACES_MANIFEST = [
  // 土曜
  {key:'2026-04-25-kyoto-10r',     day:'sat', layer:1},
  {key:'2026-04-25-tokyo-10r',     day:'sat', layer:2},
  {key:'2026-04-25-fukushima-11r', day:'sat', layer:3},
  {key:'2026-04-25-kyoto-11r',     day:'sat', layer:4},
  {key:'2026-04-25-tokyo-11r',     day:'sat', layer:5},
  // 日曜
  {key:'2026-04-26-kyoto-10r',     day:'sun', layer:1},
  {key:'2026-04-26-tokyo-10r',     day:'sun', layer:2},
  {key:'2026-04-26-fukushima-11r', day:'sun', layer:3},
  {key:'2026-04-26-kyoto-11r',     day:'sun', layer:4},
  {key:'2026-04-26-tokyo-11r',     day:'sun', layer:5},
];

const MARK_CLASS_MAP = {'◎':'honmei','○':'taikou','▲':'tana','△':'renka','☆':'hoshi'};
const LAYER_LABEL = ['','一層','二層','三層','四層','五層'];

function esc(s){
  return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function loadAndRender(){
  const data = await Promise.all(RACES_MANIFEST.map(async m => {
    try{
      const res = await fetch(`data/race-notes/${m.key}.json`, {cache:'no-cache'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      return { ...m, data: d };
    }catch(e){
      console.error('load failed:', m.key, e);
      return { ...m, data: null };
    }
  }));
  const byDay = {sat: data.filter(x => x.day==='sat'), sun: data.filter(x => x.day==='sun')};
  ['sat','sun'].forEach(day => {
    renderFloors(day, byDay[day]);
    renderCombo(day, byDay[day]);
  });
}

function renderFloors(day, races){
  const c = document.querySelector(`.tower-floors[data-day="${day}"]`);
  if(!c) return;
  const sorted = [...races].sort((a,b)=>b.layer-a.layer); // L5→L1（上から下へ）
  c.innerHTML = sorted.map(r => {
    const d = r.data || {};
    const p = d.presentation || {};
    const raceName = (d.race && d.race.name) || '読込失敗';
    const grade = (d.race && d.race.grade) ? `（${esc(d.race.grade)}）` : '';
    const meta = p.meta || '';
    const picks = p.win5Picks || [];
    const summary = p.win5Summary || '神のお告げを待ち賜う';
    const isSingle = picks.length === 1;
    const picksHtml = picks.length > 0
      ? picks.map(pk => {
          const cls = MARK_CLASS_MAP[pk.mark] || 'honmei';
          const numHtml = pk.num ? `<span class="combo-num-inline">${esc(pk.num)}</span>` : '';
          return `<div class="pick-row"><span class="pick-mark ${cls}">${esc(pk.mark)}</span><span class="pick-name">${numHtml}${esc(pk.name)}</span><span class="pick-note">${esc(pk.note||'')}</span></div>`;
        }).join('')
      : `<div class="pick-row" style="color:rgba(244,233,201,.4);font-style:italic;">神 託 降 臨 待 ち …</div>`;
    return `<div class="floor floor-${r.layer}">
      <div class="roof"></div>
      <div class="floor-body">
        <div class="floor-header">
          <span class="floor-label mincho">${LAYER_LABEL[r.layer]} ／ WIN${r.layer}</span>
          <span class="floor-race mincho">${esc(raceName)}${grade}</span>
        </div>
        <div class="floor-meta">${esc(meta)}</div>
        <div class="floor-picks${isSingle ? ' floor-picks-single':''}">${picksHtml}</div>
        <div class="floor-summary">${esc(summary)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCombo(day, races){
  const c = document.querySelector(`.win5-combo[data-day="${day}"]`);
  if(!c) return;
  const sorted = [...races].sort((a,b)=>a.layer-b.layer); // L1→L5
  const counts = sorted.map(r => (r.data && r.data.presentation && r.data.presentation.win5Picks || []).length);
  const allFilled = counts.every(x => x > 0);

  if(!allFilled){
    c.innerHTML = `<h3 class="mincho" style="text-align:center;font-size:17px;letter-spacing:.4em;color:#C9A961;margin:0 0 14px 0;font-weight:700;">奉 納 目 録</h3>` +
      sorted.map(r => {
        const name = (r.data && r.data.race && r.data.race.name) || '?';
        const picks = (r.data && r.data.presentation && r.data.presentation.win5Picks) || [];
        const state = picks.length > 0 ? `${picks.length} 頭${picks.length===1?'（1点突破）':''}` : '神のお告げを待ち賜う';
        return `<div class="sum-line"><span>WIN${r.layer}　${esc(name)}</span><span class="sum-state">${esc(state)}</span></div>`;
      }).join('');
    return;
  }

  // 全層揃い：完全目録
  const totalPoints = counts.reduce((a,b)=>a*b, 1);
  const formula = counts.join('　×　') + '　＝';
  const totalAmt = totalPoints * 100;
  const rowsHtml = sorted.map(r => {
    const d = r.data || {};
    const name = (d.race && d.race.name) || '?';
    const picks = (d.presentation && d.presentation.win5Picks) || [];
    const isSingle = picks.length === 1;
    const horsesHtml = picks.map(pk =>
      `<span class="combo-horse${isSingle ? ' single':''}"><span class="combo-num">${esc(pk.num||'?')}</span>${esc(pk.name)}</span>`
    ).join('');
    const cnt = isSingle ? '1 点 突 破' : `${picks.length} 頭`;
    return `<div class="combo-race">
      <div class="combo-race-label mincho"><span>${LAYER_LABEL[r.layer]}　WIN${r.layer}　${esc(name)}</span><span class="combo-race-count${isSingle ? ' single':''}">${cnt}</span></div>
      <div class="combo-horses">${horsesHtml}</div>
    </div>`;
  }).join('');
  c.innerHTML = `
    <div class="win5-combo-title mincho">奉　納　目　録</div>
    <div class="win5-combo-subtitle mincho">W I N 5 　 最 　終 　御 　託 　宣</div>
    ${rowsHtml}
    <div class="combo-formula-row mincho">${formula}<strong>${totalPoints}</strong>点</div>
    <div class="combo-total-row">
      <span class="mincho">奉　納　総　額</span>
      <span class="combo-total-amt">¥ ${totalAmt.toLocaleString()}</span>
    </div>`;
}

// タブ切替（既存挙動）
document.querySelectorAll('.day-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const day = btn.dataset.day;
    document.querySelectorAll('.day-tab').forEach(b => {
      const active = b.dataset.day === day;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('.tower-wrap').forEach(w => {
      w.hidden = (w.id !== 'tower-' + day);
    });
    applyProverb(day);
    window.scrollTo({top:0, behavior:'smooth'});
  });
});

// 初期化
applyProverb('sat');
loadAndRender();
</script>

</body>
</html>
