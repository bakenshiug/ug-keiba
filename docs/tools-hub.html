<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>神職工房｜社務ツール一式 | UG競馬ワイド神宮</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAFA;--paper:#FBF7EE;
  --shu:#9B2D30;--shu-dk:#7A1E1E;--midori:#1F4D2E;--kin:#C9A961;
  --text:#1A1A1A;--muted:rgba(26,26,26,0.60);
  --border:rgba(201,169,97,0.40);--border-dk:rgba(201,169,97,0.55);
}
html,body{
  background:var(--bg);color:var(--text);
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  height:100vh;overflow:hidden;
}

/* ── Hub Header ── */
.hub-header{
  background:rgba(250,250,250,.92);
  border-bottom:2px solid var(--shu);
  box-shadow:0 2px 0 var(--kin),0 6px 14px rgba(155,45,48,.08);
  backdrop-filter:blur(8px);
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
  flex-shrink:0;
}
.hub-title{
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  font-size:16px;font-weight:800;color:var(--shu);
  display:flex;align-items:center;gap:10px;
  letter-spacing:.04em;
}
.hub-title span{
  font-size:10px;color:var(--muted);
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  font-weight:500;letter-spacing:.14em;text-transform:uppercase;
}
.hub-badge{
  font-size:9px;font-weight:900;padding:2px 8px;border-radius:4px;
  background:rgba(201,169,97,.18);color:var(--shu-dk);
  letter-spacing:.14em;border:1px solid rgba(201,169,97,.45);
}
.hub-links{display:flex;gap:8px;}
.hub-link{
  font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:16px;
  text-decoration:none;color:var(--shu);
  background:rgba(201,169,97,.12);
  border:1px solid rgba(201,169,97,.35);
  transition:all .18s;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.hub-link:hover{background:rgba(201,169,97,.25);color:var(--shu-dk);}

/* ── 3-Column Grid ── */
.hub-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  height:calc(100vh - 56px);
}

/* ── Each Panel ── */
.panel{
  display:flex;flex-direction:column;
  border-right:1px solid var(--border-dk);
  overflow:hidden;
  background:var(--paper);
}
.panel:last-child{border-right:none;}

.panel-tab{
  background:rgba(251,247,238,.98);
  border-bottom:2px solid var(--border);
  padding:8px 14px;
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  height:40px;
}
.panel-tab-icon{font-size:14px;}
.panel-tab-label{
  font-size:12px;font-weight:800;color:var(--shu);
  letter-spacing:.05em;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.panel-tab-sub{
  font-size:9px;color:var(--muted);
  margin-left:auto;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(201,169,97,.14);padding:2px 7px;border-radius:4px;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}

.panel-frame{
  flex:1;width:100%;border:none;
  background:var(--paper);
}

/* ── Responsive ── */
@media(max-width:1200px){
  .hub-grid{
    grid-template-columns:1fr;
    grid-template-rows:1fr;
  }
  .panel{display:none;}
  .panel.active{display:flex;}
  .tab-bar{display:flex !important;}
}

/* ── Tab Bar ── */
.tab-bar{
  display:none;
  background:rgba(251,247,238,.98);
  border-bottom:2px solid var(--border);
  flex-shrink:0;
}
.tab-btn{
  flex:1;padding:10px 8px;
  background:transparent;border:none;
  color:var(--muted);font-family:'Shippori Mincho','Noto Serif JP',serif;
  font-size:11px;font-weight:700;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .18s;
}
.tab-btn.active{
  color:var(--shu);
  border-bottom-color:var(--shu);
}
.tab-btn:hover{color:var(--shu-dk);}
</style>
</head>
<body>

<header class="hub-header">
  <div class="hub-title">
    ⛩ UG競馬ワイド神宮
    <span>神職工房 KOUBOU</span>
    <span class="hub-badge">社務用</span>
  </div>
  <div class="hub-links">
    <a href="index.html" class="hub-link">⛩ 鳥居</a>
    <a href="kinkai-uma.html" class="hub-link">💰 金塊殿</a>
    <a href="target-analyzer.html" class="hub-link">📊 CSV</a>
    <a href="final-tool.html" class="hub-link">🏆 本殿工房</a>
  </div>
</header>

<!-- タブバー（狭い画面用） -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" onclick="showPanel(0)">💰 金塊馬抽出</button>
  <button class="tab-btn" onclick="showPanel(1)">📊 CSV解析</button>
  <button class="tab-btn" onclick="showPanel(2)">🏆 最終予想</button>
</div>

<div class="hub-grid" id="hubGrid">

  <!-- Panel 1: 金塊馬抽出 -->
  <div class="panel active" id="panel0">
    <div class="panel-tab">
      <span class="panel-tab-icon">💰</span>
      <span class="panel-tab-label">金塊馬抽出</span>
      <span class="panel-tab-sub">kinkai-uma</span>
    </div>
    <iframe class="panel-frame" src="kinkai-uma.html" title="金塊馬抽出"></iframe>
  </div>

  <!-- Panel 2: Target CSV アナライザー -->
  <div class="panel active" id="panel1">
    <div class="panel-tab">
      <span class="panel-tab-icon">📊</span>
      <span class="panel-tab-label">Target CSV 解析</span>
      <span class="panel-tab-sub">target-analyzer</span>
    </div>
    <iframe class="panel-frame" src="target-analyzer.html" title="Target CSV解析"></iframe>
  </div>

  <!-- Panel 3: 最終予想作成 -->
  <div class="panel active" id="panel2">
    <div class="panel-tab">
      <span class="panel-tab-icon">🏆</span>
      <span class="panel-tab-label">最終予想 作成ツール</span>
      <span class="panel-tab-sub">final-tool</span>
    </div>
    <iframe class="panel-frame" src="final-tool.html" title="最終予想作成ツール"></iframe>
  </div>

</div>

<script>
function showPanel(idx) {
  document.querySelectorAll('.panel').forEach((p,i) => {
    p.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', i === idx);
  });
}
</script>

</body>
</html>
