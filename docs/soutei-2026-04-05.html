<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>出走想定表 4/5(土) | UG競馬神宮</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAFA;--bg-dk:#FBF7EE;
  --accent:#C9A961;--gold:#9B2D30;--green:#1F4D2E;
  --shu:#9B2D30;--shu-dk:#7A1E1E;--kin:#C9A961;--midori:#1F4D2E;
  --text:#1A1A1A;--muted:rgba(26,26,26,0.60);
  --card:#FBF7EE;
}
html,body{background:var(--bg);color:var(--text);font-family:'Shippori Mincho','Shippori Mincho','Noto Serif JP',serif;min-height:100vh;}

/* Header */
.hdr{background:rgba(250,250,250,.92);border-bottom:2px solid #9B2D30;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 0 #C9A961,0 6px 14px rgba(155,45,48,.08);backdrop-filter:blur(8px);}
.hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:18px;background:rgba(0,0,0,0.06);color:var(--muted);font-size:11px;font-weight:700;text-decoration:none;border:1px solid rgba(0,0,0,0.12);}
.hdr-back:hover{background:rgba(0,0,0,0.1);}
.hdr-logo{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:18px;font-weight:800;color:#9B2D30;letter-spacing:.05em;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

/* Page */
.page-wrap{max-width:780px;margin:0 auto;padding:16px 12px 60px;}

/* Date header */
.date-header{text-align:center;padding:20px 16px;margin-bottom:20px;background:#FBF7EE;border:1px solid rgba(201,169,97,.40);border-radius:10px;}
.date-header .date-main{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:22px;font-weight:800;color:#9B2D30;}
.date-header .date-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.1em;}

/* Race tabs */
.race-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.race-tabs::-webkit-scrollbar{display:none;}
.race-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.12);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.race-tab:hover{background:rgba(0,0,0,0.08);}
.race-tab.active{background:rgba(201,169,97,.20);border-color:var(--kin);color:#7A1E1E;}
.race-tab.grade-tab{border-color:rgba(180,140,0,.5);color:#a16207;}
.race-tab.grade-tab.active{background:rgba(180,140,0,.15);border-color:var(--gold);color:#7c5700;}
.tab-grade{font-size:9px;display:inline-block;margin-left:3px;padding:1px 4px;border-radius:3px;background:rgba(180,140,0,.25);color:#7c5700;}
.race-tab.turf-tab{border-color:rgba(34,197,94,.5);color:#15803d;}
.race-tab.turf-tab.active{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.8);color:#15803d;}
.race-tab.dirt-tab{border-color:rgba(180,120,60,.5);color:#92400e;}
.race-tab.dirt-tab.active{background:rgba(180,120,60,.15);border-color:rgba(180,120,60,.8);color:#92400e;}

/* Race panel */
.race-panel{display:none;}
.race-panel.active{display:block;}

/* Race header */
.race-header{background:#FBF7EE;border:1px solid rgba(201,169,97,.35);border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.race-grade-badge{display:inline-block;font-size:10px;font-weight:900;padding:3px 10px;border-radius:5px;margin-bottom:8px;letter-spacing:.08em;}
.grade-G1{background:linear-gradient(90deg,#C9A961,#D4B878);color:#1A1A1A;}
.grade-G2{background:linear-gradient(90deg,#1F4D2E,#2F7A47);color:#FBF7EE;}
.grade-G3{background:linear-gradient(90deg,#2B5A9F,#4B7BBF);color:#FBF7EE;}
.grade-OP{background:rgba(26,26,26,.10);color:var(--muted);}
.race-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:20px;font-weight:800;color:#9B2D30;margin-bottom:6px;}
.race-meta{font-size:11px;color:var(--muted);}
.race-meta span{margin-right:12px;}

/* ★ Outlook card (重賞展望) */
.outlook-card{
  margin-bottom:14px;padding:18px;border-radius:14px;
  background:#FBF7EE;
  border:1px solid rgba(155,45,48,.30);
  position:relative;overflow:hidden;
}
.outlook-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.outlook-label{font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.outlook-label::after{content:'';flex:1;height:1px;background:rgba(155,45,48,.20);}
.outlook-text{font-size:13px;color:#1A1A1A;line-height:1.8;}

/* ★ Ability grade row */
.ability-row{display:flex;align-items:flex-start;gap:8px;margin-top:6px;flex-wrap:wrap;}
.ability-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:900;padding:2px 8px;border-radius:4px;letter-spacing:.04em;white-space:nowrap;}
.ability-S{background:linear-gradient(90deg,#C9A961,#D4B878);color:#1A1A1A;}
.ability-A{background:rgba(201,169,97,.25);color:#0f766e;border:1px solid rgba(15,118,110,.5);}
.ability-B{background:rgba(59,130,246,.2);color:#1d4ed8;border:1px solid rgba(29,78,216,.4);}
.ability-C{background:rgba(107,114,128,.2);color:#9ca3af;border:1px solid rgba(107,114,128,.25);}

/* ★ Comments */
.ability-comment{font-size:11px;color:#1A1A1A;line-height:1.7;margin-top:4px;padding:6px 12px;background:rgba(155,45,48,.07);border-left:3px solid rgba(155,45,48,.50);border-radius:0 6px 6px 0;}
.judge-comment{font-size:11px;color:#1A1A1A;line-height:1.7;margin-top:4px;padding:6px 12px;background:rgba(201,169,97,.07);border-left:3px solid rgba(201,169,97,.45);border-radius:0 6px 6px 0;}
.judge-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:900;padding:1px 6px;border-radius:3px;letter-spacing:.04em;margin-left:4px;vertical-align:middle;}
.judge-badge-A{background:rgba(201,169,97,.2);color:#0f766e;border:1px solid rgba(15,118,110,.4);}
.judge-badge-B{background:rgba(59,130,246,.15);color:#1d4ed8;border:1px solid rgba(29,78,216,.3);}
.judge-badge-S{background:linear-gradient(90deg,#C9A961,#D4B878);color:#1A1A1A;}
.judge-badge-C{background:rgba(107,114,128,.15);color:#9ca3af;border:1px solid rgba(107,114,128,.2);}

/* Speed index details */
.speed-detail{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.speed-val{font-size:11px;font-weight:700;color:var(--gold);}
.speed-up{color:#166534;font-size:10px;}
.speed-dn{color:#f87171;font-size:10px;}
.speed-st{color:var(--muted);font-size:10px;}
.speed-hist span{font-size:10px;color:rgba(26,26,26,.5);}

/* Horse table */
.horse-table{width:100%;border-collapse:collapse;font-size:12px;}
.horse-table th{padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;border-bottom:1px solid rgba(201,169,97,.2);}
.horse-table td{padding:10px 8px;border-bottom:1px solid rgba(0,0,0,.08);vertical-align:top;}
.horse-table tr:hover td{background:rgba(0,0,0,.03);}
.horse-table tr:last-child td{border-bottom:none;}
.td-num{font-size:11px;color:rgba(26,26,26,.3);width:38px;text-align:center;padding-top:10px;}
.pop-badge{display:inline-block;font-size:13px;font-weight:900;line-height:1;padding:3px 5px;border-radius:6px;min-width:24px;text-align:center;}
.pop-1,.pop-2,.pop-3{background:rgba(155,45,48,.12);color:#9B2D30;border:1px solid rgba(155,45,48,.30);}
.pop-4,.pop-5,.pop-6{background:rgba(15,118,110,.12);color:#0f766e;border:1px solid rgba(15,118,110,.3);}
.pop-other{background:rgba(26,26,26,.07);color:rgba(26,26,26,.45);border:1px solid rgba(26,26,26,.12);}
.pop-odds{font-size:9px;color:rgba(26,26,26,.4);margin-top:2px;letter-spacing:-.01em;}
.pop-badge{display:inline-flex;flex-direction:column;align-items:center;}
.pop-num{font-size:14px;font-weight:900;line-height:1.1;}
.pop-ninki{font-size:8px;font-weight:700;line-height:1;opacity:.85;}
.sabc-pick-pop{font-size:10px;color:rgba(26,26,26,.6);margin:2px 0 6px;line-height:1.5;}
.sabc-pick-pop strong{font-weight:900;color:var(--text);}
.td-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:14px;font-weight:700;color:#1A1A1A;display:flex;align-items:center;flex-wrap:wrap;gap:5px;}
.sabc-name-tan{font-size:13px;font-weight:900;padding:2px 8px;border-radius:6px;background:linear-gradient(135deg,rgba(155,45,48,.18),rgba(155,45,48,.08));border:1px solid rgba(155,45,48,.30);color:#9B2D30;letter-spacing:.02em;white-space:nowrap;}
.sabc-name-fuku{font-size:11px;font-weight:900;padding:2px 7px;border-radius:6px;background:rgba(29,78,216,.15);border:1px solid rgba(29,78,216,.4);color:#1e3a8a;letter-spacing:.02em;white-space:nowrap;}
.td-sire{font-size:10px;color:rgba(26,26,26,.5);margin-top:2px;}
/* ── 印バッジ ─────────────────────────────────────────── */
.mark-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:15px;font-weight:900;flex-shrink:0;line-height:1;}
.mark-honmei{background:rgba(180,20,20,.12);color:#b41414;border:2px solid rgba(180,20,20,.5);}
.mark-taikou{background:rgba(200,40,40,.08);color:#c03030;border:1.5px solid rgba(200,40,40,.38);}
.mark-saban{background:rgba(26,26,26,.09);color:#1A1A1A;border:1.5px solid rgba(26,26,26,.38);}
.mark-hoshi{background:rgba(170,130,0,.1);color:#7a5e00;border:1.5px solid rgba(170,130,0,.42);}
.mark-renge{background:rgba(26,26,26,.04);color:rgba(26,26,26,.42);border:1px solid rgba(26,26,26,.2);}
/* ── 買い目セクション ───────────────────────────────────── */
.bet-section{margin:14px 0 6px;border-radius:12px;overflow:hidden;border:1px solid rgba(26,26,26,.12);background:rgba(255,255,255,.5);}
.bet-section-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(26,26,26,.04);border-bottom:1px solid rgba(26,26,26,.08);}
.bet-section-title{font-size:10px;font-weight:900;letter-spacing:.15em;color:rgba(26,26,26,.7);}
.bet-pattern-badge{font-size:9px;font-weight:900;padding:2px 9px;border-radius:4px;letter-spacing:.05em;}
.bet-note{font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;background:rgba(180,120,0,.12);color:#a06000;border:1px solid rgba(180,120,0,.35);letter-spacing:.03em;}
.pat-a{background:rgba(180,20,20,.12);color:#b41414;border:1px solid rgba(180,20,20,.3);}
.pat-b{background:rgba(29,78,216,.1);color:#1e3a8a;border:1px solid rgba(29,78,216,.28);}
.pat-c{background:rgba(100,100,100,.1);color:#4a4a4a;border:1px solid rgba(100,100,100,.3);}
.bet-threshold-note{font-size:8px;color:rgba(26,26,26,.3);margin-left:auto;}
.bet-common{display:flex;gap:16px;padding:10px 14px;border-bottom:1px solid rgba(26,26,26,.06);flex-wrap:wrap;}
.bet-row{display:flex;align-items:center;gap:6px;}
.bet-type-tag{font-size:9px;font-weight:900;padding:1px 6px;border-radius:3px;background:rgba(26,26,26,.08);color:rgba(26,26,26,.7);letter-spacing:.05em;white-space:nowrap;}
.bet-sub{font-size:10px;color:rgba(26,26,26,.55);font-family:'Shippori Mincho','Noto Serif JP',serif;}
.bet-cards{display:flex;flex-direction:column;}
.bet-card{padding:10px 14px;border-bottom:1px solid rgba(26,26,26,.06);}
.bet-card:last-child{border-bottom:none;}
.bet-card-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bet-kind{font-size:10px;font-weight:900;color:rgba(26,26,26,.8);letter-spacing:.04em;}
.bet-pts{font-size:10px;font-weight:900;padding:1px 7px;border-radius:4px;background:rgba(155,45,48,.08);color:#9B2D30;border:1px solid rgba(155,45,48,.20);}
.bet-formula{display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.bet-formula-grid{display:flex;flex-direction:column;gap:5px;}
.bet-formula-grid>div{display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.bet-col-label{font-size:8px;font-weight:900;color:rgba(26,26,26,.4);min-width:34px;flex-shrink:0;}
.bet-arrow{font-size:12px;font-weight:700;color:rgba(26,26,26,.4);margin:0 1px;}
.bet-axis{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:900;color:rgba(26,26,26,.5);}
.bet-uma{display:inline-flex;align-items:center;gap:2px;background:rgba(26,26,26,.07);border:1px solid rgba(26,26,26,.15);border-radius:5px;padding:2px 6px;font-size:11px;font-weight:900;color:#1A1A1A;}
.bet-mark{font-size:9px;color:rgba(26,26,26,.45);}
.td-jockey-row{font-size:11px;color:rgba(26,26,26,.7);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.td-jockey-name{font-weight:700;}
.td-weight-val{font-weight:900;color:var(--gold);}
.no-jockey{color:rgba(26,26,26,.4);font-style:italic;font-size:11px;}
.sex-badge{display:inline-block;font-size:9px;font-weight:900;padding:1px 5px;border-radius:3px;margin-right:3px;vertical-align:middle;}
.sex-牡{background:rgba(29,78,216,.22);color:#1e3a8a;border:1px solid rgba(29,78,216,.3);}
.sex-牝{background:rgba(219,39,119,.18);color:#9d174d;border:1px solid rgba(219,39,119,.3);}
.sex-セ{background:rgba(75,85,99,.18);color:#374151;border:1px solid rgba(75,85,99,.25);}
.count-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(0,0,0,.06);color:var(--muted);margin-left:8px;vertical-align:middle;}

/* PDF section */
.pdf-section{margin-bottom:16px;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:12px 14px;}
.pdf-section-title{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.pdf-link{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.08);text-decoration:none;color:var(--text);margin-bottom:5px;transition:background .15s;}
.pdf-link:last-child{margin-bottom:0;}
.pdf-link:hover{background:rgba(0,0,0,.07);}
.pdf-name{font-size:12px;font-weight:700;}
.pdf-meta{font-size:10px;color:var(--muted);}

/* Score & rank */
.score-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;background:rgba(155,45,48,.12);color:var(--gold);border:1px solid rgba(155,45,48,.30);margin-left:4px;}
.rank-num{display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--gold);min-width:32px;line-height:1;margin-right:6px;letter-spacing:-.02em;}
.ext-facility{font-size:10px;color:#166534;margin-top:3px;padding-left:2px;}

/* Lap analysis card */
.lap-card{
  margin-bottom:14px;padding:16px 18px;border-radius:14px;
  background:#FBF7EE;
  border:1px solid rgba(201,169,97,.40);
  position:relative;overflow:hidden;
}
.lap-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--shu),var(--kin),var(--shu),transparent);
}
.lap-card-label{font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.lap-card-label::after{content:'';flex:1;height:1px;background:rgba(155,45,48,.12);}
.lap-card-text{font-size:11.5px;color:#1A1A1A;line-height:1.9;white-space:pre-line;}

/* ── 前走成績バー ── */
.prevrace-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  margin-top:7px;padding:7px 10px;
  background:rgba(0,0,0,.04);
  border:1px solid rgba(0,0,0,.09);
  border-radius:8px;
  font-size:10px;
}
.prevrace-label{
  font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(26,26,26,.5);margin-right:2px;
}
.prevrace-rank{
  font-weight:900;padding:1px 6px;border-radius:4px;font-size:10px;
}
.prevrace-rank.rank-1{background:linear-gradient(135deg,#C9A961,#D4B878);color:#1A1A1A;}
.prevrace-rank.rank-2{background:rgba(180,180,180,.25);color:#1A1A1A;border:1px solid rgba(26,26,26,.2);}
.prevrace-rank.rank-3{background:rgba(160,80,20,.15);color:#7a3e00;border:1px solid rgba(160,80,20,.45);}
.prevrace-rank.rank-out{background:rgba(0,0,0,.06);color:rgba(26,26,26,.7);}
.prevrace-name{font-weight:700;color:#1A1A1A;white-space:nowrap;}
.prevrace-sep{color:rgba(26,26,26,.3);}
.prevrace-style{color:rgba(26,26,26,.65);}
.prevrace-3f{color:#166534;font-weight:700;}
.prevrace-3f-rank{font-size:9px;color:rgba(22,101,52,.65);}
.prevrace-pci{font-weight:700;}
.prevrace-pci.above{color:#9B2D30;}
.prevrace-pci.below{color:rgba(26,26,26,.7);}
.prevrace-margin.pos{color:#f87171;}
.prevrace-margin.neg{color:#15803d;}
.prevrace-margin.zero{color:rgba(26,26,26,.6);}
.prevrace-weight{color:rgba(26,26,26,.55);}
.prevrace-interval{font-size:9px;color:rgba(26,26,26,.5);}

/* ── SABC バー ── */
.sabc-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:4px;
  margin-top:6px;padding:6px 10px;
  background:rgba(139,26,26,.04);
  border:1px solid rgba(155,45,48,.12);
  border-radius:8px;
  font-size:10px;
}
.sabc-label{font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:rgba(155,45,48,.50);margin-right:1px;}
.sabc-sep{color:rgba(26,26,26,.2);margin:0 4px;}
.sabc-badge{font-weight:900;padding:1px 5px;border-radius:4px;font-size:10px;min-width:18px;text-align:center;}
.sabc-badge.g-S{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;}
.sabc-badge.g-A{background:rgba(59,130,246,.35);color:#1d4ed8;border:1px solid rgba(29,78,216,.3);}
.sabc-badge.g-B{background:rgba(34,197,94,.18);color:#166534;border:1px solid rgba(22,101,52,.3);}
.sabc-badge.g-C{background:rgba(26,26,26,.1);color:rgba(26,26,26,.55);}
.sabc-badge.g-D{background:rgba(180,30,30,.1);color:rgba(160,20,20,.6);border:1px solid rgba(160,20,20,.2);}
.sabc-total{font-weight:900;color:#9B2D30;font-size:11px;margin-left:2px;}
.sabc-factor-label{font-size:8px;color:rgba(26,26,26,.5);margin-right:1px;}
.sabc-trainer-info{font-size:9px;color:rgba(26,26,26,.5);margin-left:4px;}
.sabc-breakdown{font-size:9px;color:rgba(26,26,26,.55);margin-top:3px;margin-left:2px;display:flex;align-items:center;gap:4px;}
.sabc-breakdown-base{color:rgba(26,26,26,.5);}
.sabc-breakdown-plus{color:rgba(139,26,26,.55);font-weight:700;}
.sabc-fire{font-size:12px;margin-left:2px;line-height:1;}

/* ── SABC Pick Section ─────────────────────────────── */
.sabc-pick-section{display:flex;flex-direction:column;gap:8px;margin:14px 0 6px;}
.sabc-pick-row{display:flex;align-items:stretch;gap:8px;}
.sabc-pick-dim-label{writing-mode:vertical-rl;text-orientation:mixed;font-size:8px;font-weight:900;letter-spacing:.25em;padding:8px 6px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-width:22px;flex-shrink:0;}
.sabc-pick-dim-label.tan{background:linear-gradient(180deg,rgba(155,45,48,.20),rgba(155,45,48,.06));color:#9B2D30;border:1px solid rgba(155,45,48,.30);}
.sabc-pick-dim-label.fuku{background:linear-gradient(180deg,rgba(29,78,216,.2),rgba(29,78,216,.06));color:#1e3a8a;border:1px solid rgba(29,78,216,.3);}
.sabc-pick-horses{display:flex;gap:8px;flex:1;flex-wrap:wrap;}
.sabc-pick-card{position:relative;border-radius:12px;padding:12px 14px 10px;overflow:hidden;flex:1;min-width:140px;}
.sabc-pick-card.pick-tan{background:linear-gradient(135deg,rgba(139,26,26,.10),rgba(139,26,26,.04));border:1px solid rgba(139,26,26,.28);}
.sabc-pick-card.pick-fuku{background:linear-gradient(135deg,rgba(59,130,246,.10),rgba(59,130,246,.04));border:1px solid rgba(59,130,246,.28);}
.sabc-pick-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sabc-pick-card.pick-tan::before{background:linear-gradient(90deg,#b8860b,#ffd700);}
.sabc-pick-card.pick-fuku::before{background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
.sabc-pick-tied{font-size:8px;font-weight:900;letter-spacing:.1em;padding:1px 6px;border-radius:3px;background:rgba(0,0,0,.06);color:rgba(26,26,26,.6);margin-bottom:4px;display:inline-block;}
.sabc-pick-umaban{font-size:10px;font-weight:900;padding:1px 6px;border-radius:4px;background:rgba(0,0,0,.06);color:rgba(26,26,26,.7);}
.sabc-pick-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:17px;font-weight:700;color:#1A1A1A;line-height:1.3;margin:4px 0;}
.sabc-pick-score{font-size:24px;font-weight:900;line-height:1;margin-bottom:8px;}
.sabc-pick-card.pick-tan .sabc-pick-score{color:#9B2D30;}
.sabc-pick-card.pick-fuku .sabc-pick-score{color:#1e3a8a;}

.sabc-pick-badges{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.sabc-pick-fl{font-size:8px;color:rgba(26,26,26,.5);margin-right:1px;}
/* ── SABC Ranking (重賞) ────────────────────────────────── */
.sabc-rank-wrap{display:flex;gap:12px;margin:14px 0 6px;flex-wrap:wrap;}
.sabc-rank-block{flex:1;min-width:180px;}
.sabc-rank-header{font-size:9px;font-weight:900;letter-spacing:.2em;padding:6px 12px;border-radius:8px 8px 0 0;text-align:center;}
.sabc-rank-header.tan{background:linear-gradient(135deg,rgba(155,45,48,.20),rgba(155,45,48,.06));color:#9B2D30;border:1px solid rgba(155,45,48,.30);border-bottom:none;}
.sabc-rank-header.fuku{background:linear-gradient(135deg,rgba(29,78,216,.2),rgba(29,78,216,.06));color:#1e3a8a;border:1px solid rgba(29,78,216,.3);border-bottom:none;}
.sabc-rank-list{border:1px solid rgba(26,26,26,.1);border-radius:0 0 8px 8px;overflow:hidden;}
.sabc-rank-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.6);}
.sabc-rank-row+.sabc-rank-row{border-top:1px solid rgba(26,26,26,.06);}
.sabc-rank-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.sabc-rank-badge.r1{background:linear-gradient(135deg,#ffd700,#f5a800);color:#5a3a00;box-shadow:0 1px 3px rgba(245,168,0,.4);}
.sabc-rank-badge.r2{background:linear-gradient(135deg,#e0e0e0,#b0b0b0);color:#3a3a3a;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sabc-rank-badge.r3{background:linear-gradient(135deg,#d4884a,#b8642a);color:#fff;box-shadow:0 1px 3px rgba(180,100,40,.3);}
.sabc-rank-name-block{flex:1;min-width:0;}
.sabc-rank-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:14px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sabc-rank-pop{font-size:9px;color:rgba(26,26,26,.5);margin-top:1px;}
.sabc-rank-score{font-size:20px;font-weight:900;line-height:1;white-space:nowrap;flex-shrink:0;}
.sabc-rank-score.tan{color:#9B2D30;}
.sabc-rank-score.fuku{color:#1e3a8a;}
.sabc-rank-score span{font-size:10px;font-weight:700;margin-left:1px;opacity:.7;}

/* ── 馬場予想 ─────────────────────────────────────────────── */
.baba-row{display:flex;align-items:center;gap:12px;margin-top:10px;justify-content:center;flex-wrap:wrap;}
.baba-venue-block{display:flex;align-items:center;gap:6px;}
.baba-venue-label{font-size:10px;font-weight:900;letter-spacing:.08em;color:rgba(26,26,26,.5);border:1px solid rgba(26,26,26,.2);padding:2px 7px;border-radius:10px;}
.baba-divider{color:rgba(26,26,26,.2);font-size:13px;}
.weather-info{font-size:11px;color:rgba(26,26,26,.55);}
.baba-badge{font-size:11px;font-weight:900;padding:4px 12px;border-radius:20px;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px;}
.baba-badge.turf{background:rgba(34,197,94,.18);color:#15803d;border:1px solid rgba(34,197,94,.4);}
.baba-badge.dirt{background:rgba(180,120,60,.18);color:#92400e;border:1px solid rgba(180,120,60,.4);}

/* ── セクション見出し ──────────────────────────────────────── */

/* ── INDEX / TOC ─────────────────────────────────────────── */

  display:flex;flex-wrap:wrap;gap:6px;
  margin:10px 0 16px;padding:10px 12px;

}
.toc-label{font-size:8px;font-weight:900;letter-spacing:.2em;color:rgba(26,26,26,.4);margin-right:4px;align-self:center;}

  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:14px;
  background:rgba(255,255,255,.65);border:1px solid rgba(26,26,26,.12);
  color:#1A1A1A;text-decoration:none;

}

/* ── 重馬場特注激走メモ ──────────────────────────────────── */
.wet-pick-section{
  margin-bottom:14px;border-radius:14px;overflow:hidden;
  border:1px solid rgba(29,78,216,.2);
}
.wet-pick-label{
  font-size:9px;font-weight:900;letter-spacing:.18em;
  padding:9px 14px;
  background:linear-gradient(135deg,rgba(29,78,216,.12),rgba(29,78,216,.04));
  color:#1e3a8a;border-bottom:1px solid rgba(29,78,216,.15);
  display:flex;align-items:center;gap:6px;
}
.wet-pick-card{
  padding:10px 14px;background:rgba(255,255,255,.5);
  border-bottom:1px solid rgba(29,78,216,.07);
}
.wet-pick-card:last-child{border-bottom:none;}
.wet-pick-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.wet-grade-badge{font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.wg-S{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;}
.wg-A{background:rgba(59,130,246,.35);color:#1d4ed8;border:1px solid rgba(29,78,216,.3);}
.wet-b-badge{
  font-size:9px;font-weight:900;padding:2px 7px;border-radius:4px;
  background:rgba(16,185,129,.2);color:#065f46;border:1px solid rgba(16,185,129,.35);
}
.wet-pick-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:13px;font-weight:700;color:#1A1A1A;}
.wet-pick-umaban{font-size:10px;font-weight:900;padding:1px 5px;border-radius:4px;background:rgba(0,0,0,.06);color:rgba(26,26,26,.7);margin-right:3px;}
.wet-pick-pop{font-size:9px;color:rgba(26,26,26,.5);}
.wet-pick-comment{
  font-size:11px;color:#1A1A1A;line-height:1.75;
  padding:5px 10px;margin-top:4px;
  background:rgba(29,78,216,.04);border-left:2px solid rgba(29,78,216,.3);border-radius:0 5px 5px 0;
}

/* Loading */
#loading{text-align:center;padding:60px;color:var(--muted);}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="hdr-back">← TOP</a>
  <div style="flex:1;">
    <div class="hdr-logo">UG競馬神宮</div>
    <div class="hdr-sub">出走想定表</div>
  </div>
</header>

<div class="page-wrap">
  <div id="loading" class="pulse">データ読み込み中...</div>
  <div id="content" style="display:none">
    <div class="date-header">
      <div class="date-main" id="date-main"></div>
      <div class="baba-row">
        <span class="baba-venue-block">
          <span class="baba-venue-label">阪神</span>
          <span class="weather-info">🌧️ 雨時々止む</span>
          <span class="baba-badge turf"><span class="baba-type">芝</span>重〜不良</span>
          <span class="baba-badge dirt"><span class="baba-type">ダート</span>重〜不良</span>
        </span>
        <span class="baba-divider">｜</span>
        <span class="baba-venue-block">
          <span class="baba-venue-label">中山</span>
          <span class="weather-info">☁️ くもり</span>
          <span class="baba-badge turf"><span class="baba-type">芝</span>良〜稍重</span>
          <span class="baba-badge dirt"><span class="baba-type">ダート</span>良〜稍重</span>
        </span>
      </div>
    </div>

    <div class="race-tabs" id="race-tabs"></div>
    <div id="race-panels"></div>
  </div>
</div>

<script>
const SOUTEI_URL    = 'data/soutei-2026-04-05.json';
const NOTES_BASE    = 'data/race-notes/';
const HORSES_URL    = 'data/horses-2026-04w.json';
const PREVRACE_BASE = 'data/prevrace/';

const GRADE_CLASS  = {G1:'grade-G1',G2:'grade-G2',G3:'grade-G3'};
const GRADE_SCORE  = {S:4,A:3,B:2,C:1};

function gradeScore(g){ return GRADE_SCORE[g]||0; }

// 分析ファクター合計（ability+lap+prev+ext+bms、今後 jockey+training も追加）
function computeBaseScore(n){
  if(!n) return 0;
  return gradeScore(n.abilityGrade)+gradeScore(n.lapGrade)+gradeScore(n.prevGrade)
        +gradeScore(n.extGrade)+gradeScore(n.bmsGrade)
        +gradeScore(n.jockeyGrade)+gradeScore(n.trainingGrade);
}

// 総合スコア = 分析ファクター + SABC単勝pt + SABC複勝pt + wetScore（重馬場想定時）
function computeScore(n){
  if(!n) return 0;
  const base = computeBaseScore(n);
  const tan  = (n.sabc && n.sabc.tan)  ? n.sabc.tan.total  : 0;
  const fuku = (n.sabc && n.sabc.fuku) ? n.sabc.fuku.total : 0;
  const wet  = n.wetScore || 0;
  return (base + tan + fuku) || wet;
}

// 同点タイブレーク: 1st=ZI値降順 / 2nd=トレンド(up>stable>down)降順
const TREND_SCORE = { up: 2, stable: 1, down: 0 };
function compareHorses(na, nb) {
  const d = computeScore(nb) - computeScore(na);
  if (d !== 0) return d;
  const ziDiff = ((nb && nb.sabcZI) || 0) - ((na && na.sabcZI) || 0);
  if (ziDiff !== 0) return ziDiff;
  return ((nb && TREND_SCORE[nb.trend]) || 0) - ((na && TREND_SCORE[na.trend]) || 0);
}

// 単複ランキング用タイブレーク再ソート（total同点時: ZI→trend）
function sortRankWithTiebreak(rank, horses) {
  return [...rank].sort((a, b) => {
    if (b.total !== a.total) return b.total - a.total;
    const ha = horses[a.name] || {}, hb = horses[b.name] || {};
    const ziDiff = (hb.sabcZI || 0) - (ha.sabcZI || 0);
    if (ziDiff !== 0) return ziDiff;
    return (TREND_SCORE[hb.trend] || 0) - (TREND_SCORE[ha.trend] || 0);
  });
}

function gradeHtml(g) {
  if (!g) return `<span class="race-grade-badge grade-OP">オープン</span>`;
  return `<span class="race-grade-badge ${GRADE_CLASS[g]}">${g}</span>`;
}
function sexHtml(s) { return `<span class="sex-badge sex-${s}">${s}</span>`; }

function factorBadge(label, g){
  if(!g) return '';
  return `<span class="ability-badge ability-${g}" style="font-size:10px;padding:2px 7px;">${label}&nbsp;${g}</span>`;
}

function abilityHtml(n, rank) {
  if (!n) return '';
  const ag = n.abilityGrade, lg = n.lapGrade, pg = n.prevGrade, eg = n.extGrade;
  if (!ag && !lg && !pg && !eg) return '';
  const base  = computeBaseScore(n);
  const tan   = (n.sabc && n.sabc.tan)  ? n.sabc.tan.total  : 0;
  const fuku  = (n.sabc && n.sabc.fuku) ? n.sabc.fuku.total : 0;
  const score = base + tan + fuku;
  const rankHtml = rank != null ? `<span class="rank-num">${rank}位</span>` : '';
  let html = `<div class="ability-row">`;
  html += rankHtml;
  html += factorBadge('能力', ag);
  html += factorBadge('ラップ', lg);
  html += factorBadge('前走', pg);
  html += factorBadge('外厩', eg);
  if (n.bmsGrade)      html += factorBadge('舞台', n.bmsGrade);
  if (n.jockeyGrade)   html += factorBadge('騎手', n.jockeyGrade);
  if (n.trainingGrade) html += factorBadge('調教', n.trainingGrade);
  if (score > 0) {
    const sabcSum = tan + fuku;
    const fire = sabcSum >= 52 ? '🔥🔥' : sabcSum >= 40 ? '🔥' : '';
    html += `<span class="score-badge">${score}pt</span>`;
    if (fire) html += `<span class="sabc-fire">${fire}</span>`;
  }
  html += `</div>`;
  if (score > 0) {
    let parts = `<span class="sabc-breakdown-base">分析 ${base}pt</span>`;
    if (tan  > 0) parts += `<span style="color:rgba(26,26,26,.35);">+</span><span class="sabc-breakdown-plus">単 ${tan}pt</span>`;
    if (fuku > 0) parts += `<span style="color:rgba(26,26,26,.35);">+</span><span style="color:#1e3a8a;font-weight:700;">複 ${fuku}pt</span>`;
    html += `<div class="sabc-breakdown">${parts}</div>`;
  }
  if (n.extFacility) html += `<div class="ext-facility">▸ ${n.extFacility}</div>`;
  const abCmt = n.abilityCommentRtf || (n.abilityCommentRtf === undefined ? n.abilityComment : '');
  if (abCmt) html += `<div class="ability-comment">${abCmt}</div>`;
  if (n.lapComment)  html += `<div class="ability-comment" style="border-left-color:rgba(59,130,246,.35);">${n.lapComment}</div>`;
  if (n.prevComment) html += `<div class="ability-comment" style="border-left-color:rgba(236,72,153,.35);">${n.prevComment}</div>`;
  return html;
}

function prevRaceHtml(pdata) {
  if (!pdata) return '';
  const rank = pdata.prevRank;
  let rankCls = 'rank-out';
  if (rank === 1) rankCls = 'rank-1';
  else if (rank === 2) rankCls = 'rank-2';
  else if (rank === 3) rankCls = 'rank-3';

  const marginVal = pdata.margin;
  let marginCls = 'zero', marginTxt = '0';
  if (marginVal != null) {
    if (marginVal < 0)      { marginCls = 'neg'; marginTxt = marginVal.toFixed(1); }
    else if (marginVal > 0) { marginCls = 'pos'; marginTxt = '+' + marginVal.toFixed(1); }
    else                    { marginCls = 'zero'; marginTxt = 'ハナ'; }
  }

  const pciCls = pdata.pciAboveAvg ? 'above' : 'below';
  const pciStar = pdata.pciAboveAvg ? '★' : '';

  const courseParts = [];
  if (pdata.prevVenue)   courseParts.push(pdata.prevVenue);
  if (pdata.prevSurface) courseParts.push(pdata.prevSurface);
  if (pdata.prevDistance) courseParts.push(pdata.prevDistance + 'm');
  const courseStr = courseParts.join('');

  return `<div class="prevrace-bar">
    <span class="prevrace-label">前走</span>
    <span class="prevrace-rank ${rankCls}">${rank}着</span>
    <span class="prevrace-name">${pdata.prevRaceName}</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-style">${pdata.runningStyle}</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-3f">上3F ${pdata.last3F}</span>
    <span class="prevrace-3f-rank">(${pdata.last3FRank}位/${pdata.weight}kg)</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-pci ${pciCls}">PCI ${pdata.pci}${pciStar}</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-margin ${marginCls}">着差${marginTxt}</span>
    <span class="prevrace-interval">${courseStr}・${pdata.prevCondition}・${pdata.interval}週前</span>
  </div>`;
}

function lapAnalysisHtml(notes) {
  if (!notes || !notes.lapAnalysis) return '';
  return `<div class="lap-card">
    <div class="lap-card-label">ラップ分析</div>
    <div class="lap-card-text">${notes.lapAnalysis}</div>
  </div>`;
}

function outlookHtml(notes) {
  if (!notes || !notes.outlook) return '';
  return `<div class="outlook-card">
    <div class="outlook-label">展望</div>
    <div class="outlook-text">${notes.outlook}</div>
  </div>`;
}

function wetPickHtml(notes, race) {
  if (!notes || !notes.horses) return '';
  const picks = Object.keys(notes.horses)
    .filter(n => {
      const sabc = notes.horses[n].sabc;
      return sabc && sabc.tan && (sabc.tan.wet === 'S' || sabc.tan.wet === 'A');
    })
    .map(n => {
      const hn = notes.horses[n];
      return { name: n, wetGrade: hn.sabc.tan.wet, hasWetB: hn.sabc.tan.wet_b === 'S', hn };
    })
    .sort((a, b) => ({ S: 0, A: 1 }[a.wetGrade]) - ({ S: 0, A: 1 }[b.wetGrade]));
  if (picks.length === 0) return '';
  function umabanOf(name) {
    const h = (race.horses || []).find(x => x.name === name);
    return h ? h.num : '―';
  }
  const cards = picks.map(p => {
    const comment = p.hn.wetComment || p.hn.lapComment || p.hn.abilityComment || '';
    const wetBBadge = p.hasWetB ? `<span class="wet-b-badge">道悪+ S</span>` : '';
    const pop = p.hn.popularity;
    return `<div class="wet-pick-card">
      <div class="wet-pick-head">
        <span class="wet-grade-badge wg-${p.wetGrade}">道悪 ${p.wetGrade}</span>
        ${wetBBadge}
        <span class="wet-pick-name"><span class="wet-pick-umaban">${umabanOf(p.name)}番</span>${p.name}</span>
        ${pop ? `<span class="wet-pick-pop">${pop}番人気</span>` : ''}
      </div>
      ${comment ? `<div class="wet-pick-comment">${comment}</div>` : ''}
    </div>`;
  }).join('');
  return `<div class="wet-pick-section">
    <div class="wet-pick-label">🌧️ 重馬場 特注激走メモ</div>
    ${cards}
  </div>`;
}

function tocHtml(notes, idx) {
  const isGrade = /G[1-3]/.test((notes && notes.grade) || '');
  const hasLap  = !!(notes && notes.lapAnalysis);
  const hasWet  = notes && notes.horses &&
    Object.values(notes.horses).some(h => h.sabc && h.sabc.tan &&
      (h.sabc.tan.wet === 'S' || h.sabc.tan.wet === 'A'));
  const items = [
    { id: `sabc-rank-${idx}`, label: '📊 単複ランク' },
    isGrade ? { id: `bet-${idx}`,      label: '🎯 買い目' }      : null,
    { id: `all-horses-${idx}`, label: '🐴 全頭診断' },
    hasWet  ? { id: `wet-pick-${idx}`, label: '🌧️ 重馬場メモ' }  : null,
    hasLap  ? { id: `lap-${idx}`,      label: '📈 ラップ分析' }   : null,
  ].filter(Boolean);
  const links = items.map(it =>
    `<a href="#${it.id}" class="toc-link">${it.label}</a>`
  ).join('');
  return `<nav class="toc-nav"><span class="toc-label">INDEX</span>${links}</nav>`;
}

function sabcBadge(g){ return `<span class="sabc-badge g-${g}">${g}</span>`; }

// ファクターキー → 表示ラベル（全レース共通マップ）
const SABC_LABEL_MAP = {
  zi:       'ZI',
  trainer:  '厩',
  sire:     '父',
  style:    '脚',
  last3f:   '3F',
  pci:      'PCI',
  age:      '齢',
  weight:   '馬格',
  diff3f:   '差',
  course:   '前コ',
  wet:      '道悪',
  wet_b:    '道悪+',
  jockey:   '騎手',
  jockey_b: '騎手+',
  line:     '騎厩',
  training: '調教',
};

function sabcFactors(sabc_tan) {
  // totalを除いたキーをJSONの順番で返す
  return Object.keys(sabc_tan).filter(k => k !== 'total');
}

function sabcHtml(hn) {
  if (!hn || !hn.sabc) return '';
  const t = hn.sabc.tan, f = hn.sabc.fuku;
  const factors = sabcFactors(t);
  let tanBadges  = factors.map(k=>`<span class="sabc-factor-label">${SABC_LABEL_MAP[k]||k}</span>${sabcBadge(t[k])}`).join('');
  let fukuBadges = factors.map(k=>`<span class="sabc-factor-label">${SABC_LABEL_MAP[k]||k}</span>${sabcBadge(f[k])}`).join('');
  const trainerInfo = hn.sabcTrainer ? `<span class="sabc-trainer-info">${hn.sabcTrainer}／${hn.sabcSire||''}</span>` : '';
  return `<div class="sabc-bar">
    <span class="sabc-label">単勝</span>${tanBadges}<span class="sabc-total">${t.total}pt</span>
    <span class="sabc-sep">|</span>
    <span class="sabc-label">複勝</span>${fukuBadges}<span class="sabc-total">${f.total}pt</span>
    ${trainerInfo}
  </div>`;
}

function sabcPickHtml(notes, race) {
  if (!notes || !notes.sabcRankTan || !notes.sabcRankFuku) return '';
  if (!notes.sabcRankTan[0] || !notes.sabcRankFuku[0]) return '';

  const horses   = notes.horses || {};
  const rankTan  = sortRankWithTiebreak(notes.sabcRankTan,  horses);
  const rankFuku = sortRankWithTiebreak(notes.sabcRankFuku, horses);

  const isGrade = /G[1-3]/.test(notes.grade || '');

  function umabanOf(name) {
    const h = (race.horses||[]).find(x=>x.name===name);
    return h ? h.num : '―';
  }

  // ── 重賞: 1〜3位ランキング表示 ──────────────────────────
  if (isGrade) {
    const RANK_CLS = ['r1','r2','r3'];
    function rankRow(dim, entry, rank) {
      const hn = notes.horses[entry.name];
      if (!hn) return '';
      const popInfo = hn.popularity
        ? `${hn.popularity}番人気 / ${dim==='tan'?'単勝':'複勝'}${hn.odds||'—'}倍`
        : '';
      return `<div class="sabc-rank-row">
        <div class="sabc-rank-badge ${RANK_CLS[rank]||''}">${rank+1}</div>
        <div class="sabc-rank-name-block">
          <div class="sabc-rank-name"><span class="sabc-pick-umaban">${umabanOf(entry.name)}番</span> ${entry.name}</div>
          ${popInfo ? `<div class="sabc-rank-pop">${popInfo}</div>` : ''}
        </div>
        <div class="sabc-rank-score ${dim}">${entry.total}<span>pt</span></div>
      </div>`;
    }
    function rankBlock(dim, rank, label) {
      const rows = rank.slice(0, 3).map((e, i) => rankRow(dim, e, i)).join('');
      return `<div class="sabc-rank-block">
        <div class="sabc-rank-header ${dim}">${label}ランキング</div>
        <div class="sabc-rank-list">${rows}</div>
      </div>`;
    }
    return `<div class="sabc-rank-wrap">
      ${rankBlock('tan',  rankTan,  '単勝')}
      ${rankBlock('fuku', rankFuku, '複勝')}
    </div>`;
  }

  // ── 非重賞: 従来の注目表示 ──────────────────────────────
  const firstHn = notes.horses && notes.horses[rankTan[0].name];
  const factors = (firstHn && firstHn.sabc) ? sabcFactors(firstHn.sabc.tan) : [];
  function topTied(rank) {
    if (!rank || !rank.length) return [];
    const best = rank[0].total;
    return rank.filter(x => x.total === best);
  }
  function pickBadges(sabc, dim) {
    return factors.map(k=>
      `<span class="sabc-pick-fl">${SABC_LABEL_MAP[k]||k}</span><span class="sabc-badge g-${sabc[dim][k]}">${sabc[dim][k]}</span>`
    ).join('');
  }
  function card(dim, entry, cls, isTied) {
    const hn = notes.horses[entry.name];
    if (!hn || !hn.sabc) return '';
    const tiedBadge = isTied ? `<span class="sabc-pick-tied">同点</span>` : '';
    const popInfo = hn.popularity
      ? `<div class="sabc-pick-pop">想定<strong>${hn.popularity}</strong>番人気 ／ 想定${dim==='tan'?'単勝':'複勝'}オッズ <strong>${hn.odds||'—'}倍</strong></div>`
      : '';
    return `<div class="sabc-pick-card ${cls}">
      ${tiedBadge}
      <div><span class="sabc-pick-umaban">${umabanOf(entry.name)}番</span></div>
      <div class="sabc-pick-name">${entry.name}</div>
      ${popInfo}
      <div class="sabc-pick-score">${entry.total}<span>pt</span></div>
      <div class="sabc-pick-badges">${pickBadges(hn.sabc, dim)}</div>
    </div>`;
  }
  function row(dim, rank, cls, label) {
    const tops = topTied(rank);
    const isTied = tops.length > 1;
    const cards = tops.map(e => card(dim, e, cls, isTied)).join('');
    return `<div class="sabc-pick-row">
      <div class="sabc-pick-dim-label ${dim === 'tan' ? 'tan' : 'fuku'}">${label}注目</div>
      <div class="sabc-pick-horses">${cards}</div>
    </div>`;
  }
  return `<div class="sabc-pick-section">
    ${row('tan',  rankTan,  'pick-tan',  '単勝')}
    ${row('fuku', rankFuku, 'pick-fuku', '複勝')}
  </div>`;
}

function buildTabs(races) {
  return races.map((r, i) => {
    const gradeTag = r.grade ? `<span class="tab-grade">${r.grade}</span>` : '';
    let cls;
    if (r.grade) cls = ' grade-tab';
    else if (r.course && r.course.includes('ダート')) cls = ' dirt-tab';
    else cls = ' turf-tab';
    return `<div class="race-tab${cls}${i===0?' active':''}" onclick="switchRace(${i})" id="tab-${i}">${r.raceNo}${gradeTag}</div>`;
  }).join('');
}

// ── 買い目自動生成 ────────────────────────────────────────
function generateBetHtml(sortedHorses, horsesNotes, notes, race) {
  if (!sortedHorses || sortedHorses.length < 7) return '';
  if (!/G[1-3]/.test((notes && notes.grade) || '')) return '';

  const MARKS = ['◎','○','▲','☆','△','△','△'];
  const tagged = sortedHorses.slice(0, 7).map((h, i) => ({
    name: h.name, num: h.num, mark: MARKS[i],
    score: computeScore(horsesNotes[h.name] || null)
  }));

  // パターン判定（総合スコア差 4pt = Sファクター1個分）
  const THRESHOLD = 4;
  const gap12 = tagged[0].score - tagged[1].score;
  const gap23 = tagged[1].score - tagged[2].score;
  let pattern, patternLabel, patternCls;
  if      (gap12 >= THRESHOLD) { pattern='A'; patternLabel='1強戦'; patternCls='pat-a'; }
  else if (gap23 >= THRESHOLD) { pattern='B'; patternLabel='2強戦'; patternCls='pat-b'; }
  else                          { pattern='C'; patternLabel='混戦';  patternCls='pat-c'; }

  // 単勝・複勝（SABC単/複1位馬）
  const _rTan  = (notes.sabcRankTan  && notes.sabcRankTan.length)  ? sortRankWithTiebreak(notes.sabcRankTan,  notes.horses||{}) : null;
  const _rFuku = (notes.sabcRankFuku && notes.sabcRankFuku.length) ? sortRankWithTiebreak(notes.sabcRankFuku, notes.horses||{}) : null;
  const tanName  = _rTan  ? _rTan[0].name  : tagged[0].name;
  const fukuName = _rFuku ? _rFuku[0].name : tagged[0].name;
  const getNum = name => { const h = (race.horses||[]).find(x=>x.name===name); return h ? h.num : '?'; };

  const uma = h => `<span class="bet-uma"><span class="bet-mark">${h.mark}</span>${h.num}</span>`;
  const umaPlain = n => `<span class="bet-uma"><span class="bet-mark"></span>${n}</span>`;
  const ul  = arr => arr.map(uma).join('');

  const col1 = tagged.slice(0,2); // ◎○
  const col2 = tagged.slice(0,4); // ◎○▲☆
  const rest = tagged.slice(1);   // ○▲☆△△△
  const top4 = tagged.slice(0,4); // ◎○▲☆
  const all7 = tagged;

  const commonHtml = `<div class="bet-common">
    <div class="bet-row"><span class="bet-type-tag">単勝</span>${umaPlain(getNum(tanName))}<span class="bet-sub">${tanName}</span></div>
    <div class="bet-row"><span class="bet-type-tag">複勝</span>${umaPlain(getNum(fukuName))}<span class="bet-sub">${fukuName}</span></div>
  </div>`;

  const grid = cols => cols.map((c,i)=>`<div><span class="bet-col-label">${i+1}列目</span>${ul(c)}</div>`).join('');

  let cardsHtml = '';
  if (pattern === 'A') {
    cardsHtml = `
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">馬単マルチ</span><span class="bet-pts">12点</span></div>
      <div class="bet-formula">${uma(tagged[0])}<span class="bet-arrow">↔</span>${ul(rest)}</div>
    </div>
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">3連複 1頭軸流し</span><span class="bet-pts">15点</span></div>
      <div class="bet-formula"><span class="bet-axis">${uma(tagged[0])}軸</span><span class="bet-arrow">→</span>${ul(rest)}</div>
    </div>
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">3連単 1着固定</span><span class="bet-pts">30点</span></div>
      <div class="bet-formula"><span class="bet-axis">${uma(tagged[0])}1着</span><span class="bet-arrow">→</span>${ul(rest)}<span class="bet-arrow">×</span>${ul(rest)}</div>
    </div>`;
  } else if (pattern === 'B') {
    cardsHtml = `
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">馬単フォーメーション</span><span class="bet-pts">12点</span></div>
      <div class="bet-formula-grid">${grid([col1, all7])}</div>
    </div>
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">3連複フォーメーション</span><span class="bet-pts">21点</span></div>
      <div class="bet-formula-grid">${grid([col1, col2, all7])}</div>
    </div>
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">3連単フォーメーション</span><span class="bet-pts">30点</span></div>
      <div class="bet-formula-grid">${grid([col1, col2, all7])}</div>
    </div>`;
  } else {
    cardsHtml = `
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">馬単フォーメーション</span><span class="bet-pts">12点</span></div>
      <div class="bet-formula-grid">${grid([col1, all7])}</div>
    </div>
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">3連複フォーメーション</span><span class="bet-pts">21点</span><span class="bet-note">万馬券強奪用</span></div>
      <div class="bet-formula-grid">${grid([col1, col2, all7])}</div>
    </div>
    <div class="bet-card">
      <div class="bet-card-head"><span class="bet-kind">3連単フォーメーション</span><span class="bet-pts">30点</span><span class="bet-note">万馬券強奪用</span></div>
      <div class="bet-formula-grid">${grid([col1, col2, all7])}</div>
    </div>`;
  }

  return `<div class="bet-section">
    <div class="bet-section-header">
      <span class="bet-section-title">買い目</span>
      <span class="bet-pattern-badge ${patternCls}">${patternLabel}</span>
      <span class="bet-threshold-note">総合スコア差 ${THRESHOLD}pt 基準</span>
    </div>
    ${commonHtml}
    <div class="bet-cards">${cardsHtml}</div>
  </div>`;
}

function buildPanel(race, idx, notes, horsesMap, prevraceMap) {
  const isActive = idx === 0 ? ' active' : '';
  const horsesNotes = (notes && notes.horses) || {};
  const hasNotes = notes && notes.horses && Object.keys(notes.horses).length > 0;

  // Sort horses by totalScore desc if notes available
  let horses = [...race.horses];
  if (hasNotes) {
    horses.sort((a, b) => compareHorses(horsesNotes[a.name]||null, horsesNotes[b.name]||null));
  }

  // 印割り当て（全レース・総合スコア降順）
  const MARK_KEYS  = ['honmei','taikou','saban','hoshi','renge','renge','renge'];
  const MARK_LABEL = {honmei:'◎', taikou:'○', saban:'▲', hoshi:'☆', renge:'△'};
  const markMap = {};
  if (hasNotes) {
    horses.forEach((h, i) => {
      if (i < MARK_KEYS.length) markMap[h.name] = MARK_KEYS[i];
    });
  }

  const rows = horses.map((h, ri) => {
    const hn  = horsesNotes[h.name] || null;
    const hd  = (horsesMap && horsesMap[h.name]) || null;
    const rank = hasNotes ? ri + 1 : null;
    const sire    = hd ? hd.sire    : h.sire;
    const bms     = hd ? hd.bms     : null;
    const trainer = hd ? hd.trainer : null;
    const belong  = hd ? hd.belong  : null;
    const pedigreeHtml = `父 ${sire}${bms ? ' / 母父 ' + bms : ''}`;
    const trainerHtml  = trainer ? `<span style="margin-left:8px;color:rgba(26,26,26,.6);">${belong||''}${trainer}</span>` : '';
    const jockeyCell = h.jockey ? h.jockey : `<span class="no-jockey">想定なし</span>`;
    const weightCell = h.weight != null ? `${h.weight}` : '—';
    const pdata = prevraceMap ? (prevraceMap[h.num] || null) : null;
    const pop = hn && hn.popularity;
    const popCls = pop ? (pop<=3?`pop-${pop}`:pop<=6?'pop-4':'pop-other') : 'pop-other';
    const popCell = pop
      ? `<span class="pop-badge ${popCls}"><span class="pop-num">${pop}</span><span class="pop-ninki">人気</span></span><div class="pop-odds">${hn.odds||''}倍</div>`
      : `<span style="color:rgba(26,26,26,.2);font-size:11px;">${h.num}</span>`;
    const markKey  = markMap[h.name];
    const markHtml = markKey ? `<span class="mark-badge mark-${markKey}">${MARK_LABEL[markKey]}</span>` : '';
    return `<tr>
      <td class="td-num">${popCell}</td>
      <td>
        <div class="td-name">${markHtml}${sexHtml(h.sex)}<span style="font-size:10px;color:var(--muted);">${h.age}歳</span>${h.name}${hn&&hn.sabc?`<span class="sabc-name-tan">単${hn.sabc.tan.total}pt</span><span class="sabc-name-fuku">複${hn.sabc.fuku.total}pt</span>`:''}</div>
        <div class="td-jockey-row"><span class="td-jockey-name">${jockeyCell}</span><span style="color:rgba(26,26,26,.25);">／</span><span class="td-weight-val">${weightCell}kg</span></div>
        <div class="td-sire">${pedigreeHtml}${trainerHtml}</div>
        ${abilityHtml(hn, rank)}
        ${sabcHtml(hn)}
        ${prevRaceHtml(pdata)}
      </td>
    </tr>`;
  }).join('');

  const _sabcRankHtml = sabcPickHtml(notes, race);
  const _betHtml      = generateBetHtml(horses, horsesNotes, notes, race);
  const _wetHtml      = wetPickHtml(notes, race);
  const _lapHtml      = lapAnalysisHtml(notes);
  const _outHtml      = outlookHtml(notes);

  return `<div class="race-panel${isActive}" id="panel-${idx}">
    <div class="race-header">
      ${gradeHtml(race.grade)}
      <div class="race-name">${race.raceName}<span class="count-badge">${race.horses.length}頭</span></div>
      <div class="race-meta"><span>${race.raceNo}</span><span>${race.course}</span></div>
    </div>

    ${tocHtml(notes, idx)}

    ${_sabcRankHtml ? `<div id="sabc-rank-${idx}" class="section-head">単複ランキング</div>${_sabcRankHtml}` : ''}
    ${_betHtml      ? `<div id="bet-${idx}"       class="section-head">買い目</div>${_betHtml}` : ''}

    <div id="all-horses-${idx}" class="section-head">全頭診断</div>
    <table class="horse-table">
      <thead><tr>
        <th>人気</th>
        <th>馬名 / 父馬 / 重賞展望スコア</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    ${_wetHtml ? `<div id="wet-pick-${idx}" class="section-head">重馬場特注激走メモ</div>${_wetHtml}` : ''}
    ${_lapHtml ? `<div id="lap-${idx}"      class="section-head">ラップ分析</div>${_lapHtml}` : ''}
    ${_outHtml}
  </div>`;
}

function switchRace(idx) {
  document.querySelectorAll('.race-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.race-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

async function init() {
  try {
    const ts = Date.now();
    // Fetch soutei + horsesMap in parallel, then notes
    const [soutei, horsesMap] = await Promise.all([
      fetch(SOUTEI_URL + '?_=' + ts).then(r=>r.json()),
      fetch(HORSES_URL + '?_=' + ts).then(r=>r.json()).catch(()=>({}))
    ]);

    // Fetch race-notes & prevrace in parallel for all races
    const notesMap = {};
    const prevraceMapByKey = {};
    await Promise.all(soutei.races.map(async r => {
      if (!r.notesKey) return;
      const [notes, prevraw] = await Promise.all([
        fetch(NOTES_BASE + r.notesKey + '.json?_=' + ts).then(res=>res.json()).catch(()=>null),
        fetch(PREVRACE_BASE + 'zensou-' + r.notesKey + '.json?_=' + ts).then(res=>res.json()).catch(()=>null)
      ]);
      if (notes)   notesMap[r.notesKey] = notes;
      if (prevraw) {
        // index by umaban for O(1) lookup
        const byNum = {};
        (prevraw.horses || []).forEach(h => { byNum[h.umaban] = h; });
        prevraceMapByKey[r.notesKey] = byNum;
      }
    }));

    document.getElementById('date-main').textContent = soutei.label || soutei.date;
    document.getElementById('race-tabs').innerHTML   = buildTabs(soutei.races);
    document.getElementById('race-panels').innerHTML = soutei.races.map((r,i) =>
      buildPanel(r, i, notesMap[r.notesKey]||null, horsesMap, prevraceMapByKey[r.notesKey]||null)
    ).join('');

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('content').style.display  = 'block';
  } catch(e) {
    document.getElementById('loading').textContent = 'エラー: ' + e.message;
  }
}
init();
</script>
