<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>来週の出走予定馬 | UG競馬</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f1e;color:#e8edf8;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;}

/* ── ヘッダー ── */
.page-header{
  background:linear-gradient(135deg,#0d1b3e,#1a2f5e);
  border-bottom:1px solid rgba(100,160,255,.2);
  padding:14px 20px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;
}
.back-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:700;color:rgba(180,210,255,.8);
  text-decoration:none;padding:5px 10px;border-radius:8px;
  border:1px solid rgba(100,160,255,.3);
  transition:background .15s;
}
.back-btn:hover{background:rgba(100,160,255,.12);}
.page-title{font-size:15px;font-weight:900;color:#fff;letter-spacing:.06em;}
.page-sub{font-size:10px;color:rgba(180,210,255,.6);letter-spacing:.05em;margin-top:1px;}

/* ── バナー（大阪杯→桜花賞） ── */
.breadcrumb-banner{
  margin:16px 16px 0;padding:12px 16px;border-radius:12px;
  background:linear-gradient(135deg,#1a1030,#2a1548,#1a1030);
  border:1px solid rgba(200,100,255,.25);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.bc-item{font-size:11px;font-weight:700;color:rgba(200,160,255,.7);}
.bc-sep{font-size:13px;color:rgba(200,100,255,.5);font-weight:900;}
.bc-current{font-size:12px;font-weight:900;color:#f9a8d4;}

/* ── レースセクション ── */
.section{margin:16px 12px 0;}
.race-header{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:12px 16px;border-radius:12px 12px 0 0;
  background:linear-gradient(90deg,rgba(30,50,100,.9),rgba(20,35,75,.7));
  border:1px solid rgba(100,160,255,.2);border-bottom:none;
}
.race-grade{
  font-size:10px;font-weight:900;padding:3px 8px;border-radius:5px;
  letter-spacing:.06em;white-space:nowrap;
}
.grade-g1{background:linear-gradient(135deg,#f0c040,#d4a010);color:#1a1000;}
.grade-g2{background:linear-gradient(135deg,#c0c0e0,#9090b0);color:#0a0a20;}
.race-name{font-size:15px;font-weight:900;color:#fff;letter-spacing:.04em;}
.race-meta{font-size:10px;color:rgba(180,210,255,.6);margin-left:auto;}

/* ── テーブル ── */
.table-wrap{
  overflow-x:auto;
  border:1px solid rgba(100,160,255,.18);
  border-top:none;border-radius:0 0 12px 12px;
  background:rgba(10,20,50,.6);
}
table{width:100%;border-collapse:collapse;min-width:520px;}
thead th{
  font-size:10px;font-weight:900;letter-spacing:.06em;color:rgba(180,210,255,.7);
  padding:8px 10px;background:rgba(20,40,90,.8);
  border-bottom:1px solid rgba(100,160,255,.15);
  text-align:left;white-space:nowrap;
}
tbody tr{border-bottom:1px solid rgba(100,160,255,.08);transition:background .1s;}
tbody tr:hover{background:rgba(100,160,255,.07);}
tbody tr:last-child{border-bottom:none;}
td{padding:9px 10px;font-size:12px;vertical-align:middle;}

.td-num{width:32px;text-align:center;font-weight:900;color:rgba(180,210,255,.6);font-size:11px;}
.td-name{font-weight:900;color:#e8edf8;white-space:nowrap;}
.td-sire{color:rgba(220,235,255,.8);font-size:11px;}
.td-damsire{color:rgba(180,210,255,.65);font-size:11px;}
.td-trainer{color:rgba(180,210,255,.7);font-size:11px;white-space:nowrap;}

/* 外厩バッジ */
.ext-badge{
  display:inline-block;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:10px;white-space:nowrap;
}
.ext-northern-tei{background:rgba(251,191,36,.2);color:#fcd34d;border:1px solid rgba(251,191,36,.3);}
.ext-northern-shi{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
.ext-champion   {background:rgba(34,197,94,.2);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.ext-yamamoto   {background:rgba(249,115,22,.2);color:#fdba74;border:1px solid rgba(249,115,22,.3);}
.ext-canyon     {background:rgba(168,85,247,.2);color:#d8b4fe;border:1px solid rgba(168,85,247,.3);}
.ext-esutei     {background:rgba(236,72,153,.2);color:#f9a8d4;border:1px solid rgba(236,72,153,.3);}
.ext-other      {background:rgba(100,116,139,.2);color:#cbd5e1;border:1px solid rgba(100,116,139,.3);}
.ext-zaiku      {background:rgba(50,60,80,.4);color:rgba(150,170,200,.5);border:1px solid rgba(100,120,160,.15);font-style:italic;}

/* ── フッター ── */
.page-footer{
  text-align:center;padding:32px 16px;
  font-size:10px;color:rgba(100,130,180,.4);letter-spacing:.08em;
}
.loading{text-align:center;padding:40px;color:rgba(180,210,255,.5);font-size:13px;}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">‹ TOP</a>
  <div>
    <div class="page-title">🌸 来週の出走予定馬</div>
    <div class="page-sub">NZT / 阪神牝馬S / 桜花賞</div>
  </div>
</div>

<div class="breadcrumb-banner">
  <span class="bc-item">G1 大阪杯 馬場急上昇ジョーカー出現</span>
  <span class="bc-sep">›</span>
  <span class="bc-current">🌸 桜花賞 徹底解析中</span>
</div>

<div id="content"><p class="loading">データ読み込み中...</p></div>

<div class="page-footer">🐶 AIギーニョ | UG競馬 来週出走予定馬</div>

<script>
const RACES = [
  {
    file: 'data/race-notes/2026-04-11-nakayama-11r.json',
    label: 'NZT', gradeCls: 'grade-g2',
    meta: '4月11日(土) 中山 芝1600m 17頭'
  },
  {
    file: 'data/race-notes/2026-04-11-hanshin-11r.json',
    label: '阪神牝馬S', gradeCls: 'grade-g2',
    meta: '4月11日(土) 阪神 芝1600m外 10頭'
  },
  {
    file: 'data/race-notes/2026-04-12-hanshin-11r.json',
    label: '桜花賞', gradeCls: 'grade-g1',
    meta: '4月12日(日) 阪神 芝1600m外 19頭'
  },
];

function extBadge(fac) {
  if (!fac || fac === '在厩調整') return `<span class="ext-badge ext-zaiku">在厩調整</span>`;
  if (fac.includes('天栄'))        return `<span class="ext-badge ext-northern-tei">${fac}</span>`;
  if (fac.includes('しがらき'))    return `<span class="ext-badge ext-northern-shi">${fac}</span>`;
  if (fac.includes('チャンピオン'))return `<span class="ext-badge ext-champion">${fac}</span>`;
  if (fac.includes('山元'))        return `<span class="ext-badge ext-yamamoto">${fac}</span>`;
  if (fac.includes('キャニオン'))  return `<span class="ext-badge ext-canyon">${fac}</span>`;
  if (fac.includes('エスティ'))    return `<span class="ext-badge ext-esutei">${fac}</span>`;
  return `<span class="ext-badge ext-other">${fac}</span>`;
}

function esc(s) {
  if (!s) return '—';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderRace(cfg, notes) {
  const horses = Object.entries(notes.horses)
    .sort((a, b) => a[1].num - b[1].num);

  const rows = horses.map(([name, h]) => `
    <tr>
      <td class="td-num">${h.num}</td>
      <td class="td-name">${esc(name)}</td>
      <td class="td-sire">${esc(h.sabcSire)}</td>
      <td class="td-damsire">${esc(h.damSire)}</td>
      <td class="td-trainer">${esc(h.sabcTrainer)}</td>
      <td>${extBadge(h.extFacility)}</td>
    </tr>
  `).join('');

  return `
  <div class="section">
    <div class="race-header">
      <span class="race-grade ${cfg.gradeCls}">${cfg.label}</span>
      <span class="race-name">${esc(notes.race?.name || cfg.label)}</span>
      <span class="race-meta">${cfg.meta}</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>馬名</th>
            <th>父</th>
            <th>母父</th>
            <th>厩舎</th>
            <th>外厩</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function main() {
  const results = await Promise.all(
    RACES.map(cfg => fetch(cfg.file).then(r => r.json()).then(d => ({cfg, d})))
  );
  const html = results.map(({cfg, d}) => renderRace(cfg, d)).join('');
  document.getElementById('content').innerHTML = html + '<div style="height:24px"></div>';
}
main().catch(e => {
  document.getElementById('content').innerHTML =
    `<p class="loading" style="color:#f87171">読み込みエラー: ${e.message}</p>`;
});
</script>
</body>
</html>
