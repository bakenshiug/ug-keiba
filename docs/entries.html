<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>出走予定馬 分析 | UG競馬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#022c22;--bg2:#064e3b;--bg3:#022c22;
  --pink:#10b981;--pink-dk:#059669;--pink-lt:#6ee7b7;
  --gold:#fcd34d;
  --card:rgba(255,255,255,.06);--border:rgba(100,210,160,.18);
  --text:#fff;--muted:rgba(255,210,230,.65);
  --zi-s:#fcd34d;--zi-a:#86efac;--zi-b:#93c5fd;--zi-c:#fda4af;--zi-d:rgba(255,150,160,.45);
}
html,body{background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;}

/* ── ヘッダー ── */
.page-header{
  background:linear-gradient(135deg,#022c22,#065f46,#022c22);
  border-bottom:2px solid rgba(100,210,160,.35);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 24px rgba(5,150,105,.35);
}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:700;color:#fff;
  text-decoration:none;padding:5px 10px;border-radius:8px;
  border:1px solid rgba(255,200,220,.4);
  white-space:nowrap;flex-shrink:0;
}
.page-title{font-size:15px;font-weight:900;color:#fff;letter-spacing:.06em;}
.page-sub{font-size:10px;color:rgba(180,240,210,.8);margin-top:1px;}

/* ── バナー ── */
.breadcrumb-banner{
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(2,44,34,.55),rgba(6,95,70,.4),rgba(2,44,34,.55));
  border-bottom:1px solid rgba(100,210,160,.2);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.bc-item{font-size:11px;font-weight:700;color:rgba(255,210,230,.7);}
.bc-sep{font-size:13px;color:rgba(255,170,200,.6);font-weight:900;}
.bc-current{font-size:11px;font-weight:900;color:#6ee7b7;}

/* ── タブ ── */
.tab-bar{
  display:flex;gap:0;
  background:rgba(0,0,0,.25);
  border-bottom:2px solid rgba(100,210,160,.2);
  position:sticky;top:57px;z-index:100;
}
.tab-btn{
  flex:1;padding:11px 8px;
  font-size:12px;font-weight:700;color:var(--muted);
  background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .18s;letter-spacing:.03em;
  text-align:center;
}
.tab-btn.active{
  color:#fff;
  border-bottom:3px solid var(--pink);
  background:rgba(16,185,129,.12);
}
.tab-btn .tab-grade{
  font-size:9px;font-weight:900;
  padding:1px 5px;border-radius:3px;margin-right:4px;
  vertical-align:middle;
}
.grade-g1{background:linear-gradient(135deg,#f0c040,#d4a010);color:#1a1000;}
.grade-g2{background:linear-gradient(135deg,#e0b0d0,#c080a0);color:#2a0a1a;}

/* ── レース情報 ── */
.race-info{
  padding:12px 16px;
  background:rgba(255,255,255,.04);
  border-bottom:1px solid rgba(100,210,160,.2);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.race-info-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:900;color:#fff;}
.race-info-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.horse-count{
  margin-left:auto;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  background:rgba(16,185,129,.12);color:rgba(110,231,183,.9);
  border:1px solid rgba(16,185,129,.2);
}

/* ── 馬カード ── */
.horse-list{padding:12px 12px 80px;}
.horse-card{
  background:#fff;
  border:1px solid rgba(200,30,80,.18);
  border-radius:16px;
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .15s;
}
.horse-card:active{border-color:rgba(255,140,185,.4);}
.tokuchuu-banner{
  margin:6px 0 2px;
  padding:5px 10px;
  background:linear-gradient(90deg,#fff7e6,#fff3cd);
  border:1px solid #f59e0b;
  border-radius:8px;
  font-size:11px;font-weight:800;
  color:#92400e;
  letter-spacing:.03em;
}

/* カードヘッダー */
.card-head{
  display:flex;flex-direction:column;gap:8px;
  padding:11px 14px 10px;
  background:linear-gradient(160deg,#fdf6f9 0%,#f9f0f5 100%);
  border-bottom:2px solid rgba(200,30,80,.1);
}
/* Z字レイアウト：左(馬番+馬名) ↔ 右(オッズ) */
.card-head-top{display:flex;align-items:center;gap:10px;}
.horse-num{
  width:38px;height:38px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}
.horse-num-rank{font-size:15px;font-weight:900;line-height:1;}
.horse-num-mode{font-size:7px;font-weight:700;line-height:1;letter-spacing:.03em;opacity:.85;}
/* ランク#1 強調（強弱の法則） */
.horse-num.rank1-highlight{
  box-shadow:0 0 0 2.5px #f59e0b, 0 3px 10px rgba(245,158,11,.35);
}
.horse-num-zi     {background:rgba(232,48,110,.15);color:#c01860;}
.horse-num-sougou {background:linear-gradient(135deg,rgba(252,211,77,.18),rgba(110,231,183,.18));color:#6d28d9;}
.horse-num-tan    {background:rgba(252,211,77,.22);color:#b45309;}
.horse-num-fuku   {background:rgba(110,231,183,.22);color:#047857;}
.horse-num-ana    {background:rgba(167,139,250,.22);color:#6d28d9;}
.horse-num-sf3    {background:rgba(251,146,60,.22);color:#c2410c;}
.horse-num-keshi  {background:rgba(248,113,113,.12);color:rgba(248,113,113,.7);border:1px solid rgba(248,113,113,.25);}
.horse-name{
  font-family:'Noto Serif JP',serif;
  font-size:16px;font-weight:900;color:#1a0a10;
  flex:1;min-width:0;
  letter-spacing:.02em;line-height:1.2;
}
/* 馬名ランク#1 強調 */
.horse-name.rank1-name{ color:#92400e; font-size:17px; }
/* ── バッジグループ ── */
.badge-groups{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.badge-group{display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;}
.badge-group-label{
  font-size:7px;font-weight:900;letter-spacing:.6px;
  color:rgba(0,0,0,.22);white-space:nowrap;
  min-width:22px;text-align:right;padding-top:3px;flex-shrink:0;
}
/* グループ別テーマ色（強弱・色は3色ルール） */
.badge-group-label.lbl-blood  { color:rgba(180,83,9,.45);  }  /* 血統 → amber */
.badge-group-label.lbl-ability{ color:rgba(4,120,87,.45);  }  /* 実力 → green */
.badge-group-label.lbl-apt    { color:rgba(37,99,235,.38); }  /* 適性 → blue  */
.badge-group-label.lbl-cond   { color:rgba(192,24,96,.4);  }  /* 条件 → pink  */
.badge-group-label.lbl-state  { color:rgba(109,40,217,.4); }  /* 状態 → purple */
.badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}

/* 想定人気・オッズ（Z字 右端 = 視線のゴール） */
.odds-tag{
  display:flex;flex-direction:column;align-items:flex-end;
  flex-shrink:0;gap:0px;
  padding:4px 7px;border-radius:8px;
  background:rgba(192,24,96,.06);
  border:1px solid rgba(192,24,96,.12);
}
.odds-pop{
  font-size:9px;font-weight:900;color:#c01860;letter-spacing:.03em;white-space:nowrap;
}
.odds-val{
  font-size:14px;font-weight:900;color:#1a0a10;letter-spacing:.01em;white-space:nowrap;
}
.odds-na{font-size:10px;color:#bbb;font-style:italic;}

/* ZI能力値バッジ */
.zi-badge{
  font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px;
  white-space:nowrap;letter-spacing:.04em;
}
.zi-s{background:#fef3c7;color:#92400e;border:1px solid #f59e0b;}
.zi-a{background:#d1fae5;color:#065f46;border:1px solid #34d399;}
.zi-b{background:#dbeafe;color:#1e40af;border:1px solid #60a5fa;}
.zi-c{background:#ffe4e6;color:#9f1239;border:1px solid #fb7185;}
.zi-d{background:#f3f4f6;color:#9ca3af;border:1px solid #d1d5db;}

/* 外厩グレードバッジ */
.ext-grade{
  font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px;
  white-space:nowrap;
}
.extg-s{background:#fef3c7;color:#92400e;border:1px solid #f59e0b;}
.extg-a{background:#d1fae5;color:#065f46;border:1px solid #34d399;}
.extg-b{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;}

/* 血統グレードバッジ */
.blood-grade{
  font-size:9px;font-weight:900;padding:2px 6px;border-radius:5px;
  white-space:nowrap;letter-spacing:.03em;
}
/* S grades: 金・amber 3段階 */
.bg-3s{background:#f59e0b;color:#1c0a00;border:1px solid #b45309;font-weight:900;}
.bg-2s,.bg-s{background:#fef3c7;color:#92400e;border:1px solid #f59e0b;}
.bg-1s{background:#fffbeb;color:#b45309;border:1px solid #fcd34d;}
/* A grades: 緑・emerald 3段階 */
.bg-3a{background:#10b981;color:#022c22;border:1px solid #059669;font-weight:900;}
.bg-2a,.bg-a{background:#d1fae5;color:#065f46;border:1px solid #34d399;}
.bg-1a{background:#ecfdf5;color:#166534;border:1px solid #86efac;}
/* B grades: 青・blue 3段階 */
.bg-3b{background:#60a5fa;color:#172554;border:1px solid #2563eb;font-weight:900;}
.bg-2b,.bg-b{background:#dbeafe;color:#1e40af;border:1px solid #60a5fa;}
.bg-1b{background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;}
/* C grades: 赤・rose 3段階 */
.bg-3c{background:#fb7185;color:#4c0519;border:1px solid #e11d48;font-weight:900;}
.bg-2c,.bg-c{background:#ffe4e6;color:#9f1239;border:1px solid #fb7185;}
.bg-1c{background:#fff1f2;color:#be123c;border:1px solid #fda4af;}
/* D */
.bg-d{background:#f3f4f6;color:#9ca3af;border:1px solid #d1d5db;}
.bg-n{background:#f9fafb;color:#d1d5db;border:1px solid #e5e7eb;}
.bg-analyzing{background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;font-style:italic;letter-spacing:.01em;}
.bg-age-fixed{background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc;font-weight:700;}

/* ── デュアルバッジ (単/複 分割) ── */
.dual-badge{
  display:inline-flex;align-items:stretch;
  border-radius:5px;overflow:hidden;
  white-space:nowrap;font-size:9px;font-weight:900;
  border:1px solid #d1d5db;
}
.dual-lbl{
  display:flex;align-items:center;padding:0 5px;
  background:#f3f4f6;
  color:#6b7280;font-size:8px;font-weight:700;
  border-right:1px solid #d1d5db;
}
.dual-t,.dual-f{
  display:flex;align-items:center;padding:2px 5px;gap:1px;
}
.dual-t{border-right:1px solid #e5e7eb;}
.dual-t::before{content:'単';font-size:7px;opacity:.6;font-weight:700;}
.dual-f::before{content:'複';font-size:7px;opacity:.6;font-weight:700;}

/* ── スコアバー（Z字の底辺・情報密度のゴール） ── */
.score-bars{
  display:flex;flex-direction:column;gap:4px;
  padding:7px 12px;
  background:#f5eff3;
  border-radius:8px;
  border:1px solid rgba(200,30,80,.13);
  border-top:2px solid rgba(200,30,80,.15);
}
.score-row{display:flex;align-items:center;gap:6px;}
.score-lbl{
  font-size:9px;font-weight:900;width:14px;text-align:center;flex-shrink:0;
}
.score-lbl.tan-lbl{color:#b45309;}
.score-lbl.fuku-lbl{color:#047857;}
.score-track{
  flex:1;height:5px;background:#e5e7eb;
  border-radius:3px;overflow:hidden;min-width:0;
}
.score-fill{height:100%;border-radius:3px;transition:width .3s;}
.score-fill.tan-fill{background:linear-gradient(90deg,#d97706,#fcd34d);}
.score-fill.fuku-fill{background:linear-gradient(90deg,#059669,#6ee7b7);}
.score-fill.ana-fill{background:linear-gradient(90deg,#7c3aed,#c4b5fd);}
.score-fill.sougo-fill{background:linear-gradient(90deg,#ea580c,#fb923c);}
.score-val{
  font-size:9px;font-weight:900;width:36px;text-align:right;flex-shrink:0;
}
.score-val.tan-val{color:#b45309;}
.score-val.fuku-val{color:#047857;}
.score-rank{
  font-size:9px;font-weight:900;width:24px;text-align:center;flex-shrink:0;
  color:#ccc;
}
/* 強弱: #1 = ゴールド強調、#2#3 = サブカラー */
.score-rank.rk1{
  color:#92400e;background:#fef3c7;border-radius:4px;
  padding:1px 3px;font-size:8px;
}
.score-rank.rk2{color:#6b7280;}
.score-rank.rk3{color:#b45309;}

/* ── 買い目提案 ── */
.bet-section{
  margin:10px 12px;padding:14px 16px;
  background:#fff;
  border:1.5px solid rgba(232,19,110,.35);
  border-radius:12px;
}
.bet-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  border-bottom:1px solid rgba(232,19,110,.2);padding-bottom:10px;
}
.bet-race-type{
  font-size:11px;font-weight:900;padding:4px 10px;border-radius:20px;
  color:#fff;letter-spacing:.5px;background:#E8136E;
}
.bet-title{font-size:13px;font-weight:700;color:#E8136E;}
.bet-total{margin-left:auto;font-size:11px;font-weight:700;color:rgba(180,0,80,.7);}
.bet-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-bottom:1px solid rgba(232,19,110,.12);
  flex-wrap:wrap;
}
.bet-row:last-child{border-bottom:none;}
.bet-type{
  font-size:12px;font-weight:900;padding:3px 10px;border-radius:20px;
  background:#E8136E;color:#fff;white-space:nowrap;min-width:44px;text-align:center;
}
.bet-horses{
  font-size:13px;font-weight:700;color:#222;flex:1;
}
.bet-points{
  font-size:11px;font-weight:900;color:rgba(180,0,80,.7);white-space:nowrap;
}
.bet-note{
  font-size:10px;color:rgba(180,0,80,.7);width:100%;padding-left:2px;
}
.bet-optional-note{
  font-size:11px;font-weight:600;color:#7c3aed;
  width:100%;padding:4px 8px;margin-top:2px;
  background:rgba(124,58,237,.07);
  border-left:3px solid rgba(124,58,237,.4);
  border-radius:0 4px 4px 0;
}
.bet-row-detail{flex-direction:column;align-items:stretch;gap:6px;padding:10px 0;}
.bet-row-top{display:flex;align-items:center;gap:8px;}
.bet-note-inline{font-size:10px;color:rgba(180,0,80,.7);margin-left:auto;}
.bet-formation-rows{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.bet-formation-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bet-chakuban{
  font-size:11px;font-weight:900;color:#E8136E;
  white-space:nowrap;min-width:40px;
}
.bet-horse-chips{display:flex;flex-wrap:wrap;gap:4px;}
.bet-horses-detail{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:6px 10px;background:rgba(232,19,110,.08);border-radius:6px;
}
.bet-jiku{
  font-size:12px;font-weight:900;color:#E8136E;white-space:nowrap;
}
.bet-arrow{font-size:14px;color:rgba(232,19,110,.6);flex-shrink:0;}
.bet-aite-chips{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.bet-horse-chip{
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  background:rgba(232,19,110,.12);
  border:1px solid rgba(232,19,110,.5);
  color:#c01060;
  white-space:nowrap;
}
/* ── ソートバー ── */
.sort-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;
  background:rgba(255,255,255,.025);
  border-bottom:1px solid rgba(100,210,160,.1);
}
.sort-bar-label{
  font-size:9px;font-weight:700;
  color:rgba(100,210,160,.5);white-space:nowrap;
}
.sort-btn{
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:8px;
  border:1px solid rgba(100,210,160,.2);
  background:rgba(255,255,255,.04);
  color:rgba(110,231,183,.5);
  cursor:pointer;white-space:nowrap;
}
.sort-btn.active{
  background:rgba(16,185,129,.2);
  border-color:rgba(16,185,129,.4);
  color:#fff;
}
.sort-btn.ana-btn{
  border-color:rgba(167,139,250,.35);
  color:rgba(196,181,253,.7);
}
.sort-btn.ana-btn.active{
  background:rgba(109,40,217,.25);
  border-color:rgba(167,139,250,.6);
  color:#ddd6fe;
}
.sort-btn.sf3-btn{
  border-color:rgba(251,146,60,.35);
  color:rgba(253,186,116,.7);
}
.sort-btn.sf3-btn.active{
  background:rgba(194,65,12,.25);
  border-color:rgba(251,146,60,.6);
  color:#fed7aa;
}
.sort-btn.sougou-btn{
  border-color:rgba(109,40,217,.35);
  color:rgba(167,139,250,.8);
  font-weight:800;
}
.sort-btn.sougou-btn.active{
  background:linear-gradient(90deg,rgba(180,83,9,.2),rgba(4,120,87,.2));
  border-color:rgba(167,139,250,.6);
  color:#ddd6fe;
}

/* カード本体 */
.card-body{padding:10px 14px;background:#fff;color:#222;}
.horse-meta-row{
  display:flex;gap:12px;flex-wrap:wrap;
  font-size:11px;color:#555;margin-bottom:8px;
}
.horse-meta-row span{display:flex;align-items:center;gap:3px;}
.meta-label{font-size:9px;color:#999;font-weight:700;text-transform:uppercase;}

/* 外厩フルバッジ */
.ext-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;margin-bottom:8px;}
.ext-northern-tei{background:#fef9c3;color:#713f12;border:1px solid #eab308;}
.ext-northern-shi{background:#dbeafe;color:#1e3a8a;border:1px solid #3b82f6;}
.ext-champion    {background:#dcfce7;color:#14532d;border:1px solid #22c55e;}
.ext-yamamoto    {background:#ffedd5;color:#7c2d12;border:1px solid #f97316;}
.ext-canyon      {background:#f3e8ff;color:#581c87;border:1px solid #a855f7;}
.ext-esutei      {background:#fce7f3;color:#831843;border:1px solid #ec4899;}
.ext-other       {background:#fdf2f8;color:#701a75;border:1px solid #d946ef;}
.ext-zaiku       {background:#f9fafb;color:#9ca3af;border:1px solid #e5e7eb;font-style:italic;}

/* レース目標バッジ */
.rt-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;white-space:nowrap;margin-bottom:8px;margin-left:5px;letter-spacing:0.02em;}
.rt-derby  {background:#dbeafe;color:#1e3a8a;border:1px solid #3b82f6;}
.rt-both   {background:#fef9c3;color:#713f12;border:1px solid #eab308;}
.rt-satsuki{background:#fce7f3;color:#831843;border:1px solid #ec4899;}

/* ギーニョ分析 */
.ginyo-box{
  background:#fff8fa;
  border:1px solid rgba(232,48,110,.2);
  border-left:3px solid rgba(232,48,110,.5);
  border-radius:10px;
  padding:10px 12px;
  margin-top:4px;
}
.ginyo-header{
  display:flex;align-items:center;gap:6px;
  margin-bottom:7px;
}
.ginyo-label{
  font-size:10px;font-weight:900;letter-spacing:.08em;
  color:#c01860;text-transform:uppercase;
}
.ginyo-section{margin-bottom:6px;}
.ginyo-section-title{
  font-size:9px;font-weight:900;color:#c01860;
  letter-spacing:.08em;margin-bottom:3px;text-transform:uppercase;
}

<script>
const RACES = [
  {
    file: 'data/race-notes/2026-04-19-nakayama-11r.json',
    label: '皐月賞', gradeCls: 'grade-g1',
    meta: '4月19日(日) 中山 芝2000m内 21頭'
  },
];

let allData = [];
let currentIdx = 0;

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ZI能力値グレード
function ziGrade(zi) {
  if (!zi) return 'D';
  if (zi >= 120) return 'S';
  if (zi >= 110) return 'A';
  if (zi >= 100) return 'B';
  if (zi >= 90)  return 'C';
  return 'D';
}

// 外厩グレード
function extGrade(fac) {
  if (!fac || fac === '在厩調整') return 'B';
  if (fac.includes('天栄') || fac.includes('しがらき')) return 'S';
  if (fac.includes('チャンピオン') || fac.includes('山元') || fac.includes('キャニオン')) return 'A';
  return 'B';
}

function raceTargetBadge(t) {
  if (t === 'derby')   return `<span class="rt-badge rt-derby">🔵 ダービー狙い</span>`;
  if (t === 'both')    return `<span class="rt-badge rt-both">🟡 両睨み</span>`;
  if (t === 'satsuki') return `<span class="rt-badge rt-satsuki">🔴 皐月賞本気</span>`;
  return '';
}

function extBadge(fac) {
  if (!fac || fac === '在厩調整') return `<span class="ext-badge ext-zaiku">在厩調整</span>`;
  if (fac.includes('天栄'))       return `<span class="ext-badge ext-northern-tei">${esc(fac)}</span>`;
  if (fac.includes('しがらき'))   return `<span class="ext-badge ext-northern-shi">${esc(fac)}</span>`;
  if (fac.includes('チャンピオン'))return `<span class="ext-badge ext-champion">${esc(fac)}</span>`;
  if (fac.includes('山元'))       return `<span class="ext-badge ext-yamamoto">${esc(fac)}</span>`;
  if (fac.includes('キャニオン')) return `<span class="ext-badge ext-canyon">${esc(fac)}</span>`;
  if (fac.includes('エスティ'))   return `<span class="ext-badge ext-esutei">${esc(fac)}</span>`;
  return `<span class="ext-badge ext-other">${esc(fac)}</span>`;
}

function ziGradeBadge(zi) {
  const g = ziGrade(zi);
  return `<span class="zi-badge zi-${g.toLowerCase()}">能力${g}</span>`;
}

function extGradeBadge(fac) {
  const g = extGrade(fac);
  const [t, f] = GRADE_MAPS.ext[g] || ['C','B'];
  return dualBadge('外厩', t, f);
}

function bloodGradeBadge(tan, fuku) {
  const t = (tan  && tan  !== '—') ? tan  : null;
  const f = (fuku && fuku !== '—') ? fuku : null;
  return dualBadge('血統', t, f);
}

// ── グレード分割マップ (単勝 / 複勝) ──
// [tanGrade, fukuGrade]
const GRADE_MAPS = {
  // ZI能力値: 突出した能力＝勝ちに来る → 単勝寄り
  zi:    {S:['S','A'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  // 外厩: 仕上げ＝連対安定 → 複勝寄り（既存維持）
  ext:   {S:['A','S'], A:['B','A'], B:['C','B']},
  // 近走: B=やや低調でも複勝には踏ん張れる（既存維持）
  // 12段階入力にも対応（表示は標準5段階に変換）
  kinso: {
    '3S':['S','S'], '2S':['S','A'], '1S':['A','S'],
    '3A':['A','A'], '2A':['A','B'], '1A':['B','A'],
    '3B':['B','B'], '2B':['C','B'], '1B':['C','C'],
    '3C':['D','C'], '2C':['D','D'], '1C':['D','D'],
    'S':['S','S'], 'A':['A','A'], 'B':['B','A'], 'C':['D','C'], 'D':['D','D']
  },
  // ペース: 展開がズバリ合う＝決め手になる → 単勝寄り
  pace:  {S:['S','A'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  // 馬格: パワー・消耗しにくさ＝安定連対 → 複勝寄り
  body:  {S:['A','S'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  // コース適性: 安定連対に寄与 → 複勝寄り
  course:{S:['A','S'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  // 脚質: 展開での決め手＝勝ちに来る → 単勝寄り
  style: {S:['S','A'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
};

function splitGrade(g, key) {
  if (!g || g === '—') return [null, null];
  if (GRADE_MAPS[key] && GRADE_MAPS[key][g]) return GRADE_MAPS[key][g];
  // 12段階グレード（3S等）はGRADE_MAPSにないので単複同値で返す
  return g ? [g, g] : [null, null];
}

function gradePoints(g) {
  // 12段階評価
  const pts = {
    '3S':12,'2S':11,'1S':10,
    '3A': 9,'2A': 8,'1A': 7,
    '3B': 6,'2B': 5,'1B': 4,
    '3C': 3,'2C': 2,'1C': 1,
    'D':  0,
    // 後方互換: 旧1文字グレード → 中間値(= 2X相当)
    'S': 11, 'A': 8, 'B': 5, 'C': 2
  };
  return g != null ? (pts[g] ?? null) : null;
}
function gradeMax() { return 12; }

function calcScores(h) {
  const [ziT, ziF]   = splitGrade(ziGrade(h.sabcZI), 'zi');
  const [exT, exF]   = splitGrade(extGrade(h.extFacility), 'ext');
  // kinsoGrade: スコア計算は12段階元値をそのまま使用（gradePointsが3S〜1C対応済み）
  // バッジ表示は kinsoGradeBadge(h.kinsoGrade) 側で GRADE_MAPS 変換するため分離
  const kT  = h.kinsoGrade ?? null;
  const kF  = h.kinsoGrade ?? null;
  const [pT,  pF]    = splitGrade(h.paceGrade,  'pace');
  const [bdT, bdF]   = splitGrade(h.bodyGrade,  'body');
  const [cT,  cF]    = splitGrade(h.courseGrade,'course');
  const [syT, syF]   = splitGrade(h.styleGrade, 'style');
  const srT  = h.sireGradeTan     ?? null;  // 父（データ1）
  const srF  = h.sireGradeFuku    ?? null;
  const dsT  = h.damSireGradeTan  ?? null;  // 母父（データ1）
  const dsF  = h.damSireGradeFuku ?? null;
  const sr2T = h.sireGrade2Tan    ?? 'B';  // 父（データ2）null→中央値B
  const sr2F = h.sireGrade2Fuku   ?? 'B';
  const ds2T = h.damSireGrade2Tan ?? 'B';  // 母父（データ2）null→中央値B
  const ds2F = h.damSireGrade2Fuku?? 'B';
  const bT  = (h.bloodGradeTan  && h.bloodGradeTan  !== '—') ? h.bloodGradeTan  : null;  // 配合
  const bF  = (h.bloodGradeFuku && h.bloodGradeFuku !== '—') ? h.bloodGradeFuku : null;
  const stT = h.stableGradeTan  ?? null;
  const stF = h.stableGradeFuku ?? null;
  const brT = h.breederGradeTan  ?? null;
  const brF = h.breederGradeFuku ?? null;
  const jkT = h.jockeyGradeTan  ?? null;
  const jkF = h.jockeyGradeFuku ?? null;
  const gtT = h.gateGradeTan    ?? null;
  const gtF = h.gateGradeFuku   ?? null;
  const spT = h.specialGradeTan  ?? h.specialGrade ?? null;
  const spF = h.specialGradeFuku ?? h.specialGrade ?? null;
  const agT = h.ageGradeTan    ?? null;
  const agF = h.ageGradeFuku   ?? null;
  const rtT = h.rotGradeTan    ?? null;
  const rtF = h.rotGradeFuku   ?? null;
  const s3T = h.sf3GradeTan      ?? null;
  const s3F = h.sf3GradeFuku     ?? null;
  const lpT = h.lapGradeTan      ?? null;
  const lpF = h.lapGradeFuku     ?? null;
  const pmT = h.prevMarginGradeTan  ?? null;
  const pmF = h.prevMarginGradeFuku ?? null;
  const cdT = h.conditionGradeTan  ?? null;
  const cdF = h.conditionGradeFuku ?? null;
  const smT = h.somaGradeTan  ?? null;  // 相馬眼
  const smF = h.somaGradeFuku ?? null;
  const tgtT = h.raceTargetGradeTan  ?? null;  // 思惑（皐月賞狙いA/両睨みB/ダービー思惑D）
  const tgtF = h.raceTargetGradeFuku ?? null;
  const fwT  = h.finalWorkoutGradeTan  ?? null;  // 最終追い切り（4/17-18追加）
  const fwF  = h.finalWorkoutGradeFuku ?? null;
  const hgT  = h.haigoGradeTan  ?? null;  // 配合グレード（ギーニョ配合ジャッジ）
  const hgF  = h.haigoGradeFuku ?? null;
  const pxT  = h.paradoxGradeTan  ?? null;  // パラドックス加点（皐月賞本気×能力値）
  const pxF  = h.paradoxGradeFuku ?? null;
  const coT  = h.commentGradeTan  ?? null;  // コメント評価（先行/スタミナ/粘り加点・平坦向き/追って案外減点）
  const coF  = h.commentGradeFuku ?? null;

  let tanScore=0, tanMax=0, fukuScore=0, fukuMax=0;
  for (const g of [ziT,exT,srT,dsT,sr2T,ds2T,bT,kT,pT,stT,bdT,cT,syT,brT,gtT,spT,agT,rtT,s3T,cdT,smT,lpT,pmT,tgtT,fwT,hgT,pxT,coT]) {
    const p = gradePoints(g); if (p !== null){tanScore+=p; tanMax+=gradeMax();}
  }
  for (const g of [ziF,exF,srF,dsF,sr2F,ds2F,bF,kF,pF,stF,bdF,cF,syF,brF,gtF,spF,agF,rtF,s3F,cdF,smF,lpF,pmF,tgtF,fwF,hgF,pxF,coF]) {
    const p = gradePoints(g); if (p !== null){fukuScore+=p; fukuMax+=gradeMax();}
  }
  // ギーニョ評価：乗算（D=消し表示のみ・スコア影響なし, B=中立×1, S=最高×1.3）
  const ginyoMult = g => ({'S':1.3,'A':1.15,'B':1.0,'C':0.7,'D':1.0}[g] ?? 1.0);
  tanScore  *= ginyoMult(h.ginyoGradeTan  ?? 'B');
  fukuScore *= ginyoMult(h.ginyoGradeFuku ?? 'B');
  return {tanScore, fukuScore, tanMax, fukuMax};
}

// ── デュアルバッジ (ラベル + 単grade + 複grade) ──
function cls(g) {
  const m = {
    '3S':'bg-3s','2S':'bg-2s','1S':'bg-1s',
    '3A':'bg-3a','2A':'bg-2a','1A':'bg-1a',
    '3B':'bg-3b','2B':'bg-2b','1B':'bg-1b',
    '3C':'bg-3c','2C':'bg-2c','1C':'bg-1c',
    'D':'bg-d',
    // 後方互換
    'S':'bg-2s','A':'bg-2a','B':'bg-2b','C':'bg-2c'
  };
  return m[g] || 'bg-analyzing';
}
function dualBadge(label, gTan, gFuku) {
  const tl = gTan  || '?';
  const fl = gFuku || '?';
  return `<span class="dual-badge"><span class="dual-lbl">${esc(label)}</span><span class="dual-t ${cls(gTan)}">${tl}</span><span class="dual-f ${cls(gFuku)}">${fl}</span></span>`;
}

// ── 既存ファクターを分割してデュアルバッジ化 ──
function kinsoGradeBadge(g) {
  const [t,f] = splitGrade(g, 'kinso');
  return dualBadge('近走', t, f);
}
function paceGradeBadge(g) {
  const [t,f] = splitGrade(g, 'pace');
  return dualBadge('ペース', t, f);
}
// 汎用: JSON に既に Tan/Fuku があるファクター用
function gradeBadge(label, gTan, gFuku) {
  if (!gTan && !gFuku) return `<span class="blood-grade bg-analyzing">${esc(label)} 解析中</span>`;
  return dualBadge(label, gTan ?? null, gFuku ?? null);
}
// body / course / style 用 (単一grade → 分割)
function splitBadge(label, g, key) {
  if (!g) return `<span class="blood-grade bg-analyzing">${esc(label)} 解析中</span>`;
  const [t,f] = splitGrade(g, key);
  return dualBadge(label, t, f);
}

// ── スコアバー HTML ──
function scoreBarHtml(tanScore, fukuScore, tanMax, fukuMax, tanRank, fukuRank, anaScore, anaMax, anaRank, sougouScore, sougouRank) {
  const tp = tanMax  > 0 ? Math.round(tanScore/tanMax*100)  : 0;
  const fp = fukuMax > 0 ? Math.round(fukuScore/fukuMax*100) : 0;
  const ap = anaMax  > 0 ? Math.round(Math.max(0, anaScore)/anaMax*100) : 0;
  const sp = Math.round((sougouScore ?? 0) * 100);
  const rkCls = r => r===1?'rk1':r===2?'rk2':r===3?'rk3':'';
  return `
  <div class="score-bars">
    <div class="score-row">
      <span class="score-lbl tan-lbl">単</span>
      <div class="score-track"><div class="score-fill tan-fill" style="width:${tp}%"></div></div>
      <span class="score-val tan-val">${Math.round(tanScore)}/${tanMax} <span style="opacity:.6;font-size:9px">${tp}%</span></span>
      <span class="score-rank ${rkCls(tanRank)}">#${tanRank}</span>
    </div>
    <div class="score-row">
      <span class="score-lbl fuku-lbl">複</span>
      <div class="score-track"><div class="score-fill fuku-fill" style="width:${fp}%"></div></div>
      <span class="score-val fuku-val">${Math.round(fukuScore)}/${fukuMax} <span style="opacity:.6;font-size:9px">${fp}%</span></span>
      <span class="score-rank ${rkCls(fukuRank)}">#${fukuRank}</span>
    </div>
    <div class="score-row">
      <span class="score-lbl" style="color:#a78bfa;">穴</span>
      <div class="score-track"><div class="score-fill ana-fill" style="width:${ap}%"></div></div>
      <span class="score-val" style="color:#a78bfa;">${anaScore.toFixed(2)} <span style="opacity:.6;font-size:9px">${ap}%</span></span>
      <span class="score-rank ${rkCls(anaRank)}">#${anaRank}</span>
    </div>
    <div class="score-row">
      <span class="score-lbl" style="color:#f97316;">総</span>
      <div class="score-track"><div class="score-fill sougo-fill" style="width:${sp}%"></div></div>
      <span class="score-val" style="color:#f97316;">${sp}% </span>
      <span class="score-rank ${rkCls(sougouRank)}">#${sougouRank}</span>
    </div>
  </div>`;
}

// ── 買い目生成ロジック ──
function detectRaceType(byTan) {
  if (byTan.length < 4) return '混戦';
  // 総合スコアで判定（ginyoGrade乗算後の単勝スコアだと偏るため）
  const bySg = [...byTan].sort((a,b) => (b.sougouScore??0) - (a.sougouScore??0));
  const pct = s => s.sougouScore ?? 0;
  const d12 = pct(bySg[0]) - pct(bySg[1]);
  const d23 = pct(bySg[1]) - pct(bySg[2]);
  const d34 = pct(bySg[2]) - pct(bySg[3]);
  if (d12 >= 0.05)                               return '1強';
  if (d12 <  0.05 && d23 >= 0.05)               return '2強';
  if (d12 <  0.05 && d23 < 0.07 && d34 >= 0.05) return '3強';
  return '混戦';
}

function pickUnique(lists, counts) {
  const used = new Set();
  return lists.map((list, i) => {
    const picked = [];
    for (const s of list) {
      if (!used.has(s.name) && picked.length < counts[i]) {
        picked.push(s.name); used.add(s.name);
      }
    }
    return picked;
  });
}

function generateBets(withAna, headCount) {
  const tanPct  = s => s.tanMax  > 0 ? s.tanScore  / s.tanMax  : 0;
  const fukuPct = s => s.fukuMax > 0 ? s.fukuScore / s.fukuMax : 0;
  const byTan  = [...withAna].sort((a,b) => tanPct(b)  - tanPct(a));
  const byFuku = [...withAna].sort((a,b) => fukuPct(b) - fukuPct(a));
  const byAna  = [...withAna].sort((a,b) => b.anaScore  - a.anaScore);

  const raceType = detectRaceType(byTan);
  const bets = [];

  // ── 共通：単勝・複勝 ──
  const tan1  = byTan[0].name;
  const fuku1 = byFuku[0].name;
  const ana1  = byAna.find(s => s.name !== fuku1)?.name ?? byAna[0].name;
  bets.push({ type:'単勝', horses:[tan1],        points:1, note:'単勝ランク1位' });
  bets.push({ type:'複勝', horses:[fuku1, ana1], points:2, note:'複勝1位 ＋ 穴馬1位' });

  // ── 1強戦 ──
  if (raceType === '1強') {
    const pool = withAna.filter(s => s.name !== tan1);
    const [fg, ag] = pickUnique(
      [pool.sort((a,b)=>fukuPct(b)-fukuPct(a)), pool.sort((a,b)=>b.anaScore-a.anaScore)],
      [3, 3]
    );
    const aite = [...new Set([...fg, ...ag])].slice(0, 6);
    const topAnaOdds = byAna[0]?.h?.expectedOdds ?? 0;
    const use2ren = topAnaOdds >= 10 ? '馬単' : '馬連';
    const pts2 = use2ren === '馬単' ? 12 : 6;
    bets.push({ type:use2ren, horses:[tan1, ...aite], points:pts2,
                note:`軸${tan1} × 相手6頭流し` });
    bets.push({ type:'3連単', horses:[tan1, ...aite], points:30,
                note:`1着固定 × 相手6頭流し（30点）` });

  // ── 2強戦 ──
  } else if (raceType === '2強') {
    const jiku2 = [byTan[0].name, byTan[1].name];
    const [rest] = pickUnique([byFuku.filter(s => !jiku2.includes(s.name))], [2]);
    const box4 = [...jiku2, ...rest];
    bets.push({ type:'馬連', horses:box4, points:6,
                note:`4頭ボックス` });
    bets.push({ type:'3連複', horses:jiku2, points:headCount - 2,
                note:`軸2頭 × 残り全頭総流し（${headCount-2}点）` });

  // ── 3強戦 ──
  } else if (raceType === '3強') {
    const jiku3 = [byTan[0].name, byTan[1].name, byTan[2].name];
    const anaH  = byAna.find(s => !jiku3.includes(s.name))?.name;
    const box4  = [...jiku3, ...(anaH ? [anaH] : [])];
    bets.push({ type:'3連単', horses:box4, points:24,
                note:`4頭ボックス（3強 ＋ 穴馬1位）` });

  // ── 混戦 ──
  } else {
    const [fg, ag] = pickUnique([byFuku, byAna], [2, 2]);
    const box4 = [...new Set([...fg, ...ag])].slice(0, 4);
    bets.push({ type:'馬連', horses:box4, points:6,
                note:`4頭ボックス` });
    const jiku2 = [byTan[0].name, byTan[1].name];
    bets.push({ type:'3連複', horses:jiku2, points:headCount - 2,
                note:`軸2頭 × 残り全頭総流し（${headCount-2}点）` });
  }

  return { raceType, bets };
}

function renderBetRow(b, numMap) {
  const chip = name => {
    const num = numMap?.[name] ?? '';
    return `<span class="bet-horse-chip">${num ? num+'番 ' : ''}${name}</span>`;
  };

  // フォーメーション表示（formation フィールドがある場合）
  if (b.formation) {
    const rows = Object.entries(b.formation).map(([label, names]) => `
      <div class="bet-formation-row">
        <span class="bet-chakuban">${label}</span>
        <div class="bet-horse-chips">${names.map(chip).join('')}</div>
      </div>`).join('');
    return `
    <div class="bet-row bet-row-detail">
      <div class="bet-row-top">
        <span class="bet-type">${b.type}</span>
        <span class="bet-points">${b.points}点</span>
        <div class="bet-note-inline">${b.note}</div>
      </div>
      <div class="bet-formation-rows">${rows}</div>
    </div>`;
  }

  // 複数馬・軸流し表示
  const needsDetail = (b.type === '馬単' || b.type === '馬連' || b.type === '3連単' || b.type === '3連複') && b.horses.length > 2;
  if (needsDetail) {
    const jiku = b.horses[0];
    const aite = b.horses.slice(1);
    const aiteChips = aite.map(chip).join('');
    const label = (b.type === '3連単') ? '1着固定' : '◎ 軸';
    return `
    <div class="bet-row bet-row-detail">
      <div class="bet-row-top">
        <span class="bet-type">${b.type}</span>
        <span class="bet-points">${b.points}点</span>
        <div class="bet-note-inline">${b.note}</div>
      </div>
      <div class="bet-horses-detail">
        <span class="bet-jiku">${label}　${jiku}</span>
        <span class="bet-arrow">→</span>
        <div class="bet-aite-chips">${aiteChips}</div>
      </div>
    </div>`;
  }

  // シンプル表示（単勝・複勝など）
  const horseLabels = b.horses.map(chip).join(' ／ ');
  return `
  <div class="bet-row">
    <span class="bet-type">${b.type}</span>
    <span class="bet-horses">${horseLabels}</span>
    <span class="bet-points">${b.points}点</span>
    <div class="bet-note">${b.note}</div>
    ${b.optionalNote ? `<div class="bet-optional-note">${esc(b.optionalNote)}</div>` : ''}
  </div>`;
}

function buildBetSection(withAna, headCount, d) {
  const customBets = d?.customBets;
  const { raceType, bets: autoBets } = generateBets(withAna, headCount);
  const bets = (customBets && customBets.length > 0) ? customBets : autoBets;
  const typeColor = { '1強':'#d97706','2強':'#2563eb','3強':'#7c3aed','混戦':'#4b5563' };
  const color = typeColor[raceType] ?? '#4b5563';
  const totalPoints = bets.reduce((s, b) => s + b.points, 0);
  const numMap = {};
  withAna.forEach(s => { numMap[s.name] = s.h.num; });
  const rows = bets.map(b => renderBetRow(b, numMap)).join('');
  return `
  <div class="bet-section">
    <div class="bet-header">
      <span class="bet-race-type" style="background:${color};">${raceType}</span>
      <span class="bet-title">🎯 買い目提案</span>
      <span class="bet-total">合計 ${totalPoints}点</span>
    </div>
    ${rows}
  </div>`;
}

function buildCommentMaps(d) {

  (d.sabcRankFuku || []).forEach(item => { if (item.horse) fuku[item.horse] = item.comment; });

function buildSf3Comment(h) {
  const diff = h.prevSF3Diff;
  const rank = h.prevSF3Rank;
  const odds = h.expectedOdds;
  const score = h.sf3AnaScore;
  if (score === null || score === undefined || rank === null) return null;

  // 3F差レンジ
  const diffInfo = diff === null ? null :
    diff <= 0.1 ? {label:`${diff}差 [0.0-0.1]`, tan:43}  :
    diff <= 0.3 ? {label:`${diff}差 [0.2-0.3]`, tan:78}  :
    diff <= 0.5 ? {label:`${diff}差 [0.4-0.5]`, tan:60}  :
    diff <= 0.7 ? {label:`${diff}差 [0.6-0.7]`, tan:150} :
    diff <= 0.9 ? {label:`${diff}差 [0.8-0.9]`, tan:31}  :
    diff <= 1.2 ? {label:`${diff}差 [1.0-1.2]`, tan:8}   :
    diff <= 1.5 ? {label:`${diff}差 [1.3-1.5]`, tan:170} :
    diff <= 1.9 ? {label:`${diff}差 [1.6-1.9]`, tan:0}   :
                  {label:`${diff}差`, tan:0};
  const rankInfo =
    rank===1 ? {label:'前走上がり1位', fuku:22.2} :
    rank===2 ? {label:'前走上がり2位', fuku:32.9} :
    rank===3 ? {label:'前走上がり3位', fuku:22.2} :
    rank<=5  ? {label:`前走上がり${rank}位`, fuku:24.5} :
               {label:`前走上がり${rank}位`, fuku:16.1};

  const tanStar = diffInfo && diffInfo.tan >= 150 ? '★★' : diffInfo && diffInfo.tan >= 100 ? '★' : '';
  const diffStr  = diffInfo ? `${diffInfo.label} 単回${diffInfo.tan}${tanStar}` : `差不明`;
  const rankStr  = `${rankInfo.label}（複勝率${rankInfo.fuku}%）`;
  const oddsStr  = odds ? `${odds}倍` : '?倍';

  let eval_ = '';
  if (score >= 1.5)     eval_ = '◎ 統計穴馬最上位候補';
  else if (score >= 0.6) eval_ = '○ 統計穴馬候補';
  else if (score >= 0.2) eval_ = '▲ やや穴注目';
  else                   eval_ = '△ 穴スコア低め';

  return `${diffStr} × ${rankStr} × ${oddsStr} → スコア${score.toFixed(2)}（${eval_}）`;
}

function renderRace(idx) {
  if (!allData[idx]) return;
  const {cfg, d} = allData[idx];
  const horses = Object.entries(d.horses);

  // 全馬のスコアを計算
  const scored = horses.map(([name, h]) => ({name, h, ...calcScores(h)}));

  // 穴馬スコア = 3F統計穴スコア + レース統計穴ボーナス + 血統配合グレードボーナス + 各種単回値ボーナス
  const withAna = scored.map(s => {
    const sf3Part     = s.h.sf3AnaScore            ?? 0;
    const racePart    = s.h.raceAnaBonus           ?? 0;
    const jkAna       = s.h.jockeyAnaBonus         ?? 0;
    const frameAna    = s.h.frameAnaBonus          ?? 0;
    const sireAna     = s.h.sireAnaBonus           ?? 0;
    const breederAna  = s.h.breederAnaBonus        ?? 0;
    const damSireAna  = s.h.damSireAnaBonus        ?? 0;
    const jkStableAna = s.h.jockeyStableAnaBonus   ?? 0;
    const styleAna    = s.h.styleAnaBonus          ?? 0;  // 先行×上がり最速等
    const lemaireAna  = s.h.lemaireChangeBonus     ?? 0;  // 前走ルメール→乗替（素質馬の証明）
    const marginAna   = s.h.prevMarginBonus        ?? 0;  // 前走着差ボーナス（0.3〜0.9差勝ち）
    // 血統配合グレード（B=0基準、S+S→+0.5、A+A→+0.25、D+D→-0.42）
    const bT = s.h.bloodGradeTan  ?? 'B';
    const bF = s.h.bloodGradeFuku ?? 'B';
    const bloodPart = ((gradePoints(bT) ?? 5) + (gradePoints(bF) ?? 5) - 10) / 24;
    const anaScore = sf3Part + racePart + bloodPart + jkAna + frameAna + sireAna + breederAna + damSireAna + jkStableAna + styleAna + lemaireAna + marginAna;
    const sougouScore = (s.tanMax + s.fukuMax) > 0 ? (s.tanScore + s.fukuScore) / (s.tanMax + s.fukuMax) : 0;
    const isKeshi = (s.h.ginyoGradeTan === 'D') && (s.h.ginyoGradeFuku === 'D');
    return {...s, anaScore, sougouScore, isKeshi};
  });

  // sabcRankTan/Fuku の編集順位マップ（存在する場合はそちらを優先）
  const tanEditRank = {}, fukuEditRank = {};
  (d.sabcRankTan  || []).forEach(item => { if (item.horse) tanEditRank[item.horse]  = item.rank; });
  (d.sabcRankFuku || []).forEach(item => { if (item.horse) fukuEditRank[item.horse] = item.rank; });
  const hasTanEdit  = Object.keys(tanEditRank).length  > 0;
  const hasFukuEdit = Object.keys(fukuEditRank).length > 0;

  // 単勝/複勝/ZI/穴馬/総合/人気 順位マップ
  const tanPct  = s => s.tanMax  > 0 ? s.tanScore  / s.tanMax  : 0;
  const fukuPct = s => s.fukuMax > 0 ? s.fukuScore / s.fukuMax : 0;
  const byTan    = [...withAna].sort((a,b) => tanPct(b)  - tanPct(a)  || (b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byFuku   = [...withAna].sort((a,b) => fukuPct(b) - fukuPct(a) || (b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byZI     = [...withAna].sort((a,b) => (b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byAna    = [...withAna].sort((a,b) => (a.isKeshi?1:0)-(b.isKeshi?1:0) || b.anaScore - a.anaScore);
  const bySougou = [...withAna].sort((a,b) => b.sougouScore - a.sougouScore || (b.h.sabcZI||0)-(a.h.sabcZI||0));
  // 人気順（オッズ昇順）
  const byOdds   = [...withAna].sort((a,b) => (a.h.expectedOdds||999) - (b.h.expectedOdds||999));
  const tanRankMap={}, fukuRankMap={}, ziRankMap={}, anaRankMap={}, sougouRankMap={}, popularityMap={};
  byTan.forEach(({name},i)    => tanRankMap[name]    = i+1);
  byFuku.forEach(({name},i)   => fukuRankMap[name]   = i+1);
  byZI.forEach(({name},i)     => ziRankMap[name]     = i+1);
  byAna.forEach(({name},i)    => anaRankMap[name]    = i+1);
  bySougou.forEach(({name},i) => sougouRankMap[name] = i+1);
  byOdds.forEach(({name},i)   => popularityMap[name] = i+1);

  // 表示順
  let display;
  if      (sortMode === 'tan')    display = byTan;
  else if (sortMode === 'fuku')   display = byFuku;
  else if (sortMode === 'ana')    display = byAna;
  else if (sortMode === 'sougou') display = bySougou;
  else                            display = byZI;

  const {tan: tanCmt, fuku: fukuCmt} = buildCommentMaps(d);

  const anaMax = Math.max(...withAna.map(s => s.anaScore ?? 0), 0.01);
  const cards = display.map(({name, h, tanScore, fukuScore, tanMax, fukuMax, anaScore, sougouScore, isKeshi}) =>
    buildHorseCard(name, h, tanScore, fukuScore, tanMax, fukuMax,
                   tanRankMap[name], fukuRankMap[name], ziRankMap[name], anaRankMap[name],
                   sougouRankMap[name], popularityMap[name],
                   tanCmt[name] || null, fukuCmt[name] || null,
                   anaScore ?? 0, anaMax, sougouScore ?? 0, isKeshi ?? false)
  ).join('');

  const sortBar = `
    <div class="sort-bar" style="flex-wrap:wrap;">
      <span class="sort-bar-label">並び順:</span>
      <button class="sort-btn sougou-btn ${sortMode==='sougou'?'active':''}" onclick="setSortMode('sougou')">⭐ 総合スコア順</button>
      <button class="sort-btn ${sortMode==='tan'   ?'active':''}" onclick="setSortMode('tan')">単勝スコア順</button>
      <button class="sort-btn ${sortMode==='fuku'  ?'active':''}" onclick="setSortMode('fuku')">複勝スコア順</button>
      <button class="sort-btn ana-btn ${sortMode==='ana'?'active':''}" onclick="setSortMode('ana')">穴馬スコア順</button>
      <button class="sort-btn ${sortMode==='zi'    ?'active':''}" onclick="setSortMode('zi')">ZI順</button>
    </div>`;

  document.getElementById('content').innerHTML = `
    <div class="race-info">
      <div>
        <div class="race-info-name">${esc(d.race?.name || cfg.label)}</div>
        <div class="race-info-meta">${cfg.meta}</div>
      </div>
      <span class="horse-count">${horses.length}頭</span>
    </div>
    ${buildAnalysisSection(d)}
    ${sortBar}
    <div class="horse-list">${cards}</div>
  `;
}

// タブ切り替え
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentIdx = idx;
  renderRace(idx);
});

async function main() {
  try {
    allData = await Promise.all(
      RACES.map(cfg => fetch(cfg.file + '?v=' + Date.now())
        .then(r => r.json())
        .then(d => ({cfg, d})))
    );
    renderRace(0);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<p class="loading" style="color:#f87171">読み込みエラー: ${esc(e.message)}</p>`;
  }
}
main();
</script>
</body>
</html>
