<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>出走予定馬 分析 | UG競馬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#2a0518;--bg2:#3d0825;--bg3:#280416;
  --pink:#e8306e;--pink-dk:#c0185a;--pink-lt:#ff6fa8;
  --gold:#fcd34d;
  --card:rgba(255,255,255,.06);--border:rgba(255,140,185,.18);
  --text:#fff;--muted:rgba(255,210,230,.65);
  --zi-s:#fcd34d;--zi-a:#86efac;--zi-b:#93c5fd;--zi-c:#fda4af;--zi-d:rgba(255,150,160,.45);
}
html,body{background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;}

/* ── ヘッダー ── */
.page-header{
  background:linear-gradient(135deg,#7b1040,#c01860,#7b1040);
  border-bottom:2px solid rgba(255,160,200,.35);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 24px rgba(220,30,100,.35);
}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:700;color:#fff;
  text-decoration:none;padding:5px 10px;border-radius:8px;
  border:1px solid rgba(255,200,220,.4);
  white-space:nowrap;flex-shrink:0;
}
.page-title{font-size:15px;font-weight:900;color:#fff;letter-spacing:.06em;}
.page-sub{font-size:10px;color:rgba(255,210,230,.8);margin-top:1px;}

/* ── バナー ── */
.breadcrumb-banner{
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(180,30,80,.45),rgba(220,50,110,.3),rgba(180,30,80,.45));
  border-bottom:1px solid rgba(255,150,190,.2);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.bc-item{font-size:11px;font-weight:700;color:rgba(255,210,230,.7);}
.bc-sep{font-size:13px;color:rgba(255,170,200,.6);font-weight:900;}
.bc-current{font-size:11px;font-weight:900;color:#ffb3d4;}

/* ── タブ ── */
.tab-bar{
  display:flex;gap:0;
  background:rgba(0,0,0,.25);
  border-bottom:2px solid rgba(255,140,185,.2);
  position:sticky;top:57px;z-index:100;
}
.tab-btn{
  flex:1;padding:11px 8px;
  font-size:12px;font-weight:700;color:var(--muted);
  background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .18s;letter-spacing:.03em;
  text-align:center;
}
.tab-btn.active{
  color:#fff;
  border-bottom:3px solid var(--pink);
  background:rgba(232,48,110,.12);
}
.tab-btn .tab-grade{
  font-size:9px;font-weight:900;
  padding:1px 5px;border-radius:3px;margin-right:4px;
  vertical-align:middle;
}
.grade-g1{background:linear-gradient(135deg,#f0c040,#d4a010);color:#1a1000;}
.grade-g2{background:linear-gradient(135deg,#e0b0d0,#c080a0);color:#2a0a1a;}

/* ── レース情報 ── */
.race-info{
  padding:12px 16px;
  background:rgba(255,255,255,.04);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.race-info-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:900;color:#fff;}
.race-info-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.horse-count{
  margin-left:auto;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  background:rgba(255,140,185,.12);color:rgba(255,200,225,.8);
  border:1px solid rgba(255,140,185,.2);
}

/* ── 馬カード ── */
.horse-list{padding:12px 12px 80px;}
.horse-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,140,185,.15);
  border-radius:16px;
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .15s;
}
.horse-card:active{border-color:rgba(255,140,185,.4);}

/* カードヘッダー */
.card-head{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  background:rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,140,185,.1);
}
.horse-num{
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,140,185,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:rgba(255,200,225,.8);
  flex-shrink:0;
}
.horse-name{
  font-family:'Noto Serif JP',serif;
  font-size:15px;font-weight:900;color:#fff;
  flex:1;min-width:0;
}
.badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}

/* ZI能力値バッジ */
.zi-badge{
  font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px;
  white-space:nowrap;letter-spacing:.04em;
}
.zi-s{background:rgba(252,211,77,.2);color:var(--zi-s);border:1px solid rgba(252,211,77,.35);}
.zi-a{background:rgba(134,239,172,.2);color:var(--zi-a);border:1px solid rgba(134,239,172,.35);}
.zi-b{background:rgba(147,197,253,.2);color:var(--zi-b);border:1px solid rgba(147,197,253,.35);}
.zi-c{background:rgba(253,164,175,.15);color:var(--zi-c);border:1px solid rgba(253,164,175,.3);}
.zi-d{background:rgba(255,100,120,.08);color:rgba(255,140,155,.55);border:1px solid rgba(255,100,120,.15);}

/* 外厩グレードバッジ */
.ext-grade{
  font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px;
  white-space:nowrap;
}
.extg-s{background:rgba(252,211,77,.15);color:#fcd34d;border:1px solid rgba(252,211,77,.3);}
.extg-a{background:rgba(134,239,172,.12);color:#86efac;border:1px solid rgba(134,239,172,.25);}
.extg-b{background:rgba(255,255,255,.07);color:rgba(255,220,235,.5);border:1px solid rgba(255,255,255,.1);}

/* 血統グレードバッジ */
.blood-grade{
  font-size:9px;font-weight:900;padding:2px 6px;border-radius:5px;
  white-space:nowrap;letter-spacing:.03em;
}
.bg-s{background:rgba(252,211,77,.18);color:#fcd34d;border:1px solid rgba(252,211,77,.35);}
.bg-a{background:rgba(134,239,172,.15);color:#86efac;border:1px solid rgba(134,239,172,.3);}
.bg-b{background:rgba(147,197,253,.15);color:#93c5fd;border:1px solid rgba(147,197,253,.3);}
.bg-c{background:rgba(253,164,175,.1);color:#fda4af;border:1px solid rgba(253,164,175,.2);}
.bg-d{background:rgba(255,100,120,.05);color:rgba(255,140,155,.4);border:1px solid rgba(255,100,120,.12);}
.bg-n{background:rgba(255,255,255,.04);color:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.08);}
.bg-analyzing{background:rgba(80,80,100,.08);color:rgba(180,180,200,.35);border:1px solid rgba(100,100,130,.12);font-style:italic;letter-spacing:.01em;}

/* カード本体 */
.card-body{padding:10px 14px;}
.horse-meta-row{
  display:flex;gap:12px;flex-wrap:wrap;
  font-size:11px;color:var(--muted);margin-bottom:8px;
}
.horse-meta-row span{display:flex;align-items:center;gap:3px;}
.meta-label{font-size:9px;color:rgba(255,180,210,.4);font-weight:700;text-transform:uppercase;}

/* 外厩フルバッジ */
.ext-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap;margin-bottom:8px;}
.ext-northern-tei{background:rgba(251,191,36,.18);color:#fcd34d;border:1px solid rgba(251,191,36,.3);}
.ext-northern-shi{background:rgba(96,165,250,.18);color:#93c5fd;border:1px solid rgba(96,165,250,.3);}
.ext-champion    {background:rgba(34,197,94,.18);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.ext-yamamoto    {background:rgba(249,115,22,.18);color:#fdba74;border:1px solid rgba(249,115,22,.3);}
.ext-canyon      {background:rgba(168,85,247,.18);color:#d8b4fe;border:1px solid rgba(168,85,247,.3);}
.ext-esutei      {background:rgba(236,72,153,.18);color:#f9a8d4;border:1px solid rgba(236,72,153,.3);}
.ext-other       {background:rgba(180,100,140,.15);color:#e8b4cc;border:1px solid rgba(180,100,140,.25);}
.ext-zaiku       {background:rgba(60,20,40,.4);color:rgba(200,150,175,.4);border:1px solid rgba(180,80,120,.1);font-style:italic;}

/* ギーニョ分析 */
.ginyo-box{
  background:rgba(232,48,110,.06);
  border:1px solid rgba(232,48,110,.2);
  border-left:3px solid rgba(232,48,110,.5);
  border-radius:10px;
  padding:10px 12px;
  margin-top:4px;
}
.ginyo-header{
  display:flex;align-items:center;gap:6px;
  margin-bottom:7px;
}
.ginyo-label{
  font-size:10px;font-weight:900;letter-spacing:.08em;
  color:rgba(255,140,185,.8);text-transform:uppercase;
}
.ginyo-section{margin-bottom:6px;}
.ginyo-section-title{
  font-size:9px;font-weight:900;color:rgba(255,140,185,.5);
  letter-spacing:.08em;margin-bottom:3px;text-transform:uppercase;
}
.ginyo-text{
  font-size:12px;line-height:1.7;color:rgba(255,230,240,.85);
}
.no-comment{
  font-size:11px;color:rgba(255,180,210,.3);
  font-style:italic;padding:4px 0;
}
.prev-finish{
  display:inline-block;font-size:10px;font-weight:900;
  padding:1px 7px;border-radius:4px;margin-bottom:6px;
  background:rgba(255,200,80,.15);color:#fcd34d;
  border:1px solid rgba(255,200,80,.25);
}

/* 前走なし */
.no-race{font-size:11px;color:rgba(255,180,210,.3);font-style:italic;}

/* ランク表示 */
.rank-badge{
  font-size:9px;font-weight:900;padding:2px 6px;border-radius:4px;
  background:rgba(232,48,110,.15);color:rgba(255,140,185,.8);
  border:1px solid rgba(232,48,110,.25);margin-right:6px;
}

/* ── ギーニョ重賞データ解析セクション ── */
.analysis-section{
  margin:12px 12px 0;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,140,185,.2);
}
.analysis-block{
  background:rgba(40,5,24,.7);
  padding:14px 16px;
  border-bottom:1px solid rgba(255,140,185,.1);
}
.analysis-block:last-child{border-bottom:none;}
.analysis-block-title{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:900;letter-spacing:.1em;
  color:rgba(255,140,185,.9);text-transform:uppercase;
  margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid rgba(255,140,185,.15);
}
.analysis-icon{font-size:14px;}
.analysis-comment{
  font-size:12px;line-height:1.8;
  color:rgba(255,230,240,.82);
}
/* ランキングリスト */
.rank-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;}
.rank-item{
  display:flex;align-items:flex-start;gap:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,140,185,.1);
  border-radius:10px;padding:10px 12px;
}
.rank-item.rank-keshi{
  opacity:.55;
  border-color:rgba(248,113,113,.15);
  background:rgba(248,113,113,.04);
}
.rank-num{
  flex-shrink:0;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;
}
.rank-num.r1{background:rgba(252,211,77,.2);color:#fcd34d;border:1px solid rgba(252,211,77,.4);}
.rank-num.r2{background:rgba(209,213,219,.15);color:#d1d5db;border:1px solid rgba(209,213,219,.3);}
.rank-num.r3{background:rgba(180,83,9,.2);color:#fdba74;border:1px solid rgba(180,83,9,.35);}
.rank-num.rn{background:rgba(255,255,255,.07);color:rgba(255,210,230,.5);border:1px solid rgba(255,255,255,.1);}
.rank-num.rx{background:rgba(248,113,113,.1);color:rgba(248,113,113,.6);border:1px solid rgba(248,113,113,.2);font-size:10px;}
.rank-info{flex:1;min-width:0;}
.rank-horse{
  font-family:'Noto Serif JP',serif;
  font-size:13px;font-weight:900;color:#fff;
  margin-bottom:4px;
}
.rank-horse-comment{
  font-size:11px;line-height:1.7;
  color:rgba(255,210,230,.7);
}

.loading{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">‹ TOP</a>
  <div>
    <div class="page-title">🌸 出走予定馬 解析</div>
    <div class="page-sub">NZT / 阪神牝馬S / 桜花賞</div>
  </div>
</div>

<div class="breadcrumb-banner">
  <span class="bc-item">G1 大阪杯 馬場急上昇ジョーカー出現</span>
  <span class="bc-sep">›</span>
  <span class="bc-current">🌸 桜花賞 徹底解析中</span>
</div>

<!-- タブ -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-idx="0">
    <span class="tab-grade grade-g2">G2</span>NZT
  </button>
  <button class="tab-btn" data-idx="1">
    <span class="tab-grade grade-g2">G2</span>阪神牝馬S
  </button>
  <button class="tab-btn" data-idx="2">
    <span class="tab-grade grade-g1">G1</span>桜花賞
  </button>
</div>

<!-- コンテンツ -->
<div id="content"><p class="loading">データ読み込み中...</p></div>

<script>
const RACES = [
  {
    file: 'data/race-notes/2026-04-11-nakayama-11r.json',
    label: 'NZT', gradeCls: 'grade-g2',
    meta: '4月11日(土) 中山 芝1600m 17頭'
  },
  {
    file: 'data/race-notes/2026-04-11-hanshin-11r.json',
    label: '阪神牝馬S', gradeCls: 'grade-g2',
    meta: '4月11日(土) 阪神 芝1600m外 10頭'
  },
  {
    file: 'data/race-notes/2026-04-12-hanshin-11r.json',
    label: '桜花賞', gradeCls: 'grade-g1',
    meta: '4月12日(日) 阪神 芝1600m外 19頭'
  },
];

let allData = [];
let currentIdx = 0;

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ZI能力値グレード
function ziGrade(zi) {
  if (!zi) return 'D';
  if (zi >= 120) return 'S';
  if (zi >= 110) return 'A';
  if (zi >= 100) return 'B';
  if (zi >= 90)  return 'C';
  return 'D';
}

// 外厩グレード
function extGrade(fac) {
  if (!fac || fac === '在厩調整') return 'B';
  if (fac.includes('天栄') || fac.includes('しがらき')) return 'S';
  if (fac.includes('チャンピオン') || fac.includes('山元') || fac.includes('キャニオン')) return 'A';
  return 'B';
}

function extBadge(fac) {
  if (!fac || fac === '在厩調整') return `<span class="ext-badge ext-zaiku">在厩調整</span>`;
  if (fac.includes('天栄'))       return `<span class="ext-badge ext-northern-tei">${esc(fac)}</span>`;
  if (fac.includes('しがらき'))   return `<span class="ext-badge ext-northern-shi">${esc(fac)}</span>`;
  if (fac.includes('チャンピオン'))return `<span class="ext-badge ext-champion">${esc(fac)}</span>`;
  if (fac.includes('山元'))       return `<span class="ext-badge ext-yamamoto">${esc(fac)}</span>`;
  if (fac.includes('キャニオン')) return `<span class="ext-badge ext-canyon">${esc(fac)}</span>`;
  if (fac.includes('エスティ'))   return `<span class="ext-badge ext-esutei">${esc(fac)}</span>`;
  return `<span class="ext-badge ext-other">${esc(fac)}</span>`;
}

function ziGradeBadge(zi) {
  const g = ziGrade(zi);
  return `<span class="zi-badge zi-${g.toLowerCase()}">能力${g}</span>`;
}

function extGradeBadge(fac) {
  const g = extGrade(fac);
  return `<span class="ext-grade extg-${g.toLowerCase()}">外厩${g}</span>`;
}

function bloodGradeBadge(tan, fuku) {
  const cls = g => g === 'S' ? 'bg-s' : g === 'A' ? 'bg-a' : g === 'B' ? 'bg-b' : g === 'C' ? 'bg-c' : g === 'D' ? 'bg-d' : 'bg-n';
  const t = tan  || '—';
  const f = fuku || '—';
  return `<span class="blood-grade ${cls(t)}">血統単${t}</span><span class="blood-grade ${cls(f)}">血統複${f}</span>`;
}

function kinsoGradeBadge(g) {
  const cls = g === 'S' ? 'bg-s' : g === 'A' ? 'bg-a' : g === 'B' ? 'bg-b' : g === 'C' ? 'bg-c' : g === 'D' ? 'bg-d' : 'bg-n';
  const label = g || '—';
  return `<span class="blood-grade ${cls}">近走${label}</span>`;
}

function paceGradeBadge(g) {
  const cls = g === 'S' ? 'bg-s' : g === 'A' ? 'bg-a' : g === 'B' ? 'bg-b' : g === 'C' ? 'bg-c' : g === 'D' ? 'bg-d' : 'bg-n';
  const label = g || '—';
  return `<span class="blood-grade ${cls}">ペース${label}</span>`;
}

function gradeBadge(label, g) {
  if (!g) return `<span class="blood-grade bg-analyzing">${label} 解析中</span>`;
  const cls = g==='S'?'bg-s':g==='A'?'bg-a':g==='B'?'bg-b':g==='C'?'bg-c':g==='D'?'bg-d':'bg-n';
  return `<span class="blood-grade ${cls}">${label}${g}</span>`;
}

// ZI×外厩 でソートして順位付け
function rankHorses(horses) {
  const gradeOrder = {S:4,A:3,B:2,C:1,D:0};
  return [...horses].sort((a,b) => {
    const ziA = a[1].sabcZI || 0, ziB = b[1].sabcZI || 0;
    if (ziB !== ziA) return ziB - ziA;
    return gradeOrder[extGrade(b[1].extFacility)] - gradeOrder[extGrade(a[1].extFacility)];
  });
}

function buildRankList(items) {
  if (!items || items.length === 0) return '';
  return '<ul class="rank-list">' + items.map(item => {
    const isKeshi = String(item.rank) === '消';
    const rankCls = isKeshi ? 'rx' : (item.rank === 1 ? 'r1' : item.rank === 2 ? 'r2' : item.rank === 3 ? 'r3' : 'rn');
    const rankLabel = isKeshi ? '消' : String(item.rank);
    return `
    <li class="rank-item${isKeshi ? ' rank-keshi' : ''}">
      <div class="rank-num ${rankCls}">${rankLabel}</div>
      <div class="rank-info">
        <div class="rank-horse">${esc(item.horse)}</div>
        <div class="rank-horse-comment">${esc(item.comment)}</div>
      </div>
    </li>`;
  }).join('') + '</ul>';
}

function buildAnalysisSection(d) {
  const hasTan  = d.sabcRankTan && d.sabcRankTan.length > 0;
  const hasFuku = d.sabcRankFuku && d.sabcRankFuku.length > 0;
  const hasAnalysis = d.raceAnalysis;
  if (!hasAnalysis && !hasTan && !hasFuku) return '';

  let html = '<div class="analysis-section">';

  if (hasAnalysis) {
    html += `
    <div class="analysis-block">
      <div class="analysis-block-title">
        <span class="analysis-icon">📊</span>ギーニョの重賞データ解析
      </div>
      <div class="analysis-comment">${esc(d.raceAnalysis)}</div>
    </div>`;
  }

  if (d.bloodAnalysis) {
    html += `
    <div class="analysis-block">
      <div class="analysis-block-title">
        <span class="analysis-icon">🧬</span>ギーニョの血統解析
      </div>
      <div class="analysis-comment">${esc(d.bloodAnalysis)}</div>
    </div>`;
  }

  if (hasTan) {
    html += `
    <div class="analysis-block">
      <div class="analysis-block-title">
        <span class="analysis-icon">🥇</span>単勝期待値ランキング
      </div>
      ${buildRankList(d.sabcRankTan)}
    </div>`;
  }

  if (hasFuku) {
    html += `
    <div class="analysis-block">
      <div class="analysis-block-title">
        <span class="analysis-icon">🎯</span>複勝期待値ランキング
      </div>
      ${buildRankList(d.sabcRankFuku)}
    </div>`;
  }

  html += '</div>';
  return html;
}

function buildHorseCard(name, h, rank) {
  const zg  = ziGrade(h.sabcZI);
  const eg  = extGrade(h.extFacility);
  const hasComment = h.prevJockeyComment || h.prevRaceNote;

  const ginyoHtml = hasComment ? `
    <div class="ginyo-box">
      <div class="ginyo-header">
        <span class="ginyo-label">🐶 ギーニョ分析</span>
        ${h.prevFinish ? `<span class="prev-finish">前走 ${esc(h.prevFinish)}</span>` : ''}
      </div>
      ${h.prevRaceNote ? `
        <div class="ginyo-section">
          <div class="ginyo-section-title">▍ パドック・レース所見</div>
          <div class="ginyo-text">${esc(h.prevRaceNote)}</div>
        </div>` : ''}
      ${h.prevJockeyComment ? `
        <div class="ginyo-section">
          <div class="ginyo-section-title">▍ ギーニョの前走ジャッジ</div>
          <div class="ginyo-text">${esc(h.prevJockeyComment)}</div>
        </div>` : ''}
    </div>` : `<p class="no-comment">コメントデータなし</p>`;

  return `
  <div class="horse-card">
    <div class="card-head">
      <span class="horse-num">${h.num}</span>
      <span class="horse-name">${esc(name)}</span>
      <div class="badges">
        ${ziGradeBadge(h.sabcZI)}
        ${extGradeBadge(h.extFacility)}
        ${bloodGradeBadge(h.bloodGradeTan, h.bloodGradeFuku)}
        ${kinsoGradeBadge(h.kinsoGrade)}
        ${paceGradeBadge(h.paceGrade)}
        ${gradeBadge('騎手', h.jockeyGrade)}
        ${gradeBadge('厩舎', h.stableGrade)}
        ${gradeBadge('騎厩', h.jockeyStableGrade)}
        ${gradeBadge('馬格', h.bodyGrade)}
        ${gradeBadge('コース', h.courseGrade)}
        ${gradeBadge('枠番', h.gateGrade)}
        ${gradeBadge('脚質', h.styleGrade)}
        ${gradeBadge('特注', h.specialGrade)}
        ${gradeBadge('生産', h.breederGrade)}
      </div>
    </div>
    <div class="card-body">
      <div class="horse-meta-row">
        <span><span class="meta-label">父</span>${esc(h.sabcSire) || '—'}</span>
        <span><span class="meta-label">母父</span>${esc(h.damSire) || '—'}</span>
        <span><span class="meta-label">厩</span>${esc(h.sabcTrainer) || '—'}</span>
      </div>
      ${extBadge(h.extFacility)}
      ${ginyoHtml}
    </div>
  </div>`;
}

function renderRace(idx) {
  if (!allData[idx]) return;
  const {cfg, d} = allData[idx];
  const horses = Object.entries(d.horses);
  const ranked = rankHorses(horses);

  const cards = ranked.map(([name, h], i) =>
    buildHorseCard(name, h, i + 1)
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="race-info">
      <div>
        <div class="race-info-name">${esc(d.race?.name || cfg.label)}</div>
        <div class="race-info-meta">${cfg.meta}</div>
      </div>
      <span class="horse-count">${horses.length}頭</span>
    </div>
    ${buildAnalysisSection(d)}
    <div class="horse-list">${cards}</div>
  `;
}

// タブ切り替え
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentIdx = idx;
  renderRace(idx);
});

async function main() {
  try {
    allData = await Promise.all(
      RACES.map(cfg => fetch(cfg.file + '?v=' + Date.now())
        .then(r => r.json())
        .then(d => ({cfg, d})))
    );
    renderRace(0);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<p class="loading" style="color:#f87171">読み込みエラー: ${esc(e.message)}</p>`;
  }
}
main();
</script>
</body>
</html>
