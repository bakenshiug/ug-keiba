<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>出走想定表 4/6(日) | UG強奪競馬新聞</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Public+Sans:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#130003;--bg-dk:#0b0002;
  --pink:#E8003D;--gold:#f0c040;--green:#22c55e;
  --text:#f5d0d5;--muted:rgba(255,255,255,0.45);
  --card:rgba(255,255,255,0.05);
}
html,body{background:var(--bg);color:var(--text);font-family:'Public Sans',sans-serif;min-height:100vh;}

/* Header */
.hdr{background:linear-gradient(135deg,#200006,#0b0002 60%,#130003);border-bottom:2px solid rgba(232,0,61,.5);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(232,0,61,.2);}
.hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:18px;background:rgba(255,255,255,0.08);color:var(--muted);font-size:11px;font-weight:700;text-decoration:none;border:1px solid rgba(255,255,255,0.12);}
.hdr-back:hover{background:rgba(255,255,255,0.14);}
.hdr-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(232,0,61,.8);letter-spacing:.05em;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

/* Page */
.page-wrap{max-width:780px;margin:0 auto;padding:16px 12px 60px;}

/* Date header */
.date-header{text-align:center;padding:20px 16px;margin-bottom:20px;background:linear-gradient(135deg,rgba(232,0,61,.12),rgba(10,0,3,.95));border:1px solid rgba(232,0,61,.3);border-radius:16px;}
.date-header .date-main{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:900;color:#fff;}
.date-header .date-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.1em;}

/* Race tabs */
.race-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.race-tabs::-webkit-scrollbar{display:none;}
.race-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.race-tab:hover{background:rgba(255,255,255,0.1);}
.race-tab.active{background:rgba(232,0,61,.2);border-color:rgba(232,0,61,.7);color:#fff;}
.race-tab.grade-tab{border-color:rgba(240,192,64,.4);color:var(--gold);}
.race-tab.grade-tab.active{background:rgba(240,192,64,.15);border-color:var(--gold);color:var(--gold);}
.tab-grade{font-size:9px;display:inline-block;margin-left:3px;padding:1px 4px;border-radius:3px;background:rgba(240,192,64,.3);color:var(--gold);}

/* Race panel */
.race-panel{display:none;}
.race-panel.active{display:block;}

/* Race header */
.race-header{background:linear-gradient(135deg,rgba(30,0,8,.9),rgba(10,0,3,.95));border:1px solid rgba(232,0,61,.35);border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.race-grade-badge{display:inline-block;font-size:10px;font-weight:900;padding:3px 10px;border-radius:5px;margin-bottom:8px;letter-spacing:.08em;}
.grade-G1{background:linear-gradient(90deg,#b8860b,#ffd700);color:#000;}
.grade-G2{background:linear-gradient(90deg,#1a6b2a,#22c55e);color:#000;}
.grade-G3{background:linear-gradient(90deg,#0d3b6e,#3b82f6);color:#fff;}
.grade-OP{background:rgba(255,255,255,.15);color:var(--muted);}
.race-name{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:900;color:#fff;margin-bottom:6px;}
.race-meta{font-size:11px;color:var(--muted);}
.race-meta span{margin-right:12px;}

/* Outlook card (重賞展望) */
.outlook-card{
  margin-bottom:14px;padding:18px;border-radius:14px;
  background:linear-gradient(135deg,rgba(240,192,64,.08),rgba(10,0,3,.9));
  border:1px solid rgba(240,192,64,.35);
  position:relative;overflow:hidden;
}
.outlook-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.outlook-label{font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.outlook-label::after{content:'';flex:1;height:1px;background:rgba(240,192,64,.2);}
.outlook-text{font-size:13px;color:rgba(255,255,255,.8);line-height:1.8;}

/* Ability grade row */
.ability-row{display:flex;align-items:flex-start;gap:8px;margin-top:6px;flex-wrap:wrap;}
.ability-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:900;padding:2px 8px;border-radius:4px;letter-spacing:.04em;white-space:nowrap;}
.ability-S{background:linear-gradient(90deg,#b8860b,#ffd700);color:#000;}
.ability-A{background:rgba(232,0,61,.25);color:#ff6b8a;border:1px solid rgba(232,0,61,.5);}
.ability-B{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.4);}
.ability-C{background:rgba(107,114,128,.2);color:#9ca3af;border:1px solid rgba(107,114,128,.25);}

/* Comments */
.ability-comment{font-size:11px;color:rgba(255,255,255,.88);line-height:1.7;margin-top:4px;padding:6px 12px;background:rgba(240,192,64,.07);border-left:3px solid rgba(240,192,64,.5);border-radius:0 6px 6px 0;}
.judge-comment{font-size:11px;color:rgba(255,255,255,.88);line-height:1.7;margin-top:4px;padding:6px 12px;background:rgba(232,0,61,.07);border-left:3px solid rgba(232,0,61,.45);border-radius:0 6px 6px 0;}
.judge-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:900;padding:1px 6px;border-radius:3px;letter-spacing:.04em;margin-left:4px;vertical-align:middle;}
.judge-badge-A{background:rgba(232,0,61,.2);color:#ff6b8a;border:1px solid rgba(232,0,61,.4);}
.judge-badge-B{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
.judge-badge-S{background:linear-gradient(90deg,#b8860b,#ffd700);color:#000;}
.judge-badge-C{background:rgba(107,114,128,.15);color:#9ca3af;border:1px solid rgba(107,114,128,.2);}

/* Speed index details */
.speed-detail{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.speed-val{font-size:11px;font-weight:700;color:var(--gold);}
.speed-up{color:#4ade80;font-size:10px;}
.speed-dn{color:#f87171;font-size:10px;}
.speed-st{color:var(--muted);font-size:10px;}
.speed-hist span{font-size:10px;color:rgba(255,255,255,.3);}

/* Horse table */
.horse-table{width:100%;border-collapse:collapse;font-size:12px;}
.horse-table th{padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;border-bottom:1px solid rgba(232,0,61,.2);}
.horse-table td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:top;}
.horse-table tr:hover td{background:rgba(255,255,255,.02);}
.horse-table tr:last-child td{border-bottom:none;}
.td-num{font-size:11px;color:var(--muted);width:28px;text-align:center;padding-top:12px;}
.td-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;color:#fff;}
.td-sire{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px;}
.td-jockey{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;}
.td-weight{font-size:12px;color:var(--gold);font-weight:700;text-align:right;white-space:nowrap;}
.no-jockey{color:rgba(255,255,255,.2);font-style:italic;font-size:11px;}
.sex-badge{display:inline-block;font-size:9px;font-weight:900;padding:1px 5px;border-radius:3px;margin-right:3px;vertical-align:middle;}
.sex-牡{background:rgba(59,130,246,.25);color:#93c5fd;}
.sex-牝{background:rgba(236,72,153,.25);color:#f9a8d4;}
.sex-セ{background:rgba(107,114,128,.25);color:#d1d5db;}
.count-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.08);color:var(--muted);margin-left:8px;vertical-align:middle;}

/* PDF section */
.pdf-section{margin-bottom:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;}
.pdf-section-title{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.pdf-link{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-decoration:none;color:var(--text);margin-bottom:5px;transition:background .15s;}
.pdf-link:last-child{margin-bottom:0;}
.pdf-link:hover{background:rgba(255,255,255,.08);}
.pdf-name{font-size:12px;font-weight:700;}
.pdf-meta{font-size:10px;color:var(--muted);}

/* Score & rank */
.score-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;background:rgba(240,192,64,.15);color:var(--gold);border:1px solid rgba(240,192,64,.3);margin-left:4px;}
.rank-num{font-size:10px;font-weight:900;color:var(--gold);}
.ext-facility{font-size:10px;color:rgba(34,197,94,.65);margin-top:3px;padding-left:2px;}

/* Lap analysis card */
.lap-card{
  margin-bottom:14px;padding:16px 18px;border-radius:14px;
  background:linear-gradient(135deg,rgba(240,192,64,.06),rgba(10,0,3,.92));
  border:1px solid rgba(240,192,64,.25);
  position:relative;overflow:hidden;
}
.lap-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(240,192,64,.5),transparent);
}
.lap-card-label{font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.lap-card-label::after{content:'';flex:1;height:1px;background:rgba(240,192,64,.15);}
.lap-card-text{font-size:11.5px;color:rgba(255,255,255,.72);line-height:1.9;white-space:pre-line;}

/* ── 前走成績バー ── */
.prevrace-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  margin-top:7px;padding:7px 10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  border-radius:8px;
  font-size:10px;
}
.prevrace-label{
  font-size:8px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-right:2px;
}
.prevrace-rank{
  font-weight:900;padding:1px 6px;border-radius:4px;font-size:10px;
}
.prevrace-rank.rank-1{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;}
.prevrace-rank.rank-2{background:rgba(180,180,180,.25);color:#ccc;border:1px solid rgba(255,255,255,.2);}
.prevrace-rank.rank-3{background:rgba(180,100,20,.25);color:#f0a060;border:1px solid rgba(200,120,30,.3);}
.prevrace-rank.rank-out{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);}
.prevrace-name{font-weight:700;color:rgba(255,255,255,.75);white-space:nowrap;}
.prevrace-sep{color:rgba(255,255,255,.2);}
.prevrace-style{color:rgba(255,255,255,.5);}
.prevrace-3f{color:#86efac;font-weight:700;}
.prevrace-3f-rank{font-size:9px;color:rgba(134,239,172,.6);}
.prevrace-pci{font-weight:700;}
.prevrace-pci.above{color:#f0c040;}
.prevrace-pci.below{color:rgba(255,255,255,.45);}
.prevrace-margin.pos{color:#f87171;}
.prevrace-margin.neg{color:#34d399;}
.prevrace-margin.zero{color:rgba(255,255,255,.4);}
.prevrace-weight{color:rgba(255,255,255,.35);}
.prevrace-interval{font-size:9px;color:rgba(255,255,255,.3);}

/* Loading */
#loading{text-align:center;padding:60px;color:var(--muted);}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="hdr-back">← TOP</a>
  <div style="flex:1;">
    <div class="hdr-logo">UG強奪競馬新聞</div>
    <div class="hdr-sub">出走想定表</div>
  </div>
</header>

<div class="page-wrap">
  <div id="loading" class="pulse">データ読み込み中...</div>
  <div id="content" style="display:none">
    <div class="date-header">
      <div class="date-main" id="date-main"></div>
    </div>

    <div class="race-tabs" id="race-tabs"></div>
    <div id="race-panels"></div>
  </div>
</div>

<script>
const SOUTEI_URL  = 'data/soutei-2026-04-06.json';
const NOTES_BASE  = 'data/race-notes/';
const HORSES_URL    = 'data/horses-2026-04w.json';
const PREVRACE_BASE = 'data/prevrace/';

const GRADE_CLASS  = {G1:'grade-G1',G2:'grade-G2',G3:'grade-G3'};
const GRADE_SCORE  = {S:4,A:3,B:2,C:1};

function gradeScore(g){ return GRADE_SCORE[g]||0; }
function computeScore(n){
  if(!n) return 0;
  return gradeScore(n.abilityGrade)+gradeScore(n.lapGrade)+gradeScore(n.prevGrade)+gradeScore(n.extGrade);
}

function gradeHtml(g) {
  if (!g) return `<span class="race-grade-badge grade-OP">オープン</span>`;
  return `<span class="race-grade-badge ${GRADE_CLASS[g]}">${g}</span>`;
}
function sexHtml(s) { return `<span class="sex-badge sex-${s}">${s}</span>`; }

function factorBadge(label, g){
  if(!g) return '';
  return `<span class="ability-badge ability-${g}" style="font-size:10px;padding:2px 7px;">${label}&nbsp;${g}</span>`;
}

function abilityHtml(n, rank) {
  if (!n) return '';
  const ag = n.abilityGrade, lg = n.lapGrade, pg = n.prevGrade, eg = n.extGrade;
  if (!ag && !lg && !pg && !eg) return '';
  const score = computeScore(n);
  const rankHtml = rank != null ? `<span class="rank-num">#${rank}</span>` : '';
  let html = `<div class="ability-row">`;
  html += rankHtml;
  html += factorBadge('能力', ag);
  html += factorBadge('ラップ', lg);
  html += factorBadge('前走', pg);
  html += factorBadge('外厩', eg);
  if (score > 0) html += `<span class="score-badge">${score}pt</span>`;
  html += `</div>`;
  if (n.extFacility) html += `<div class="ext-facility">▸ ${n.extFacility}</div>`;
  const abCmt = n.abilityCommentRtf || (n.abilityCommentRtf === undefined ? n.abilityComment : '');
  if (abCmt) html += `<div class="ability-comment">${abCmt}</div>`;
  if (n.lapComment)     html += `<div class="ability-comment" style="border-left-color:rgba(59,130,246,.35);">${n.lapComment}</div>`;
  if (n.prevComment)    html += `<div class="ability-comment" style="border-left-color:rgba(236,72,153,.35);">${n.prevComment}</div>`;
  return html;
}

function prevRaceHtml(pdata) {
  if (!pdata) return '';
  const rank = pdata.prevRank;
  let rankCls = 'rank-out';
  if (rank === 1) rankCls = 'rank-1';
  else if (rank === 2) rankCls = 'rank-2';
  else if (rank === 3) rankCls = 'rank-3';

  const marginVal = pdata.margin;
  let marginCls = 'zero', marginTxt = '0';
  if (marginVal != null) {
    if (marginVal < 0)      { marginCls = 'neg'; marginTxt = marginVal.toFixed(1); }
    else if (marginVal > 0) { marginCls = 'pos'; marginTxt = '+' + marginVal.toFixed(1); }
    else                    { marginCls = 'zero'; marginTxt = 'ハナ'; }
  }

  const pciCls = pdata.pciAboveAvg ? 'above' : 'below';
  const pciStar = pdata.pciAboveAvg ? '★' : '';

  const courseParts = [];
  if (pdata.prevVenue)    courseParts.push(pdata.prevVenue);
  if (pdata.prevSurface)  courseParts.push(pdata.prevSurface);
  if (pdata.prevDistance) courseParts.push(pdata.prevDistance + 'm');
  const courseStr = courseParts.join('');
  const itvStr = pdata.interval != null ? pdata.interval + '週前' : '連闘';

  return `<div class="prevrace-bar">
    <span class="prevrace-label">前走</span>
    <span class="prevrace-rank ${rankCls}">${rank}着</span>
    <span class="prevrace-name">${pdata.prevRaceName}</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-style">${pdata.runningStyle}</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-3f">上3F ${pdata.last3F}</span>
    <span class="prevrace-3f-rank">(${pdata.last3FRank}位/${pdata.weight}kg)</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-pci ${pciCls}">PCI ${pdata.pci}${pciStar}</span>
    <span class="prevrace-sep">|</span>
    <span class="prevrace-margin ${marginCls}">着差${marginTxt}</span>
    <span class="prevrace-interval">${courseStr}・${pdata.prevCondition}・${itvStr}</span>
  </div>`;
}

function lapAnalysisHtml(notes) {
  if (!notes || !notes.lapAnalysis) return '';
  return `<div class="lap-card">
    <div class="lap-card-label">ラップ分析</div>
    <div class="lap-card-text">${notes.lapAnalysis}</div>
  </div>`;
}

function outlookHtml(notes) {
  if (!notes || !notes.outlook) return '';
  return `<div class="outlook-card">
    <div class="outlook-label">展望</div>
    <div class="outlook-text">${notes.outlook}</div>
  </div>`;
}

function buildTabs(races) {
  return races.map((r, i) => {
    const gradeTag = r.grade ? `<span class="tab-grade">${r.grade}</span>` : '';
    const grCls    = r.grade ? ' grade-tab' : '';
    return `<div class="race-tab${grCls}${i===0?' active':''}" onclick="switchRace(${i})" id="tab-${i}">${r.raceNo}${gradeTag}</div>`;
  }).join('');
}

function buildPanel(race, idx, notes, horsesMap, prevraceMap) {
  const isActive = idx === 0 ? ' active' : '';
  const horsesNotes = (notes && notes.horses) || {};
  const hasNotes = notes && notes.horses && Object.keys(notes.horses).length > 0;

  // Sort horses by totalScore desc if notes available
  let horses = [...race.horses];
  if (hasNotes) {
    horses.sort((a, b) => computeScore(horsesNotes[b.name]) - computeScore(horsesNotes[a.name]));
  }

  const rows = horses.map((h, ri) => {
    const hn  = horsesNotes[h.name] || null;
    const hd  = (horsesMap && horsesMap[h.name]) || null;
    const rank = hasNotes ? ri + 1 : null;
    const sire    = hd ? hd.sire    : h.sire;
    const bms     = hd ? hd.bms     : null;
    const trainer = hd ? hd.trainer : null;
    const belong  = hd ? hd.belong  : null;
    const pedigreeHtml = `父 ${sire}${bms ? ' / 母父 ' + bms : ''}`;
    const trainerHtml  = trainer ? `<span style="margin-left:8px;color:rgba(255,255,255,.4);">${belong||''}${trainer}</span>` : '';
    const jockeyCell = h.jockey ? h.jockey : `<span class="no-jockey">想定なし</span>`;
    const weightCell = h.weight != null ? `${h.weight}` : '—';
    const pdata = prevraceMap ? (prevraceMap[h.num] || null) : null;
    return `<tr>
      <td class="td-num">${h.num}</td>
      <td>
        <div class="td-name">${sexHtml(h.sex)}<span style="font-size:10px;color:var(--muted);margin-right:3px;">${h.age}歳</span>${h.name}</div>
        <div class="td-sire">${pedigreeHtml}${trainerHtml}</div>
        ${abilityHtml(hn, rank)}
        ${prevRaceHtml(pdata)}
      </td>
      <td class="td-jockey">${jockeyCell}</td>
      <td class="td-weight">${weightCell}</td>
    </tr>`;
  }).join('');

  return `<div class="race-panel${isActive}" id="panel-${idx}">
    <div class="race-header">
      ${gradeHtml(race.grade)}
      <div class="race-name">${race.raceName}<span class="count-badge">${race.horses.length}頭</span></div>
      <div class="race-meta"><span>${race.raceNo}</span><span>${race.course}</span></div>
    </div>
    ${lapAnalysisHtml(notes)}
    ${outlookHtml(notes)}
    <table class="horse-table">
      <thead><tr>
        <th>番</th>
        <th>馬名 / 父馬 / 重賞展望スコア</th>
        <th>想定騎手</th>
        <th style="text-align:right">斤量</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function switchRace(idx) {
  document.querySelectorAll('.race-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.race-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

async function init() {
  try {
    const ts = Date.now();
    // Fetch soutei + horsesMap in parallel, then notes
    const [soutei, horsesMap] = await Promise.all([
      fetch(SOUTEI_URL + '?_=' + ts).then(r=>r.json()),
      fetch(HORSES_URL + '?_=' + ts).then(r=>r.json()).catch(()=>({}))
    ]);

    // Fetch race-notes & prevrace in parallel for all races
    const notesMap = {};
    const prevraceMapByKey = {};
    await Promise.all(soutei.races.map(async r => {
      if (!r.notesKey) return;
      const [notes, prevraw] = await Promise.all([
        fetch(NOTES_BASE + r.notesKey + '.json?_=' + ts).then(res=>res.json()).catch(()=>null),
        fetch(PREVRACE_BASE + 'zensou-' + r.notesKey + '.json?_=' + ts).then(res=>res.json()).catch(()=>null)
      ]);
      if (notes)   notesMap[r.notesKey] = notes;
      if (prevraw) {
        const byNum = {};
        (prevraw.horses || []).forEach(h => { byNum[h.umaban] = h; });
        prevraceMapByKey[r.notesKey] = byNum;
      }
    }));

    document.getElementById('date-main').textContent = soutei.label || soutei.date;
    document.getElementById('race-tabs').innerHTML   = buildTabs(soutei.races);
    document.getElementById('race-panels').innerHTML = soutei.races.map((r,i) =>
      buildPanel(r, i, notesMap[r.notesKey]||null, horsesMap, prevraceMapByKey[r.notesKey]||null)
    ).join('');

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('content').style.display  = 'block';
  } catch(e) {
    document.getElementById('loading').textContent = 'エラー: ' + e.message;
  }
}
init();
</script>
</body>
</html>
