<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WIN5絵馬殿｜過去戦績 | UG競馬ワイド神宮</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAFA;--paper:#FBF7EE;
  --shu:#9B2D30;--shu-dk:#7A1E1E;--midori:#1F4D2E;--kin:#C9A961;--kin-dk:#8B7530;
  --gold:#C9A961;--gold-dk:#8B7530;--gold-lt:#E6D5A0;
  --card:#FBF7EE;--border:rgba(201,169,97,.4);
  --text:#1A1A1A;--muted:rgba(26,26,26,.6);
  --hit:#1F4D2E;--miss:#7A1E1E;--upcoming:#6a5e3a;
}
html,body{
  background:#FAFAFA;
  color:var(--text);
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  min-height:100vh;
}

/* ─ ヘッダー（鳥居風）─ */
.page-header{
  background:rgba(250,250,250,.92);
  border-bottom:2px solid var(--shu);
  box-shadow:0 2px 0 var(--kin),0 6px 14px rgba(155,45,48,.08);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(8px);
}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:700;color:var(--shu);
  text-decoration:none;padding:5px 10px;border-radius:8px;
  border:1px solid rgba(201,169,97,.4);
  background:rgba(201,169,97,.12);
  white-space:nowrap;flex-shrink:0;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.back-btn:hover{background:rgba(201,169,97,.2);}
.header-badge{
  font-size:12px;font-weight:900;padding:4px 10px;border-radius:4px;
  background:linear-gradient(135deg,#C9A961,#8B7530);color:#fff;
  letter-spacing:.1em;flex-shrink:0;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.header-title{font-size:15px;font-weight:800;color:var(--shu);letter-spacing:.06em;font-family:'Shippori Mincho','Noto Serif JP',serif;}
.header-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* ─ コンテンツ ─ */
.content{max-width:520px;margin:0 auto;padding:16px 12px 80px;}

/* ─ サマリーバナー（絵巻物風）─ */
.summary-banner{
  background:linear-gradient(135deg,rgba(201,169,97,.08),rgba(155,45,48,.06));
  border:1px solid rgba(201,169,97,.35);
  border-radius:10px;padding:14px 16px;margin-bottom:20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.summary-stat{text-align:center;min-width:60px;}
.summary-stat-val{font-size:24px;font-weight:800;color:var(--shu);line-height:1;font-family:'Shippori Mincho','Noto Serif JP',serif;}
.summary-stat-label{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;letter-spacing:.06em;}
.summary-divider{width:1px;height:40px;background:rgba(201,169,97,.3);}

/* ─ セクションヘッダー ─ */
.section-header{
  font-size:9px;font-weight:900;letter-spacing:.1em;
  color:var(--kin);text-transform:uppercase;
  padding:4px 0 10px;margin-top:8px;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}

/* ─ アーカイブカード（絵馬風）─ */
.archive-card{
  background:#FBF7EE;
  border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  margin-bottom:16px;
  transition:border-color .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(26,26,26,.06);
}
.archive-card:hover{border-color:var(--shu);box-shadow:0 4px 14px rgba(155,45,48,.12);}

/* カードヘッダー */
.card-head{
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:linear-gradient(135deg,rgba(201,169,97,.08),rgba(155,45,48,.04));
  border-bottom:1px solid rgba(201,169,97,.25);
}
.card-date{
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  font-size:13px;font-weight:800;color:var(--shu);letter-spacing:.04em;
}
.card-label{font-size:10px;color:var(--muted);margin-top:2px;}
.card-status-badge{
  font-size:10px;font-weight:900;padding:4px 10px;border-radius:4px;
  white-space:nowrap;flex-shrink:0;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.status-hit{background:rgba(31,77,46,.12);color:var(--midori);border:1px solid rgba(31,77,46,.35);}
.status-miss{background:rgba(122,30,30,.08);color:var(--shu-dk);border:1px solid rgba(122,30,30,.25);}
.status-upcoming{background:rgba(201,169,97,.12);color:var(--kin-dk);border:1px solid rgba(201,169,97,.3);}

/* 詳細ボタン */
.card-link{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:var(--shu);
  text-decoration:none;padding:4px 8px;border-radius:8px;
  border:1px solid rgba(201,169,97,.3);flex-shrink:0;
  transition:all .15s;
}
.card-link:hover{color:var(--shu-dk);border-color:var(--shu);background:rgba(155,45,48,.06);}

/* ── 脚ロウ ── */
.legs-list{padding:10px 12px;}
.leg-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 0;border-bottom:1px solid rgba(201,169,97,.15);
}
.leg-row:last-child{border-bottom:none;}
.leg-badge{
  font-size:8px;font-weight:900;letter-spacing:.06em;
  padding:3px 7px;border-radius:4px;
  background:rgba(201,169,97,.15);color:var(--shu);
  border:1px solid rgba(201,169,97,.3);white-space:nowrap;flex-shrink:0;
  min-width:38px;text-align:center;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.leg-info{flex:1;min-width:0;}
.leg-race{font-size:11px;font-weight:700;color:var(--text);}
.leg-meta{font-size:9px;color:var(--muted);margin-top:1px;}
.leg-picks{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.leg-pick-chip{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:10px;
  background:rgba(26,26,26,.04);
  border:1px solid rgba(26,26,26,.1);
  color:var(--text);
  white-space:nowrap;
}
.leg-pick-chip.is-winner{
  background:rgba(31,77,46,.12);
  border-color:rgba(31,77,46,.4);
  color:var(--midori);
}
.leg-pick-chip.is-winner::before{content:'🎯 ';}
.leg-result{flex-shrink:0;text-align:right;}
.leg-hit-badge{
  font-size:9px;font-weight:900;padding:3px 8px;border-radius:4px;white-space:nowrap;
}
.leg-hit{background:rgba(31,77,46,.15);color:var(--midori);border:1px solid rgba(31,77,46,.3);}
.leg-miss{background:rgba(122,30,30,.08);color:var(--shu-dk);border:1px solid rgba(122,30,30,.25);}
.leg-pending{background:rgba(201,169,97,.1);color:var(--kin-dk);border:1px solid rgba(201,169,97,.25);}

/* ── カードフッター ── */
.card-foot{
  padding:9px 14px;
  background:rgba(251,247,238,.6);
  border-top:1px solid rgba(201,169,97,.2);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
}
.combo-info{font-size:9px;color:var(--muted);}
.win5-payout{
  font-size:12px;font-weight:900;
  color:var(--shu);
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.win5-hit-banner{
  width:100%;
  text-align:center;padding:8px;
  background:linear-gradient(90deg,rgba(201,169,97,.1),rgba(201,169,97,.25),rgba(201,169,97,.1));
  border-top:1px solid rgba(201,169,97,.35);
  font-size:12px;font-weight:900;color:var(--shu);
  letter-spacing:.06em;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}

/* ─ グレードバッジ ─ */
.grade-badge{
  display:inline-block;font-size:8px;font-weight:900;
  padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;
}
.grade-g1{background:linear-gradient(135deg,#C9A961,#8B7530);color:#fff;}
.grade-g2{background:linear-gradient(135deg,#1F4D2E,#0f3319);color:#fff;}
.grade-g3{background:linear-gradient(135deg,#2B5A9F,#1A3F70);color:#fff;}
.grade-l{background:linear-gradient(135deg,#9B2D30,#7A1E1E);color:#fff;}
.grade-3c{background:linear-gradient(135deg,#8a8a8a,#5a5a5a);color:#fff;}

/* ─ 空っぽ ─ */
.empty-state{
  text-align:center;padding:60px 20px;
  color:rgba(26,26,26,.3);
  font-size:13px;
}
.empty-icon{font-size:40px;display:block;margin-bottom:12px;}

/* ─ ローディング ─ */
.loading-state{
  text-align:center;padding:60px 20px;
  color:var(--muted);font-size:12px;
}
</style>
</head>
<body>

<!-- ヘッダー（鳥居風）-->
<header class="page-header">
  <a href="index.html" class="back-btn">⛩ 鳥居</a>
  <span class="header-badge">WIN5</span>
  <div style="flex:1;min-width:0;">
    <div class="header-title">WIN5絵馬殿</div>
    <div class="header-sub">過去御神託アーカイブ</div>
  </div>
</header>

<!-- コンテンツ -->
<div class="content">

  <!-- サマリー -->
  <div class="summary-banner" id="summaryBanner">
    <div class="summary-stat">
      <div class="summary-stat-val" id="statTotal">—</div>
      <div class="summary-stat-label">総参戦</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-stat">
      <div class="summary-stat-val" id="statHit" style="color:#1F4D2E">—</div>
      <div class="summary-stat-label">WIN5的中</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-stat">
      <div class="summary-stat-val" id="statLegHit" style="color:#C9A961">—</div>
      <div class="summary-stat-label">脚的中率</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-stat">
      <div class="summary-stat-val" id="statPayout" style="color:#9B2D30">—</div>
      <div class="summary-stat-label">最大払戻</div>
    </div>
  </div>

  <div class="section-header">▼ アーカイブ一覧（新しい順）</div>

  <div id="archiveList">
    <div class="loading-state">📡 データを読み込んでいます...</div>
  </div>

</div>

<script>
const GRADE_CSS = { G1:'grade-g1', G2:'grade-g2', G3:'grade-g3', L:'grade-l', '3C':'grade-3c', '':'grade-3c' };

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function legStatusBadge(leg) {
  if (leg.hit === true)  return '<span class="leg-hit-badge leg-hit">✓ 的中</span>';
  if (leg.hit === false) return `<span class="leg-hit-badge leg-miss">✗ ${esc(leg.winner||'外れ')}</span>`;
  return '<span class="leg-hit-badge leg-pending">準備中</span>';
}

function cardStatusBadge(entry) {
  if (entry.status === 'upcoming') return '<span class="card-status-badge status-upcoming">⏳ 開催前</span>';
  if (entry.win5Result === true)   return '<span class="card-status-badge status-hit">🏆 WIN5的中！</span>';
  if (entry.status === 'done')     return '<span class="card-status-badge status-miss">終了</span>';
  return '<span class="card-status-badge status-upcoming">⏳ 結果待ち</span>';
}

function renderCard(entry) {
  const gradeCssMap = { G1:'grade-g1',G2:'grade-g2',G3:'grade-g3',L:'grade-l','3C':'grade-3c' };
  const legsHtml = entry.legs.map(leg => {
    const picks = (leg.picks||[]).map(n => {
      const isWin = leg.winner && n === leg.winner;
      return `<span class="leg-pick-chip${isWin?' is-winner':''}">${esc(n)}</span>`;
    }).join('');
    const gradeCss = gradeCssMap[leg.gradeClass] || 'grade-3c';
    return `
      <div class="leg-row">
        <span class="leg-badge">${esc(leg.leg)}</span>
        <div class="leg-info">
          <div class="leg-race">${esc(leg.raceName)}<span class="grade-badge ${gradeCss}">${esc(leg.gradeClass)}</span></div>
          <div class="leg-meta">${esc(leg.raceId)} ${esc(leg.course)} ${leg.headsCount}頭 ／ ${leg.picksCount}頭選択</div>
          <div class="leg-picks">${picks}</div>
        </div>
        <div class="leg-result">${legStatusBadge(leg)}</div>
      </div>`;
  }).join('');

  const legHits  = entry.legs.filter(l=>l.hit===true).length;
  const legTotal = entry.legs.filter(l=>l.hit!==null).length;
  const legInfo  = legTotal > 0 ? `脚 ${legHits}/${legTotal}` : `${entry.totalCombinations}点`;

  const footRight = entry.win5Payout
    ? `<span class="win5-payout">💰 ${Number(entry.win5Payout).toLocaleString()}円</span>`
    : `<span class="combo-info">${entry.totalCombinations||'—'}点</span>`;

  const win5Banner = entry.win5Result === true
    ? `<div class="win5-hit-banner">🏆 WIN5 的中！</div>` : '';

  return `
  <div class="archive-card">
    <div class="card-head">
      <div>
        <div class="card-date">${esc(entry.date.replace('-','年').replace('-','月')+'日')}</div>
        <div class="card-label">${esc(entry.label)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${cardStatusBadge(entry)}
        ${entry.pageFile ? `<a href="${esc(entry.pageFile)}" class="card-link">分析 →</a>` : ''}
      </div>
    </div>
    <div class="legs-list">${legsHtml}</div>
    ${win5Banner}
    <div class="card-foot">
      <span class="combo-info">${legInfo}</span>
      ${footRight}
    </div>
  </div>`;
}

function computeStats(data) {
  const done = data.filter(e=>e.status==='done');
  const total = data.length;
  const win5Hits = data.filter(e=>e.win5Result===true).length;
  const allLegs = data.flatMap(e=>e.legs||[]);
  const legDone = allLegs.filter(l=>l.hit!==null);
  const legHit  = allLegs.filter(l=>l.hit===true);
  const legRate = legDone.length>0 ? Math.round(legHit.length/legDone.length*100)+'%' : '—';
  const payouts = data.map(e=>e.win5Payout).filter(Boolean);
  const maxPay  = payouts.length > 0 ? Math.max(...payouts.map(Number)) : null;

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statHit').textContent     = win5Hits;
  document.getElementById('statLegHit').textContent  = legRate;
  document.getElementById('statPayout').textContent  = maxPay ? (maxPay>=10000 ? Math.round(maxPay/1000)+'K' : maxPay) : '—';
}

async function main() {
  try {
    const res = await fetch('data/win5-list.json?v='+Date.now());
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const sorted = [...data].sort((a,b)=>b.date.localeCompare(a.date));
    computeStats(sorted);
    document.getElementById('archiveList').innerHTML = sorted.length
      ? sorted.map(renderCard).join('')
      : '<div class="empty-state"><span class="empty-icon">🏇</span>まだアーカイブがありません</div>';
  } catch(e) {
    document.getElementById('archiveList').innerHTML =
      `<div class="empty-state"><span class="empty-icon">⚠️</span>データを読み込めませんでした</div>`;
  }
}
main();
</script>
</body>
</html>
