<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>本殿｜御神託の間 | UG競馬ワイド神宮</title>
<link rel="stylesheet" href="assets/css/jinja.css"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;500;700;900&family=Public+Sans:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* 🏯 神社パレット（松コース） */
  --bg:#FAFAFA;--bg-dk:#FBF7EE;--bg-md:#F5F0E3;
  --paper:#FBF7EE;
  --sumi:#1A1A1A;--shu:#9B2D30;--shu-dk:#7A1E1E;
  --midori:#1F4D2E;--kin:#C9A961;
  --pink:#9B2D30;--pink-dk:#7A1E1E;--gold:#C9A961;
  --green:#1F4D2E;
  --text:#2A2A2A;--muted:rgba(42,42,42,.6);
  --card:rgba(255,255,255,.9);--border:rgba(201,169,97,.3);
}
html,body{
  background:var(--bg);
  background-image:
    linear-gradient(160deg, rgba(251,247,238,.5) 0%, rgba(250,250,250,1) 50%, rgba(251,247,238,.5) 100%),
    radial-gradient(circle at 20% 30%, rgba(201,169,97,.04) 0%, transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(155,45,48,.03) 0%, transparent 60%);
  color:var(--text);
  font-family:'Shippori Mincho','Noto Serif JP','Public Sans',serif;
  min-height:100vh;
}

/* ── Header（神社・鳥居風）── */
.hdr{background:var(--paper);border-bottom:3px double var(--shu);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.hdr::before{content:'⛩';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:60px;color:var(--shu);opacity:.04;pointer-events:none;}
.hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:18px;background:rgba(155,45,48,.08);color:var(--shu);font-size:11px;font-weight:700;text-decoration:none;border:1px solid rgba(155,45,48,.3);font-family:'Shippori Mincho',serif;}
.hdr-back:hover{background:rgba(155,45,48,.15);}
.hdr-logo{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:18px;font-weight:800;color:var(--sumi);letter-spacing:.08em;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;font-family:'Shippori Mincho',serif;}

/* ── Race Selector（御札風）── */
.selector-wrap{padding:14px 12px 0;max-width:780px;margin:0 auto;}
.week-label{font-size:10px;font-weight:800;letter-spacing:.22em;color:var(--shu);margin-bottom:10px;padding-left:2px;font-family:'Shippori Mincho',serif;}
.week-label::before{content:'御神籤 ／ ';color:var(--kin);font-weight:700;}
.race-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}

.race-btn{
  background:var(--paper);
  border:1px solid var(--border);
  border-radius:8px 8px 4px 4px;
  padding:12px 14px;
  cursor:pointer;
  text-align:left;
  color:var(--sumi);
  transition:all .18s ease;
  position:relative;
  overflow:hidden;
  font-family:'Shippori Mincho',serif;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.race-btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--shu) 0%, var(--kin) 50%, var(--shu) 100%);
  opacity:.3;
}
.race-btn:hover{border-color:var(--shu);box-shadow:0 2px 8px rgba(155,45,48,.12);}
.race-btn:active{transform:scale(.97);}
.race-btn.active{
  background:linear-gradient(140deg,#fff,rgba(251,247,238,.98));
  border:2px solid var(--shu);
  box-shadow:0 0 0 1px rgba(155,45,48,.1),0 4px 16px rgba(155,45,48,.15);
}
.race-btn.active::before{opacity:1;height:4px;}
.race-btn .btn-grade{
  font-size:9px;font-weight:900;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:5px;letter-spacing:.06em;
}
.race-btn .btn-name{
  font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:14px;font-weight:800;color:var(--sumi);line-height:1.25;margin-bottom:4px;
}
.race-btn .btn-meta{
  font-size:10px;color:var(--muted);line-height:1.4;
}
.race-btn.active .btn-name{color:var(--shu);}
.race-btn .active-dot{
  position:absolute;top:10px;right:10px;
  width:8px;height:8px;border-radius:50%;
  background:var(--shu);
  box-shadow:0 0 0 2px rgba(155,45,48,.2);
  display:none;
}
.race-btn.active .active-dot{display:block;}

/* ── Detail Panel ── */
.detail-wrap{max-width:780px;margin:0 auto;padding:14px 12px 100px;}

/* Race card（拝殿・本殿風） */
.race-card{background:var(--paper);border:1px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08),0 0 0 1px rgba(201,169,97,.08);position:relative;}
.race-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--shu) 0%,var(--kin) 50%,var(--shu) 100%);z-index:1;}
.race-head{background:linear-gradient(180deg,#fff 0%,var(--paper) 100%);border-bottom:1px solid var(--border);padding:20px 20px 16px;display:flex;align-items:flex-start;gap:12px;position:relative;}
.race-head::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:40px;height:3px;background:var(--kin);border-radius:2px;}
.race-grade-badge{font-size:11px;font-weight:900;padding:4px 10px;border-radius:3px;white-space:nowrap;margin-top:2px;letter-spacing:.06em;flex-shrink:0;}
.race-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:24px;font-weight:800;color:var(--sumi);letter-spacing:.04em;line-height:1.1;}
.race-meta{font-size:12px;color:var(--muted);margin-top:5px;letter-spacing:.04em;font-weight:600;font-family:'Shippori Mincho',serif;}
.race-body{padding:18px 18px 22px;}

/* Condition note（御神籤風の注意書き） */
.cond-note{background:rgba(201,169,97,.08);border:1px solid rgba(201,169,97,.35);border-left:3px solid var(--kin);border-radius:0 6px 6px 0;padding:10px 14px;margin-bottom:18px;font-size:12px;line-height:1.75;color:var(--text);font-family:'Shippori Mincho',serif;}

/* Section title（神社の御札風の見出し） */
.sec-title{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--shu);margin-bottom:10px;margin-top:2px;padding-left:4px;font-family:'Shippori Mincho',serif;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'◆';font-size:9px;color:var(--kin);}

/* Hero cards（御神籤札風） */
.horse-hero{border-radius:4px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden;background:#fff;}
.horse-hero::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;}
.horse-hero.h-honmei{background:linear-gradient(135deg,#fff 0%,rgba(255,250,250,1) 100%);border:2px solid var(--shu);box-shadow:0 4px 20px rgba(155,45,48,.18),0 0 0 1px rgba(155,45,48,.08);}
.horse-hero.h-honmei::before{background:var(--shu);}
.horse-hero.h-taikou{background:linear-gradient(135deg,#fff 0%,rgba(245,250,245,1) 100%);border:2px solid var(--midori);box-shadow:0 3px 16px rgba(31,77,46,.14);}
.horse-hero.h-taikou::before{background:var(--midori);}
.horse-hero.h-sangen{background:linear-gradient(135deg,#fff 0%,rgba(252,248,240,1) 100%);border:2px solid var(--kin);box-shadow:0 3px 14px rgba(201,169,97,.18);}
.horse-hero.h-sangen::before{background:var(--kin);}
.horse-hero.h-star{background:linear-gradient(135deg,#fff 0%,rgba(251,247,238,1) 100%);border:1.5px solid rgba(155,45,48,.5);box-shadow:0 2px 12px rgba(155,45,48,.08);}
.horse-hero.h-star::before{background:linear-gradient(180deg,var(--shu),var(--kin));}
.horse-hero.h-delta{background:linear-gradient(135deg,#fff 0%,rgba(249,249,249,1) 100%);border:1.5px solid rgba(31,77,46,.4);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.horse-hero.h-delta::before{background:rgba(31,77,46,.5);}

.horse-hero-mark{position:absolute;top:12px;right:14px;font-size:28px;font-weight:900;line-height:1;opacity:1;font-family:'Shippori Mincho',serif;}
.h-honmei .horse-hero-mark{color:var(--shu);}
.h-taikou .horse-hero-mark{color:var(--midori);}
.h-sangen .horse-hero-mark{color:var(--kin);}
.h-star   .horse-hero-mark{color:var(--shu-dk);}
.h-delta  .horse-hero-mark{color:rgba(31,77,46,.7);}

.hero-rank-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:900;letter-spacing:.12em;padding:2px 8px;border-radius:3px;text-transform:uppercase;margin-bottom:7px;font-family:'Shippori Mincho',serif;}
.h-honmei .hero-rank-pill{background:rgba(155,45,48,.1);color:var(--shu);border:1px solid rgba(155,45,48,.35);}
.h-taikou .hero-rank-pill{background:rgba(31,77,46,.08);color:var(--midori);border:1px solid rgba(31,77,46,.3);}
.h-sangen .hero-rank-pill{background:rgba(201,169,97,.12);color:var(--kin);border:1px solid rgba(201,169,97,.4);}
.h-star   .hero-rank-pill{background:rgba(155,45,48,.07);color:var(--shu-dk);border:1px solid rgba(155,45,48,.3);}
.h-delta  .hero-rank-pill{background:rgba(31,77,46,.06);color:rgba(31,77,46,.8);border:1px solid rgba(31,77,46,.25);}

.horse-num-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:3px;font-size:13px;font-weight:900;flex-shrink:0;margin-right:5px;font-family:'Shippori Mincho',serif;}
.h-honmei .horse-num-badge{background:var(--shu);color:#fff;border:1px solid var(--shu-dk);}
.h-taikou .horse-num-badge{background:var(--midori);color:#fff;border:1px solid var(--midori);}
.h-sangen .horse-num-badge{background:var(--kin);color:#fff;border:1px solid var(--kin);}
.h-star   .horse-num-badge{background:rgba(155,45,48,.9);color:#fff;border:1px solid var(--shu);}
.h-delta  .horse-num-badge{background:rgba(31,77,46,.85);color:#fff;border:1px solid var(--midori);}

.horse-hero-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:21px;font-weight:800;line-height:1.15;display:flex;align-items:center;gap:4px;padding-right:44px;color:var(--sumi);}
.h-honmei .horse-hero-name{color:var(--sumi);}
.h-taikou .horse-hero-name{color:var(--sumi);}
.h-sangen .horse-hero-name{color:var(--sumi);}
.h-star   .horse-hero-name{color:var(--sumi);}
.h-delta  .horse-hero-name{color:var(--sumi);}

.horse-hero-top{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.info-pt{font-size:14px;font-weight:900;color:var(--shu);font-family:'Shippori Mincho',serif;}

/* ── 馬情報グリッド（枠番・外厩・騎手・厩舎・前走・父名）── */
.horse-info-rows{margin-top:10px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border);padding-top:10px;}
.horse-info-row{display:flex;align-items:center;gap:8px;min-height:22px;}
.info-lbl{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);min-width:34px;flex-shrink:0;font-family:'Shippori Mincho',serif;}
.info-val{font-size:13px;font-weight:700;color:var(--sumi);font-family:'Shippori Mincho',serif;}
.info-val-muted{font-size:13px;color:var(--muted);font-family:'Shippori Mincho',serif;}
/* 枠番カラー */
.waku-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:900;}
.waku-1{background:#111;color:#fff;border:1px solid #444;}
.waku-2{background:#fff;color:#111;}
.waku-3{background:#e44;color:#fff;}
.waku-4{background:#44c;color:#fff;}
.waku-5{background:#f80;color:#fff;}
.waku-6{background:#090;color:#fff;}
.waku-7{background:#e0e;color:#fff;}
.waku-8{background:#e00;color:#fff;}
/* 外厩バッジ */
.gaiku-badge{font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;color:#fff;letter-spacing:.02em;}
.gaiku-northern{background:#1a6b1a;}
.gaiku-shadai  {background:#1a4fa0;}
.gaiku-champ   {background:#6b2d8b;}
.gaiku-yamamoto{background:#8b5500;}
.gaiku-zaichu  {background:#555;color:#fff;}
.gaiku-other   {background:#2d7d7d;}

/* Compact table（帳簿風） */
.compact-table-wrap{overflow-x:auto;margin-bottom:14px;background:#fff;border:1px solid var(--border);border-radius:4px;}
table.horse-tbl{width:100%;border-collapse:collapse;font-size:12px;font-family:'Shippori Mincho',serif;}
table.horse-tbl th{background:var(--paper);color:var(--shu);font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:8px 6px;text-align:center;border-bottom:2px solid var(--border);white-space:nowrap;}
table.horse-tbl td{padding:8px 6px;border-bottom:1px solid rgba(201,169,97,.15);text-align:center;color:var(--text);}
table.horse-tbl td.tbl-name{text-align:left;font-weight:700;color:var(--sumi);font-size:13px;white-space:nowrap;}
table.horse-tbl td.tbl-sub{font-size:11px;color:var(--muted);}
table.horse-tbl tr:last-child td{border-bottom:none;}
table.horse-tbl tr:hover td{background:rgba(201,169,97,.05);}
.mark-badge{display:inline-block;font-size:14px;font-weight:900;width:22px;text-align:center;font-family:'Shippori Mincho',serif;}
.mark-◎{color:var(--shu);}
.mark-○{color:var(--midori);}
.mark-▲{color:var(--kin);}
.mark-△{color:rgba(31,77,46,.75);}
.mark-☆{color:var(--shu-dk);}
.mark-×{color:var(--muted);}
.pt-val{font-family:'Shippori Mincho','Inter',sans-serif;font-weight:700;font-size:12px;color:var(--sumi);}

/* Divider（注連縄風） */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--kin) 20%,var(--shu) 50%,var(--kin) 80%,transparent);opacity:.5;margin:16px 0;}

/* ── 前日人気・オッズ行 ── */
.odds-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:6px 0 4px;font-family:'Shippori Mincho',serif;}
.odds-pop{font-size:11px;font-weight:900;color:#fff;background:var(--shu);padding:2px 8px;border-radius:3px;letter-spacing:.03em;}
.odds-sep{font-size:10px;color:var(--muted);font-weight:700;}
.odds-tan{font-size:12px;font-weight:900;color:var(--shu-dk);letter-spacing:.02em;}
.odds-fuku{font-size:12px;font-weight:700;color:var(--midori);letter-spacing:.02em;}

/* ── 馬コメント（御神託スタイル）── */
.horse-comment-block{margin-top:10px;display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--border);padding-top:8px;}
.hcmt-ability{font-size:12px;color:var(--text);line-height:1.85;padding:8px 12px;background:rgba(155,45,48,.05);border-left:3px solid var(--shu);border-radius:0 4px 4px 0;font-family:'Shippori Mincho',serif;}
.hcmt-lap{font-size:11px;color:var(--text);line-height:1.85;padding:7px 12px;background:rgba(31,77,46,.05);border-left:3px solid var(--midori);border-radius:0 4px 4px 0;font-family:'Shippori Mincho',serif;}
.hcmt-prev{font-size:11px;color:var(--text);line-height:1.85;padding:7px 12px;background:rgba(201,169,97,.06);border-left:3px solid var(--kin);border-radius:0 4px 4px 0;font-family:'Shippori Mincho',serif;}
/* 全馬コメントリスト */
.all-horse-comments{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
.horse-cmt-item{border-radius:4px;padding:13px 15px;background:#fff;border:1px solid var(--border);}
.horse-cmt-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.horse-cmt-num{font-size:11px;font-weight:900;padding:2px 7px;border-radius:3px;background:var(--paper);color:var(--shu);border:1px solid var(--border);}
.horse-cmt-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:14px;font-weight:800;color:var(--sumi);}

/* Odds Note（御神籤注意書き） */
.odds-note{
  padding:14px 16px;border-radius:0 6px 6px 0;
  background:rgba(201,169,97,.05);
  border:1px solid rgba(201,169,97,.25);
  border-left:3px solid var(--kin);
  font-size:12px;font-weight:600;color:var(--text);line-height:1.85;
  letter-spacing:.02em;
  margin-bottom:4px;
  font-family:'Shippori Mincho',serif;
}

/* Bets（授与所：御札のお支払い） */
.bets-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.bet-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:4px;background:rgba(201,169,97,.06);border:1px solid rgba(201,169,97,.3);font-family:'Shippori Mincho',serif;}
.bet-type{font-size:10px;font-weight:900;color:var(--shu);min-width:52px;white-space:nowrap;letter-spacing:.05em;padding-top:2px;}
.bet-val{font-size:12px;font-weight:700;color:var(--sumi);white-space:pre-line;line-height:1.85;flex:1;}
.bet-caption{font-size:10px;font-style:italic;color:var(--muted);margin-top:3px;line-height:1.5;}
/* 1頭軸検知バッジ */
.jiku-detect-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:4px;margin-bottom:8px;
  background:linear-gradient(135deg,rgba(155,45,48,.08),rgba(251,247,238,1));
  border:2px solid var(--shu);box-shadow:0 2px 8px rgba(155,45,48,.12);font-family:'Shippori Mincho',serif;}
.jiku-detect-icon{font-size:16px;line-height:1;flex-shrink:0;}
.jiku-detect-text{font-size:11px;font-weight:900;color:var(--shu-dk);letter-spacing:.04em;line-height:1.4;}
.jiku-detect-sub{font-size:10px;font-weight:700;color:var(--muted);margin-top:1px;}
.bet-row.bet-row-jiku{background:linear-gradient(135deg,rgba(155,45,48,.06),#fff);border:2px solid var(--shu);box-shadow:0 2px 8px rgba(155,45,48,.12);}
.bet-row.bet-row-jiku .bet-type{color:var(--shu-dk);}
.bet-row.bet-row-jiku .bet-val{color:var(--sumi);font-weight:900;}
/* 2頭軸バナー（金） */
.jiku-2-banner{background:linear-gradient(135deg,rgba(201,169,97,.12),rgba(251,247,238,1));
  border-color:var(--kin);box-shadow:0 2px 8px rgba(201,169,97,.15);}
.jiku-2-banner .jiku-detect-text{color:#7a5500;}
.jiku-2-banner .jiku-detect-sub{color:var(--muted);}
.bet-row.bet-row-2jiku{background:linear-gradient(135deg,rgba(201,169,97,.08),#fff);border:2px solid var(--kin);box-shadow:0 2px 8px rgba(201,169,97,.12);}
.bet-row.bet-row-2jiku .bet-type{color:#7a5500;}
.bet-row.bet-row-2jiku .bet-val{color:var(--sumi);font-weight:900;}

/* 単勝派・複勝派・ギーニョのオススメ（参拝札風） */
.bet-audience-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:900;letter-spacing:.06em;padding:2px 9px;border-radius:3px;margin-bottom:4px;font-family:'Shippori Mincho',serif;}
.bet-tan-tag{background:rgba(201,169,97,.12);color:var(--kin);border:1px solid var(--kin);}
.bet-fuku-tag{background:rgba(31,77,46,.08);color:var(--midori);border:1px solid var(--midori);}
.bet-wrap{display:flex;flex-direction:column;}
.bet-ginyo-banner{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:4px 4px 0 0;margin-bottom:-2px;
  background:linear-gradient(135deg,var(--kin),#d4b976);border:2px solid #a07d34;border-bottom:none;}
.bet-ginyo-banner-text{font-size:10px;font-weight:900;color:#1a0800;letter-spacing:.06em;font-family:'Shippori Mincho',serif;}
.bet-row.bet-row-ginyo{border:2px solid #a07d34!important;border-radius:0 0 4px 4px!important;
  box-shadow:0 4px 12px rgba(201,169,97,.25)!important;background:linear-gradient(135deg,#fff,rgba(251,247,238,.9))!important;}

/* Comments（御神託書） */
.comment-area{display:flex;flex-direction:column;gap:10px;}
.final-card{background:linear-gradient(160deg,#fff,var(--paper));border:2px solid var(--shu);border-radius:4px;padding:20px 20px;box-shadow:0 4px 20px rgba(155,45,48,.15),0 0 0 1px rgba(155,45,48,.08);position:relative;overflow:hidden;font-family:'Shippori Mincho',serif;}
.final-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--shu) 0%,var(--kin) 50%,var(--shu) 100%);}
.final-card::after{content:'⛩';position:absolute;top:8px;right:14px;font-size:28px;color:var(--shu);opacity:.1;}
.final-card .clabel{font-size:10px;font-weight:800;letter-spacing:.22em;color:var(--shu);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.final-card .clabel::before{content:'◆';color:var(--kin);font-size:11px;}
.final-card .clabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,169,97,.4),transparent);}
.final-card .ctext{font-size:14px;line-height:1.95;color:var(--sumi);font-weight:500;letter-spacing:.02em;}
.risk-card{background:rgba(155,45,48,.05);border:1px solid rgba(155,45,48,.25);border-radius:4px;padding:13px 15px;font-family:'Shippori Mincho',serif;}
.risk-card .clabel{font-size:10px;font-weight:900;letter-spacing:.1em;color:var(--shu-dk);margin-bottom:6px;}
.risk-card .ctext{font-size:13px;line-height:1.75;color:var(--text);}
.extra-card{background:linear-gradient(140deg,rgba(201,169,97,.1),#fff);border:2px solid var(--kin);border-radius:4px;padding:13px 15px;box-shadow:0 2px 10px rgba(201,169,97,.12);font-family:'Shippori Mincho',serif;}
.extra-card .clabel{font-size:11px;font-weight:900;letter-spacing:.1em;color:#7a5500;margin-bottom:6px;}
.extra-card .ctext{font-size:14px;line-height:1.75;color:var(--sumi);font-weight:700;}
.betmemo-card{background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:11px 14px;font-family:'Shippori Mincho',serif;}
.betmemo-card .clabel{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;}
.betmemo-card .ctext{font-size:12px;line-height:1.7;color:var(--text);}

/* Loading / Error */
.loading{text-align:center;padding:50px 20px;color:var(--muted);font-family:'Shippori Mincho',serif;}
.err{text-align:center;padding:30px 20px;color:var(--shu-dk);font-size:13px;font-family:'Shippori Mincho',serif;}

/* fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.race-card{animation:fadeUp .22s ease both;}

/* ══ グレード別ネオン点滅 ══ */
@keyframes neonG1{
  0%,100%{box-shadow:0 0 6px rgba(139,26,26,.5),0 0 14px rgba(139,26,26,.2);}
  50%{box-shadow:0 0 18px rgba(139,26,26,1),0 0 38px rgba(139,26,26,.7),0 0 65px rgba(139,26,26,.3);}
}
@keyframes neonG2{
  0%,100%{box-shadow:0 0 6px rgba(34,197,94,.5),0 0 14px rgba(34,197,94,.2);}
  50%{box-shadow:0 0 18px rgba(34,197,94,1),0 0 38px rgba(34,197,94,.7),0 0 65px rgba(34,197,94,.3);}
}
@keyframes neonG3{
  0%,100%{box-shadow:0 0 6px rgba(59,130,246,.5),0 0 14px rgba(59,130,246,.2);}
  50%{box-shadow:0 0 18px rgba(59,130,246,1),0 0 38px rgba(59,130,246,.7),0 0 65px rgba(59,130,246,.3);}
}

/* ─ ボタン：グレード別ネオン枠線 ─ */
.race-btn.grade-g1{border-color:rgba(139,26,26,.55);animation:neonG1 2s ease-in-out infinite;}
.race-btn.grade-g2{border-color:rgba(34,197,94,.55);animation:neonG2 2s ease-in-out infinite;}
.race-btn.grade-g3{border-color:rgba(31,77,46,.35);}
.race-btn.active.grade-g1{border-width:2px;border-color:var(--shu);background:linear-gradient(140deg,rgba(155,45,48,.08),#fff 100%);}
.race-btn.active.grade-g2{border-width:2px;border-color:var(--kin);background:linear-gradient(140deg,rgba(201,169,97,.1),#fff 100%);}
.race-btn.active.grade-g3{border-width:2px;border-color:var(--midori);background:linear-gradient(140deg,rgba(31,77,46,.08),#fff 100%);}
.race-btn.active.grade-g1 .active-dot{background:var(--shu);box-shadow:0 0 8px rgba(155,45,48,.5);}
.race-btn.active.grade-g2 .active-dot{background:var(--kin);box-shadow:0 0 8px rgba(201,169,97,.6);}
.race-btn.active.grade-g3 .active-dot{background:var(--midori);box-shadow:0 0 8px rgba(31,77,46,.5);}
/* アクティブ時 墨系で表示 */
.race-btn.active.grade-g1 .btn-meta,
.race-btn.active.grade-g2 .btn-meta,
.race-btn.active.grade-g3 .btn-meta{color:var(--muted);}
.race-btn.active.grade-g1 .btn-picks,
.race-btn.active.grade-g2 .btn-picks,
.race-btn.active.grade-g3 .btn-picks{color:var(--shu) !important;}
.race-btn.active.grade-g1 .btn-result,
.race-btn.active.grade-g2 .btn-result,
.race-btn.active.grade-g3 .btn-result{opacity:.9;}

/* ─ レースカード：グレード別朱印枠 ─ */
.race-card.grade-g1{border-color:var(--shu);animation:fadeUp .22s ease both;}
.race-card.grade-g2{border-color:var(--kin);animation:fadeUp .22s ease both;}
.race-card.grade-g3{border-color:var(--midori);animation:fadeUp .22s ease both;}

/* ─ レースヘッダー：グレード別朱印カラー ─ */
.race-card.grade-g1 .race-head{border-bottom-color:var(--shu);background:linear-gradient(120deg,rgba(155,45,48,.05) 0%,#fff 55%,rgba(201,169,97,.05) 100%);}
.race-card.grade-g2 .race-head{border-bottom-color:var(--kin);background:linear-gradient(120deg,rgba(201,169,97,.08) 0%,#fff 55%,rgba(201,169,97,.04) 100%);}
.race-card.grade-g3 .race-head{border-bottom-color:var(--midori);background:linear-gradient(120deg,rgba(31,77,46,.06) 0%,#fff 55%,rgba(31,77,46,.03) 100%);}
/* ── グレードカード ヘッダー：品格ある色 ── */
.race-card.grade-g1 .race-name{color:var(--shu-dk);}
.race-card.grade-g2 .race-name{color:#7a5500;}
.race-card.grade-g3 .race-name{color:var(--midori);}
.race-card.grade-g1 .race-meta{color:var(--muted);}
.race-card.grade-g2 .race-meta{color:var(--muted);}
.race-card.grade-g3 .race-meta{color:var(--muted);}
.race-card.grade-g1 .race-grade-badge,
.race-card.grade-g2 .race-grade-badge,
.race-card.grade-g3 .race-grade-badge{box-shadow:0 0 8px rgba(0,0,0,.08);}

/* ── レースタイプバッジ ── */
.race-type-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:900;letter-spacing:.08em;
  padding:4px 12px;border-radius:20px;margin-top:7px;
}
.race-type-badge.rt-ikkyou{
  background:linear-gradient(135deg,var(--shu),var(--shu-dk));
  color:#fff;
  border:1px solid var(--shu-dk);
  box-shadow:0 2px 8px rgba(155,45,48,.25);
  animation:rtPulse 2.2s ease-in-out infinite;
}
.race-type-badge.rt-sessen{
  background:linear-gradient(135deg,var(--midori),#163c24);
  color:#fff;
  border:1px solid #163c24;
  box-shadow:0 2px 8px rgba(31,77,46,.25);
}
.race-type-badge.rt-konsen{
  background:linear-gradient(135deg,var(--kin),#a88c52);
  color:#fff;
  border:1px solid #a88c52;
  box-shadow:0 2px 8px rgba(201,169,97,.3);
}
.race-type-badge.rt-default{
  background:var(--paper);
  color:var(--muted);
  border:1px solid var(--border);
}
/* ── レース格言（箴言札）── */
.race-quote{
  margin-top:9px;padding:10px 16px;
  border-left:3px solid var(--kin);
  background:rgba(201,169,97,.06);
  border-radius:0 4px 4px 0;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  font-size:12px;font-style:italic;
  color:var(--text);line-height:1.8;
  letter-spacing:.02em;
}
.race-quote-author{
  display:block;margin-top:4px;
  font-size:10px;font-weight:700;font-style:normal;
  color:var(--kin);letter-spacing:.05em;
}
.race-quote-author::before{content:'― ';}
@keyframes rtPulse{
  0%,100%{box-shadow:0 2px 8px rgba(155,45,48,.25);}
  50%{box-shadow:0 2px 14px rgba(155,45,48,.45);}
}

/* ── 展開予想図（絵巻物風）── */
.pace-chart-wrap{margin-bottom:8px;}
.pace-chart{
  background:linear-gradient(160deg,#fff 0%,var(--paper) 100%);
  border:1px solid var(--border);
  border-radius:4px;
  padding:14px 14px 12px;
  overflow:hidden;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.pace-track{
  position:relative;
  display:grid;
  grid-template-columns:52px 1fr;
  gap:6px;
  margin-bottom:8px;
}
.pace-lane-label{
  display:flex;align-items:center;
  font-size:10px;font-weight:900;letter-spacing:.12em;
  color:var(--shu);
  padding-right:8px;
  justify-content:flex-end;
  white-space:nowrap;
}
.pace-lane{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  border-left:2px solid rgba(201,169,97,.3);
  padding-left:8px;
  min-height:30px;
}
.pace-token{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;
  border-radius:50%;
  font-size:10px;font-weight:900;
  border:1.5px solid rgba(0,0,0,.15);
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
  color:#fff;
  transition:transform .15s;
}
.pace-token:hover{transform:scale(1.15);}
.pace-token.mark-hon{ background:linear-gradient(135deg,var(--shu),var(--shu-dk)); box-shadow:0 2px 6px rgba(155,45,48,.35);}
.pace-token.mark-tai{ background:linear-gradient(135deg,var(--midori),#163c24); }
.pace-token.mark-san{ background:linear-gradient(135deg,var(--kin),#a88c52); }
.pace-token.mark-hoshi{ background:linear-gradient(135deg,#8b1a1a,#5a0e0e); }
.pace-token.mark-san2{ background:linear-gradient(135deg,#5a3a7a,#40285a); }
.pace-token.mark-none{ background:rgba(42,42,42,.3); }
.pace-arrow{
  display:flex;align-items:center;
  height:14px;margin:4px 0 8px;
}
.pace-arrow-line{
  flex:1;height:2px;
  background:linear-gradient(90deg,rgba(201,169,97,.2) 0%,var(--shu) 100%);
  border-radius:2px;
}
.pace-arrow-tip{
  font-size:14px;color:var(--shu);margin-left:-2px;
}
.pace-est-row{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  margin-top:4px;
}
.pace-est-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:4px;
  background:var(--paper);border:1px solid var(--border);
  font-size:11px;font-weight:700;color:var(--text);
  font-family:'Shippori Mincho',serif;
}
.pace-est-badge.pace-hi{background:rgba(155,45,48,.08);border-color:var(--shu);color:var(--shu);}
.pace-est-badge.pace-mid{background:rgba(201,169,97,.12);border-color:var(--kin);color:#7a5500;}
.pace-est-badge.pace-slow{background:rgba(31,77,46,.08);border-color:var(--midori);color:var(--midori);}
.pace-note{
  font-size:11px;color:var(--text);line-height:1.8;font-weight:600;
  padding:10px 14px;background:var(--paper);
  border-radius:0 4px 4px 0;margin-top:8px;border-left:3px solid var(--shu);
  font-family:'Shippori Mincho',serif;
}

/* ── 展開予想アニメーション（絵馬絵巻）── */
.pace-anim-card{
  background:linear-gradient(160deg,#fff 0%,var(--paper) 100%);
  border:1px solid var(--border);
  border-radius:4px;
  padding:14px 12px 12px;
  overflow:hidden;
}
.pace-phase-tabs{
  display:flex;gap:6px;margin-bottom:12px;
}
.tab-btn{
  flex:1;padding:8px 0;border-radius:4px;
  font-size:11px;font-weight:900;letter-spacing:.12em;
  background:var(--paper);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  transition:all .2s ease;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.tab-btn.active{
  background:rgba(155,45,48,.08);border-color:var(--shu);
  color:var(--shu);box-shadow:0 2px 6px rgba(155,45,48,.12);
}
.pace-anim-stage{
  position:relative;width:100%;height:820px;
  border-radius:4px;overflow:hidden;
  border:1px solid var(--border);
  background:linear-gradient(180deg,#fafafa 0%,#f0ede3 100%);
}
@media screen and (max-width:768px){
  .pace-anim-stage{height:420px !important;}
}
.course-svg{
  position:absolute;inset:0;width:100%;height:100%;
}
.token-layer{
  position:absolute;inset:0;
}
.anim-token{
  position:absolute;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;
  border:1.5px solid rgba(0,0,0,.18);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  transition:left .6s cubic-bezier(.4,0,.2,1),
             top  .6s cubic-bezier(.4,0,.2,1);
  transform:translate(-50%,-50%);
  cursor:default;z-index:10;
  font-family:'Public Sans',sans-serif;
}
.anim-token.mark-hon{background:linear-gradient(135deg,var(--shu),var(--shu-dk));box-shadow:0 2px 6px rgba(155,45,48,.4);}
.anim-token.mark-tai{background:linear-gradient(135deg,var(--midori),#163c24);}
.anim-token.mark-san{background:linear-gradient(135deg,var(--kin),#a88c52);}
.anim-token.mark-hoshi{background:linear-gradient(135deg,#8b1a1a,#5a0e0e);}
.anim-token.mark-san2{background:linear-gradient(135deg,#5a3a7a,#40285a);}
.anim-token.mark-none{background:rgba(42,42,42,.35);}
@keyframes tokenPop{
  0%{transform:translate(-50%,-50%) scale(1);}
  40%{transform:translate(-50%,-50%) scale(1.3);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
.anim-token.popping{animation:tokenPop .35s ease;}
.pace-anim-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;flex-wrap:wrap;gap:8px;
}
.autoplay-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:4px;
  font-size:11px;font-weight:900;letter-spacing:.08em;
  background:var(--paper);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  transition:all .2s;font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.autoplay-btn.playing{
  background:rgba(155,45,48,.08);border-color:var(--shu);
  color:var(--shu);
}

/* ── 結果セクション（絵馬殿・結果掲示板）── */
.result-wrap{border-radius:4px;overflow:hidden;margin-bottom:6px;background:#fff;border:1px solid var(--border);font-family:'Shippori Mincho',serif;}
/* 的中バナー */
.result-banner-hit{background:linear-gradient(90deg,var(--shu),var(--shu-dk),var(--shu));padding:11px 18px;display:flex;align-items:center;gap:8px;}
.result-banner-miss{background:var(--paper);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:8px;border-radius:4px 4px 0 0;}
.result-banner-title{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:16px;font-weight:800;color:#fff;letter-spacing:.05em;}
.result-banner-miss .result-banner-title{color:var(--sumi);}
.result-hit-bets-banner{background:rgba(155,45,48,.08);border-radius:0;padding:8px 18px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--border);}
.result-hit-bet{font-size:12px;font-weight:700;color:var(--shu-dk);display:flex;align-items:center;gap:4px;}
/* 着順セクション */
.result-order-head{padding:10px 18px 6px;font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;background:var(--paper);}
.result-order-list{padding:6px 18px 12px;display:flex;flex-direction:column;gap:0;background:#fff;}
.result-order-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(201,169,97,.15);}
.result-order-row:last-child{border-bottom:none;}
.result-medal{font-size:20px;line-height:1;width:26px;text-align:center;flex-shrink:0;}
.result-num-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:3px;font-size:12px;font-weight:900;flex-shrink:0;}
.result-mark{font-size:15px;font-weight:900;width:18px;text-align:center;flex-shrink:0;}
.result-wrap .mark-○{color:var(--midori);}
.result-wrap .mark-▲{color:var(--kin);}
.result-wrap .mark-☆{color:var(--shu-dk);}
.result-wrap .mark-△{color:rgba(31,77,46,.75);}
.result-horse-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:15px;font-weight:800;color:var(--sumi);flex:1;}
.result-popularity{font-size:10px;color:var(--muted);white-space:nowrap;margin-right:6px;}
.result-rank-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:3px;border:1px solid var(--border);color:var(--text);white-space:nowrap;background:var(--paper);}
/* 払い戻しセクション */
.result-payout-head{background:linear-gradient(90deg,var(--kin),#b8994f);padding:8px 18px;font-size:10px;font-weight:800;letter-spacing:.14em;color:#fff;text-transform:uppercase;}
.result-payout-list{background:#fff;padding:4px 0;}
.result-payout-row{display:flex;align-items:baseline;justify-content:space-between;padding:7px 18px;border-bottom:1px solid rgba(201,169,97,.1);}
.result-payout-row:last-child{border-bottom:none;}
.result-payout-type{font-size:11px;font-weight:700;color:var(--muted);min-width:54px;}
.result-payout-amt{font-size:13px;font-weight:900;color:var(--sumi);text-align:right;}
/* 的中払い戻し金ハイライト */
.result-payout-row.is-hit{background:rgba(201,169,97,.08);border-left:3px solid var(--kin);padding-left:15px;}
.result-payout-row.is-hit .result-payout-type{color:#7a5500;font-weight:900;}
.result-payout-row.is-hit .result-payout-amt{color:#7a5500;font-size:15px;}
/* 回収率バー */
.result-kaishuri{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 18px;background:var(--paper);border-top:1px solid var(--border);}
.result-kaishuri-label{font-size:10px;font-weight:700;color:var(--muted);}
.result-kaishuri-nums{display:flex;gap:14px;align-items:baseline;}
.result-kaishuri-item{font-size:11px;color:var(--muted);}
.result-kaishuri-item strong{font-size:13px;color:var(--sumi);}
.result-kaishuri-pct{font-size:18px;font-weight:900;letter-spacing:.02em;}
.result-kaishuri-pct.hit{color:var(--midori);}
.result-kaishuri-pct.miss{color:var(--shu);}
/* 振り返りノート */
.result-note-wrap{background:var(--paper);padding:10px 18px;font-size:12px;line-height:1.75;color:var(--text);border-top:1px solid var(--border);}
/* 馬場設定急上昇バッジ */
.wet-rise-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:900;padding:3px 9px;border-radius:4px;background:linear-gradient(90deg,var(--midori),#163c24);color:#fff;border:1px solid var(--midori);letter-spacing:.04em;white-space:nowrap;margin-left:6px;flex-shrink:0;}
/* レース後結果バナー（結果札）*/
.post-race-result-banner{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:rgba(155,45,48,.06);border-left:3px solid var(--shu);border-radius:0 4px 4px 0;padding:7px 12px;margin:5px 0 2px;font-family:'Shippori Mincho',serif;}
.prr-pos{font-size:13px;font-weight:900;color:var(--shu);letter-spacing:.02em;}
.prr-odds-tan{font-size:12px;font-weight:900;color:var(--shu-dk);}
.prr-odds-fuku{font-size:11px;font-weight:700;color:var(--text);}
.prr-sep{font-size:10px;color:var(--muted);font-weight:700;}
/* 今後への教訓（反省札） */
.lesson-wrap{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-top:14px;font-family:'Shippori Mincho',serif;}
.lesson-header{padding:10px 16px;background:var(--paper);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:10px;font-weight:800;letter-spacing:.16em;color:var(--shu);text-transform:uppercase;}
.lesson-body{padding:14px 16px;font-size:12px;line-height:1.95;color:var(--text);}
.lesson-body p{margin-bottom:10px;}
.lesson-body p:last-child{margin-bottom:0;}
/* ── 分析回顧（御神託の回顧）── */
.review-wrap{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-top:16px;font-family:'Shippori Mincho',serif;position:relative;}
.review-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--shu),var(--kin),var(--shu));}
.review-header{padding:12px 16px;background:var(--paper);border-bottom:1px solid var(--border);font-size:10px;font-weight:800;letter-spacing:.18em;color:var(--shu);text-transform:uppercase;}
.review-header::before{content:'◆ ';color:var(--kin);}
.review-body{padding:16px;}
.review-catchcopy{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:17px;font-weight:800;color:var(--sumi);line-height:1.4;margin-bottom:6px;}
.review-theme{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:16px;border-left:3px solid var(--kin);padding-left:10px;}
.review-section-title{font-size:12px;font-weight:800;color:var(--shu);margin:14px 0 6px;letter-spacing:.06em;}
.review-section-title::before{content:'▸ ';color:var(--kin);}
.review-text{font-size:12px;line-height:1.95;color:var(--text);margin-bottom:8px;white-space:pre-line;}
.review-results-list{margin:10px 0;display:flex;flex-direction:column;gap:6px;}
.review-result-row{background:rgba(155,45,48,.06);border-left:3px solid var(--shu);border-radius:0 4px 4px 0;padding:8px 14px;font-size:12px;font-weight:700;color:var(--sumi);letter-spacing:.02em;}
.review-closing-quote{margin-top:14px;padding:12px 16px;background:var(--paper);border-radius:4px;border:1px solid var(--border);font-size:11px;font-style:italic;color:var(--text);line-height:1.85;}
.review-footer{margin-top:14px;text-align:center;font-size:12px;color:var(--shu);font-weight:700;letter-spacing:.12em;font-family:'Shippori Mincho',serif;}
.review-footer::before{content:'─ ';color:var(--kin);}
.review-footer::after{content:' ─';color:var(--kin);}
/* ヒーローカード内の着順バッジ（朱印風）*/
.order-badge{font-size:10px;font-weight:900;padding:2px 8px;border-radius:3px;margin-left:6px;white-space:nowrap;font-family:'Shippori Mincho',serif;}
/* 明背景用（御札カラー）*/
.order-1st{background:var(--kin);color:#fff;border:1px solid #a88c52;}
.order-2nd{background:#8a8a8a;color:#fff;border:1px solid #6a6a6a;}
.order-3rd{background:#a66820;color:#fff;border:1px solid #7e4e18;}
.order-other{background:var(--paper);color:var(--muted);border:1px solid var(--border);font-weight:900;}
/* result-wrap内での着順バッジ（少し明るめ）*/
.result-wrap .order-1st{background:linear-gradient(135deg,var(--kin),#b8994f);color:#fff;border:1px solid #a88c52;}
.result-wrap .order-2nd{background:linear-gradient(135deg,#b0b0b0,#8a8a8a);color:#fff;border:1px solid #6a6a6a;}
.result-wrap .order-3rd{background:linear-gradient(135deg,#b07030,#7e4e18);color:#fff;border:1px solid #7e4e18;}
.result-wrap .order-other{background:var(--paper);color:var(--muted);border:1px solid var(--border);}
/* レースボタンの結果バッジ */
.race-btn .btn-result{font-size:9px;font-weight:900;padding:2px 7px;border-radius:3px;display:inline-block;margin-top:4px;letter-spacing:.08em;font-family:'Shippori Mincho',serif;}
.btn-result-hit{background:rgba(155,45,48,.15);color:var(--shu-dk);border:1px solid var(--shu);}
.btn-result-miss{background:var(--paper);color:var(--muted);border:1px solid var(--border);}

/* ══ 御神託の間（FINAL VERDICT HERO）══ */
@keyframes verdictGlow{
  0%,100%{box-shadow:0 0 12px rgba(155,45,48,.18),0 0 28px rgba(155,45,48,.06);}
  50%{box-shadow:0 0 24px rgba(155,45,48,.3),0 0 48px rgba(155,45,48,.12);}
}
@keyframes verdictIn{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes verdictTextIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}

.verdict-hero{
  background:linear-gradient(160deg,#fff 0%,var(--paper) 100%);
  border-bottom:2px solid var(--shu);
  padding:24px 20px 20px;
  position:relative;overflow:hidden;
  animation:verdictIn .38s cubic-bezier(.22,1,.36,1) both;
  margin-bottom:14px;
  border-radius:4px;
  border:2px solid var(--shu);
  box-shadow:0 4px 24px rgba(155,45,48,.15),0 0 0 1px rgba(155,45,48,.1);
  font-family:'Shippori Mincho',serif;
}
.verdict-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--shu) 0%,var(--kin) 50%,var(--shu) 100%);
  pointer-events:none;
}
.verdict-hero::after{
  content:'御神託';
  position:absolute;right:12px;top:12px;
  font-size:80px;font-weight:800;letter-spacing:.1em;
  color:var(--shu);opacity:.05;
  white-space:nowrap;pointer-events:none;
  font-family:'Shippori Mincho',serif;
  line-height:1;
}
.verdict-label{
  font-size:10px;font-weight:800;letter-spacing:.28em;
  color:var(--shu);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.verdict-label::before{content:'◆';color:var(--kin);}
.verdict-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,169,97,.4),transparent);}
.verdict-mark-row{
  display:flex;align-items:center;gap:16px;margin:0 0 14px;
  position:relative;z-index:1;
  animation:verdictTextIn .45s .1s cubic-bezier(.22,1,.36,1) both;
}
.verdict-mark-circle{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--shu),var(--shu-dk));
  border:3px solid var(--kin);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#fff;
  animation:verdictGlow 2.5s ease-in-out infinite;
  flex-shrink:0;
  font-family:'Shippori Mincho',serif;
}
.verdict-horse-info{flex:1;min-width:0;}
.verdict-horse-name{
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  font-size:26px;font-weight:800;color:var(--sumi);
  line-height:1.1;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.verdict-horse-sub{
  font-size:11px;font-weight:700;color:var(--muted);
  letter-spacing:.06em;margin-top:5px;
}
.verdict-honmei-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;border-radius:3px;margin-top:6px;
  background:rgba(155,45,48,.12);color:var(--shu);
  border:1px solid var(--shu);
}
.verdict-quote{
  background:var(--paper);
  border-left:3px solid var(--kin);
  border-radius:0 4px 4px 0;
  padding:12px 16px;margin-bottom:12px;
  font-size:12px;font-style:italic;font-weight:500;
  color:var(--text);line-height:1.85;
  position:relative;z-index:1;
}
.verdict-quote-author{
  display:block;margin-top:4px;
  font-size:10px;font-weight:700;font-style:normal;
  color:var(--kin);letter-spacing:.06em;
}
.verdict-final-text{
  background:#fff;border:1px solid var(--border);
  border-left:3px solid var(--shu);
  border-radius:0 4px 4px 0;padding:12px 16px;
  font-size:13px;font-weight:600;color:var(--sumi);
  line-height:1.85;position:relative;z-index:1;
  letter-spacing:.02em;margin-bottom:12px;
}
.verdict-chips-row{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  position:relative;z-index:1;
  padding-top:12px;border-top:1px solid var(--border);
}
.verdict-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 11px;border-radius:3px;
  font-size:10px;font-weight:800;white-space:nowrap;
  background:rgba(201,169,97,.1);color:#7a5500;
  border:1px solid rgba(201,169,97,.4);
  letter-spacing:.04em;
  font-family:'Shippori Mincho',serif;
}
.verdict-chip.vc-main{
  background:linear-gradient(135deg,rgba(155,45,48,.08),rgba(155,45,48,.04));
  color:var(--shu);border-color:var(--shu);
}

/* ── スマホ：全馬スコアテーブル 外厩(4列目)・厩舎(6列目)を非表示 ── */

/* ── 週アコーディオン（絵馬殿・過去記録帳） ── */
.archive-wrap{padding:14px 12px 0;max-width:780px;margin:0 auto;font-family:'Shippori Mincho',serif;}
.archive-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.archive-title{font-size:10px;font-weight:800;letter-spacing:.22em;color:var(--shu);}
.archive-title::before{content:'絵馬殿 ／ ';color:var(--kin);}
.archive-stats-link{font-size:11px;font-weight:700;color:var(--shu);padding:5px 12px;border-radius:3px;background:rgba(155,45,48,.06);border:1px solid rgba(155,45,48,.3);text-decoration:none;transition:all .18s;font-family:'Shippori Mincho',serif;}
.archive-stats-link:hover{background:rgba(155,45,48,.12);color:var(--shu-dk);}

.week-accordion{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.week-accordion.is-current{border-color:var(--shu);box-shadow:0 2px 12px rgba(155,45,48,.12);}
.week-acc-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;transition:background .18s;}
.week-acc-header:hover{background:var(--paper);}
.week-acc-left{display:flex;align-items:center;gap:10px;}
.week-acc-label{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:14px;font-weight:800;color:var(--sumi);}
.week-current-badge{font-size:9px;font-weight:900;padding:2px 8px;border-radius:3px;background:var(--shu);color:#fff;border:1px solid var(--shu-dk);letter-spacing:.08em;}
.week-acc-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.week-acc-arrow{font-size:16px;color:var(--shu);transition:transform .22s;line-height:1;}
.week-acc-arrow.open{transform:rotate(180deg);}
.week-acc-body{display:none;padding:0 12px 12px;}
.week-acc-body.open{display:block;}

.week-hit-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.week-hit-chip{font-size:9px;font-weight:900;padding:2px 8px;border-radius:3px;letter-spacing:.04em;}
.chip-hit{background:rgba(155,45,48,.1);color:var(--shu);border:1px solid rgba(155,45,48,.3);}
.chip-miss{background:var(--paper);color:var(--muted);border:1px solid var(--border);}

/* ══ soutei 展望・分析セクション（御神託の各章）══ */
.section-head{display:flex;align-items:center;gap:8px;margin:20px 0 10px;padding:0 2px;font-size:10px;font-weight:800;letter-spacing:.22em;color:var(--shu);scroll-margin-top:60px;font-family:'Shippori Mincho',serif;}
.section-head::before{content:'◆';width:auto;height:auto;color:var(--kin);flex-shrink:0;}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,169,97,.4),transparent);}

.outlook-card{margin-bottom:14px;padding:18px;border-radius:4px;background:#fff;border:1px solid var(--border);position:relative;overflow:hidden;font-family:'Shippori Mincho',serif;}
.outlook-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--shu),var(--kin),var(--shu));}
.outlook-label{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--shu);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.outlook-label::before{content:'◆';color:var(--kin);}
.outlook-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,169,97,.3),transparent);}
.outlook-text{font-size:13px;color:var(--text);line-height:1.95;}
.outlook-text table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0;}
.outlook-text th,.outlook-text td{padding:6px 10px;text-align:center;border:1px solid var(--border);}
.outlook-text th{background:var(--paper);color:var(--shu);font-weight:800;}

.lap-card{margin-bottom:14px;padding:16px 18px;border-radius:4px;background:#fff;border:1px solid var(--border);position:relative;overflow:hidden;font-family:'Shippori Mincho',serif;}
.lap-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--midori),var(--kin),var(--midori));}
.lap-card-label{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--midori);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.lap-card-label::before{content:'◆';color:var(--kin);}
.lap-card-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,169,97,.3),transparent);}
.lap-card-text{font-size:12px;color:var(--text);line-height:1.95;white-space:pre-line;}

.wet-pick-section{margin-bottom:14px;border-radius:4px;overflow:hidden;border:1px solid var(--border);background:#fff;font-family:'Shippori Mincho',serif;}
.wet-pick-label{font-size:10px;font-weight:800;letter-spacing:.18em;padding:9px 14px;background:var(--paper);color:var(--midori);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.wet-pick-card{padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);}
.wet-pick-card:last-child{border-bottom:none;}
.wet-pick-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.wet-grade-badge{font-size:10px;font-weight:900;padding:2px 8px;border-radius:3px;flex-shrink:0;}
.wg-S{background:var(--kin);color:#fff;}
.wg-A{background:rgba(31,77,46,.12);color:var(--midori);border:1px solid var(--midori);}
.wet-b-badge{font-size:9px;font-weight:900;padding:2px 7px;border-radius:3px;background:rgba(31,77,46,.1);color:var(--midori);border:1px solid rgba(31,77,46,.3);}
.wet-pick-name{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:13px;font-weight:700;color:var(--sumi);}
.wet-pick-umaban{font-size:10px;font-weight:900;padding:1px 6px;border-radius:3px;background:var(--paper);color:var(--shu);margin-right:3px;}
.wet-pick-comment{font-size:11px;color:var(--text);line-height:1.85;padding:6px 12px;margin-top:4px;background:rgba(31,77,46,.05);border-left:2px solid var(--midori);border-radius:0 4px 4px 0;}

<!-- 詳細表示エリア -->
<div class="detail-wrap" id="detailWrap" style="display:none;">
  <div id="detail"></div>
</div>

<script>
const MARK_ORDER = ['◎','○','▲','☆','△','×',''];
const MARK_META = {
  '◎': { cls:'h-honmei', label:'◎ 本命', icon:'◎' },
  '○': { cls:'h-taikou', label:'○ 対抗', icon:'○' },
  '▲': { cls:'h-sangen', label:'▲ 3番手',icon:'▲' },
  '☆': { cls:'h-star',   label:'☆ 穴馬', icon:'☆' },
  '△': { cls:'h-delta',  label:'△ 連下', icon:'△' },
};

function gradeStyle(g) {
  if (g==='G1') return 'background:#f0c040;color:#000;';
  if (g==='G2') return 'background:#c0c0c0;color:#000;';
  if (g==='G3') return 'background:#cd7f32;color:#fff;';
  return 'background:rgba(34,197,94,.3);color:#22c55e;';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── 展開予想図レンダラー ── */
function renderPaceChart(pace){
  if(!pace || !pace.horses || !pace.horses.length) return '';

  const LANES = [
    { pos: 1, label: '逃げ' },
    { pos: 2, label: '先行' },
    { pos: 3, label: '中団' },
    { pos: 4, label: '差し' },
    { pos: 5, label: '追込' },
  ];

  const markClass = m => {
    if(m==='◎') return 'mark-hon';
    if(m==='○') return 'mark-tai';
    if(m==='▲') return 'mark-san';
    if(m==='☆') return 'mark-hoshi';
    if(m==='△') return 'mark-san2';
    return 'mark-none';
  };

  const lanesHtml = LANES.map(lane => {
    const group = pace.horses.filter(h => h.position === lane.pos);
    if(!group.length) return '';
    const tokens = group.map(h =>
      `<span class="pace-token ${markClass(h.mark)}" title="${esc(h.name)}（${h.num}番）">${h.num}</span>`
    ).join('');
    return `
      <div class="pace-lane-label">${lane.label}</div>
      <div class="pace-lane">${tokens}</div>`;
  }).join('');

  const pe = pace.paceEstimate || '';
  const peCls = pe.includes('ハイ') ? 'pace-hi' : pe.includes('スロー') ? 'pace-slow' : 'pace-mid';

  return `
  <div class="pace-chart-wrap">
    <div class="sec-title">🏇 展開予想図</div>
    <div class="pace-chart">
      <div class="pace-track">${lanesHtml}</div>
      <div class="pace-arrow">
        <div class="pace-arrow-line"></div>
        <div class="pace-arrow-tip">▶ ゴール</div>
      </div>
      <div class="pace-est-row">
        <div class="pace-est-badge ${peCls}">⚡ ペース想定：${esc(pe)}</div>
      </div>
      ${pace.paceNote ? `<div class="pace-note">📝 ${esc(pace.paceNote)}</div>` : ''}
    </div>
  </div>
  <div class="divider"></div>`;
}

/* ── 展開予想アニメーションレンダラー ── */
(function(){
  // グローバル状態
  window.__paceState = { phaseIdx: 0, timer: null, coords: {} };

  const PHASE_LABELS = ['スタート後', '4角', 'ゴール前'];
  // SVG論理座標系（縦向き：下=START, 上=GOAL）
  const STAGE_W = 340, STAGE_H = 820;
  // 各フェーズのY中心（下から上へ進行）
  const PHASE_Y = [720, 440, 110];
  // 各position(1-5)のX位置（左=逃げ, 右=追込）
  const POS_X   = { 1: 38, 2: 98, 3: 168, 4: 238, 5: 302 };
  // 脚質ごとの前後差オフセット（逃げが前=上、追込が後=下）
  const POS_Y_OFFSET = { 1: -48, 2: -24, 3: 0, 4: 24, 5: 48 };

  function markCls(m){
    if(m==='◎') return 'mark-hon';
    if(m==='○') return 'mark-tai';
    if(m==='▲') return 'mark-san';
    if(m==='☆') return 'mark-hoshi';
    if(m==='△') return 'mark-san2';
    return 'mark-none';
  }

  function getPhases(h){
    return h.phases || [h.position, h.position,
      h.position <= 2 ? Math.min(h.position + 1, 5)
      : h.position >= 4 ? Math.max(h.position - 1, 1)
      : h.position];
  }

  function calcCoords(horses){
    const coords = {};
    const total = horses.length;
    // 全フェーズ共通：馬番→X（右=内枠=小番号, 左=外枠=大番号）
    const numToX = num => (302 - (num - 1) / (total - 1) * (302 - 38)) / STAGE_W * 100;

    horses.forEach(h => {
      const xPct = numToX(h.num).toFixed(2);
      coords[h.num] = {};

      // Phase 0: スタート後 ── 馬番順横並び（Y=START付近）
      const y0 = PHASE_Y[0] + (h.num % 2 === 0 ? -7 : 7);
      coords[h.num][0] = { x: xPct, y: (y0 / STAGE_H * 100).toFixed(2) };

      // Phase 1: 4角 ── Y=脚質ポジション（逃げ=上, 追込=下）
      const pos1 = getPhases(h)[1];
      const y1 = PHASE_Y[1] + (POS_Y_OFFSET[pos1] || 0);
      coords[h.num][1] = { x: xPct, y: (y1 / STAGE_H * 100).toFixed(2) };

      // Phase 2: ゴール前 ── Y=finalRank（1位=上, 18位=下）
      const rank = h.finalRank || total;
      const y2 = 38 + (rank - 1) / (total - 1) * 140;
      coords[h.num][2] = { x: xPct, y: (y2 / STAGE_H * 100).toFixed(2) };
    });

    return coords;
  }

  const COURSE_SVG = `
<svg class="course-svg" viewBox="0 0 340 820" preserveAspectRatio="none"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 芝生横縞パターン -->
    <pattern id="gp" x="0" y="0" width="340" height="40" patternUnits="userSpaceOnUse">
      <rect width="340" height="20" fill="#2d5a1b"/>
      <rect y="20" width="340" height="20" fill="#3a6e22"/>
    </pattern>
    <!-- 上部（ゴール側）を明るく、下部（スタート側）を暗く -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(120,220,80,.18)"/>
      <stop offset="60%"  stop-color="rgba(0,0,0,.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,.35)"/>
    </linearGradient>
  </defs>
  <!-- 芝生ベース -->
  <rect width="340" height="820" rx="12" fill="url(#gp)"/>
  <rect width="340" height="820" rx="12" fill="url(#fade)"/>

  <!-- 枠区切り縦線（外枠/中枠/内枠 の3分割） -->
  <line x1="113" y1="30" x2="113" y2="778" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <line x1="226" y1="30" x2="226" y2="778" stroke="rgba(255,255,255,.12)" stroke-width="1"/>

  <!-- 枠ラベル（上部）：右=内枠, 中=中枠, 左=外枠 -->
  <text x="57"  y="26" font-size="8" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-weight="700" text-anchor="middle">外枠</text>
  <text x="170" y="26" font-size="8" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-weight="700" text-anchor="middle">中枠</text>
  <text x="283" y="26" font-size="8" fill="rgba(255,255,255,.55)" font-family="sans-serif" font-weight="700" text-anchor="middle">内枠</text>

  <!-- GOALライン（上）━━━━━━━━━━━━━━ -->
  <rect x="0" y="30" width="340" height="4" fill="rgba(232,0,61,.9)"/>
  <text x="170" y="46" font-size="10" fill="rgba(255,255,255,.95)" font-family="sans-serif" font-weight="900" text-anchor="middle" letter-spacing="3">GOAL</text>

  <!-- 直線ライン - - - - - - - - - - - - - -->
  <line x1="0" y1="270" x2="340" y2="270" stroke="rgba(255,230,0,.65)" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="12" y="265" font-size="8" fill="rgba(255,230,0,.9)" font-family="sans-serif" font-weight="900">直線</text>

  <!-- 4角ライン - - - - - - - - - - - - - -->
  <line x1="0" y1="520" x2="340" y2="520" stroke="rgba(255,180,60,.55)" stroke-width="1.5" stroke-dasharray="8,6"/>
  <text x="12" y="515" font-size="8" fill="rgba(255,200,80,.85)" font-family="sans-serif" font-weight="900">4角</text>

  <!-- STARTライン（下）━━━━━━━━━━━━━━ -->
  <rect x="0" y="778" width="340" height="3" fill="rgba(255,255,255,.6)"/>
  <text x="170" y="800" font-size="10" fill="rgba(255,255,255,.7)" font-family="sans-serif" font-weight="900" text-anchor="middle" letter-spacing="3">START</text>

  <!-- 進行方向矢印（右端・下から上） -->
  <line x1="330" y1="758" x2="330" y2="55" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
  <polygon points="323,57 330,35 337,57" fill="rgba(255,255,255,.3)"/>
</svg>`;

  window.renderPaceAnimation = function(pace){
    if(!pace || !pace.horses || !pace.horses.length) return '';
    const horses = pace.horses;
    const coords = calcCoords(horses);
    window.__paceState.coords = coords;

    const pe = pace.paceEstimate || '';
    const peCls = pe.includes('ハイ') ? 'pace-hi' : pe.includes('スロー') ? 'pace-slow' : 'pace-mid';

    const tabsHtml = PHASE_LABELS.map((l, i) =>
      `<button class="tab-btn${i===0?' active':''}" onclick="window.switchPacePhase(${i})">${l}</button>`
    ).join('');

    const tokensHtml = horses.map(h => {
      const c = coords[h.num][0];
      return `<div class="anim-token ${markCls(h.mark)}"
                   id="pt${h.num}"
                   data-num="${h.num}"
                   style="left:${c.x}%;top:${c.y}%;"
                   title="${h.name}（${h.num}番）">${h.num}</div>`;
    }).join('');

    return `
<div class="pace-chart-wrap">
  <div class="sec-title">🏇 展開予想アニメーション</div>
  <div class="pace-anim-card">
    <div class="pace-phase-tabs">${tabsHtml}</div>
    <div class="pace-anim-stage" id="paceStage">
      ${COURSE_SVG}
      <div class="token-layer" id="tokenLayer">${tokensHtml}</div>
    </div>
    <div class="pace-anim-footer">
      <div class="pace-est-row">
        <div class="pace-est-badge ${peCls}">⚡ ペース：${esc(pe)}</div>
      </div>
      <button class="autoplay-btn" id="autoplayBtn" onclick="window.togglePaceAutoplay()">▶ 自動再生</button>
    </div>
    ${pace.paceNote ? `<div class="pace-note">📝 ${esc(pace.paceNote)}</div>` : ''}
  </div>
</div>
<div class="divider"></div>`;
  };

  window.switchPacePhase = function(pi){
    const state = window.__paceState;
    const coords = state.coords;
    state.phaseIdx = pi;

    // タブ切り替え
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', i === pi));

    // トークン移動
    document.querySelectorAll('.anim-token').forEach(el => {
      const num = parseInt(el.dataset.num, 10);
      if(!coords[num] || !coords[num][pi]) return;
      const c = coords[num][pi];
      el.style.left = c.x + '%';
      el.style.top  = c.y + '%';
      // パルスアニメ
      el.classList.remove('popping');
      void el.offsetWidth; // reflow
      el.classList.add('popping');
      setTimeout(() => el.classList.remove('popping'), 350);
    });
  };

  window.togglePaceAutoplay = function(){
    const state = window.__paceState;
    const btn = document.getElementById('autoplayBtn');
    if(state.timer){
      clearInterval(state.timer);
      state.timer = null;
      btn.classList.remove('playing');
      btn.textContent = '▶ 自動再生';
    } else {
      btn.classList.add('playing');
      btn.textContent = '⏹ 停止';
      state.timer = setInterval(() => {
        window.switchPacePhase((state.phaseIdx + 1) % 3);
      }, 1800);
    }
  };
})();

function formatJpDate(d){
  if(!d) return '';
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return d;
  const days=['日','月','火','水','木','金','土'];
  const dt = new Date(+m[1], +m[2]-1, +m[3]);
  return `${m[1]}年${+m[2]}月${+m[3]}日（${days[dt.getDay()]}曜日）`;
}

function raceTypeCls(t){
  if(!t) return 'rt-default';
  if(t.includes('1強')) return 'rt-ikkyou';
  if(t.includes('接戦')) return 'rt-sessen';
  if(t.includes('混戦')) return 'rt-konsen';
  return 'rt-default';
}
function raceTypeIcon(t){
  if(!t) return '';
  if(t.includes('1強')) return '👑';
  if(t.includes('接戦')) return '⚔️';
  if(t.includes('混戦')) return '🌀';
  return '🏇';
}

function wakuClass(gate){ return gate ? `waku-${Math.min(gate,8)}` : ''; }

function gaikuBadge(gaiku) {
  if (!gaiku) return '<span class="gaiku-badge gaiku-zaichu">在厩調整</span>';
  let cls = 'gaiku-other';
  if (/天栄|ノーザン/.test(gaiku))  cls = 'gaiku-northern';
  else if (/シャダイ|社台/.test(gaiku)) cls = 'gaiku-shadai';
  else if (/チャンピオン/.test(gaiku)) cls = 'gaiku-champ';
  else if (/山元/.test(gaiku))      cls = 'gaiku-yamamoto';
  else if (/在厩|自厩/.test(gaiku)) cls = 'gaiku-zaichu';
  return `<span class="gaiku-badge ${cls}">${esc(gaiku)}</span>`;
}

function infoRow(label, valHtml) {
  return `<div class="horse-info-row"><span class="info-lbl">${label}</span>${valHtml}</div>`;
}

// ── SABC期待値ランキング ──
function sortRankWithTiebreak(rank, horses) {
  return [...rank].sort((a, b) => {
    // rankフィールドがあればそちらを優先（昇順）
    if (a.rank != null && b.rank != null) return a.rank - b.rank;
    if (b.total !== a.total) return b.total - a.total;
    const ha = horses[a.name] || {}, hb = horses[b.name] || {};
    return (hb.sabcZI || 0) - (ha.sabcZI || 0);
  });
}

function sabcRankHtml(notes, horses) {
  if (!notes || !notes.sabcRankTan || !notes.sabcRankFuku) return '';
  if (!notes.sabcRankTan[0] || !notes.sabcRankFuku[0]) return '';
  const nh = notes.horses || {};
  const rankTan  = sortRankWithTiebreak(notes.sabcRankTan,  nh);
  const rankFuku = sortRankWithTiebreak(notes.sabcRankFuku, nh);
  const RANK_CLS = ['r1','r2','r3'];
  function numOf(name) {
    const h = (horses||[]).find(x => x.name === name);
    return h ? h.num : '—';
  }
  function rankRow(entry, i, dim) {
    const hn = nh[entry.name] || {};
    const popInfo = hn.popularity ? `${hn.popularity}番人気` : '';
    return `<div class="sabc-rank-row">
      <div class="sabc-rank-badge ${RANK_CLS[i]||''}">${i+1}</div>
      <div class="sabc-rank-name-block">
        <div class="sabc-rank-name">${numOf(entry.name)}番 ${esc(entry.name)}</div>
        ${popInfo ? `<div class="sabc-rank-pop">${popInfo}</div>` : ''}
      </div>
      <div class="sabc-rank-score ${dim}">${entry.total}<span>pt</span></div>
    </div>`;
  }
  function rankBlock(dim, rank, label) {
    const rows = rank.slice(0,3).map((e,i) => rankRow(e,i,dim)).join('');
    return `<div class="sabc-rank-block">
      <div class="sabc-rank-header ${dim}">${label}</div>
      <div class="sabc-rank-list">${rows}</div>
    </div>`;
  }
  return `<div class="sabc-rank-wrap">
    ${rankBlock('tan',  rankTan,  '単勝期待値ランキング')}
    ${rankBlock('fuku', rankFuku, '複勝期待値ランキング')}
  </div>`;
}

// SACBランキングから「最も人気のない馬（穴馬）」を推奨買い目として表示
function sabcBetsHtml(notes, horses) {
  if (!notes || !notes.sabcRankTan || !notes.sabcRankFuku) return '';
  const nh = notes.horses || {};

  // ランキング上位3位以内から popularity が最大（=最も人気薄）の馬を選ぶ
  function pickLeastFavorite(rankList) {
    const top3 = sortRankWithTiebreak(rankList, nh).slice(0, 3);
    if (!top3.length) return null;
    const withPop = top3.filter(e => nh[e.name] && nh[e.name].popularity);
    if (!withPop.length) return top3[0]; // fallback: 1位
    return withPop.reduce((best, e) =>
      (nh[e.name].popularity > (nh[best.name]?.popularity || 0)) ? e : best
    , withPop[0]);
  }

  const pickTan  = pickLeastFavorite(notes.sabcRankTan);
  const pickFuku = pickLeastFavorite(notes.sabcRankFuku);
  if (!pickTan && !pickFuku) return '';

  function horseInfo(name) {
    const h  = (horses||[]).find(x => x.name === name) || {};
    const hn = nh[name] || {};
    const num    = h.num  || '—';
    const mark   = h.mark || '';
    const pop    = hn.popularity ? `${hn.popularity}番人気` : '';
    const odds   = hn.odds       ? `単${hn.odds}倍`         : '';
    const fuku   = hn.fuku_odds  ? `複${hn.fuku_odds}`      : '';
    return { num, mark, pop, odds, fuku };
  }

  const betResult = notes.betResult || {};

  function betBanner(labelText, pick, resultText) {
    const { num, mark, pop, odds, fuku } = horseInfo(pick.name);
    const markHtml = mark ? `<span class="sabc-bet-mark">${mark}</span>` : '';
    const metaHtml = [pop, odds, fuku].filter(Boolean)
      .map(t => `<span class="sabc-bet-meta-chip">${t}</span>`).join('');
    const isHit = resultText && (resultText.includes('的中') || resultText.includes('！'));
    const resultHtml = resultText
      ? `<div><span class="sabc-bet-result ${isHit ? 'hit' : 'near'}">${esc(resultText)}</span></div>` : '';
    return `<div class="sabc-bet-banner">
      <span class="sabc-bet-icon">🥇</span>
      <div class="sabc-bet-body">
        <div class="sabc-bet-label">${labelText}</div>
        <div class="sabc-bet-name">${markHtml}${num}番 ${esc(pick.name)}</div>
        ${metaHtml ? `<div class="sabc-bet-meta">${metaHtml}</div>` : ''}
        ${resultHtml}
      </div>
      <span class="sabc-bet-sub">${pick.total}pt</span>
    </div>`;
  }

  const rows = [];
  if (pickTan)  rows.push(betBanner('単勝期待値', pickTan,  betResult.tan  || ''));
  if (pickFuku) rows.push(betBanner('複勝期待値', pickFuku, betResult.fuku || ''));
  return rows.join('');
}

    <div class="outlook-text">${notes.outlook}</div>

function lapAnalysisHtml(notes) {

    <div class="lap-card-text">${esc(notes.lapAnalysis)}</div>
  </div>`;
}

function wetPickHtml(notes, horses) {
  if (!notes || !notes.horses) return '';
  const picks = Object.keys(notes.horses)
    .filter(n => {
      const sabc = notes.horses[n].sabc;
      return sabc && sabc.tan && (sabc.tan.wet === 'S' || sabc.tan.wet === 'A');
    })
    .map(n => {
      const hn = notes.horses[n];
      return { name: n, wetGrade: hn.sabc.tan.wet, hasWetB: hn.sabc.tan.wet_b === 'S', hn };
    })
    .sort((a, b) => ({S:0,A:1}[a.wetGrade]||0) - ({S:0,A:1}[b.wetGrade]||0));
  if (!picks.length) return '';
  function numOf(name) {
    const h = (horses||[]).find(x => x.name === name);
    return h ? h.num : '—';
  }
  const cards = picks.map(p => {
    const comment = p.hn.wetComment || p.hn.lapComment || p.hn.abilityComment || '';
    const wetBBadge = p.hasWetB ? `<span class="wet-b-badge">道悪+ S</span>` : '';
    return `<div class="wet-pick-card">
      <div class="wet-pick-head">
        <span class="wet-grade-badge wg-${p.wetGrade}">道悪 ${p.wetGrade}</span>
        ${wetBBadge}
        <span class="wet-pick-name"><span class="wet-pick-umaban">${numOf(p.name)}番</span>${esc(p.name)}</span>
      </div>
      ${comment ? `<div class="wet-pick-comment">${esc(comment)}</div>` : ''}
    </div>`;
  }).join('');
  return `<div class="wet-pick-section">
    <div class="wet-pick-label">🌧️ 重馬場 特注激走メモ</div>
    ${cards}
  </div>`;
}

// コメントを1〜2文に要約（句点で区切り最大maxChars文字）
function summarizeComment(text, maxChars) {
  if (!text) return '';
  const sentences = text.split('。').filter(s => s.trim());
  let result = '';
  for (const s of sentences) {
    const next = result ? result + '。' + s : s;
    if (next.length > (maxChars || 100)) break;
    result = next;
  }
  if (!result) result = sentences[0] || '';
  return result + '。';
}

function renderHeroCard(h, orderMap, noteHorse) {
  const meta = MARK_META[h.mark];
  if (!meta) return '';
  const wc = wakuClass(h.gate);

// ── 投資額自動計算（統一買い目：単勝/馬単マルチ/三連複/三連単フォーメーション）
function calcInvestment(horses) {
  const A = [], B = [], C = []; // 列1:◎○ / 列2:◎○▲☆ / 列3:◎○▲☆△
  (horses || []).forEach((h, i) => {
    const m = h.mark || '';
    if (m === '◎' || m === '○')    { A.push(i); B.push(i); C.push(i); }
    else if (m === '▲' || m === '☆') { B.push(i); C.push(i); }
    else if (m === '△')              { C.push(i); }
  });
  const allMarked = B.length + C.filter(i => !B.includes(i)).length; // 全印馬数
  const inba = allMarked - 1; // ◎を除いた印馬数（○▲☆△）
  const tansho  = 100;
  const batan   = inba * 2 * 100; // 馬単マルチ（◎↔印馬）
  // 三連複フォーメーション
  let fuku = 0;
  for (let i = 0; i < C.length; i++)
    for (let j = i+1; j < C.length; j++)
      for (let k = j+1; k < C.length; k++) {
        const combo = [C[i],C[j],C[k]];
        if (combo.some(x=>A.includes(x)) && combo.filter(x=>B.includes(x)).length>=2) fuku++;
      }
  // 三連単フォーメーション
  let tan = 0;
  for (const a of A) for (const b of B) { if (b===a) continue;
    for (const c of C) { if (c===a||c===b) continue; tan++; } }
  return { tansho, batan, sanrenpuku: fuku*100, sanrentan: tan*100,
           total: tansho + batan + fuku*100 + tan*100 };
}

// ── ◎抜け判定（他の印馬最高ptより7pt以上高ければ「抜け」）
function isHonmeiDetached(horses) {
  const honmei = horses.find(h => h.mark === '◎');
  if (!honmei || honmei.totalPt == null) return false;
  const othersWithMark = horses.filter(h => h.mark && h.mark !== '◎' && h.totalPt != null);
  if (othersWithMark.length === 0) return false;
  const secondBest = Math.max(...othersWithMark.map(h => parseFloat(h.totalPt) || 0));
  return (parseFloat(honmei.totalPt) - secondBest) >= 7;
}

// n頭から2頭選ぶ組み合わせ数
function comb2(n) { return n >= 2 ? Math.floor(n * (n - 1) / 2) : 0; }

// 1頭軸モードの投資額（単勝 + 馬単◎流し + 三連複1頭軸）
function calcInvestmentJiku(horses) {
  const opponents = horses.filter(h => h.mark && h.mark !== '◎' && ['○','▲','☆','△'].includes(h.mark));
  const N = opponents.length;
  const pts = comb2(N);
  return { total: 100 + N * 100 + pts * 100, jiku: '1', pts, opponentCount: N };
}

// ◎○2頭抜け判定（min(◎,○) − 3位pt ≥ 7）
function isTop2Detached(horses) {
  const honmei = horses.find(h => h.mark === '◎');
  const taikou = horses.find(h => h.mark === '○');
  if (!honmei || !taikou || honmei.totalPt == null || taikou.totalPt == null) return false;
  const minTop2 = Math.min(parseFloat(honmei.totalPt)||0, parseFloat(taikou.totalPt)||0);
  const others = horses.filter(h => h.mark && !['◎','○'].includes(h.mark) && h.totalPt != null);
  if (others.length === 0) return false;
  const top3rd = Math.max(...others.map(h => parseFloat(h.totalPt) || 0));
  return (minTop2 - top3rd) >= 7;
}

// 2頭軸モードの投資額（単勝 + 馬連◎○ + 馬単◎○マルチ + 三連複2頭軸 + 三連単2頭軸マルチ）
function calcInvestment2jiku(horses) {
  const opponents = horses.filter(h => ['▲','☆','△'].includes(h.mark||''));
  const N = opponents.length;
  // 単勝100 + 馬連100 + 馬単200 + 三連複N×100 + 三連単6N×100
  return { total: 100 + 100 + 200 + N * 100 + 6 * N * 100, jiku: '2', pts3renpuku: N, pts3rentan: 6 * N, opponentCount: N };
}

function renderResult(data, notes) {
  const res = data.result;
  if (!res) return '';
  const isHit = res.hitFlag;
  const r = data.race || {};
  const medals = ['🥇','🥈','🥉'];
  const markClsMap = {'◎':'mark-◎','○':'mark-○','▲':'mark-▲','☆':'mark-☆','△':'mark-△','×':'mark-×'};
  const numMark = {};
  (data.horses||[]).forEach(h => { if(h.mark) numMark[h.num] = h.mark; });

  // 馬番→馬名マップ（data.horsesから引き当て）
  const numToName = {};
  (data.horses||[]).forEach(h => { if(h.num) numToName[h.num] = h.name || ''; });

  // 馬名→人気マップ（data.horsesから引き当て、なければnotes.horsesにフォールバック）
  const namePopMap = {};
  (data.horses||[]).forEach(h => { if(h.name && h.popularity) namePopMap[h.name] = h.popularity; });
  if (notes && notes.horses) {
    Object.entries(notes.horses).forEach(([n, v]) => {
      if (v && v.popularity && !namePopMap[n]) namePopMap[n] = v.popularity;
    });
  }

  // 着順リスト
  const orderRows = (res.top3||[]).map((h,i) => {
    const mk = numMark[h.num] || '';
    const wc = h.num ? `waku-${Math.min(h.gate||Math.ceil(h.num/2),8)}` : '';
    const rankBadgeCls = ['order-1st','order-2nd','order-3rd'][i] || 'order-other';
    const name = h.name || numToName[h.num] || '';
    const pop = namePopMap[name];
    const popHtml = pop ? `<span class="result-popularity">${pop}番人気</span>` : '';
    return `<div class="result-order-row">
      <span class="result-medal">${medals[i]||''}</span>
      <span class="result-num-badge ${wc}" style="font-size:11px;">${h.num}</span>
      <span class="result-mark ${mk ? markClsMap[mk] : ''}">${mk||'　'}</span>
      <span class="result-horse-name">${esc(name)}</span>
      ${popHtml}
      <span class="result-rank-badge ${rankBadgeCls}">${i+1}着</span>
    </div>`;
  }).join('');

  // 払い戻し（hitBetsと照合してゴールドハイライト）
  const BET_ALIASES = {
    '単勝':['単勝'],'馬単':['馬単'],'馬連':['馬連'],
    '複勝':['複勝'],'枠連':['枠連'],'ワイド':['ワイド'],
    '三連複':['三連複','３連複','3連複'],'三連単':['三連単','３連単','3連単'],
  };
  const hitSet = new Set((res.hitBets||[]).flatMap(b => BET_ALIASES[b]||[b]));
  const isPayoutHit = key => [...hitSet].some(alias => key.replace(/\s/g,'').startsWith(alias));
  const payoutRows = Object.entries(res.payouts||{}).map(([k,v]) => {
    const hit = isPayoutHit(k);
    return `<div class="result-payout-row${hit?' is-hit':''}">
      <span class="result-payout-type">${esc(k)}</span>
      <span class="result-payout-amt">${esc(v)}</span>
    </div>`;
  }).join('');

  // 回収率（3分岐で投資額を自動選択）
  const inv = isHonmeiDetached(data.horses || [])
    ? calcInvestmentJiku(data.horses || [])
    : isTop2Detached(data.horses || [])
      ? calcInvestment2jiku(data.horses || [])
      : calcInvestment(data.horses || []);
  const rtn = res.returnAmount || 0;
  const pct = inv.total > 0 ? Math.round(rtn / inv.total * 100) : 0;
  const kaishuriHtml = '';

  // 的中バナー内容
  const hitBetsLine = (res.hitBets||[]).map(b =>
    `<span class="result-hit-bet">✅ ${esc(b)}的中</span>`
  ).join('');

  if (isHit) {
    return `<div class="result-wrap">
      <div class="result-banner-hit">
        <span style="font-size:20px;">🎯</span>
        <span class="result-banner-title">UG予想 的中！</span>
      </div>
      ${hitBetsLine ? `<div class="result-hit-bets-banner">${hitBetsLine}</div>` : ''}
      <div class="result-order-head">${esc(r.name||'')} ${esc(r.grade||'')} 着順</div>
      <div class="result-order-list">${orderRows}</div>
      ${payoutRows ? `<div class="result-payout-head">払い戻し</div><div class="result-payout-list">${payoutRows}</div>` : ''}
      ${kaishuriHtml}
      ${res.note ? `<div class="result-note-wrap">${esc(res.note)}</div>` : ''}
    </div>`;
  } else {
    return `<div class="result-wrap">
      <div class="result-banner-miss">
        <span style="font-size:18px;">❌</span>
        <span class="result-banner-title" style="color:var(--muted);font-size:14px;">不的中</span>
      </div>
      <div class="result-order-head">${esc(r.name||'')} ${esc(r.grade||'')} 着順</div>
      <div class="result-order-list">${orderRows}</div>
      ${payoutRows ? `<div class="result-payout-head">払い戻し</div><div class="result-payout-list">${payoutRows}</div>` : ''}
      ${kaishuriHtml}
      ${res.note ? `<div class="result-note-wrap">${esc(res.note)}</div>` : ''}
    </div>`;
  }
}

      const opMarks  = opponents.map(h => h.mark).join('');
      const N        = opponents.length;

      const banner = `<div class="jiku-detect-banner">

        + (bets['三連単1着固定'] ? betRow('三連単1着固定', bets['三連単1着固定']) : '');
    }

      const opponents = allHorses.filter(h => ['▲','☆','△'].includes(h.mark||''));
      const opMarks  = opponents.map(h => h.mark).join('');
      const N        = opponents.length;
      const top3rd   = Math.max(...opponents.map(h => parseFloat(h.totalPt)||0));
      const minTop2  = Math.min(parseFloat(honmei.totalPt)||0, parseFloat(taikou.totalPt)||0);

      const banner = `<div class="jiku-detect-banner jiku-2-banner">
