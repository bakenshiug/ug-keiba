<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏆 WIN5 勝ち馬抽出 4/19 | UG競馬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#06080f;--bg2:#0d0820;--bg3:#06080f;
  --gold:#f0c040;--gold-dk:#c8890a;--gold-lt:#fde68a;
  --card:rgba(255,255,255,.06);--border:rgba(240,192,64,.18);
  --text:#fff;--muted:rgba(255,240,200,.65);
}
html,body{background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;}

/* ── WIN5ヘッダー ── */
.page-header{
  background:linear-gradient(135deg,#0a0616,#1a0a30,#0a0616);
  border-bottom:2px solid rgba(240,192,64,.4);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 24px rgba(200,140,10,.3);
}
.win5-badge{
  font-size:12px;font-weight:900;padding:4px 10px;border-radius:6px;
  background:linear-gradient(135deg,#f0c040,#d4a010);color:#1a0800;
  letter-spacing:.12em;flex-shrink:0;
  box-shadow:0 0 10px rgba(240,192,64,.4);
}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:700;color:#fff;
  text-decoration:none;padding:5px 10px;border-radius:8px;
  border:1px solid rgba(240,192,64,.4);white-space:nowrap;flex-shrink:0;
}
.page-title{font-size:15px;font-weight:900;color:#f0c040;letter-spacing:.06em;}
.page-sub{font-size:10px;color:rgba(255,230,140,.7);margin-top:1px;}

/* ── WIN5サマリーバー ── */
.win5-summary-bar{
  padding:10px 12px;
  background:linear-gradient(135deg,rgba(240,192,64,.06),rgba(180,100,10,.06));
  border-bottom:1px solid rgba(240,192,64,.2);
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.win5-sb-label{
  font-size:9px;font-weight:900;letter-spacing:.08em;
  color:rgba(240,192,64,.6);white-space:nowrap;flex-shrink:0;
  text-transform:uppercase;
}
.win5-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 9px;border-radius:20px;cursor:pointer;
  border:1px solid rgba(240,192,64,.25);
  background:rgba(240,192,64,.06);
  transition:all .15s;
  font-size:11px;
}
.win5-chip:active,.win5-chip:hover{background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.5);}
.win5-chip.active{background:rgba(240,192,64,.18);border-color:rgba(240,192,64,.7);box-shadow:0 0 8px rgba(240,192,64,.2);}
.win5-chip-leg{font-size:8px;font-weight:900;color:rgba(240,192,64,.7);letter-spacing:.04em;flex-shrink:0;}
.win5-chip-horse{font-weight:900;color:#fff;}
.win5-chip-loading{font-size:9px;color:rgba(255,200,100,.4);font-style:italic;}

/* ── タブ ── */
.tab-bar{
  display:flex;gap:0;
  background:rgba(0,0,0,.35);
  border-bottom:2px solid rgba(240,192,64,.15);
  position:sticky;top:57px;z-index:100;
  overflow-x:auto;
}
.tab-btn{
  flex:1;min-width:80px;padding:9px 6px 8px;
  font-size:11px;font-weight:700;color:var(--muted);
  background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .18s;letter-spacing:.03em;
  text-align:center;white-space:nowrap;
}
.tab-btn.active{
  color:#fff;
  border-bottom:3px solid var(--gold);
  background:rgba(240,192,64,.09);
}
.tab-btn .tab-leg{
  display:block;font-size:8px;font-weight:900;
  color:rgba(240,192,64,.5);letter-spacing:.06em;margin-bottom:2px;
}
.tab-btn.active .tab-leg{color:rgba(240,192,64,.85);}
.tab-btn .tab-grade{
  font-size:8px;font-weight:900;
  padding:1px 4px;border-radius:3px;margin-right:3px;
  vertical-align:middle;
}

/* グレードバッジ */
.grade-g1{background:linear-gradient(135deg,#f0c040,#d4a010);color:#1a1000;}
.grade-g2{background:linear-gradient(135deg,#e0b0d0,#c080a0);color:#2a0a1a;}
.grade-g3{background:linear-gradient(135deg,#80c090,#3a7050);color:#fff;}
.grade-l{background:linear-gradient(135deg,#7ab8e0,#4a90c0);color:#fff;}
.grade-3c{background:linear-gradient(135deg,#a0a0c0,#606080);color:#fff;}

/* ── WIN5コレクション（上位3頭） ── */
.win5-collection{
  margin:10px 12px 0;
  padding:12px 14px;
  background:linear-gradient(135deg,rgba(240,192,64,.04),rgba(180,100,10,.04));
  border:1px solid rgba(240,192,64,.18);
  border-radius:12px;
}
.win5-col-title{
  font-size:10px;font-weight:900;letter-spacing:.08em;
  color:rgba(240,192,64,.7);text-transform:uppercase;
  margin-bottom:8px;
}
.win5-col-horses{display:flex;gap:8px;flex-wrap:wrap;}
.win5-col-horse{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(240,192,64,.15);
  flex-shrink:0;
}
.win5-col-mark{
  font-size:15px;font-weight:900;flex-shrink:0;
}
.win5-col-name{
  font-family:'Noto Serif JP',serif;
  font-size:12px;font-weight:900;color:#fff;
}
.win5-col-score{
  font-size:9px;font-weight:700;
  color:rgba(240,192,64,.6);
  white-space:nowrap;
}

/* ── レース情報 ── */
.race-info{
  padding:10px 16px;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid rgba(240,192,64,.12);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.race-info-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:900;color:#fff;}
.race-info-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.horse-count{
  margin-left:auto;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  background:rgba(240,192,64,.1);color:rgba(240,192,64,.85);
  border:1px solid rgba(240,192,64,.2);
}

/* ── 馬カード ── */
.horse-list{padding:12px 12px 80px;}
.horse-card{background:#fff;border:1px solid rgba(200,30,80,.18);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.horse-card:active{border-color:rgba(255,140,185,.4);}
.tokuchuu-banner{margin:6px 0 2px;padding:5px 10px;background:linear-gradient(90deg,#fff7e6,#fff3cd);border:1px solid #f59e0b;border-radius:8px;font-size:11px;font-weight:800;color:#92400e;letter-spacing:.03em;}

/* カードヘッダー */
.card-head{display:flex;flex-direction:column;gap:8px;padding:11px 14px 10px;background:linear-gradient(160deg,#fdf6f9 0%,#f9f0f5 100%);border-bottom:2px solid rgba(200,30,80,.1);}
.card-head-top{display:flex;align-items:center;gap:10px;}
.horse-num{width:38px;height:38px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.horse-num-rank{font-size:15px;font-weight:900;line-height:1;}
.horse-num-mode{font-size:7px;font-weight:700;line-height:1;letter-spacing:.03em;opacity:.85;}
.horse-num.rank1-highlight{box-shadow:0 0 0 2.5px #f59e0b,0 3px 10px rgba(245,158,11,.35);}
.horse-num-zi{background:rgba(232,48,110,.15);color:#c01860;}
.horse-num-sougou{background:linear-gradient(135deg,rgba(252,211,77,.18),rgba(110,231,183,.18));color:#6d28d9;}
.horse-num-tan{background:rgba(252,211,77,.22);color:#b45309;}
.horse-num-fuku{background:rgba(110,231,183,.22);color:#047857;}
.horse-num-ana{background:rgba(167,139,250,.22);color:#6d28d9;}
.horse-num-sf3{background:rgba(251,146,60,.22);color:#c2410c;}
.horse-num-keshi{background:rgba(248,113,113,.12);color:rgba(248,113,113,.7);border:1px solid rgba(248,113,113,.25);}

/* 印バッジ */
.mark-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-size:16px;font-weight:900;flex-shrink:0;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.18);}
.mark-honmei{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;border:2px solid #d97706;}
.mark-taikou{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff;border:2px solid #475569;}
.mark-tantan{background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;border:2px solid #dc2626;}
.mark-hoshi{background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;border:2px solid #9333ea;}
.mark-sankaku{background:linear-gradient(135deg,#6b7280,#4b5563);color:#fff;border:2px solid #374151;font-size:13px;}

/* 枠番バッジ */
.gate-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:30px;height:30px;border-radius:6px;flex-shrink:0;font-weight:900;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.gate-num-main{font-size:13px;line-height:1;}
.gate-frame-sub{font-size:6.5px;line-height:1;opacity:.85;letter-spacing:.02em;}
.gate-1{background:#f0f0f0;color:#333;border:1.5px solid #aaa;}
.gate-2{background:#1a1a1a;color:#fff;border:1.5px solid #555;}
.gate-3{background:#dc2626;color:#fff;border:1.5px solid #b91c1c;}
.gate-4{background:#2563eb;color:#fff;border:1.5px solid #1e40af;}
.gate-5{background:#fbbf24;color:#333;border:1.5px solid #d97706;}
.gate-6{background:#16a34a;color:#fff;border:1.5px solid #166534;}
.gate-7{background:#ea580c;color:#fff;border:1.5px solid #c2410c;}
.gate-8{background:#f472b6;color:#fff;border:1.5px solid #db2777;}
.horse-num-uma{background:rgba(99,102,241,.15);color:#4338ca;border:1px solid rgba(99,102,241,.3);}
.horse-num-mark-sort{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(236,72,153,.15));color:#d97706;border:1px solid rgba(245,158,11,.4);}

.horse-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:900;color:#1a0a10;flex:1;min-width:0;letter-spacing:.02em;line-height:1.2;}
.horse-name.rank1-name{color:#92400e;font-size:17px;}

.badge-groups{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.badge-group{display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;}
.badge-group-label{font-size:7px;font-weight:900;letter-spacing:.6px;color:rgba(0,0,0,.22);white-space:nowrap;min-width:22px;text-align:right;padding-top:3px;flex-shrink:0;}
.badge-group-label.lbl-blood{color:rgba(180,83,9,.45);}
.badge-group-label.lbl-ability{color:rgba(4,120,87,.45);}
.badge-group-label.lbl-apt{color:rgba(37,99,235,.38);}
.badge-group-label.lbl-cond{color:rgba(192,24,96,.4);}
.badge-group-label.lbl-state{color:rgba(109,40,217,.4);}
/* 脚質名ラベルカラー（逃げ=赤/先行=琥珀/中団=青/差し=紫/後方=灰/追込=スレート） */
.style-lbl-nige   {background:#fee2e2!important;color:#991b1b!important;border-right-color:#fca5a5!important;}
.style-lbl-senkou {background:#fef3c7!important;color:#92400e!important;border-right-color:#fcd34d!important;}
.style-lbl-chutan {background:#dbeafe!important;color:#1e40af!important;border-right-color:#93c5fd!important;}
.style-lbl-sashi  {background:#ede9fe!important;color:#5b21b6!important;border-right-color:#c4b5fd!important;}
.style-lbl-koho   {background:#f3f4f6!important;color:#374151!important;border-right-color:#d1d5db!important;}
.style-lbl-oikomi {background:#f1f5f9!important;color:#334155!important;border-right-color:#94a3b8!important;}
.badge-group-label.lbl-lap{color:rgba(6,148,162,.5);}
.badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}

.odds-tag{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:0px;padding:4px 7px;border-radius:8px;background:rgba(192,24,96,.06);border:1px solid rgba(192,24,96,.12);}
.odds-pop{font-size:9px;font-weight:900;color:#c01860;letter-spacing:.03em;white-space:nowrap;}
.odds-val{font-size:14px;font-weight:900;color:#1a0a10;letter-spacing:.01em;white-space:nowrap;}
.odds-na{font-size:10px;color:#bbb;font-style:italic;}

/* ZI能力値バッジ */
.zi-badge{font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px;white-space:nowrap;letter-spacing:.04em;}
.zi-s{background:#fef3c7;color:#92400e;border:1px solid #f59e0b;}
.zi-a{background:#d1fae5;color:#065f46;border:1px solid #34d399;}
.zi-b{background:#dbeafe;color:#1e40af;border:1px solid #60a5fa;}
.zi-c{background:#ffe4e6;color:#9f1239;border:1px solid #fb7185;}
.zi-d{background:#f3f4f6;color:#9ca3af;border:1px solid #d1d5db;}

/* 血統グレードバッジ */
.blood-grade{font-size:9px;font-weight:900;padding:2px 6px;border-radius:5px;white-space:nowrap;letter-spacing:.03em;}
.bg-3s{background:#f59e0b;color:#1c0a00;border:1px solid #b45309;font-weight:900;}
.bg-2s,.bg-s{background:#fef3c7;color:#92400e;border:1px solid #f59e0b;}
.bg-1s{background:#fffbeb;color:#b45309;border:1px solid #fcd34d;}
.bg-3a{background:#10b981;color:#022c22;border:1px solid #059669;font-weight:900;}
.bg-2a,.bg-a{background:#d1fae5;color:#065f46;border:1px solid #34d399;}
.bg-1a{background:#ecfdf5;color:#166534;border:1px solid #86efac;}
.bg-3b{background:#60a5fa;color:#172554;border:1px solid #2563eb;font-weight:900;}
.bg-2b,.bg-b{background:#dbeafe;color:#1e40af;border:1px solid #60a5fa;}
.bg-1b{background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;}
.bg-3c{background:#fb7185;color:#4c0519;border:1px solid #e11d48;font-weight:900;}
.bg-2c,.bg-c{background:#ffe4e6;color:#9f1239;border:1px solid #fb7185;}
.bg-1c{background:#fff1f2;color:#be123c;border:1px solid #fda4af;}
.bg-d{background:#f3f4f6;color:#9ca3af;border:1px solid #d1d5db;}
.bg-n{background:#f9fafb;color:#d1d5db;border:1px solid #e5e7eb;}
.bg-analyzing{background:#f3f4f6;color:#9ca3af;border:1px solid #e5e7eb;font-style:italic;letter-spacing:.01em;}
.bg-age-fixed{background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc;font-weight:700;}

/* デュアルバッジ */
.dual-badge{display:inline-flex;align-items:stretch;border-radius:5px;overflow:hidden;white-space:nowrap;font-size:9px;font-weight:900;border:1px solid #d1d5db;}
.dual-lbl{display:flex;align-items:center;padding:0 5px;background:#f3f4f6;color:#6b7280;font-size:8px;font-weight:700;border-right:1px solid #d1d5db;}
.dual-t,.dual-f{display:flex;align-items:center;padding:2px 5px;gap:1px;}
.dual-t{border-right:1px solid #e5e7eb;}
.dual-t::before{content:'単';font-size:7px;opacity:.6;font-weight:700;}
.dual-f::before{content:'複';font-size:7px;opacity:.6;font-weight:700;}

/* スコアバー */
.score-bars{display:flex;flex-direction:column;gap:4px;padding:7px 12px;background:#f5eff3;border-radius:8px;border:1px solid rgba(200,30,80,.13);border-top:2px solid rgba(200,30,80,.15);}
.score-row{display:flex;align-items:center;gap:6px;}
.score-lbl{font-size:9px;font-weight:900;width:14px;text-align:center;flex-shrink:0;}
.score-lbl.tan-lbl{color:#b45309;}
.score-lbl.fuku-lbl{color:#047857;}
.score-track{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;min-width:0;}
.score-fill{height:100%;border-radius:3px;transition:width .3s;}
.score-fill.tan-fill{background:linear-gradient(90deg,#d97706,#fcd34d);}
.score-fill.fuku-fill{background:linear-gradient(90deg,#059669,#6ee7b7);}
.score-fill.ana-fill{background:linear-gradient(90deg,#7c3aed,#c4b5fd);}
.score-fill.sougo-fill{background:linear-gradient(90deg,#ea580c,#fb923c);}
.score-val{font-size:9px;font-weight:900;width:36px;text-align:right;flex-shrink:0;}
.score-val.tan-val{color:#b45309;}
.score-val.fuku-val{color:#047857;}
.score-rank{font-size:9px;font-weight:900;width:24px;text-align:center;flex-shrink:0;color:#ccc;}
.score-rank.rk1{color:#92400e;background:#fef3c7;border-radius:4px;padding:1px 3px;font-size:8px;}
.score-rank.rk2{color:#6b7280;}
.score-rank.rk3{color:#b45309;}

/* 買い目 */
.bet-section{margin:10px 12px;padding:14px 16px;background:#fff;border:1.5px solid rgba(232,19,110,.35);border-radius:12px;}
.bet-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;border-bottom:1px solid rgba(232,19,110,.2);padding-bottom:10px;}
.bet-race-type{font-size:11px;font-weight:900;padding:4px 10px;border-radius:20px;color:#fff;letter-spacing:.5px;background:#E8136E;}
.bet-title{font-size:13px;font-weight:700;color:#E8136E;}
.bet-total{margin-left:auto;font-size:11px;font-weight:700;color:rgba(180,0,80,.7);}
.bet-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(232,19,110,.12);flex-wrap:wrap;}
.bet-row:last-child{border-bottom:none;}
.bet-type{font-size:12px;font-weight:900;padding:3px 10px;border-radius:20px;background:#E8136E;color:#fff;white-space:nowrap;min-width:44px;text-align:center;}
.bet-horses{font-size:13px;font-weight:700;color:#222;flex:1;}
.bet-points{font-size:11px;font-weight:900;color:rgba(180,0,80,.7);white-space:nowrap;}
.bet-note{font-size:10px;color:rgba(180,0,80,.7);width:100%;padding-left:2px;}
.bet-optional-note{font-size:11px;font-weight:600;color:#7c3aed;width:100%;padding:4px 8px;margin-top:2px;background:rgba(124,58,237,.07);border-left:3px solid rgba(124,58,237,.4);border-radius:0 4px 4px 0;}
.bet-row-detail{flex-direction:column;align-items:stretch;gap:6px;padding:10px 0;}
.bet-row-top{display:flex;align-items:center;gap:8px;}
.bet-note-inline{font-size:10px;color:rgba(180,0,80,.7);margin-left:auto;}
.bet-formation-rows{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.bet-formation-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bet-chakuban{font-size:11px;font-weight:900;color:#E8136E;white-space:nowrap;min-width:40px;}
.bet-horse-chips{display:flex;flex-wrap:wrap;gap:4px;}
.bet-horses-detail{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 10px;background:rgba(232,19,110,.08);border-radius:6px;}
.bet-jiku{font-size:12px;font-weight:900;color:#E8136E;white-space:nowrap;}
.bet-arrow{font-size:14px;color:rgba(232,19,110,.6);flex-shrink:0;}
.bet-aite-chips{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.bet-horse-chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(232,19,110,.12);border:1px solid rgba(232,19,110,.5);color:#c01060;white-space:nowrap;}

/* ソートバー */
.sort-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(240,192,64,.1);flex-wrap:wrap;}
.sort-bar-label{font-size:9px;font-weight:700;color:rgba(240,192,64,.5);white-space:nowrap;}
.sort-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;border:1px solid rgba(240,192,64,.2);background:rgba(255,255,255,.04);color:rgba(240,220,140,.5);cursor:pointer;white-space:nowrap;}
.sort-btn.active{background:rgba(240,192,64,.18);border-color:rgba(240,192,64,.4);color:#fff;}
.sort-btn.ana-btn{border-color:rgba(167,139,250,.35);color:rgba(196,181,253,.7);}

<script>
const RACES = [

  { file: 'data/race-notes/2026-04-19-nakayama-10r.json',  label: '京葉S',   gradeCls: 'grade-l',  meta: '中山10R ダ1200m 15頭',   leg: 'WIN2' },
  { file: 'data/race-notes/2026-04-19-fukushima-11r.json', label: '福島牝馬S',gradeCls: 'grade-g3', meta: '福島11R 芝1800m外 16頭',  leg: 'WIN3' },
  { file: 'data/race-notes/2026-04-19-hanshin-11r.json',   label: '立雲峡S', gradeCls: 'grade-3c', meta: '阪神11R 芝1200m 10頭',  leg: 'WIN4' },
  { file: 'data/race-notes/2026-04-19-nakayama-11r.json',  label: '皐月賞',  gradeCls: 'grade-g1', meta: '中山11R 芝2000m内 18頭',  leg: 'WIN5' },
];

let allData = [];
let currentIdx = 0;

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function ziGrade(zi) {
  if (!zi) return 'D';
  if (zi >= 120) return 'S';
  if (zi >= 110) return 'A';
  if (zi >= 100) return 'B';
  if (zi >= 90)  return 'C';
  return 'D';
}

function extGrade(fac, surface) {
  if (!fac || fac === '在厩調整') return 'C';
  const isDirt = surface === 'ダ';
  if (isDirt) {
    if (fac.includes('チャンピオン') || fac.includes('しがらき')) return 'S';
    if (fac.includes('天栄') || fac.includes('宇治田原') ||
        fac.includes('山元')  || fac.includes('キャニオン') || fac.includes('大山ヒルズ')) return 'A';
    if (fac.includes('優楽') || fac.includes('山岡') || fac.includes('ヒイラギ')) return 'C';
    return 'B';
  } else {
    if (fac.includes('天栄') || fac.includes('しがらき')) return 'S';
    if (fac.includes('チャンピオン') || fac.includes('大山ヒルズ') ||
        fac.includes('山元')        || fac.includes('社台ファーム') ||
        fac.includes('社台F'))       return 'A';
    if (fac.includes('宇治田原') || fac.includes('キャニオン')) return 'B';
    if (fac.includes('優楽') || fac.includes('山岡') || fac.includes('ヒイラギ')) return 'C';
    return 'B';
  }
}

function raceTargetBadge(t) {
  if (t === 'derby')   return `<span class="rt-badge rt-derby">🔵 ダービー狙い</span>`;
  if (t === 'both')    return `<span class="rt-badge rt-both">🟡 両睨み</span>`;
  if (t === 'satsuki') return `<span class="rt-badge rt-satsuki">🔴 皐月賞本気</span>`;
  return '';
}

function extBadge(fac) {
  if (!fac || fac === '在厩調整') return `<span class="ext-badge ext-zaiku">在厩調整</span>`;
  if (fac.includes('天栄'))       return `<span class="ext-badge ext-northern-tei">${esc(fac)}</span>`;
  if (fac.includes('しがらき'))   return `<span class="ext-badge ext-northern-shi">${esc(fac)}</span>`;
  if (fac.includes('チャンピオン'))return `<span class="ext-badge ext-champion">${esc(fac)}</span>`;
  if (fac.includes('山元'))       return `<span class="ext-badge ext-yamamoto">${esc(fac)}</span>`;
  if (fac.includes('キャニオン')) return `<span class="ext-badge ext-canyon">${esc(fac)}</span>`;
  if (fac.includes('エスティ'))   return `<span class="ext-badge ext-esutei">${esc(fac)}</span>`;
  return `<span class="ext-badge ext-other">${esc(fac)}</span>`;
}

// 馬格グレード：prevWeight + sex から自動計算（牝馬は+20kg補正）
function prevWeightGrade(w, sex) {
  if (!w) return null;
  const ww = w + (sex === '牝' ? 20 : 0);
  if (ww >= 500) return 'S';
  if (ww >= 480) return 'A';
  if (ww >= 460) return 'B';
  if (ww >= 440) return 'C';
  return 'D';
}

function ziGradeBadge(zi) {
  const g = ziGrade(zi);
  return `<span class="zi-badge zi-${g.toLowerCase()}">能力${g}</span>`;
}

const GRADE_MAPS = {
  zi:    {S:['S','A'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  ext:   {S:['A','S'], A:['B','A'], B:['C','B'], C:['D','C']},
  kinso: {
    '3S':['S','S'],'2S':['S','A'],'1S':['A','S'],
    '3A':['A','A'],'2A':['A','B'],'1A':['B','A'],
    '3B':['B','B'],'2B':['C','B'],'1B':['C','C'],
    '3C':['D','C'],'2C':['D','D'],'1C':['D','D'],
    'S':['S','S'],'A':['A','A'],'B':['B','A'],'C':['D','C'],'D':['D','D']
  },
  pace:  {S:['S','A'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  body:  {S:['A','S'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  course:{S:['A','S'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  style: {S:['S','A'], A:['A','A'], B:['C','B'], C:['D','C'], D:['D','D']},
  weightChange:{S:['S','A'],A:['A','A'],B:['C','B'],C:['D','C'],D:['D','D']},
};

function splitGrade(g, key) {
  if (!g || g === '—') return [null, null];
  if (GRADE_MAPS[key] && GRADE_MAPS[key][g]) return GRADE_MAPS[key][g];
  return g ? [g, g] : [null, null];
}

function gradePoints(g) {
  const pts = {
    '3S':12,'2S':11,'1S':10,'3A':9,'2A':8,'1A':7,'3B':6,'2B':5,'1B':4,'3C':3,'2C':2,'1C':1,'D':0,
    'S':11,'A':8,'B':5,'C':2
  };
  return g != null ? (pts[g] ?? null) : null;
}
function gradeMax() { return 12; }

function calcScores(h, surface) {
  const [ziT,ziF]   = splitGrade(ziGrade(h.sabcZI),'zi');
  const [exT,exF]   = splitGrade(extGrade(h.extFacility,surface),'ext');
  const kT = h.kinsoGrade ?? null, kF = h.kinsoGrade ?? null;
  const [pT,pF]     = splitGrade(h.paceGrade,'pace');
  const resolvedBodyGrade = h.bodyGrade ?? prevWeightGrade(h.prevWeight, h.sex);
  const [bdT,bdF]   = splitGrade(resolvedBodyGrade,'body');
  const [cT,cF]     = splitGrade(h.courseGrade,'course');
  const [syT,syF]   = splitGrade(h.styleGrade,'style');
  const srT  = h.sireGradeTan     ?? null, srF  = h.sireGradeFuku    ?? null;
  const dsT  = h.damSireGradeTan  ?? null, dsF  = h.damSireGradeFuku ?? null;
  const sr2T = h.sireGrade2Tan    ?? 'B',  sr2F = h.sireGrade2Fuku   ?? 'B';
  const ds2T = h.damSireGrade2Tan ?? 'B',  ds2F = h.damSireGrade2Fuku?? 'B';
  const bT  = (h.bloodGradeTan  && h.bloodGradeTan  !== '—') ? h.bloodGradeTan  : null;
  const bF  = (h.bloodGradeFuku && h.bloodGradeFuku !== '—') ? h.bloodGradeFuku : null;
  const stT = h.stableGradeTan  ?? null, stF = h.stableGradeFuku ?? null;
  const brT = h.breederGradeTan  ?? null, brF = h.breederGradeFuku ?? null;
  const jkT = h.jockeyGradeTan  ?? null, jkF = h.jockeyGradeFuku ?? null;
  const gtT = h.gateGradeTan    ?? null, gtF = h.gateGradeFuku   ?? null;
  const hnT = h.horseNumGradeTan  ?? null, hnF = h.horseNumGradeFuku ?? null;
  const cbT = h.comboGradeTan    ?? null, cbF = h.comboGradeFuku   ?? null;
  const spT = h.specialGradeTan  ?? h.specialGrade ?? null;
  const spF = h.specialGradeFuku ?? h.specialGrade ?? null;
  const agT = h.ageGradeTan    ?? null, agF = h.ageGradeFuku   ?? null;
  const rtT = h.rotGradeTan    ?? null, rtF = h.rotGradeFuku   ?? null;
  const s3T = h.sf3GradeTan    ?? null, s3F = h.sf3GradeFuku   ?? null;
  const lpT = h.lapGradeTan    ?? null, lpF = h.lapGradeFuku   ?? null;
  const pmT = h.prevMarginGradeTan  ?? null, pmF = h.prevMarginGradeFuku ?? null;
  const cdT = h.conditionGradeTan  ?? null, cdF = h.conditionGradeFuku ?? null;
  const smT = h.somaGradeTan  ?? null, smF = h.somaGradeFuku ?? null;
  const tgtT = h.raceTargetGradeTan  ?? null, tgtF = h.raceTargetGradeFuku ?? null;
  const fwT  = h.finalWorkoutGradeTan  ?? null, fwF  = h.finalWorkoutGradeFuku ?? null;
  const hgT  = h.haigoGradeTan  ?? null, hgF  = h.haigoGradeFuku ?? null;
  const pxT  = h.paradoxGradeTan  ?? null, pxF  = h.paradoxGradeFuku ?? null;
  const coT  = h.commentGradeTan  ?? null, coF  = h.commentGradeFuku ?? null;
  const [wcT,wcF] = splitGrade(h.weightChangeGrade,'weightChange');
  const pcT  = h.prevCourseGradeTan  ?? null, pcF  = h.prevCourseGradeFuku ?? null;
  const chT  = h.charGradeTan  ?? null, chF  = h.charGradeFuku ?? null;  // 適性/キャラ
  const prT  = h.pastRaceGradeTan  ?? null, prF  = h.pastRaceGradeFuku ?? null;
  const gkT  = h.gekisouGradeTan  ?? null, gkF  = h.gekisouGradeFuku ?? null;
  const lhcT = h.lapHotCornerGrade ?? null, lhcF = h.lapHotCornerGrade ?? null;
  const lgrT = h.lapGoldenRatioGrade ?? null, lgrF = h.lapGoldenRatioGrade ?? null;
  const lttT = h.lapTotalTimeGrade ?? null, lttF = h.lapTotalTimeGrade ?? null;
  const sm2T = h.soma2GradeTan  ?? null, sm2F = h.soma2GradeFuku ?? null;
  const gbT  = h.ginyoBonusGradeTan  ?? null, gbF  = h.ginyoBonusGradeFuku ?? null;

  let tanScore=0,tanMax=0,fukuScore=0,fukuMax=0;
  for (const g of [ziT,exT,srT,dsT,sr2T,ds2T,bT,kT,pT,stT,bdT,cT,syT,brT,jkT,gtT,hnT,cbT,spT,agT,rtT,s3T,cdT,smT,lpT,pmT,tgtT,fwT,hgT,pxT,coT,wcT,pcT,chT,lhcT,lgrT,lttT,sm2T,gbT]) {
    const p=gradePoints(g); if(p!==null){tanScore+=p;tanMax+=gradeMax();}
  }
  for (const g of [ziF,exF,srF,dsF,sr2F,ds2F,bF,kF,pF,stF,bdF,cF,syF,brF,jkF,gtF,hnF,cbF,spF,agF,rtF,s3F,cdF,smF,lpF,pmF,tgtF,fwF,hgF,pxF,coF,wcF,pcF,chF,lhcF,lgrF,lttF,sm2F,gbF]) {
    const p=gradePoints(g); if(p!==null){fukuScore+=p;fukuMax+=gradeMax();}
  }
  const prPtsT=gradePoints(prT); if(prPtsT!==null){tanScore+=prPtsT*3;tanMax+=gradeMax()*3;}
  const prPtsF=gradePoints(prF); if(prPtsF!==null){fukuScore+=prPtsF*3;fukuMax+=gradeMax()*3;}
  const gkPtsT=gradePoints(gkT); if(gkPtsT!==null){tanScore+=gkPtsT*2;tanMax+=gradeMax()*2;}
  const gkPtsF=gradePoints(gkF); if(gkPtsF!==null){fukuScore+=gkPtsF*2;fukuMax+=gradeMax()*2;}
  const ginyoMult = g=>({'S':1.3,'A':1.15,'B':1.0,'C':0.7,'D':1.0}[g]??1.0);
  tanScore  *= ginyoMult(h.ginyoGradeTan  ?? 'B');
  fukuScore *= ginyoMult(h.ginyoGradeFuku ?? 'B');
  return {tanScore,fukuScore,tanMax,fukuMax};
}

function cls(g) {

}

function detectRaceType(byTan) {
  if (byTan.length < 4) return '混戦';
  const bySg = [...byTan].sort((a,b)=>(b.sougouScore??0)-(a.sougouScore??0));
  const pct = s=>s.sougouScore??0;
  const d12=pct(bySg[0])-pct(bySg[1]),d23=pct(bySg[1])-pct(bySg[2]),d34=pct(bySg[2])-pct(bySg[3]);
  if (d12>=0.05)                              return '1強';
  if (d12<0.05&&d23>=0.05)                   return '2強';
  if (d12<0.05&&d23<0.07&&d34>=0.05)         return '3強';
  return '混戦';
}

function pickUnique(lists, counts) {
  const used = new Set();
  return lists.map((list,i) => {
    const picked=[];
    for (const s of list) {
      if (!used.has(s.name)&&picked.length<counts[i]){picked.push(s.name);used.add(s.name);}
    }
    return picked;
  });
}

function generateBets(withAna, headCount) {
  const tanPct  = s=>s.tanMax>0?s.tanScore/s.tanMax:0;
  const fukuPct = s=>s.fukuMax>0?s.fukuScore/s.fukuMax:0;
  const byTan   = [...withAna].sort((a,b)=>tanPct(b)-tanPct(a));
  const byFuku  = [...withAna].sort((a,b)=>fukuPct(b)-fukuPct(a));
  const byAna   = [...withAna].sort((a,b)=>b.anaScore-a.anaScore);
  const raceType=detectRaceType(byTan);
  const bets=[];
  const tan1=byTan[0].name,fuku1=byFuku[0].name;
  const ana1=byAna.find(s=>s.name!==fuku1)?.name??byAna[0].name;
  bets.push({type:'単勝',horses:[tan1],points:1,note:'単勝ランク1位'});
  bets.push({type:'複勝',horses:[fuku1,ana1],points:2,note:'複勝1位 ＋ 穴馬1位'});
  if (raceType==='1強') {
    const pool=withAna.filter(s=>s.name!==tan1);
    const [fg,ag]=pickUnique([pool.sort((a,b)=>fukuPct(b)-fukuPct(a)),pool.sort((a,b)=>b.anaScore-a.anaScore)],[3,3]);
    const aite=[...new Set([...fg,...ag])].slice(0,6);
    const use2ren=(byAna[0]?.h?.expectedOdds??0)>=10?'馬単':'馬連';
    bets.push({type:use2ren,horses:[tan1,...aite],points:use2ren==='馬単'?12:6,note:`軸${tan1} × 相手6頭流し`});
    bets.push({type:'3連単',horses:[tan1,...aite],points:30,note:'1着固定 × 相手6頭流し（30点）'});
  } else if (raceType==='2強') {
    const jiku2=[byTan[0].name,byTan[1].name];
    const [rest]=pickUnique([byFuku.filter(s=>!jiku2.includes(s.name))],[2]);
    bets.push({type:'馬連',horses:[...jiku2,...rest],points:6,note:'4頭ボックス'});
    bets.push({type:'3連複',horses:jiku2,points:headCount-2,note:`軸2頭 × 残り全頭総流し（${headCount-2}点）`});
  } else if (raceType==='3強') {
    const jiku3=[byTan[0].name,byTan[1].name,byTan[2].name];
    const anaH=byAna.find(s=>!jiku3.includes(s.name))?.name;
    bets.push({type:'3連単',horses:[...jiku3,...(anaH?[anaH]:[])],points:24,note:'4頭ボックス（3強＋穴馬1位）'});
  } else {
    const [fg,ag]=pickUnique([byFuku,byAna],[2,2]);
    const box4=[...new Set([...fg,...ag])].slice(0,4);
    bets.push({type:'馬連',horses:box4,points:6,note:'4頭ボックス'});
    const jiku2=[byTan[0].name,byTan[1].name];
    bets.push({type:'3連複',horses:jiku2,points:headCount-2,note:`軸2頭 × 残り全頭総流し（${headCount-2}点）`});
  }
  return {raceType,bets};
}

function renderBetRow(b, numMap) {
  const chip=name=>{const num=numMap?.[name]??'';return`<span class="bet-horse-chip">${num?num+'番 ':''}${name}</span>`;};
  if (b.formation) {
    const rows=Object.entries(b.formation).map(([label,names])=>`<div class="bet-formation-row"><span class="bet-chakuban">${label}</span><div class="bet-horse-chips">${names.map(chip).join('')}</div></div>`).join('');
    return `<div class="bet-row bet-row-detail"><div class="bet-row-top"><span class="bet-type">${b.type}</span><span class="bet-points">${b.points}点</span><div class="bet-note-inline">${b.note}</div></div><div class="bet-formation-rows">${rows}</div></div>`;
  }
  const needsDetail=(b.type==='馬単'||b.type==='馬連'||b.type==='3連単'||b.type==='3連複')&&b.horses.length>2;
  if (needsDetail) {
    const jiku=b.horses[0],aite=b.horses.slice(1);
    const label=b.type==='3連単'?'1着固定':'◎ 軸';
    return `<div class="bet-row bet-row-detail"><div class="bet-row-top"><span class="bet-type">${b.type}</span><span class="bet-points">${b.points}点</span><div class="bet-note-inline">${b.note}</div></div><div class="bet-horses-detail"><span class="bet-jiku">${label}　${jiku}</span><span class="bet-arrow">→</span><div class="bet-aite-chips">${aite.map(chip).join('')}</div></div></div>`;
  }
  return `<div class="bet-row"><span class="bet-type">${b.type}</span><span class="bet-horses">${b.horses.map(chip).join(' ／ ')}</span><span class="bet-points">${b.points}点</span><div class="bet-note">${b.note}</div>${b.optionalNote?`<div class="bet-optional-note">${esc(b.optionalNote)}</div>`:''}</div>`;
}

function buildBetSection(withAna, headCount, d) {
  const customBets=d?.customBets;
  const {raceType,bets:autoBets}=generateBets(withAna,headCount);
  const bets=(customBets&&customBets.length>0)?customBets:autoBets;
  const typeColor={'1強':'#d97706','2強':'#2563eb','3強':'#7c3aed','混戦':'#4b5563'};
  const color=typeColor[raceType]??'#4b5563';
  const totalPoints=bets.reduce((s,b)=>s+b.points,0);
  const numMap={};withAna.forEach(s=>{numMap[s.name]=s.h.num;});
  return `<div class="bet-section"><div class="bet-header"><span class="bet-race-type" style="background:${color};">${raceType}</span><span class="bet-title">🎯 買い目提案</span><span class="bet-total">合計 ${totalPoints}点</span></div>${bets.map(b=>renderBetRow(b,numMap)).join('')}</div>`;
}

function buildSf3Comment(h) {
  const diff=h.prevSF3Diff,rank=h.prevSF3Rank,odds=h.expectedOdds,score=h.sf3AnaScore;
  if (score===null||score===undefined||rank===null) return null;
  const diffInfo=diff===null?null:diff<=0.1?{label:`${diff}差 [0.0-0.1]`,tan:43}:diff<=0.3?{label:`${diff}差 [0.2-0.3]`,tan:78}:diff<=0.5?{label:`${diff}差 [0.4-0.5]`,tan:60}:diff<=0.7?{label:`${diff}差 [0.6-0.7]`,tan:150}:diff<=0.9?{label:`${diff}差 [0.8-0.9]`,tan:31}:diff<=1.2?{label:`${diff}差 [1.0-1.2]`,tan:8}:diff<=1.5?{label:`${diff}差 [1.3-1.5]`,tan:170}:{label:`${diff}差`,tan:0};
  const rankInfo=rank===1?{label:'前走上がり1位',fuku:22.2}:rank===2?{label:'前走上がり2位',fuku:32.9}:rank===3?{label:'前走上がり3位',fuku:22.2}:rank<=5?{label:`前走上がり${rank}位`,fuku:24.5}:{label:`前走上がり${rank}位`,fuku:16.1};
  const tanStar=diffInfo&&diffInfo.tan>=150?'★★':diffInfo&&diffInfo.tan>=100?'★':'';
  const eval_=score>=1.5?'◎ 統計穴馬最上位候補':score>=0.6?'○ 統計穴馬候補':score>=0.2?'▲ やや穴注目':'△ 穴スコア低め';
  return `${diffInfo?diffInfo.label+' 単回'+diffInfo.tan+tanStar:'差不明'} × ${rankInfo.label}（複勝率${rankInfo.fuku}%） × ${odds?odds+'倍':'?倍'} → スコア${score.toFixed(2)}（${eval_}）`;
}

function buildMarkMap(sougouRankMap, anaRankMap, totalHorseCount) {
  const targetCount=Math.floor(totalHorseCount/2);
  const markMap={},assigned=new Set();
  const sougouSorted=Object.keys(sougouRankMap).sort((a,b)=>sougouRankMap[a]-sougouRankMap[b]);
  const anaSorted=Object.keys(anaRankMap).sort((a,b)=>anaRankMap[a]-anaRankMap[b]);
  function assign(horse,mark){markMap[horse]=mark;assigned.add(horse);}
  if (sougouSorted[0]) assign(sougouSorted[0],'◎');
  for (const h of sougouSorted.slice(1)){if(!assigned.has(h)){assign(h,'○');break;}}
  for (const h of sougouSorted.slice(2)){if(!assigned.has(h)){assign(h,'▲');break;}}
  for (const h of anaSorted){if(!assigned.has(h)){assign(h,'⭐');break;}}
  for (const h of sougouSorted){if(assigned.size>=targetCount)break;if(!assigned.has(h))assign(h,'△');}
  return markMap;
}

// WIN5コレクション（単勝スコア上位3頭 ＋ 穴馬1位）
function buildWin5Collection(withAna) {
  const tanPct = s => s.tanMax > 0 ? s.tanScore / s.tanMax : 0;
  const byTan  = [...withAna].sort((a,b) => tanPct(b) - tanPct(a));
  const byAna  = [...withAna].sort((a,b) => b.anaScore - a.anaScore);
  const marks  = ['◎','○','▲'];
  const colors = ['#f59e0b','#94a3b8','#f87171'];
  const items  = byTan.slice(0,3).map((s,i) => `
    <div class="win5-col-horse">
      <span class="win5-col-mark" style="color:${colors[i]}">${marks[i]}</span>
      <span class="win5-col-name">${esc(s.name)}</span>
      <span class="win5-col-score">${Math.round(tanPct(s)*100)}%</span>
    </div>`).join('');
  // 穴馬1位（単勝3位以内と重複しない最上位）
  const anaTop = byAna.find(s => !byTan.slice(0,3).some(t => t.name === s.name));
  const anaChip = anaTop ? `
    <div class="win5-col-horse" style="border-color:rgba(167,139,250,.4);background:rgba(109,40,217,.06);">
      <span class="win5-col-mark" style="color:#a78bfa;">⭐</span>
      <span class="win5-col-name">${esc(anaTop.name)}</span>
      <span class="win5-col-score" style="color:#a78bfa;">穴${anaTop.anaScore.toFixed(1)}</span>
    </div>` : '';
  return `<div class="win5-collection"><div class="win5-col-title">🏆 WIN5 予想印（単勝スコア順）</div><div class="win5-col-horses">${items}${anaChip}</div></div>`;
}

// サマリーバー更新
function updateWin5Summary() {
  allData.forEach(({d}, idx) => {
    const chip = document.querySelector(`.win5-chip[data-leg="${idx}"]`);
    if (!chip) return;
    chip.classList.remove('win5-chip-loading');
    if (!d) {
      chip.innerHTML = `<span class="win5-chip-leg">${RACES[idx].leg}</span><span class="win5-chip-horse" style="color:rgba(255,100,100,.6)">準備中</span>`;
      return;
    }
    const horses=Object.entries(d.horses);
    const surface=d.race?.surface??'芝';
    const scored=horses.map(([name,h])=>({name,h,...calcScores(h,surface)}));
    const withAna=scored.map(s=>({...s,sougouScore:(s.tanMax+s.fukuMax)>0?(s.tanScore+s.fukuScore)/(s.tanMax+s.fukuMax):0}));
    // WIN5は単勝ゲーム → サマリーバーは単勝スコア1位を表示
    const bySg=[...withAna].sort((a,b)=>(b.tanMax>0?b.tanScore/b.tanMax:0)-(a.tanMax>0?a.tanScore/a.tanMax:0));
    const top=bySg[0];
    chip.innerHTML = `<span class="win5-chip-leg">${RACES[idx].leg}</span><span class="win5-chip-horse">${esc(top?.name||'?')}</span>`;
    chip.onclick = () => switchTab(idx);
  });
}

function computeWithAna(d) {
  const horses = Object.entries(d.horses);
  const surface = d.race?.surface ?? '芝';
  const scored = horses.map(([name,h])=>({name,h,...calcScores(h,surface)}));
  return scored.map(s=>{
    const raceTarget=s.h.raceTarget??'';
    const honki={'satsuki':2.0,'both':1.0,'derby':0,'fukushima':2.0,'both_vm':1.0,'vm':0}[raceTarget]??0;
    const gkGrade=s.h.gekisouGradeTan??null;
    const gekisouCoef={'S':3,'A':2,'B':1,'C':0.5}[gkGrade]??0.3;
    const odds=s.h.expectedOdds??5;
    const oddsPt=Math.min(Math.max(Math.log(odds/5)*1.5,0),4.0);
    const haigoBonus={'S':1.0,'A':0.6,'B':0.2,'C':0,'D':-0.3}[s.h.haigoGradeTan??'']??0;
    const paradoxBonus={'S':0.8,'A':0.5,'B':0.2,'C':0,'D':-0.3}[s.h.paradoxGradeTan??'']??0;
    const anaScore=honki*gekisouCoef*(1+oddsPt)+haigoBonus+paradoxBonus;
    const sougouScore=(s.tanMax+s.fukuMax)>0?(s.tanScore+s.fukuScore)/(s.tanMax+s.fukuMax):0;
    const isKeshi=(s.h.ginyoGradeTan==='D')&&(s.h.ginyoGradeFuku==='D');
    return {...s,anaScore,sougouScore,isKeshi};
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[idx]?.classList.add('active');
  document.querySelectorAll('.win5-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.win5-chip[data-leg="${idx}"]`)?.classList.add('active');
  currentIdx=idx;
  renderRace(idx);
}

function renderRace(idx) {
  if (!allData[idx]) return;
  const {cfg,d}=allData[idx];
  if (!d) {
    document.getElementById('content').innerHTML=`<p class="loading" style="color:#f87171">${esc(cfg.label)}のデータを取得できませんでした。準備中です。</p>`;
    return;
  }
  const horses=Object.entries(d.horses);
  const surface=d.race?.surface??'芝';  // 外厩スコア芝/ダ分岐
  const withAna=computeWithAna(d);

  const tanEditRank={},fukuEditRank={};
  (d.sabcRankTan||[]).forEach(item=>{if(item.horse)tanEditRank[item.horse]=item.rank;});
  (d.sabcRankFuku||[]).forEach(item=>{if(item.horse)fukuEditRank[item.horse]=item.rank;});

  const tanPct=s=>s.tanMax>0?s.tanScore/s.tanMax:0;
  const fukuPct=s=>s.fukuMax>0?s.fukuScore/s.fukuMax:0;
  const byTan=[...withAna].sort((a,b)=>tanPct(b)-tanPct(a)||(b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byFuku=[...withAna].sort((a,b)=>fukuPct(b)-fukuPct(a)||(b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byZI=[...withAna].sort((a,b)=>(b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byAna=[...withAna].sort((a,b)=>(a.isKeshi?1:0)-(b.isKeshi?1:0)||b.anaScore-a.anaScore);
  const bySougou=[...withAna].sort((a,b)=>b.sougouScore-a.sougouScore||(b.h.sabcZI||0)-(a.h.sabcZI||0));
  const byUma=[...withAna].sort((a,b)=>(a.h.horseNum||999)-(b.h.horseNum||999));
  const byOdds=[...withAna].sort((a,b)=>(a.h.expectedOdds||999)-(b.h.expectedOdds||999));

  const tanRankMap={},fukuRankMap={},ziRankMap={},anaRankMap={},sougouRankMap={},popularityMap={};
  byTan.forEach(({name},i)=>tanRankMap[name]=i+1);
  byFuku.forEach(({name},i)=>fukuRankMap[name]=i+1);
  byZI.forEach(({name},i)=>ziRankMap[name]=i+1);
  byAna.forEach(({name},i)=>anaRankMap[name]=i+1);
  bySougou.forEach(({name},i)=>sougouRankMap[name]=i+1);
  byOdds.forEach(({name},i)=>popularityMap[name]=i+1);

  const markDeltaTopN=d.race?.markDeltaTopN??null;
  const markTotal=markDeltaTopN?markDeltaTopN*2:horses.length;
  const markMap=markDeltaTopN?buildMarkMap(sougouRankMap,anaRankMap,markTotal):{};
  const MARK_ORDER={'◎':1,'○':2,'▲':3,'⭐':4,'△':5};
  const byMark=markDeltaTopN?[...withAna].sort((a,b)=>{const ao=MARK_ORDER[markMap[a.name]]??9,bo=MARK_ORDER[markMap[b.name]]??9;return ao-bo||b.sougouScore-a.sougouScore;}):byZI;
  markRankMap={};
  byMark.forEach(({name},i)=>markRankMap[name]=i+1);

  let display;
  if(sortMode==='tan')display=byTan;
  else if(sortMode==='fuku')display=byFuku;
  else if(sortMode==='ana')display=byAna;
  else if(sortMode==='sougou')display=bySougou;
  else if(sortMode==='uma')display=byUma;
  else if(sortMode==='mark')display=byMark;
  else display=byZI;

  const {tan:tanCmt,fuku:fukuCmt}=buildCommentMaps(d);
  const anaMax=Math.max(...withAna.map(s=>s.anaScore??0),0.01);
  const cards=display.map(({name,h,tanScore,fukuScore,tanMax,fukuMax,anaScore,sougouScore,isKeshi})=>
    buildHorseCard(name,h,tanScore,fukuScore,tanMax,fukuMax,
      tanRankMap[name],fukuRankMap[name],ziRankMap[name],anaRankMap[name],
      sougouRankMap[name],popularityMap[name],
      tanCmt[name]||null,fukuCmt[name]||null,
      anaScore??0,anaMax,sougouScore??0,isKeshi??false,
      markMap[name]??null,surface)
  ).join('');

  const sortBar=`
    <div class="sort-bar">
      <span class="sort-bar-label">並び順:</span>
      <button class="sort-btn ${sortMode==='tan'?'active':''}" onclick="setSortMode('tan')">🥇 単勝スコア</button>
      <button class="sort-btn ana-btn ${sortMode==='ana'?'active':''}" onclick="setSortMode('ana')">⭐ 穴馬スコア</button>
      <button class="sort-btn ${sortMode==='zi'?'active':''}" onclick="setSortMode('zi')">📊 ZI能力値</button>
      <button class="sort-btn uma-btn ${sortMode==='uma'?'active':''}" onclick="setSortMode('uma')">🏇 馬番順</button>
    </div>`;

  document.getElementById('content').innerHTML=`
    <div class="race-info">
      <div>
        <div class="race-info-name">${esc(d.race?.name||cfg.label)}</div>
        <div class="race-info-meta">${cfg.meta}</div>
      </div>
      <span class="horse-count">${horses.length}頭</span>
    </div>
    ${buildWin5Collection(withAna)}
    ${buildAnalysisSection(d)}
    ${sortBar}
    <div class="horse-list">${cards}</div>
    ${buildBetSection(withAna,horses.length,d)}
  `;
}

document.getElementById('tabBar').addEventListener('click', e=>{
  const btn=e.target.closest('.tab-btn');
  if (!btn) return;
  switchTab(parseInt(btn.dataset.idx));
});

async function main() {
  const results=await Promise.allSettled(
    RACES.map(cfg=>fetch(cfg.file+'?v='+Date.now())
      .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
      .then(d=>({cfg,d})))
  );
  allData=results.map((res,i)=>res.status==='fulfilled'?res.value:{cfg:RACES[i],d:null});
  updateWin5Summary();
  renderRace(0);
}
main();
</script>
