<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本殿｜御神託 | UG競馬神宮</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --shu:#8A2D2D;
  --shu-light:#C0392B;
  --kin:#C9A961;
  --kin-deep:#A07B28;
  --sumi:#1a1108;
  --sand:#F4E9C9;
  --wood:#2c1d10;
  --bg:#0f0b08;
  --card:#1a120a;
  --paper:#1e1409;
  --border:rgba(201,169,97,.25);
  --honmei:#E8B86A;
  --taikou:#B8B8B8;
  --tana:#C48E48;
  --renka:#7BA06A;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  color:var(--sand);
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(201,169,97,.15), transparent 60%),
    var(--bg);
  min-height:100vh;
  line-height:1.7;
}
.mincho{font-family:'Shippori Mincho','Noto Serif JP',serif;}
a{color:var(--kin);text-decoration:none;}

/* ── ヘッダ ── */
.page-header{
  padding:36px 24px 24px;
  text-align:center;
  border-bottom:1px solid rgba(201,169,97,.2);
}
.page-title{
  font-size:clamp(26px,5vw,44px);
  font-weight:900;
  color:var(--kin);
  letter-spacing:.24em;
  text-shadow:0 0 24px rgba(201,169,97,.3);
}
.page-subtitle{
  margin-top:8px;
  font-size:12px;
  color:rgba(201,169,97,.7);
  letter-spacing:.3em;
}
.page-lead{
  margin-top:18px;
  font-size:13px;
  color:rgba(255,240,200,.7);
}
.home-link{
  display:inline-block;
  margin-top:14px;
  font-size:12px;
  color:var(--kin);
  text-decoration:none;
  border:1px solid var(--kin);
  padding:6px 18px;
  border-radius:2px;
  letter-spacing:.12em;
  transition:all .2s;
}
.home-link:hover{background:var(--kin);color:var(--sumi);}

/* ── 日タブ ── */
.day-tabs{
  display:flex;justify-content:center;gap:2px;
  margin:28px auto 0;max-width:520px;padding:0 16px;
}
.day-tab{
  flex:1;padding:12px 8px;text-align:center;
  background:var(--card);border:1px solid var(--border);border-bottom:none;
  color:rgba(244,233,201,.6);font-size:12px;letter-spacing:.22em;cursor:pointer;
  transition:all .2s;font-family:'Shippori Mincho',serif;
}
.day-tab.active{background:var(--wood);color:var(--kin);border-color:var(--kin);font-weight:700;}
.day-tab:hover:not(.active){color:var(--sand);background:rgba(44,29,16,.6);}

/* ── レースセレクタ ── */
.race-selector{
  max-width:960px;margin:0 auto;padding:16px;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;
}
.race-btn{
  background:var(--card);border:1px solid var(--border);border-radius:4px 4px 2px 2px;
  padding:10px 12px;cursor:pointer;text-align:left;color:var(--sand);
  transition:all .18s ease;font-family:'Shippori Mincho',serif;position:relative;overflow:hidden;
}
.race-btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--shu) 0%,var(--kin) 50%,var(--shu) 100%);opacity:.4;
}
.race-btn:hover{border-color:var(--kin);}
.race-btn.active{background:var(--wood);border-color:var(--kin);box-shadow:0 0 0 1px var(--kin) inset;}
.race-btn.active::before{opacity:1;height:3px;}
.race-btn .btn-win5{display:inline-block;font-size:9px;font-weight:900;padding:1px 6px;border-radius:2px;background:var(--shu);color:var(--sand);letter-spacing:.1em;margin-bottom:4px;}
.race-btn .btn-grade{display:inline-block;font-size:9px;font-weight:900;padding:1px 6px;border-radius:2px;background:rgba(201,169,97,.2);color:var(--kin);letter-spacing:.1em;margin-bottom:4px;margin-left:4px;}
.race-btn .btn-name{font-size:14px;font-weight:700;color:var(--kin);margin-bottom:2px;line-height:1.25;}
.race-btn .btn-meta{font-size:10px;color:rgba(244,233,201,.6);line-height:1.4;}

/* ── 本殿パネル ── */
.shrine-wrap{max-width:1040px;margin:0 auto;padding:20px 16px 60px;}

.honden{
  background:linear-gradient(180deg,#1e1509 0%,#140c06 100%);
  border:1px solid var(--kin);border-radius:4px;margin-bottom:28px;position:relative;
  box-shadow:0 0 40px rgba(0,0,0,.5),0 0 0 1px rgba(201,169,97,.1);
}
.honden::before{
  content:'';position:absolute;top:-8px;left:0;right:0;height:8px;
  background:linear-gradient(180deg,var(--shu) 0%,var(--shu-light) 100%);border-radius:2px 2px 0 0;
}
.honden-head{
  padding:26px 20px 18px;text-align:center;border-bottom:1px solid var(--border);
  background:radial-gradient(ellipse at center top, rgba(201,169,97,.1), transparent 70%);
}
.honden-race-meta{font-size:11px;color:rgba(244,233,201,.6);letter-spacing:.22em;margin-bottom:6px;}
.honden-race-name{
  font-size:clamp(22px,4vw,32px);color:var(--kin);font-weight:900;letter-spacing:.2em;
  text-shadow:0 0 20px rgba(201,169,97,.4);
}
.honden-race-info{margin-top:12px;font-size:11px;color:rgba(244,233,201,.7);}
.honden-race-info span{display:inline-block;padding:2px 10px;margin:0 2px;border:1px solid rgba(201,169,97,.3);border-radius:2px;}

.section-title{
  text-align:center;margin:22px 0 12px;font-size:11px;
  color:rgba(201,169,97,.7);letter-spacing:.5em;position:relative;
}
.section-title::before,.section-title::after{
  content:'';display:inline-block;width:40px;height:1px;vertical-align:middle;
  background:rgba(201,169,97,.3);margin:0 12px;
}

/* ── 御守カード 2×2 ── */
.omamori-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:8px 16px 4px;
}
.omamori{
  position:relative;background:var(--paper);
  border:1px solid rgba(201,169,97,.35);border-radius:4px;
  padding:0;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
  display:flex;flex-direction:column;
}
/* マーク別の朱色濃淡 */
.omamori.m-honmei{border-color:var(--honmei);box-shadow:0 2px 20px rgba(232,184,106,.15),0 0 0 1px rgba(232,184,106,.2);}
.omamori.m-taikou{border-color:var(--taikou);}
.omamori.m-tana{border-color:var(--tana);}
.omamori.m-renka{border-color:var(--renka);}
/* 4神カード border + glow */
.omamori.m-seiryu{border-color:rgba(140,192,222,.5);box-shadow:0 2px 20px rgba(140,192,222,.12),0 0 0 1px rgba(140,192,222,.2);}
.omamori.m-suzaku{border-color:rgba(224,140,125,.55);box-shadow:0 2px 20px rgba(224,140,125,.15),0 0 0 1px rgba(224,140,125,.2);}
.omamori.m-byakko{border-color:rgba(232,208,130,.55);box-shadow:0 2px 20px rgba(232,208,130,.15),0 0 0 1px rgba(232,208,130,.2);}
.omamori.m-genbu {border-color:rgba(156,182,141,.5);box-shadow:0 2px 20px rgba(156,182,141,.12),0 0 0 1px rgba(156,182,141,.2);}

.omamori-bar{
  background:linear-gradient(180deg,var(--shu) 0%,#6a1f1f 100%);
  color:var(--sand);text-align:center;
  padding:10px 48px 10px 12px;font-size:11px;letter-spacing:.4em;
  font-family:'Shippori Mincho',serif;font-weight:700;
  border-bottom:1px solid rgba(201,169,97,.35);
  position:relative;
}
.omamori-bar .mark-inline{
  display:inline-block;font-size:14px;margin-right:8px;
  color:var(--kin);font-weight:900;
}
.omamori-bar .bar-grade{
  display:inline-block;margin-left:6px;font-size:10.5px;
  color:var(--kin);letter-spacing:.05em;font-weight:900;
  opacity:.85;
}
.omamori-bar::after{
  content:'';position:absolute;left:10%;right:10%;bottom:-3px;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--kin) 50%,transparent 100%);
}

.omamori-body{
  padding:14px 16px 16px;flex:1;display:flex;flex-direction:column;
  background:
    linear-gradient(180deg,rgba(201,169,97,.03) 0%,transparent 60%),
    var(--paper);
}
.omamori-meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10.5px;color:rgba(244,233,201,.65);letter-spacing:.1em;
  margin-bottom:6px;
}
.omamori-meta .waku{
  display:inline-block;padding:1px 6px 1px 7px;text-align:center;
  border-radius:3px 0 0 3px;background:var(--wood);color:var(--kin);font-weight:900;
  font-size:11.5px;margin-right:0;letter-spacing:.05em;
}
.omamori-meta .uma{
  display:inline-block;padding:1px 7px 1px 6px;background:var(--wood);color:var(--sand);
  border-radius:0 3px 3px 0;font-size:11.5px;font-weight:700;margin-right:8px;
  border-left:1px solid rgba(201,169,97,.25);letter-spacing:.05em;
}
.omamori-meta .ninki{color:var(--kin);font-size:11px;font-weight:700;}
.omamori-meta .ninki .odds{
  font-style:normal;color:var(--shu);font-size:12px;font-weight:900;
  margin-left:4px;letter-spacing:.02em;
}

.omamori-name{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(22px,3vw,30px);font-weight:900;
  color:var(--sand);text-align:center;
  padding:6px 0 4px;
  letter-spacing:.06em;line-height:1.25;
  text-shadow:0 0 12px rgba(201,169,97,.15);
}
.omamori-name-en{
  text-align:center;color:rgba(201,169,97,.5);
  font-size:10px;letter-spacing:.2em;margin-bottom:8px;
}

.omamori-divider{
  height:1px;margin:4px 0 10px;
  background:linear-gradient(90deg,transparent 0%,var(--kin) 50%,transparent 100%);
  opacity:.4;
}

.omamori-info{
  display:grid;grid-template-columns:auto 1fr;gap:4px 10px;
  font-size:11.5px;line-height:1.5;
  margin-bottom:10px;
}
.omamori-info dt{color:var(--kin);letter-spacing:.1em;font-weight:700;white-space:nowrap;}
.omamori-info dd{color:var(--sand);}
.omamori-info .prev-race{color:rgba(244,233,201,.85);}
.omamori-info .prev-cd{color:rgba(201,169,97,.7);font-size:10.5px;margin:0 2px;letter-spacing:.02em;}
.omamori-info .prev-finish{
  display:inline-block;padding:0 6px;margin-left:4px;border-radius:2px;
  font-weight:900;font-size:11px;
}
.omamori-info .fin-win{background:var(--kin);color:var(--sumi);}
.omamori-info .fin-place{background:rgba(201,169,97,.25);color:var(--kin);}
.omamori-info .fin-lose{background:rgba(244,233,201,.12);color:rgba(244,233,201,.7);}

.omamori-badges{
  display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;
}
.omamori-badges .badge{
  display:inline-block;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:2px;letter-spacing:.08em;
  font-family:'Shippori Mincho',serif;
  border:1px solid rgba(201,169,97,.25);
}
.badge.b-seiryu{background:rgba(74,133,158,.25);color:#8CC0DE;border-color:rgba(140,192,222,.35);}
.badge.b-byakko{background:rgba(232,208,130,.2);color:#E8D082;border-color:rgba(232,208,130,.35);}
.badge.b-genbu{background:rgba(85,104,72,.3);color:#9CB68D;border-color:rgba(156,182,141,.35);}
.badge.b-suzaku{background:rgba(180,70,60,.25);color:#E08C7D;border-color:rgba(224,140,125,.35);}
.badge.b-soho{background:rgba(201,169,97,.15);color:var(--kin);border-color:rgba(201,169,97,.35);}
.badge-sub{
  display:block;font-size:8.5px;opacity:.7;margin-top:2px;
  letter-spacing:.04em;font-family:'Inter','Shippori Mincho',sans-serif;
  font-weight:600;
}

/* ───── 結果反映：着順バッジ ───── */
.rank-badge{
  display:inline-block;margin-left:10px;padding:2px 9px;border-radius:3px;
  font-size:11px;font-weight:700;letter-spacing:.06em;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
  vertical-align:middle;
}
.rank-1{background:linear-gradient(135deg,#d4a83c,#b88a1f);color:#1a1a1a;box-shadow:0 0 10px rgba(212,168,60,.35);}
.rank-2{background:#c9c5be;color:#2a2a2a;}
.rank-3{background:#b08850;color:#1a1a1a;}
.rank-out{background:rgba(80,75,70,.55);color:rgba(244,233,201,.7);}
.rank-kesi{background:rgba(60,50,45,.65);color:rgba(244,233,201,.5);text-decoration:line-through;letter-spacing:.08em;}
.omamori.has-result .omamori-bar{position:relative;}

/* ───── 的中バッジ（レースヘッダ） ───── */
.verdict-badge{
  display:inline-block;padding:3px 12px;border-radius:3px;margin-left:10px;
  font-size:11px;font-weight:700;letter-spacing:.08em;
  font-family:'Shippori Mincho','Noto Serif JP',serif;
}
.verdict-win{background:linear-gradient(135deg,#2f7c44,#1f5c30);color:#f4e9c9;box-shadow:0 0 14px rgba(47,124,68,.45);}
.verdict-gami{background:linear-gradient(135deg,#c47b1f,#9a5810);color:#f4e9c9;}
.verdict-lose{background:rgba(80,75,70,.55);color:rgba(244,233,201,.55);}

/* ───── 結果セクション ───── */
.result-block{
  margin:18px 22px;padding:18px 22px;border-radius:6px;
  background:linear-gradient(135deg,rgba(26,26,26,.85),rgba(35,30,25,.65));
  border:1px solid rgba(201,169,97,.18);
}
.result-block.result-win{border-color:rgba(47,124,68,.55);background:linear-gradient(135deg,rgba(31,92,48,.18),rgba(26,26,26,.7));}
.result-block.result-gami{border-color:rgba(196,123,31,.45);background:linear-gradient(135deg,rgba(154,88,16,.15),rgba(26,26,26,.7));}
.result-title{
  text-align:center;font-size:14px;letter-spacing:.5em;color:#C9A961;
  border-bottom:1px solid rgba(201,169,97,.2);padding-bottom:10px;margin-bottom:12px;
}
.result-verdict{
  text-align:center;font-size:18px;letter-spacing:.3em;margin-bottom:12px;font-weight:700;
}
.result-win .result-verdict{color:#82DB6F;text-shadow:0 0 12px rgba(130,219,111,.4);}
.result-gami .result-verdict{color:#E8B870;}
.result-lose .result-verdict{color:rgba(244,233,201,.45);}
.result-hits{margin-bottom:14px;}
.result-hit-row{
  display:flex;justify-content:space-between;padding:6px 4px;
  border-bottom:1px dashed rgba(201,169,97,.12);font-size:12.5px;
  color:rgba(244,233,201,.85);
}
.result-hit-row:last-child{border-bottom:0;}
.result-hit-pair{font-family:'Shippori Mincho','Noto Serif JP',serif;}
.result-hit-amount{font-family:'Inter',sans-serif;font-weight:700;color:#E8D082;}
.result-total-row{
  display:flex;justify-content:space-between;padding:5px 4px;font-size:13px;
  color:rgba(244,233,201,.8);font-family:'Inter',sans-serif;
}
.result-total-row .mincho{font-family:'Shippori Mincho','Noto Serif JP',serif;letter-spacing:.2em;}
.result-profit{
  border-top:1px solid rgba(201,169,97,.2);padding-top:9px;margin-top:5px;
  font-size:14.5px;font-weight:700;
}
.profit-plus{color:#82DB6F;}
.profit-minus{color:#E08C7D;}

/* ───── ワイド+馬連 並列ブロック ───── */
.result-kinds{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;
}
@media(max-width:640px){
  .result-kinds{grid-template-columns:1fr;}
}
.result-kind{
  padding:12px 14px;border-radius:5px;
  border:1px solid rgba(201,169,97,.16);
  background:rgba(20,20,20,.4);
}
.result-kind.result-win{border-color:rgba(47,124,68,.45);background:rgba(31,92,48,.12);}
.result-kind.result-gami{border-color:rgba(196,123,31,.4);background:rgba(154,88,16,.1);}
.result-kind-head{
  text-align:center;font-size:12.5px;letter-spacing:.32em;
  color:#C9A961;font-weight:700;
  border-bottom:1px solid rgba(201,169,97,.18);
  padding-bottom:7px;margin-bottom:9px;
}
.result-kind .result-hits{margin-bottom:9px;}
.result-kind .result-hit-row{font-size:12px;padding:4px 2px;}
.result-kind .result-total-row{font-size:11.5px;padding:3px 2px;}
.result-kind .result-profit{font-size:13px;padding-top:7px;margin-top:4px;}
.result-grand{
  border-top:2px solid rgba(201,169,97,.3);padding-top:10px;margin-top:6px;
  background:rgba(15,15,15,.4);padding:10px 14px;border-radius:4px;
}
.result-grand .result-total-row{font-size:13.5px;}
.result-grand .result-profit{font-size:15px;font-weight:900;}

/* ───── 日別合計バナー（4/25 戦績バナー等） ───── */
.day-summary{
  margin:14px 16px 2px;padding:14px 22px;
  border:1px solid rgba(201,169,97,.22);
  background:linear-gradient(135deg,rgba(20,20,20,.85),rgba(35,30,22,.7));
  border-radius:5px;text-align:center;
}
.day-summary-title{
  color:#C9A961;font-size:12.5px;letter-spacing:.45em;
  border-bottom:1px solid rgba(201,169,97,.18);
  padding-bottom:8px;margin-bottom:10px;
}
.day-summary-stats{
  display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;
  align-items:baseline;font-size:13px;color:rgba(244,233,201,.85);
  font-family:'Inter','Shippori Mincho',sans-serif;
}
.day-summary-stats .ds-record strong{font-size:17px;color:#E8D082;letter-spacing:.1em;}
.day-summary-stats .ds-rate{font-size:14.5px;letter-spacing:.15em;font-weight:700;}
.day-summary-stats .ds-rate.plus{color:#82DB6F;}
.day-summary-stats .ds-rate.minus{color:#E08C7D;}
.day-summary-stats .ds-divider{color:rgba(201,169,97,.3);}
.day-summary-stats .ds-spend,
.day-summary-stats .ds-pay{font-family:'Inter',sans-serif;color:rgba(244,233,201,.7);}
.day-summary-stats .ds-profit{font-size:14.5px;letter-spacing:.1em;font-weight:700;}
.day-summary-stats .ds-profit.plus{color:#82DB6F;}
.day-summary-stats .ds-profit.minus{color:#E08C7D;}

/* 券種別行 */
.day-summary-kind{
  display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:14px 12px;
  padding:7px 0;font-size:13px;color:rgba(244,233,201,.85);
  border-bottom:1px dashed rgba(201,169,97,.15);
}
.day-summary-kind:last-of-type{border-bottom:0;}
.day-summary-kind .ds-kind-label{
  display:inline-block;min-width:54px;padding:2px 10px;
  background:rgba(201,169,97,.15);color:#C9A961;
  font-size:11.5px;letter-spacing:.32em;border-radius:2px;font-weight:700;
}
.day-summary-kind .ds-record strong{font-size:14.5px;color:#E8D082;}
.day-summary-kind .ds-rate{font-size:13px;font-weight:700;}
.day-summary-kind .ds-spend,
.day-summary-kind .ds-pay{font-family:'Inter',sans-serif;font-size:12.5px;color:rgba(244,233,201,.7);}

/* 合計行 */
.day-summary-grand{
  display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:14px 12px;
  padding:11px 0 6px;margin-top:4px;
  border-top:2px solid rgba(201,169,97,.3);
  font-size:14px;
}
.day-summary-grand .ds-grand-label{
  display:inline-block;min-width:54px;padding:3px 10px;
  background:linear-gradient(135deg,#C9A961,#9A7438);color:#1a1108;
  font-size:12px;letter-spacing:.4em;border-radius:2px;font-weight:900;
}
.day-summary-grand .ds-rate{font-size:15px;font-weight:900;}
.day-summary-grand .ds-profit{font-size:14.5px;font-weight:900;}

@media(max-width:640px){
  .day-summary-kind, .day-summary-grand{flex-direction:column;align-items:flex-start;gap:4px;}
  .day-summary-kind .ds-divider, .day-summary-grand .ds-divider{display:none;}
}
.day-summary-proverb{
  margin-top:10px;font-size:11.5px;letter-spacing:.2em;
  color:rgba(201,169,97,.6);font-style:italic;
}

/* ───── レース選択ボタンの的中バッジ ───── */
.btn-verdict{
  display:inline-block;margin-left:6px;padding:1px 6px;
  font-size:11px;border-radius:3px;
  font-family:'Inter',sans-serif;font-weight:700;letter-spacing:.04em;
  vertical-align:middle;
}
.btn-verdict.v-win{background:linear-gradient(135deg,#2f7c44,#1f5c30);color:#f4e9c9;box-shadow:0 0 8px rgba(47,124,68,.5);}
.btn-verdict.v-gami{background:linear-gradient(135deg,#c47b1f,#9a5810);color:#f4e9c9;}
.btn-verdict.v-lose{background:rgba(80,75,70,.55);color:rgba(244,233,201,.55);}

/* ───── レース別格言（result-block 末尾） ───── */
.result-proverb{
  margin-top:12px;padding-top:10px;
  border-top:1px dashed rgba(201,169,97,.18);
  text-align:center;font-size:11.5px;letter-spacing:.18em;
  color:rgba(201,169,97,.7);font-style:italic;
}

  font-size:11.5px;color:rgba(244,233,201,.75);

}

.omamori-seal{
  position:absolute;top:4px;right:8px;
  width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #B03838 0%, var(--shu) 55%, #5a1a1a 100%);
  color:var(--kin);

@media (max-width:720px){

<body>
<!-- ═════ AI試験運用バナー（全ページ共通） ═════ -->
<div class="ai-trial-banner">
  <div class="ai-trial-banner-text">
    <span class="ai-trial-icon">🤖</span>神 宮 、 A I で 全 レ ー ス 採 点 へ 拡 張 中 。 試 運 転 故 、 神 託 に 粗 あ り 。 <strong>さ れ ど 人 気 は 嘘 つ け ど 、 構 造 は 嘘 つ か ぬ 。</strong>
    <span class="ai-trial-author">─ ギ ー ニ ョ 修 行 中 の 一 文 ─</span>
  </div>
</div>


<header class="page-header">
  <div class="page-title mincho">本　殿</div>
  <div class="page-subtitle mincho">御 神 託 の 間</div>
  <div class="page-lead mincho">選ばれし四頭に、単勝・複勝・ワイドを奉納する。</div>
  <a class="home-link mincho" href="index.html">⛩ 神宮に戻る</a>
</header>

<div class="day-tabs" id="dayTabs"></div>
<div id="daySummary"></div>
<div class="race-selector" id="raceSelector"></div>

<div class="shrine-wrap" id="shrineWrap">
  <div class="empty-state mincho">御神託を降ろす準備中 ……</div>
</div>

<div class="footer mincho">⛩ UG 競馬神宮　本殿 ／ 四神統合御託宣 ⛩</div>

<script>
// ───────────────────────────────────────
//  本殿データ — 週次メンテ：土日レース一覧
//  picks = 4頭（◎○▲△）
//  bets  = 単勝1点・複勝1点・ワイド4頭BOX(6点)
// ───────────────────────────────────────
// ───────────────────────────────────────
//  本殿データ — race-notes.presentation から fetch
//  週次メンテ：RACES_MANIFESTに新レースのkeyを追加するだけ
//  各 race-notes JSON の .presentation セクションが picks/bets/note のソース
// ───────────────────────────────────────
const RACES_MANIFEST = [
  // ================= 2026-04-25 土曜 =================
  {key:'2026-04-25-kyoto-10r',     date:'2026-04-25', day:'sat', label:'土'},
  {key:'2026-04-25-tokyo-10r',     date:'2026-04-25', day:'sat', label:'土'},
  {key:'2026-04-25-fukushima-11r', date:'2026-04-25', day:'sat', label:'土'},
  {key:'2026-04-25-kyoto-11r',     date:'2026-04-25', day:'sat', label:'土'},
  {key:'2026-04-25-tokyo-11r',     date:'2026-04-25', day:'sat', label:'土'},
  // ================= 2026-04-26 日曜 =================
  {key:'2026-04-26-kyoto-10r',     date:'2026-04-26', day:'sun', label:'日'},
  {key:'2026-04-26-tokyo-10r',     date:'2026-04-26', day:'sun', label:'日'},
  {key:'2026-04-26-fukushima-11r', date:'2026-04-26', day:'sun', label:'日'},
  {key:'2026-04-26-kyoto-11r',     date:'2026-04-26', day:'sun', label:'日'},
  {key:'2026-04-26-tokyo-11r',     date:'2026-04-26', day:'sun', label:'日'},
];

let RACES = [];

async function loadRaces() {
  const loaded = await Promise.all(RACES_MANIFEST.map(async m => {
    try {
      // CDN edge cache 回避：build番号代わりに分単位のタイムスタンプを付与
      const _bust = Math.floor(Date.now() / 60000);
      const res = await fetch(`data/race-notes/${m.key}.json?_=${_bust}`, {cache:'no-cache'});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      const p = d.presentation || {};
      return {
        key:       m.key,
        date:      (d.race && d.race.date) || m.date,
        day:       m.day,
        label:     m.label,
        win5:      p.win5Layer || '',
        grade:     (d.race && d.race.grade) || '',
        name:      (d.race && d.race.name) || '未定',
        nameEn:    p.nameEn || '',
        meta:      p.meta || '',
        startTime: p.startTime || '',
        picks:     p.horses || [],
        bets:      p.bets || {},
        note:      p.note || '',
        result:    p.result || null
      };
    } catch(e) {
      console.error(`race-notes load failed: ${m.key}`, e);
      // 最低限の placeholder で埋めて UI 崩壊を防ぐ
      return {
        key: m.key, date: m.date, day: m.day, label: m.label,
        win5:'', grade:'', name:'読込失敗', meta:'',
        startTime:'', picks: [], bets:{}, note:`データ読込失敗: ${m.key}`
      };
    }
  }));
  RACES = loaded;
}

// ───────────────────────────────────────
//  レンダリング
// ───────────────────────────────────────
const shrine = document.getElementById('shrineWrap');
const daysEl = document.getElementById('dayTabs');
const selEl  = document.getElementById('raceSelector');

function uniqueDays(){
  const seen = new Set(); const out = [];
  RACES.forEach(r => { if(!seen.has(r.date)){ seen.add(r.date); out.push(r); } });
  return out;
}

let currentDate = null;
let currentKey  = null;

function setDate(d){
  currentDate = d;
  const list = RACES.filter(r => r.date === d);
  currentKey = list[0] ? list[0].key : null;
  render();
}
function setKey(k){ currentKey = k; render(); }

function render(){
  const days = uniqueDays();
  daysEl.innerHTML = days.map(d => {
    const cls = d.date === currentDate ? 'day-tab active' : 'day-tab';
    return `<button class="${cls}" onclick="setDate('${d.date}')">${formatDayHeader(d.date, d.label)}</button>`;
  }).join('');

  const races = RACES.filter(r => r.date === currentDate);

  // 日別合計バナー（result があるレースが1つでもあれば表示）
  const verdicts = races.map(r => r.result ? judgeWinning(r) : null).filter(v => v);
  const summaryEl = document.getElementById('daySummary');
  if (summaryEl){
    if (verdicts.length > 0){
      const total = verdicts.length;
      // 券種別集計
      const wideKinds   = verdicts.map(v => v.perKind && v.perKind.wide).filter(x => x);
      const umarenKinds = verdicts.map(v => v.perKind && v.perKind.umaren).filter(x => x);
      const sumKind = arr => arr.reduce((s,v)=>({
        spend: s.spend + v.totalSpend,
        pay:   s.pay   + v.totalPay,
        wins:  s.wins  + (v.type !== 'lose' ? 1 : 0),
      }), {spend:0, pay:0, wins:0});
      const w = sumKind(wideKinds);
      const u = sumKind(umarenKinds);
      const totalSpend = w.spend + u.spend;
      const totalPay   = w.pay   + u.pay;
      const totalRate  = totalSpend ? Math.round((totalPay/totalSpend)*1000)/10 : 0;
      const profit     = totalPay - totalSpend;
      const sign       = profit >= 0 ? '+' : '−';
      const wRate = w.spend ? Math.round((w.pay/w.spend)*1000)/10 : 0;
      const uRate = u.spend ? Math.round((u.pay/u.spend)*1000)/10 : 0;
      const overallWins = verdicts.filter(v => v.type !== 'lose').length;
      const proverb = dailyProverb(totalRate, overallWins, total);

      const kindRow = (label, k, rate) => k.spend > 0 ? `
        <div class="day-summary-kind">
          <span class="ds-kind-label mincho">${label}</span>
          <span class="ds-record mincho"><strong>${total}戦${k.wins}勝</strong></span>
          <span class="ds-divider">／</span>
          <span class="ds-rate ${rate>=100?'plus':'minus'} mincho">回収率　${rate}%</span>
          <span class="ds-divider">／</span>
          <span class="ds-spend">投　¥${k.spend.toLocaleString()}</span>
          <span class="ds-pay">払　¥${k.pay.toLocaleString()}</span>
        </div>` : '';

      // タイトル：曜日付き
      const yobi = ['日','月','火','水','木','金','土'];
      const dt = new Date(currentDate + 'T00:00:00');
      const yobiLabel = isNaN(dt.getTime()) ? '本　日' : `${yobi[dt.getDay()]}　曜　日`;

      summaryEl.innerHTML = `
        <div class="day-summary">
          <div class="day-summary-title mincho">${yobiLabel}　の　戦　績</div>
          ${kindRow('ワイド', w, wRate)}
          ${kindRow('馬　連', u, uRate)}
          <div class="day-summary-grand">
            <span class="ds-grand-label mincho">合　計</span>
            <span class="ds-rate ${totalRate>=100?'plus':'minus'} mincho">回収率　${totalRate}%</span>
            <span class="ds-divider">／</span>
            <span class="ds-spend">投　¥${totalSpend.toLocaleString()}</span>
            <span class="ds-pay">払　¥${totalPay.toLocaleString()}</span>
            <span class="ds-profit ${profit>=0?'plus':'minus'} mincho">収支 ${sign}¥${Math.abs(profit).toLocaleString()}</span>
          </div>
          <div class="day-summary-proverb mincho">― ${proverb} ―</div>
        </div>`;
    } else {
      summaryEl.innerHTML = '';
    }
  }

  selEl.innerHTML = races.map(r => {
    const cls = r.key === currentKey ? 'race-btn active' : 'race-btn';
    const win5Tag = r.win5 ? `<span class="btn-win5">${r.win5}</span>` : '';
    const gradeTag = r.grade ? `<span class="btn-grade">${r.grade}</span>` : '';
    // 的中バッジ（result があれば）
    const v = r.result ? judgeWinning(r) : null;
    const verdictTag = v
      ? `<span class="btn-verdict v-${v.type}" title="${v.type==='win'?'的中':v.type==='gami'?'ガミ的中':'外れ'}">${v.type==='win'?'🎯':v.type==='gami'?'🎯':'×'}</span>`
      : '';
    return `<button class="${cls}" onclick="setKey('${r.key}')">
      ${win5Tag}${gradeTag}${verdictTag}
      <div class="btn-name mincho">${r.name}</div>
      <div class="btn-meta">${r.meta}</div>
    </button>`;
  }).join('');

  const race = RACES.find(r => r.key === currentKey);
  if(!race){
    shrine.innerHTML = `<div class="empty-state mincho">この日のレースはまだ降ろされていません</div>`;
    return;
  }
  shrine.innerHTML = hondenHtml(race);
}

function formatDayHeader(d, label){
  const m = d.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return d;
  return `${+m[2]}/${+m[3]}（${label}）`;
}

function markClass(mark){
  return ({'◎':'m-honmei','○':'m-taikou','▲':'m-tana','△':'m-renka'})[mark] || '';
}
function godClass(god){
  return ({'seiryu':'m-seiryu','suzaku':'m-suzaku','byakko':'m-byakko','genbu':'m-genbu'})[god] || '';
}

function finishClass(f){
  if(!f || f === '—') return 'fin-lose';
  const n = parseInt(f);
  if(n === 1) return 'fin-win';
  if(n === 2 || n === 3) return 'fin-place';
  return 'fin-lose';
}

function omamoriHtml(p, raceResult){
  const badges = (p.badges||[]).map(b => {
    const sub = (b.t === 'suzaku' && (b.soku || b.gan))
      ? `<span class="badge-sub">速${b.soku||'—'}／眼${b.gan||'—'}</span>`
      : '';
    return `<span class="badge b-${b.t}">${b.label}${b.g}${sub}</span>`;
  }).join('');
  const finClass = finishClass(p.prevFinish);

  // 結果データから該当馬を探す（馬番優先、なければ馬名）
  const rh = raceResult && raceResult.horses
    ? raceResult.horses.find(h => (p.num && String(h.num) === String(p.num)) || h.name === p.name)
    : null;
  const rank = rh && rh.rank ? rh.rank : '';
  const finalNinki = (rh && rh.finalNinki) || p.ninki;
  const finalOdds  = (rh && rh.finalOdds)  || p.odds;
  // 着順バッジ（1-3着＝色つき／4着以下＝モノクロ／取消＝専用ラベル／未確定＝なし）
  let rankBadge = '';
  if (rank) {
    if (rank === '取消' || rank === '中止' || rank === '除外') {
      rankBadge = `<span class="rank-badge rank-kesi">出走取消</span>`;
    } else {
      const rn = parseInt(rank);
      const cls = rn === 1 ? 'rank-1' : (rn === 2 ? 'rank-2' : (rn === 3 ? 'rank-3' : 'rank-out'));
      rankBadge = `<span class="rank-badge ${cls}">${rank}着</span>`;
    }
  }

  return `
  <div class="omamori ${godClass(p.god) || markClass(p.mark)}${rank ? ' has-result' : ''}">
    <div class="omamori-bar">
      <span class="mark-inline">${p.godEmoji || p.mark}</span>${p.godLabel ? `${p.godLabel}1位` : `御 守（${p.markLabel}）`}${p.godGrade ? `<span class="bar-grade">[${p.godGrade}]</span>` : ''}
      ${rankBadge}
    </div>
    <div class="omamori-body">
      <div class="omamori-meta">
        <span><span class="waku">${p.gate}枠</span><span class="uma">${p.num}番</span></span>
        <span class="ninki">${finalNinki}人気 <em class="odds">${finalOdds}倍</em></span>
      </div>
      <div class="omamori-name mincho">${p.name}</div>
      <div class="omamori-name-en">${(p.name||'').toUpperCase()}</div>
      <div class="omamori-divider"></div>
      <dl class="omamori-info">
        <dt>父</dt><dd>${p.sire}</dd>
        <dt>母父</dt><dd>${p.bms}</dd>
        <dt>騎手</dt><dd>${p.jockey}</dd>
        <dt>厩舎</dt><dd>${p.trainer}</dd>
        <dt>外厩</dt><dd>${p.gaikyu}</dd>
        <dt>前走</dt><dd class="prev-race">${p.prevName}${(p.prevTrack||p.prevDist) ? `<span class="prev-cd">（${[p.prevTrack, p.prevDist].filter(x=>x && x !== '—').join('・')}）</span>` : ''}<span class="prev-finish ${finClass}">${p.prevFinish}${p.prevFinish && p.prevFinish !== '—' ? '着' : ''}</span></dd>
      </dl>
      <div class="omamori-badges">${badges}</div>
      <div class="omamori-comment">${p.comment}</div>
      <div class="omamori-seal">神印</div>
    </div>
  </div>`;
}

// ───── 格言エンジン（ブラックユーモア＋名言ミックス） ─────
const PROVERBS = {
  win: [
    '神は時に外れに微笑み、然して的中に驚く。',
    '天命を引き当てた一日。',
    '勝者なき馬券は無く、敗者なき馬券もまた無し。',
    '神慮、ここに降臨せり。',
    '今日の的中、明日の自信。',
  ],
  gami: [
    '神はガミを恐れず。',
    '半額の救いもまた救い。',
    'ガミは未来への布石、収支は哲学なり。',
    '半返しの神慮、有難く頂戴。',
    '配当の小なるは神の倹約なり。',
  ],
  lose: [
    '外したのではない。的中の機会を得たのだ。 ― エジソン風',
    '神は試練を与えたもう。',
    '今日のハズレは、明日の学費。',
    '勝ち負けは時の運、馬券道は永遠なり。',
    '百敗百敗、やがて百勝に至る。',
  ],
};
function pickProverb(type, seed){
  const arr = PROVERBS[type] || PROVERBS.lose;
  let h = 0;
  for (const c of String(seed||'')) h = ((h<<5) - h + c.charCodeAt(0)) | 0;
  return arr[Math.abs(h) % arr.length];
}
function dailyProverb(rate, hits, total){
  if (rate >= 200) return '神は今日、貴殿に微笑みき。 ― 競馬の神';
  if (rate >= 100) return 'プラス収支は紳士の証。';
  if (rate >= 80)  return '神は半額以上の慈悲を給う。';
  if (rate >= 50)  return '半額返しは罰ではなく、修行の継続を許す印。';
  if (rate >= 30)  return '人事を尽くして天命を待つ。 ― 孔明';
  if (hits === 0)  return '百戦百勝は善の善なる者にあらず。 ― 孫子';
  return '神はガミを恐れず。';
}

// 券種別の的中判定（汎用版）
// kind: 'wide' | 'umaren'
// 戻り値: {type:'win'|'gami'|'lose', hits:[{pair,amount}], totalPay, totalSpend}
function judgeKind(r, kind){
  const result = r.result;
  const bets   = r.bets || {};
  if (!result || !result.horses || !result.payouts) return null;
  const cfg = bets[kind];
  if (!cfg || !cfg.horses) return null;

  const horses = cfg.horses || [];
  const per    = cfg.perPoint || 100;
  const totalSpend = (horses.length * (horses.length - 1) / 2) * per;

  const nameToNum = {};
  result.horses.forEach(h => { if (h.name) nameToNum[h.name] = String(h.num); });

  const payouts = result.payouts[kind] || [];
  const hits = [];
  let totalPay = 0;

  for (let i = 0; i < horses.length; i++) {
    for (let j = i + 1; j < horses.length; j++) {
      const a = nameToNum[horses[i]];
      const b = nameToNum[horses[j]];
      if (!a || !b) continue;
      const hit = payouts.find(p => {
        const c = (p.combo || []).map(String);
        return (c[0] === a && c[1] === b) || (c[0] === b && c[1] === a);
      });
      if (hit && hit.amount) {
        hits.push({ pair: [horses[i], horses[j]], nums: [a, b], amount: hit.amount });
        totalPay += hit.amount;
      }
    }
  }
  let type;
  if (totalPay === 0) type = 'lose';
  else if (totalPay >= totalSpend) type = 'win';
  else type = 'gami';
  return { type, hits, totalPay, totalSpend };
}

// レース全体の的中サマリー（ワイド+馬連を統合）
function judgeWinning(r){
  const result = r.result;
  const bets   = r.bets || {};
  const strat  = bets.strategy || '';
  if (!result) return null;

  // 旧 wide-only も新 wide-and-umaren も両対応
  const w = judgeKind(r, 'wide');
  const u = judgeKind(r, 'umaren');
  const segs = [w, u].filter(x => x);
  if (segs.length === 0) {
    return { type: 'lose', hits: [], totalPay: 0, totalSpend: 0, note: 'strategy未対応' };
  }
  const totalPay = segs.reduce((s,x) => s + x.totalPay, 0);
  const totalSpend = segs.reduce((s,x) => s + x.totalSpend, 0);
  const hits = segs.flatMap(x => x.hits);
  let type;
  if (totalPay === 0) type = 'lose';
  else if (totalPay >= totalSpend) type = 'win';
  else type = 'gami';
  return { type, hits, totalPay, totalSpend, perKind: { wide: w, umaren: u } };
}

// 券種ごとの結果ブロックHTML
function renderKindBlock(label, v){
  if (!v) return '';
  const profit = v.totalPay - v.totalSpend;
  const profitSign = profit >= 0 ? '+' : '−';
  const rate = v.totalSpend ? Math.round((v.totalPay / v.totalSpend) * 1000) / 10 : 0;
  const verdictLabel =
    v.type === 'win'  ? '🎯 的　中'
    : v.type === 'gami' ? '🎯 ガミ的中'
    : '— 外　れ';
  const hitsHtml = v.hits.length
    ? v.hits.map(h =>
        `<div class="result-hit-row"><span class="result-hit-pair">${h.pair[0]} − ${h.pair[1]}</span><span class="result-hit-amount">¥${h.amount.toLocaleString()}</span></div>`
      ).join('')
    : `<div class="result-hit-row" style="opacity:.55;">的中なし</div>`;
  return `
  <div class="result-kind result-${v.type}">
    <div class="result-kind-head mincho">${label} ${verdictLabel}</div>
    <div class="result-hits">${hitsHtml}</div>
    <div class="result-total-row"><span class="mincho">投　資</span><span>¥${v.totalSpend.toLocaleString()}</span></div>
    <div class="result-total-row"><span class="mincho">払　戻</span><span>¥${v.totalPay.toLocaleString()}</span></div>
    <div class="result-total-row"><span class="mincho">回 収 率</span><span class="${rate >= 100 ? 'profit-plus' : 'profit-minus'}">${rate}%</span></div>
    <div class="result-total-row result-profit"><span class="mincho">収　支</span><span class="${profit >= 0 ? 'profit-plus' : 'profit-minus'}">${profitSign}¥${Math.abs(profit).toLocaleString()}</span></div>
  </div>`;
}

// 結果セクション（ワイド+馬連 並列表示）
function renderResultSection(r){
  const v = judgeWinning(r);
  if (!v) return '';
  const wideBlk   = v.perKind && v.perKind.wide   ? renderKindBlock('ワイド', v.perKind.wide)   : '';
  const umarenBlk = v.perKind && v.perKind.umaren ? renderKindBlock('馬　連', v.perKind.umaren) : '';
  const totalRate = v.totalSpend ? Math.round((v.totalPay / v.totalSpend) * 1000) / 10 : 0;
  const totalProfit = v.totalPay - v.totalSpend;
  const totalSign = totalProfit >= 0 ? '+' : '−';
  const proverb = pickProverb(v.type, r.key);
  return `
  <div class="result-block result-${v.type}">
    <div class="result-title mincho">結　果</div>
    <div class="result-kinds">${wideBlk}${umarenBlk}</div>
    ${v.perKind && v.perKind.wide && v.perKind.umaren ? `
    <div class="result-grand">
      <div class="result-total-row"><span class="mincho">合計投資</span><span>¥${v.totalSpend.toLocaleString()}</span></div>
      <div class="result-total-row"><span class="mincho">合計払戻</span><span>¥${v.totalPay.toLocaleString()}</span></div>
      <div class="result-total-row"><span class="mincho">合計回収率</span><span class="${totalRate >= 100 ? 'profit-plus' : 'profit-minus'}">${totalRate}%</span></div>
      <div class="result-total-row result-profit"><span class="mincho">合計収支</span><span class="${totalProfit >= 0 ? 'profit-plus' : 'profit-minus'}">${totalSign}¥${Math.abs(totalProfit).toLocaleString()}</span></div>
    </div>` : ''}
    <div class="result-proverb mincho">― ${proverb} ―</div>
  </div>`;
}

function hondenHtml(r){
  const strategy = (r.bets && r.bets.strategy) || '4horse-box';

  // 馬名→馬番 lookup（picksから取得、なければ '—'）
  const numOf = (name) => {
    const p = (r.picks||[]).find(x => x.name === name);
    return p && p.num ? p.num : '—';
  };
  const horseCell = (name) => `<span class="offering-num">${numOf(name)}</span><span class="offering-horse">${name}</span>`;

  let offeringRows = '';
  let offeringDesc = '';
  let grandTotal = 0;

  if(strategy === '4horse-box'){
    const wideCombos = makeCombos(r.bets.wide.horses);
    const wideTotal  = wideCombos.length * r.bets.wide.perPoint;
    grandTotal = r.bets.tan.amount + r.bets.fuku.amount + wideTotal;
    offeringDesc = '単勝 ／ 複勝 ／ ワイド４頭ＢＯＸ';
    offeringRows = `
      <div class="offering-row">
        <div class="offering-type mincho">単　勝</div>
        <div class="offering-content">${horseCell(r.bets.tan.name)}</div>
        <div class="offering-amount">¥${r.bets.tan.amount}（1点）</div>
      </div>
      <div class="offering-row">
        <div class="offering-type mincho">複　勝</div>
        <div class="offering-content">${horseCell(r.bets.fuku.name)}</div>
        <div class="offering-amount">¥${r.bets.fuku.amount}（1点）</div>
      </div>
      <div class="offering-row">
        <div class="offering-type mincho">ワイド</div>
        <div class="offering-content">
          ${r.bets.wide.horses.map(h => horseCell(h)).join('　')}
          <div style="margin-top:4px;color:rgba(244,233,201,.55);font-size:11px;">4頭BOX = ${wideCombos.length}点</div>
        </div>
        <div class="offering-amount">¥${wideTotal}（${wideCombos.length}点×¥${r.bets.wide.perPoint}）</div>
      </div>`;
  } else if(strategy === '2horse-tan'){
    grandTotal = r.bets.tan.amount + r.bets.tan2.amount;
    offeringDesc = '２頭単勝勝負';
    offeringRows = `
      <div class="offering-row">
        <div class="offering-type mincho">単　勝①</div>
        <div class="offering-content">${horseCell(r.bets.tan.name)}</div>
        <div class="offering-amount">¥${r.bets.tan.amount}（1点）</div>
      </div>
      <div class="offering-row">
        <div class="offering-type mincho">単　勝②</div>
        <div class="offering-content">${horseCell(r.bets.tan2.name)}</div>
        <div class="offering-amount">¥${r.bets.tan2.amount}（1点）</div>
      </div>`;
  } else if(strategy === '1horse-tan'){
    grandTotal = r.bets.tan.amount;
    offeringDesc = '１点突破確定（単勝）';
    offeringRows = `
      <div class="offering-row">
        <div class="offering-type mincho">単　勝</div>
        <div class="offering-content">${horseCell(r.bets.tan.name)}</div>
        <div class="offering-amount">¥${r.bets.tan.amount}（1点）</div>
      </div>`;
  } else if(strategy === 'wide-only'){
    // 旧スキーマ後方互換
    const wideCombos = makeCombos(r.bets.wide.horses);
    const wideTotal  = wideCombos.length * r.bets.wide.perPoint;
    grandTotal = wideTotal;
    offeringDesc = 'ワイド４頭ＢＯＸ 専用奉納';
    offeringRows = `
      <div class="offering-row">
        <div class="offering-type mincho">ワイド</div>
        <div class="offering-content">
          ${r.bets.wide.horses.map(h => horseCell(h)).join('　')}
          <div style="margin-top:4px;color:rgba(244,233,201,.55);font-size:11px;">4頭BOX = ${wideCombos.length}点</div>
        </div>
        <div class="offering-amount">¥${wideTotal}（${wideCombos.length}点×¥${r.bets.wide.perPoint}）</div>
      </div>`;
  } else if(strategy === 'wide-and-umaren'){
    // 2026-04-26〜v2: ワイド+馬連 並列奉納
    const wideHorses   = (r.bets.wide   && r.bets.wide.horses)   || [];
    const umarenHorses = (r.bets.umaren && r.bets.umaren.horses) || [];
    const wideCombos   = makeCombos(wideHorses);
    const umarenCombos = makeCombos(umarenHorses);
    const widePer      = (r.bets.wide   && r.bets.wide.perPoint)   || 100;
    const umarenPer    = (r.bets.umaren && r.bets.umaren.perPoint) || 100;
    const wideTotal    = wideCombos.length   * widePer;
    const umarenTotal  = umarenCombos.length * umarenPer;
    grandTotal = wideTotal + umarenTotal;
    offeringDesc = 'ワイド ＆ 馬連 ４頭ＢＯＸ 並列奉納';
    offeringRows = `
      <div class="offering-row">
        <div class="offering-type mincho">ワイド</div>
        <div class="offering-content">
          ${wideHorses.map(h => horseCell(h)).join('　')}
          <div style="margin-top:4px;color:rgba(244,233,201,.55);font-size:11px;">4頭BOX = ${wideCombos.length}点</div>
        </div>
        <div class="offering-amount">¥${wideTotal}（${wideCombos.length}点×¥${widePer}）</div>
      </div>
      <div class="offering-row">
        <div class="offering-type mincho">馬　連</div>
        <div class="offering-content">
          ${umarenHorses.map(h => horseCell(h)).join('　')}
          <div style="margin-top:4px;color:rgba(244,233,201,.55);font-size:11px;">4頭BOX = ${umarenCombos.length}点</div>
        </div>
        <div class="offering-amount">¥${umarenTotal}（${umarenCombos.length}点×¥${umarenPer}）</div>
      </div>`;
  }

  const win5Html = r.win5 ? `<span>${r.win5} 対象</span>` : '';
  const gradeHtml = `<span>${r.grade}</span>`;

  // 的中判定（result があれば）
  const verdict = r.result ? judgeWinning(r) : null;
  const verdictBadge = verdict
    ? `<span class="verdict-badge verdict-${verdict.type}">${
        verdict.type === 'win'  ? '🎯 的中' :
        verdict.type === 'gami' ? '🎯 ガミ的中' :
        '— 外れ'
      }</span>`
    : '';

  return `
  <div class="honden">
    <div class="honden-head">
      <div class="honden-race-meta mincho">${r.meta}　／　発走 ${r.startTime}</div>
      <div class="honden-race-name mincho">${r.name}</div>
      <div class="honden-race-info">${win5Html}${gradeHtml}${verdictBadge}</div>
    </div>

    <div class="section-title mincho">選 ば れ し 四 頭</div>
    <div class="omamori-grid">
      ${r.picks.slice(0,4).map(p => omamoriHtml(p, r.result)).join('')}
    </div>

    <div class="offering">
      <div class="offering-desc mincho">${offeringDesc}</div>
      ${offeringRows}
      <div class="offering-total">
        <div class="lbl mincho">奉 納 合 計</div>
        <div class="amt mincho">¥${grandTotal}</div>
      </div>
    </div>

    ${r.result ? renderResultSection(r) : ''}

    <div class="logic-note"><strong>御託宣</strong>　${r.note}</div>
  </div>`;
}

function makeCombos(arr){
  const out = [];
  for(let i=0; i<arr.length; i++){
    for(let j=i+1; j<arr.length; j++){
      out.push([arr[i], arr[j]]);
    }
  }
  return out;
}

  await loadRaces();

  const days = uniqueDays().map(d => d.date);
  const target = days.find(d => d >= today) || days[days.length-1] || days[0];
