<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2D9B0;--bg-dk:#E8C898;--bg-md:#EDD9A3;
  --pink:#E8003D;--pink-dk:#B5002E;--gold:#8B1A1A;
  --text:#1C2B4A;--muted:rgba(28,43,74,0.55);
  --border:rgba(232,0,61,0.22);
}
html,body{background:var(--bg);color:var(--text);font-family:'Public Sans',sans-serif;min-height:100vh;}
.serif{font-family:'Noto Serif JP',serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;}

/* ── Header ── */
.hdr{
  background:linear-gradient(135deg,#EDD9A3,#E8C898 60%,#EDD9A3);
  border-bottom:2px solid rgba(232,0,61,.5);
  padding:14px 18px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 30px rgba(232,0,61,.15);
}
.hdr-back{
  display:inline-flex;align-items:center;gap:4px;padding:6px 12px;
  border-radius:18px;background:rgba(0,0,0,.06);color:var(--muted);
  font-size:11px;font-weight:700;text-decoration:none;
  border:1px solid rgba(0,0,0,.12);
}
.hdr-back:hover{background:rgba(0,0,0,.10);}
.hdr-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:var(--text);}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:2px;}

/* ── Ticker ── */
.ticker-wrap{overflow:hidden;white-space:nowrap;background:var(--pink);padding:7px 0;}
.ticker-text{display:inline-block;animation:ticker-scroll 30s linear infinite;padding-left:100%;font-size:11px;font-weight:900;color:#fff;letter-spacing:.06em;}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* ── Hero ── */
.hero-label{
  font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);margin-bottom:6px;
}
.hero-title{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:900;color:var(--text);}
.hero-desc{font-size:11px;color:var(--muted);margin-top:4px;}

/* ── スコアボード ── */
.scoreboard{
  background:linear-gradient(160deg,rgba(232,208,162,.6),rgba(242,217,176,.95));
  border:1px solid rgba(232,0,61,.30);
  border-radius:20px;
  box-shadow:0 4px 24px rgba(232,0,61,.10),inset 0 1px 0 rgba(255,255,255,.6);
}
.score-col{flex:1;text-align:center;padding:16px 10px;}
.score-col+.score-col{border-left:1px solid rgba(28,43,74,.10);}
.score-big{font-size:28px;font-weight:900;line-height:1;}
.score-label{font-size:10px;margin-top:3px;color:var(--muted);}
.score-divider{border:none;border-top:1px solid rgba(28,43,74,.10);margin:0 16px;}
.stat-bar-wrap{background:rgba(28,43,74,.10);border-radius:999px;height:5px;overflow:hidden;}
.stat-bar{height:5px;border-radius:999px;transition:width 1s ease;}
.stat-bar-tan {background:linear-gradient(90deg,var(--pink),rgba(232,0,61,.5));}
.stat-bar-fuku{background:linear-gradient(90deg,var(--gold),rgba(139,26,26,.4));}
@keyframes scoreCount{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.score-animate{animation:scoreCount .6s ease forwards;}

/* ── 週アコーディオン ── */
.week-card{
  background:linear-gradient(140deg,rgba(232,208,162,.45),rgba(242,217,176,.80));
  border:1px solid rgba(232,0,61,.20);
  border-radius:16px;overflow:hidden;
}
.week-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;transition:background .18s;
}
.week-header:hover{background:rgba(232,0,61,.06);}
.week-body{display:none;padding:0 14px 14px;}
.week-body.open{display:block;}
.week-arrow{transition:transform .22s;color:var(--muted);}
.week-arrow.open{transform:rotate(180deg);}

/* ── 週バッジ ── */
.week-hit-badge{
  font-size:9px;font-weight:900;padding:2px 8px;border-radius:999px;
  background:rgba(232,0,61,.12);border:1px solid rgba(232,0,61,.30);
  color:var(--pink);
}

/* ── レースブロック ── */
.race-block{
  background:rgba(255,255,255,.55);
  border:1px solid rgba(28,43,74,.10);
  border-radius:12px;margin-bottom:8px;overflow:hidden;
}
.race-head{
  padding:10px 14px 8px;
  border-bottom:1px solid rgba(28,43,74,.08);
  background:rgba(232,208,162,.30);
}

/* ── 着順バッジ ── */
.rank-1 {background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;}
.rank-2 {background:linear-gradient(135deg,#9ca3af,#6b7280);color:#fff;}
.rank-3 {background:linear-gradient(135deg,#d97706,#92400e);color:#fff;}
.rank-out{background:rgba(28,43,74,.08);color:var(--muted);}
.rank-pending{background:rgba(28,43,74,.05);color:rgba(28,43,74,.35);border:1px dashed rgba(28,43,74,.20);}

/* ── 馬券種別バッジ ── */
.bet-tan   {background:linear-gradient(135deg,#E8003D,#B5002E);color:#fff;}
.bet-fuku  {background:linear-gradient(135deg,#8B1A1A,#5a0f0f);color:#fff;}
.bet-umaren{background:linear-gradient(135deg,#06b6d4,#0e7490);color:#fff;}
.bet-wide  {background:linear-gradient(135deg,#8b5cf6,#4c1d95);color:#fff;}
.bet-sanren{background:linear-gradient(135deg,#d97706,#92400e);color:#fff;}
.bet-other {background:rgba(28,43,74,.10);color:var(--muted);}

/* ── ローダー ── */
@keyframes spin{to{transform:rotate(360deg)}}
.loader{width:28px;height:28px;border:3px solid rgba(232,0,61,.15);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}

/* ── 空ステート ── */
.empty-state{text-align:center;padding:60px 20px;}

/* ── セクションラベル ── */
.sec-label{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}

/* ── フッター ── */
footer{margin-top:60px;padding:24px 20px;border-top:1px solid rgba(232,0,61,.18);text-align:center;}
</style>
</head>

<script>
const BET_CLASS = {
  '単勝':'bet-tan','複勝':'bet-fuku','馬連':'bet-umaren',
  'ワイド':'bet-wide','三連複':'bet-sanren','三連単':'bet-sanren',
};

function calcInvestment(picks) {
  const A = [], B = [], C = [], O = [];
  (picks || []).forEach((h, i) => {
    const m = h.mark || '';
    if (m === '◎')                      { A.push(i); B.push(i); C.push(i); }
    else if (m === '○')                  { A.push(i); B.push(i); C.push(i); O.push(i); }
    else if (m === '▲' || m === '☆')   { B.push(i); C.push(i); }
    else if (m === '△')                  { C.push(i); }
  });
  const inba = B.length + C.filter(i => !B.includes(i)).length;
  // 単勝:◎×1000円、複勝:○×1000円、馬単/三連複/三連単:100円/line
  const tansho  = (A.length - O.length) * 1000; // ◎の数 × 1000
  const fukusho = O.length * 1000;               // ○の数 × 1000
  const batan   = inba * 2 * 100;
  let fuku = 0;
  for (let i = 0; i < C.length; i++)
    for (let j = i+1; j < C.length; j++)
      for (let k = j+1; k < C.length; k++) {
        const c = [C[i],C[j],C[k]];
        if (c.some(x=>A.includes(x)) && c.filter(x=>B.includes(x)).length>=2) fuku++;
      }
  let tan = 0;
  for (const a of A) for (const b of B) { if (b===a) continue;
    for (const c of C) { if (c===a||c===b) continue; tan++; } }
  return { total: tansho + fukusho + batan + fuku*100 + tan*100 };
}

async function loadHistory() {
  try {
    const res = await fetch('data/final-history.json?v=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    render(await res.json());
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('emptyState').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  const weeks = (data.weeks || []).slice().reverse();
  let totalPicks=0, tanHits=0, fukuHits=0, tanReturn=0, fukuReturn=0;
  let totalInvestment=0, totalReturn=0;
  weeks.forEach(w => {
    (w.races||[]).forEach(r => {
      const hasResult = (r.picks||[]).some(h => h.result && h.result.chakujun != null);
      if (hasResult) {
        totalInvestment += r.investment ? r.investment : calcInvestment(r.picks||[]).total;
        totalReturn += r.returnAmount || 0;
      }
      (r.picks||[]).forEach(h => {
        const res = h.result;
        if (!res || res.chakujun == null) return;
        totalPicks++;
        const rank = parseInt(res.chakujun);
        if (rank===1) { tanHits++; tanReturn += (parseFloat(res.tanOdds)||0)*100; }
        if (rank<=3)  { fukuHits++; fukuReturn += (parseFloat(res.fukuOdds)||0)*100; }
      });
    });
  });
  renderScoreboard(totalPicks, tanHits, fukuHits, tanReturn, fukuReturn, totalInvestment, totalReturn);
  if (weeks.length===0) { document.getElementById('emptyState').style.display='block'; return; }
  renderWeeks(weeks);
}

function renderScoreboard(total, tanH, fukuH, tanRet, fukuRet, totalInv, totalRet) {
  const tanRate  = total>0 ? tanH/total*100 : 0;
  const fukuRate = total>0 ? fukuH/total*100 : 0;
  const betKaichi = totalInv>0 ? Math.round(totalRet/totalInv*100) : 0;
  const cols = [
    { label:'単勝的中率', value: total>0 ? tanRate.toFixed(1)+'%'  : '-%', color:'#E8003D' },
    { label:'複勝的中率', value: total>0 ? fukuRate.toFixed(1)+'%'  : '-%', color:'#8B1A1A' },
    { label:'総回収率',   value: totalInv>0 ? betKaichi+'%'          : '-%', color: betKaichi>=100 ? '#22c55e' : '#B5002E' },
    { label:'回収額',     value: totalInv>0 ? '¥'+totalRet.toLocaleString() : '-', color:'#1C2B4A' },
  ];
  document.getElementById('scoreCols').innerHTML = cols.map(c => `
    <div class="score-col score-animate">
      <div class="score-big" style="color:${c.color}">${esc(c.value)}</div>
      <div class="score-label">${esc(c.label)}</div>
    </div>`).join('');
  document.getElementById('tanHitFrac').textContent  = `${tanH}/${total}頭`;
  document.getElementById('fukuHitFrac').textContent = `${fukuH}/${total}頭`;
  document.getElementById('tanRateLabel').textContent  = total>0 ? '的中率 '+tanRate.toFixed(1)+'%' : '-';
  document.getElementById('fukuRateLabel').textContent = total>0 ? '的中率 '+fukuRate.toFixed(1)+'%' : '-';
  document.getElementById('totalPicks').textContent = total+'頭（結果入力済）';
  document.getElementById('invSummary').textContent = totalInv>0
    ? `¥${totalInv.toLocaleString()} → ¥${totalRet.toLocaleString()}` : '-';
  setTimeout(() => {
    document.getElementById('tanBar').style.width  = Math.min(tanRate,100)+'%';
    document.getElementById('fukuBar').style.width = Math.min(fukuRate,100)+'%';
  }, 300);
}

function renderWeeks(weeks) {
  const container = document.getElementById('weekList');
  container.innerHTML = '';
  weeks.forEach((week, idx) => {
    let wTotal=0, wTan=0, wFuku=0;
    (week.races||[]).forEach(r => {
      (r.picks||[]).forEach(h => {
        const res = h.result;
        if (!res || res.chakujun == null) return;
        wTotal++;
        const rank = parseInt(res.chakujun);
        if (rank===1) wTan++;
        if (rank<=3)  wFuku++;
      });
    });
    const weekEl = document.createElement('div');
    weekEl.className = 'week-card';
    weekEl.innerHTML = `
      <div class="week-header" onclick="toggleWeek(this)">
        <div style="display:flex;align-items:center;gap:10px;">
          <div>
            <p style="font-weight:900;font-size:14px;color:var(--text);">${esc(week.label||week.weekId)}</p>
            <p style="font-size:11px;margin-top:2px;color:var(--muted);">${week.races?week.races.length+'レース':'0レース'}</p>
          </div>
          ${wTotal>0 ? `<span class="week-hit-badge">単${wTan}/${wTotal} 複${wFuku}/${wTotal}</span>` : ''}
        </div>
        <span class="material-symbols-outlined week-arrow ${idx===0?'open':''}">expand_more</span>
      </div>
      <div class="week-body ${idx===0?'open':''}">
        ${(week.races||[]).map(r => buildRaceBlock(r)).join('')}
        ${(!week.races||week.races.length===0)?'<p style="text-align:center;font-size:11px;padding:16px 0;color:var(--muted);">レースなし</p>':''}
      </div>`;
    container.appendChild(weekEl);
  });
}

function buildRaceBlock(race) {
  const picks = race.picks || [];
  const rtn = race.returnAmount || 0;
  const hasResult = picks.some(h => h.result && h.result.chakujun != null);
  // race.investment が設定されていればそれを優先、なければ自動計算
  const invTotal = race.investment ? race.investment : calcInvestment(picks).total;
  const pct = (hasResult && invTotal>0) ? Math.round(rtn/invTotal*100) : null;
  const pctColor = pct!=null ? (pct>=100?'#22c55e':'#E8003D') : '';
  const pctHtml = pct!=null ? `<span style="font-size:14px;font-weight:900;color:${pctColor};margin-left:6px;">${pct}%</span>` : '';
  const invHtml = (hasResult && invTotal>0)
    ? `<p style="font-size:10px;margin-top:2px;color:var(--muted);">投資¥${invTotal.toLocaleString()} 回収¥${rtn.toLocaleString()}</p>` : '';
  return `
    <div class="race-block">
      <div class="race-head">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div>
            <p style="font-weight:900;font-size:13px;color:var(--text);font-family:'Noto Serif JP',serif;">${esc(race.raceName)}</p>
            <p style="font-size:10px;margin-top:2px;color:var(--muted);">${esc(race.course||'')} &nbsp;｜&nbsp; ${esc(race.date||'')}</p>
            ${invHtml}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <span style="font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;background:rgba(232,0,61,.12);color:var(--pink);border:1px solid rgba(232,0,61,.25);">厳選 ${picks.length}点</span>
            ${pctHtml}
          </div>
        </div>
      </div>
      <div style="padding:10px 14px;display:flex;flex-direction:column;gap:10px;">
        ${picks.map(h => buildPickRow(h)).join('')}
      </div>
    </div>`;
}

function buildPickRow(h) {
  const res = h.result || {};
  const rank = res.chakujun!=null ? parseInt(res.chakujun) : null;
  let rankBadge = '';
  if (rank===null) rankBadge = `<span class="rank-pending" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;">結果待ち</span>`;
  else if (rank===1) rankBadge = `<span class="rank-1" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;">🥇 1着</span>`;
  else if (rank===2) rankBadge = `<span class="rank-2" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;">🥈 2着</span>`;
  else if (rank===3) rankBadge = `<span class="rank-3" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;">🥉 3着</span>`;
  else rankBadge = `<span class="rank-out" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;">${rank}着</span>`;

  const betCls = BET_CLASS[h.betType] || 'bet-other';
  const betBadge = h.betType ? `<span class="${betCls}" style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;">${esc(h.betType)}</span>` : '';

  let oddsHtml = '';
  if (rank!=null) {
    const t = res.tanOdds  ? `<span style="font-size:11px;color:${rank===1?'#E8003D':'var(--muted)'};">単 <strong>${res.tanOdds}倍</strong></span>` : '';
    const f = res.fukuOdds ? `<span style="font-size:11px;color:${rank<=3?'#8B1A1A':'var(--muted)'};">複 <strong>${res.fukuOdds}倍</strong></span>` : '';
    if (t||f) oddsHtml = `<div style="display:flex;gap:10px;margin-top:3px;">${t}${f}</div>`;
  }

  return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-weight:900;font-size:13px;color:var(--text);">${esc(h.name)}</span>
          ${betBadge}
        </div>
        ${oddsHtml}
      </div>
      <div style="flex-shrink:0;">${rankBadge}</div>
    </div>`;
}

function toggleWeek(header) {
  const body  = header.nextElementSibling;
  const arrow = header.querySelector('.week-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

function esc(str) {
  if (!str && str!==0) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadHistory();
</script>
</body>
</html>
