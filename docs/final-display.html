<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>最終予想 | UG強奪競馬新聞</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Public+Sans:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#130003;--bg-dk:#0b0002;--bg-md:#1a0004;
  --pink:#E8003D;--pink-dk:#B5002E;--gold:#f0c040;
  --green:#22c55e;
  --text:#f5d0d5;--muted:rgba(255,255,255,0.45);
  --card:rgba(255,255,255,0.05);--border:rgba(232,0,61,0.22);
}
html,body{background:var(--bg);color:var(--text);font-family:'Public Sans',sans-serif;min-height:100vh;}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#200006,#0b0002 60%,#130003);border-bottom:2px solid rgba(232,0,61,.5);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(232,0,61,.2);}
.hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:18px;background:rgba(255,255,255,0.08);color:var(--muted);font-size:11px;font-weight:700;text-decoration:none;border:1px solid rgba(255,255,255,0.12);}
.hdr-back:hover{background:rgba(255,255,255,0.14);}
.hdr-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(232,0,61,.8),0 0 48px rgba(232,0,61,.4);letter-spacing:.05em;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

/* ── Race Selector ── */
.selector-wrap{padding:14px 12px 0;max-width:780px;margin:0 auto;}
.week-label{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;text-shadow:0 0 10px rgba(240,192,64,.5);padding-left:2px;}
.race-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}

.race-btn{
  background:linear-gradient(140deg,rgba(30,0,8,.9),rgba(10,0,3,.95));
  border:1px solid rgba(232,0,61,.25);
  border-radius:14px;
  padding:12px 14px;
  cursor:pointer;
  text-align:left;
  color:var(--text);
  transition:all .18s ease;
  position:relative;
  overflow:hidden;
}
.race-btn:active{transform:scale(.97);}
.race-btn.active{
  background:linear-gradient(140deg,rgba(232,0,61,.22),rgba(10,0,3,.95));
  border:2px solid rgba(232,0,61,.75);
  box-shadow:0 0 20px rgba(232,0,61,.3),inset 0 0 16px rgba(232,0,61,.08);
}
.race-btn .btn-grade{
  font-size:9px;font-weight:900;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:5px;letter-spacing:.06em;
}
.race-btn .btn-name{
  font-family:'Noto Serif JP',serif;font-size:14px;font-weight:900;color:#fff;line-height:1.25;margin-bottom:4px;
}
.race-btn .btn-meta{
  font-size:10px;color:rgba(255,255,255,.45);line-height:1.4;
}
.race-btn.active .btn-name{color:#fff;text-shadow:0 0 12px rgba(232,0,61,.5);}
.race-btn .active-dot{
  position:absolute;top:10px;right:10px;
  width:7px;height:7px;border-radius:50%;
  background:var(--pink);
  box-shadow:0 0 8px rgba(232,0,61,.8);
  display:none;
}
.race-btn.active .active-dot{display:block;}

/* ── Detail Panel ── */
.detail-wrap{max-width:780px;margin:0 auto;padding:14px 12px 100px;}

/* Race card */
.race-card{background:linear-gradient(160deg,rgba(30,0,8,.9),rgba(10,0,3,.95));border:1px solid rgba(232,0,61,.30);border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(232,0,61,.10);}
.race-head{background:linear-gradient(120deg,rgba(232,0,61,.18) 0%,rgba(10,0,3,.9) 55%,rgba(240,192,64,.06) 100%);border-bottom:1px solid rgba(232,0,61,.35);padding:16px 20px;display:flex;align-items:flex-start;gap:12px;}
.race-grade-badge{font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;white-space:nowrap;margin-top:2px;letter-spacing:.06em;flex-shrink:0;}
.race-name{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:900;color:#fff;letter-spacing:.04em;line-height:1.1;}
.race-meta{font-size:11px;color:rgba(255,255,255,.55);margin-top:5px;letter-spacing:.04em;}
.race-body{padding:18px 18px 22px;}

/* Condition note */
.cond-note{background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.25);border-left:3px solid rgba(240,192,64,.6);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:12px;line-height:1.65;color:rgba(255,240,180,.88);}

/* Section title */
.sec-title{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px;margin-top:2px;padding-left:4px;}

/* Hero cards */
.horse-hero{border-radius:16px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden;}
.horse-hero.h-honmei{background:linear-gradient(140deg,rgba(232,0,61,.22) 0%,rgba(20,0,6,.95) 55%);border:2px solid rgba(232,0,61,.75);box-shadow:0 0 32px rgba(232,0,61,.35),inset 0 0 20px rgba(232,0,61,.08);}
.horse-hero.h-taikou{background:linear-gradient(140deg,rgba(255,255,255,.13) 0%,rgba(14,0,5,.95) 55%);border:2px solid rgba(255,255,255,.45);box-shadow:0 0 24px rgba(255,255,255,.12),inset 0 0 16px rgba(255,255,255,.04);}
.horse-hero.h-sangen{background:linear-gradient(140deg,rgba(240,192,64,.15) 0%,rgba(14,0,5,.95) 55%);border:1px solid rgba(240,192,64,.55);box-shadow:0 0 20px rgba(240,192,64,.2),inset 0 0 14px rgba(240,192,64,.05);}
.horse-hero.h-star{background:linear-gradient(140deg,rgba(168,85,247,.15) 0%,rgba(14,0,5,.95) 55%);border:1px solid rgba(168,85,247,.50);box-shadow:0 0 18px rgba(168,85,247,.2);}
.horse-hero.h-delta{background:linear-gradient(140deg,rgba(100,160,255,.10) 0%,rgba(14,0,5,.95) 55%);border:1px solid rgba(100,160,255,.35);box-shadow:0 0 14px rgba(100,160,255,.12);}

.horse-hero-mark{position:absolute;top:12px;right:14px;font-size:28px;font-weight:900;line-height:1;opacity:.9;}
.h-honmei .horse-hero-mark{color:#E8003D;text-shadow:0 0 20px rgba(232,0,61,.9);}
.h-taikou .horse-hero-mark{color:#fff;text-shadow:0 0 18px rgba(255,255,255,.7);}
.h-sangen .horse-hero-mark{color:#f0c040;text-shadow:0 0 16px rgba(240,192,64,.8);}
.h-star   .horse-hero-mark{color:#d8b4fe;text-shadow:0 0 14px rgba(168,85,247,.7);}
.h-delta  .horse-hero-mark{color:#93c5fd;text-shadow:0 0 12px rgba(100,160,255,.6);}

.hero-rank-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:900;letter-spacing:.1em;padding:2px 8px;border-radius:4px;text-transform:uppercase;margin-bottom:7px;}
.h-honmei .hero-rank-pill{background:rgba(232,0,61,.25);color:#ff6b8a;border:1px solid rgba(232,0,61,.4);}
.h-taikou .hero-rank-pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.25);}
.h-sangen .hero-rank-pill{background:rgba(240,192,64,.18);color:#f0c040;border:1px solid rgba(240,192,64,.35);}
.h-star   .hero-rank-pill{background:rgba(168,85,247,.18);color:#d8b4fe;border:1px solid rgba(168,85,247,.35);}
.h-delta  .hero-rank-pill{background:rgba(100,160,255,.15);color:#93c5fd;border:1px solid rgba(100,160,255,.30);}

.horse-num-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:900;flex-shrink:0;margin-right:5px;}
.h-honmei .horse-num-badge{background:rgba(232,0,61,.3);color:#fff;border:1px solid rgba(232,0,61,.6);}
.h-taikou .horse-num-badge{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);}
.h-sangen .horse-num-badge{background:rgba(240,192,64,.2);color:#f0c040;border:1px solid rgba(240,192,64,.5);}
.h-star   .horse-num-badge{background:rgba(168,85,247,.2);color:#d8b4fe;border:1px solid rgba(168,85,247,.4);}
.h-delta  .horse-num-badge{background:rgba(100,160,255,.15);color:#93c5fd;border:1px solid rgba(100,160,255,.35);}

.horse-hero-name{font-family:'Noto Serif JP',serif;font-size:21px;font-weight:900;line-height:1.15;display:flex;align-items:center;gap:4px;padding-right:44px;}
.h-honmei .horse-hero-name{color:#fff;text-shadow:0 0 20px rgba(232,0,61,.5);}
.h-taikou .horse-hero-name{color:#fff;text-shadow:0 0 16px rgba(255,255,255,.3);}
.h-sangen .horse-hero-name{color:#fff8e0;text-shadow:0 0 14px rgba(240,192,64,.3);}
.h-star   .horse-hero-name{color:#f0e8ff;}
.h-delta  .horse-hero-name{color:#e8f0ff;}

.horse-hero-info{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;}
.info-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap;}
.info-jockey{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);}
.info-trainer{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);}
.info-pt{font-size:13px;font-weight:900;color:var(--gold);margin-left:auto;text-shadow:0 0 8px rgba(240,192,64,.5);}

/* Compact table */
.compact-table-wrap{overflow-x:auto;margin-bottom:14px;}
table.horse-tbl{width:100%;border-collapse:collapse;font-size:12px;}
table.horse-tbl th{background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:7px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap;}
table.horse-tbl td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;color:rgba(255,255,255,.7);}
table.horse-tbl td.tbl-name{text-align:left;font-weight:700;color:var(--text);}
table.horse-tbl tr:last-child td{border-bottom:none;}
.mark-badge{display:inline-block;font-size:14px;font-weight:900;width:22px;text-align:center;}
.mark-◎{color:#E8003D;text-shadow:0 0 6px rgba(232,0,61,.6);}
.mark-○{color:#fff;}
.mark-▲{color:var(--gold);text-shadow:0 0 6px rgba(240,192,64,.5);}
.mark-△{color:#93c5fd;}
.mark-☆{color:#d8b4fe;}
.mark-×{color:var(--muted);}
.pt-val{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;}

/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(232,0,61,.25),transparent);margin:16px 0;}

/* Bets */
.bets-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.bet-row{display:flex;align-items:baseline;gap:10px;padding:9px 14px;border-radius:10px;background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);}
.bet-type{font-size:10px;font-weight:900;color:var(--gold);min-width:52px;white-space:nowrap;letter-spacing:.05em;}
.bet-val{font-size:13px;font-weight:700;color:#fff;}

/* Comments */
.comment-area{display:flex;flex-direction:column;gap:10px;}
.final-card{background:linear-gradient(140deg,rgba(240,192,64,.12),rgba(10,0,3,.95));border:2px solid rgba(240,192,64,.65);border-radius:14px;padding:15px 17px;box-shadow:0 0 28px rgba(240,192,64,.25),inset 0 0 20px rgba(240,192,64,.05);}
.final-card .clabel{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#f0c040;text-shadow:0 0 10px rgba(240,192,64,.9);margin-bottom:7px;}
.final-card .ctext{font-size:14px;line-height:1.75;color:#fff8d0;font-weight:600;}
.risk-card{background:rgba(232,0,61,.07);border:1px solid rgba(232,0,61,.25);border-radius:12px;padding:13px 15px;}
.risk-card .clabel{font-size:10px;font-weight:900;letter-spacing:.1em;color:rgba(255,150,150,.7);margin-bottom:6px;}
.risk-card .ctext{font-size:13px;line-height:1.65;color:#ffb3c6;}
.extra-card{background:linear-gradient(140deg,rgba(255,100,0,.12),rgba(10,0,3,.95));border:2px solid rgba(255,140,0,.55);border-radius:12px;padding:13px 15px;box-shadow:0 0 18px rgba(255,120,0,.2);}
.extra-card .clabel{font-size:11px;font-weight:900;letter-spacing:.1em;color:#ffb020;text-shadow:0 0 8px rgba(255,180,0,.8);margin-bottom:6px;}
.extra-card .ctext{font-size:14px;line-height:1.65;color:#ffe8a0;font-weight:700;}
.betmemo-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 14px;}
.betmemo-card .clabel{font-size:9px;font-weight:900;letter-spacing:.12em;color:rgba(255,255,255,.4);margin-bottom:5px;}
.betmemo-card .ctext{font-size:12px;line-height:1.6;color:rgba(255,255,255,.65);}

/* Loading / Error */
.loading{text-align:center;padding:50px 20px;color:var(--muted);}
.err{text-align:center;padding:30px 20px;color:#ffb3c6;font-size:13px;}

/* fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.race-card{animation:fadeUp .22s ease both;}

/* ══ グレード別ネオン点滅 ══ */
@keyframes neonG1{
  0%,100%{box-shadow:0 0 6px rgba(240,192,64,.5),0 0 14px rgba(240,192,64,.2);}
  50%{box-shadow:0 0 18px rgba(240,192,64,1),0 0 38px rgba(240,192,64,.7),0 0 65px rgba(240,192,64,.3);}
}
@keyframes neonG2{
  0%,100%{box-shadow:0 0 6px rgba(34,197,94,.5),0 0 14px rgba(34,197,94,.2);}
  50%{box-shadow:0 0 18px rgba(34,197,94,1),0 0 38px rgba(34,197,94,.7),0 0 65px rgba(34,197,94,.3);}
}
@keyframes neonG3{
  0%,100%{box-shadow:0 0 6px rgba(59,130,246,.5),0 0 14px rgba(59,130,246,.2);}
  50%{box-shadow:0 0 18px rgba(59,130,246,1),0 0 38px rgba(59,130,246,.7),0 0 65px rgba(59,130,246,.3);}
}

/* ─ ボタン：グレード別ネオン枠線 ─ */
.race-btn.grade-g1{border-color:rgba(240,192,64,.55);animation:neonG1 2s ease-in-out infinite;}
.race-btn.grade-g2{border-color:rgba(34,197,94,.55);animation:neonG2 2s ease-in-out infinite;}
.race-btn.grade-g3{border-color:rgba(59,130,246,.55);animation:neonG3 2s ease-in-out infinite;}
.race-btn.active.grade-g1{border-width:2px;border-color:rgba(240,192,64,.9);background:linear-gradient(140deg,rgba(240,192,64,.15),rgba(10,0,3,.95));}
.race-btn.active.grade-g2{border-width:2px;border-color:rgba(34,197,94,.9);background:linear-gradient(140deg,rgba(34,197,94,.12),rgba(10,0,3,.95));}
.race-btn.active.grade-g3{border-width:2px;border-color:rgba(59,130,246,.9);background:linear-gradient(140deg,rgba(59,130,246,.12),rgba(10,0,3,.95));}
.race-btn.active.grade-g1 .active-dot{background:#f0c040;box-shadow:0 0 8px rgba(240,192,64,.9);}
.race-btn.active.grade-g2 .active-dot{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.9);}
.race-btn.active.grade-g3 .active-dot{background:#3b82f6;box-shadow:0 0 8px rgba(59,130,246,.9);}

/* ─ レースカード：グレード別ネオン枠線 ─ */
.race-card.grade-g1{border-color:rgba(240,192,64,.55);animation:fadeUp .22s ease both,neonG1 2.5s ease-in-out infinite;}
.race-card.grade-g2{border-color:rgba(34,197,94,.55);animation:fadeUp .22s ease both,neonG2 2.5s ease-in-out infinite;}
.race-card.grade-g3{border-color:rgba(59,130,246,.55);animation:fadeUp .22s ease both,neonG3 2.5s ease-in-out infinite;}

/* ─ レースヘッダー・タイトル：グレード別カラー ─ */
.race-card.grade-g1 .race-head{border-bottom-color:rgba(240,192,64,.5);background:linear-gradient(120deg,rgba(240,192,64,.14) 0%,rgba(10,0,3,.9) 55%,rgba(240,192,64,.04) 100%);}
.race-card.grade-g2 .race-head{border-bottom-color:rgba(34,197,94,.5);background:linear-gradient(120deg,rgba(34,197,94,.11) 0%,rgba(10,0,3,.9) 55%,rgba(34,197,94,.04) 100%);}
.race-card.grade-g3 .race-head{border-bottom-color:rgba(59,130,246,.5);background:linear-gradient(120deg,rgba(59,130,246,.11) 0%,rgba(10,0,3,.9) 55%,rgba(59,130,246,.04) 100%);}
.race-card.grade-g1 .race-name{text-shadow:0 0 22px rgba(240,192,64,.6);}
.race-card.grade-g2 .race-name{text-shadow:0 0 22px rgba(34,197,94,.5);}
.race-card.grade-g3 .race-name{text-shadow:0 0 22px rgba(59,130,246,.5);}
</style>
</head>
<body>

<header class="hdr">
  <a href="../index.html" class="hdr-back">← トップ</a>
  <div>
    <div class="hdr-sub">UG強奪競馬新聞 / 重賞最終予想</div>
    <div class="hdr-logo">🎯 FINAL PICK</div>
  </div>
</header>

<!-- レース選択ボタン -->
<div class="selector-wrap">
  <div class="week-label" id="weekLabel">⏳ 読み込み中...</div>
  <div class="race-btns" id="raceBtns"></div>
</div>

<!-- 詳細表示エリア -->
<div class="detail-wrap">
  <div id="detail"><div class="loading">⏳ データ読み込み中...</div></div>
</div>

<script>
const MARK_ORDER = ['◎','○','▲','☆','△','×',''];
const MARK_META = {
  '◎': { cls:'h-honmei', label:'◎ 本命', icon:'◎' },
  '○': { cls:'h-taikou', label:'○ 対抗', icon:'○' },
  '▲': { cls:'h-sangen', label:'▲ 3番手',icon:'▲' },
  '☆': { cls:'h-star',   label:'☆ 穴馬', icon:'☆' },
  '△': { cls:'h-delta',  label:'△ 連下', icon:'△' },
};

function gradeStyle(g) {
  if (g==='G1') return 'background:#f0c040;color:#000;';
  if (g==='G2') return 'background:#c0c0c0;color:#000;';
  if (g==='G3') return 'background:#cd7f32;color:#fff;';
  return 'background:rgba(34,197,94,.3);color:#22c55e;';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderHeroCard(h) {
  const meta = MARK_META[h.mark];
  if (!meta) return '';
  const jockeyHtml = h.jockey ? `<span class="info-pill info-jockey">🏇 ${esc(h.jockey)}</span>` : '';
  const trainerHtml = h.trainer ? `<span class="info-pill info-trainer">🏠 ${esc(h.trainer)}</span>` : '';
  return `
  <div class="horse-hero ${meta.cls}">
    <span class="horse-hero-mark">${meta.icon}</span>
    <div class="hero-rank-pill">${esc(meta.label)}</div>
    <div class="horse-hero-name">
      <span class="horse-num-badge">${h.num}</span>
      <span>${esc(h.name)}</span>
    </div>
    <div class="horse-hero-info">
      ${jockeyHtml}${trainerHtml}
      <span class="info-pt">${h.totalPt} pt</span>
    </div>
  </div>`;
}

function renderCompactRows(horses) {
  if (!horses.length) return '';
  const rows = horses.map(h => {
    const markDisp = h.mark
      ? `<span class="mark-badge mark-${h.mark}">${h.mark}</span>`
      : '<span style="color:var(--muted);font-size:10px;">—</span>';
    return `<tr>
      <td>${h.num}</td>
      <td class="tbl-name">${esc(h.name)}</td>
      <td style="font-size:11px;">${h.jockey ? esc(h.jockey) : '<span style="color:var(--muted)">—</span>'}</td>
      <td>${markDisp}</td>
      <td class="pt-val">${h.totalPt}</td>
    </tr>`;
  }).join('');
  return `
  <div class="compact-table-wrap">
    <table class="horse-tbl">
      <thead><tr><th>馬番</th><th style="text-align:left;">馬名</th><th style="text-align:left;">騎手</th><th>印</th><th>pt</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderRaceDetail(data) {
  const r = data.race || {};
  const allHorses = (data.horses || []).slice().sort((a,b) => {
    const ai = MARK_ORDER.indexOf(a.mark||'');
    const bi = MARK_ORDER.indexOf(b.mark||'');
    return ai !== bi ? ai - bi : b.totalPt - a.totalPt;
  });
  const bets = data.bets || {};
  const comments = data.comments || {};

  const heroHorses = allHorses.filter(h => h.mark && MARK_META[h.mark]);
  const restHorses = allHorses.filter(h => !h.mark || !MARK_META[h.mark] || h.mark==='×');

  const betTypes = ['単勝','馬連','ワイド','三連複','三連単','買い目1'];
  const betsHtml = betTypes
    .filter(k => bets[k])
    .map(k => `<div class="bet-row"><span class="bet-type">${k}</span><span class="bet-val">${esc(bets[k])}</span></div>`)
    .join('');

  const commentsHtml = [
    comments.final ? `<div class="final-card"><div class="clabel">■ 最終結論</div><div class="ctext">${esc(comments.final).replace(/\n/g,'<br>')}</div></div>` : '',
    comments.risk  ? `<div class="risk-card"><div class="clabel">⚠️ 波乱ファクター</div><div class="ctext">${esc(comments.risk)}</div></div>` : '',
    data.betMemo   ? `<div class="betmemo-card"><div class="clabel">📝 買い目メモ</div><div class="ctext">${esc(data.betMemo)}</div></div>` : '',
    comments.extra ? `<div class="extra-card"><div class="clabel">🚨 補足</div><div class="ctext">${esc(comments.extra)}</div></div>` : '',
  ].filter(Boolean).join('');

  const gs = gradeStyle(r.grade||'');
  const gradeClass = r.grade ? 'grade-' + r.grade.toLowerCase() : '';

  return `
  <div class="race-card ${gradeClass}">
    <div class="race-head">
      <span class="race-grade-badge" style="${gs}">${esc(r.grade||'')}</span>
      <div>
        <div class="race-name">${esc(r.name||'')}</div>
        <div class="race-meta">${esc(r.venue||'')} ${esc(r.raceNum||'')} ／ ${esc(r.surface||'')}${esc(r.distance||'')} ／ ${esc(r.condition||'')} ／ ${esc(r.date||'')}</div>
      </div>
    </div>
    <div class="race-body">
      ${data.raceCondNote ? `<div class="cond-note">🏟️ ${esc(data.raceCondNote).replace(/\n/g,'<br>')}</div>` : ''}
      ${heroHorses.length ? `<div class="sec-title">印付き馬</div>${heroHorses.map(renderHeroCard).join('')}` : ''}
      ${restHorses.length ? `<div class="sec-title" style="margin-top:14px;">全馬スコア</div>${renderCompactRows(restHorses)}` : ''}
      <div class="divider"></div>
      ${betsHtml ? `<div class="sec-title">買い目</div><div class="bets-grid">${betsHtml}</div><div class="divider"></div>` : ''}
      ${commentsHtml ? `<div class="sec-title">分析コメント</div><div class="comment-area">${commentsHtml}</div>` : ''}
    </div>
  </div>`;
}

// ── ボタン生成 ─────────────────────────────────
function gradeLabel(g) {
  if (g==='G1') return `<span class="btn-grade" style="background:#f0c040;color:#000;">G1</span>`;
  if (g==='G2') return `<span class="btn-grade" style="background:#c0c0c0;color:#000;">G2</span>`;
  if (g==='G3') return `<span class="btn-grade" style="background:#cd7f32;color:#fff;">G3</span>`;
  return `<span class="btn-grade" style="background:rgba(34,197,94,.3);color:#22c55e;border:1px solid rgba(34,197,94,.4);">${g||'OP'}</span>`;
}

// キャッシュ
const cache = {};

async function showRace(file, btnEl) {
  // アクティブボタン切り替え
  document.querySelectorAll('.race-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const detail = document.getElementById('detail');
  detail.innerHTML = '<div class="loading">⏳ 読み込み中...</div>';

  try {
    if (!cache[file]) {
      const r = await fetch(`data/${file}.json?v=` + Date.now());
      if (!r.ok) throw new Error(`${file}.json が見つかりません`);
      cache[file] = await r.json();
    }
    detail.innerHTML = renderRaceDetail(cache[file]);
    // スクロールをdetailの先頭へ
    detail.scrollIntoView({behavior:'smooth', block:'start'});
  } catch(e) {
    detail.innerHTML = `<div class="err">⚠️ 読み込みエラー：${e.message}</div>`;
  }
}

async function loadAll() {
  const weekLabel = document.getElementById('weekLabel');
  const raceBtns  = document.getElementById('raceBtns');
  const detail    = document.getElementById('detail');

  try {
    const res = await fetch('data/final-list.json?v=' + Date.now());
    if (!res.ok) throw new Error('final-list.json が見つかりません');
    const list = await res.json();

    weekLabel.textContent = '🗓️ ' + (list.label || list.week);

    if (!list.files || list.files.length === 0) {
      raceBtns.innerHTML = '';
      detail.innerHTML = '<div class="err">今週の最終予想はまだ公開されていません</div>';
      return;
    }

    // ボタン先読み（レース情報だけ取得）
    const buttons = [];
    for (const file of list.files) {
      try {
        const r2 = await fetch(`data/${file}.json?v=` + Date.now());
        if (!r2.ok) continue;
        const data = await r2.json();
        if (data.published === false) continue;
        cache[file] = data; // キャッシュ
        buttons.push({ file, data });
      } catch(e) { /* スキップ */ }
    }

    if (buttons.length === 0) {
      detail.innerHTML = '<div class="err">今週の最終予想はまだ公開されていません 🙏</div>';
      return;
    }

    // ボタン描画
    raceBtns.innerHTML = buttons.map(({ file, data }) => {
      const r = data.race || {};
      const honmei = (data.horses || []).find(h => h.mark === '◎');
      const taikou = (data.horses || []).find(h => h.mark === '○');
      const picksLine = [honmei, taikou]
        .filter(Boolean)
        .map(h => `◎${h.name}` === `◎${honmei?.name}` ? `◎${h.name}` : `○${h.name}`)
        .join(' / ');

      const gradeClass = r.grade ? 'grade-' + r.grade.toLowerCase() : '';
      return `<button class="race-btn ${gradeClass}" data-file="${esc(file)}" onclick="handleBtnClick(this)">
        <span class="active-dot"></span>
        ${gradeLabel(r.grade)}
        <div class="btn-name">${esc(r.name||file)}</div>
        <div class="btn-meta">${esc(r.venue||'')} ${esc(r.distance||'')} ／ ${esc(r.date||'')}</div>
        ${picksLine ? `<div style="margin-top:5px;font-size:10px;font-weight:700;color:rgba(240,192,64,.8);">${esc(picksLine)}</div>` : ''}
      </button>`;
    }).join('');

    // 1番目を自動表示
    const firstBtn = raceBtns.querySelector('.race-btn');
    if (firstBtn) {
      firstBtn.classList.add('active');
      detail.innerHTML = renderRaceDetail(cache[firstBtn.dataset.file]);
    }

  } catch(e) {
    weekLabel.textContent = '❌ エラー';
    detail.innerHTML = `<div class="err">読み込みエラー：${e.message}</div>`;
  }
}

function handleBtnClick(btn) {
  showRace(btn.dataset.file, btn);
}

loadAll();
</script>
</body>
</html>
