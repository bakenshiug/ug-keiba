<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>жңҖзөӮдәҲжғі | UGеј·еҘӘз«¶йҰ¬ж–°иҒһ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Public+Sans:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#130003;--bg-dk:#0b0002;--bg-md:#1a0004;
  --pink:#E8003D;--pink-dk:#B5002E;--gold:#f0c040;
  --green:#22c55e;
  --text:#f5d0d5;--muted:rgba(255,255,255,0.45);
  --card:rgba(255,255,255,0.05);--border:rgba(232,0,61,0.22);
}
html,body{background:var(--bg);color:var(--text);font-family:'Public Sans',sans-serif;min-height:100vh;}

/* в”Җв”Җ Header в”Җв”Җ */
.hdr{background:linear-gradient(135deg,#200006,#0b0002 60%,#130003);border-bottom:2px solid rgba(232,0,61,.5);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(232,0,61,.2);}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:18px;background:rgba(255,255,255,0.08);color:var(--muted);font-size:11px;font-weight:700;text-decoration:none;border:1px solid rgba(255,255,255,0.12);}
.hdr-back:hover{background:rgba(255,255,255,0.14);}
.hdr-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(232,0,61,.8),0 0 48px rgba(232,0,61,.4);letter-spacing:.05em;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

/* в”Җв”Җ Layout в”Җв”Җ */
.wrap{max-width:780px;margin:0 auto;padding:24px 14px 100px;}
.week-label{font-size:12px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;text-shadow:0 0 10px rgba(240,192,64,.5);}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   RACE CARD (outer wrapper)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.race-card{background:linear-gradient(160deg,rgba(30,0,8,.9),rgba(10,0,3,.95));border:1px solid rgba(232,0,61,.30);border-radius:22px;overflow:hidden;margin-bottom:36px;box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(232,0,61,.10);}

/* Race header */
.race-head{background:linear-gradient(120deg,rgba(232,0,61,.18) 0%,rgba(10,0,3,.9) 55%,rgba(240,192,64,.06) 100%);border-bottom:1px solid rgba(232,0,61,.35);padding:18px 22px;display:flex;align-items:flex-start;gap:14px;}
.race-grade-badge{font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;white-space:nowrap;margin-top:4px;letter-spacing:.06em;}
.race-name-wrap{}
.race-name{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:.04em;line-height:1.1;}
.race-meta{font-size:12px;color:rgba(255,255,255,.55);margin-top:6px;letter-spacing:.04em;}

/* Race body */
.race-body{padding:20px 20px 24px;}

/* Condition note */
.cond-note{background:rgba(240,192,64,.07);border:1px solid rgba(240,192,64,.25);border-left:3px solid rgba(240,192,64,.6);border-radius:10px;padding:10px 14px;margin-bottom:20px;font-size:12px;line-height:1.65;color:rgba(255,240,180,.88);}

/* Section title */
.sec-title{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px;margin-top:4px;padding-left:4px;}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   HERO HORSE CARDS (в—Һ в—Ӣ в–І вҳҶ в–і)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.horse-hero{border-radius:16px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;}

/* в—Һ жң¬е‘Ҫ в”Җв”Җ deep red glow */
.horse-hero.h-honmei{
  background:linear-gradient(140deg,rgba(232,0,61,.22) 0%,rgba(20,0,6,.95) 55%);
  border:2px solid rgba(232,0,61,.75);
  box-shadow:0 0 32px rgba(232,0,61,.35),inset 0 0 20px rgba(232,0,61,.08);
}
/* в—Ӣ еҜҫжҠ— в”Җв”Җ silver-white glow */
.horse-hero.h-taikou{
  background:linear-gradient(140deg,rgba(255,255,255,.13) 0%,rgba(14,0,5,.95) 55%);
  border:2px solid rgba(255,255,255,.45);
  box-shadow:0 0 24px rgba(255,255,255,.12),inset 0 0 16px rgba(255,255,255,.04);
}
/* в–І 3з•ӘжүӢ в”Җв”Җ gold glow */
.horse-hero.h-sangen{
  background:linear-gradient(140deg,rgba(240,192,64,.15) 0%,rgba(14,0,5,.95) 55%);
  border:1px solid rgba(240,192,64,.55);
  box-shadow:0 0 20px rgba(240,192,64,.2),inset 0 0 14px rgba(240,192,64,.05);
}
/* вҳҶ з©ҙ в”Җв”Җ purple glow */
.horse-hero.h-star{
  background:linear-gradient(140deg,rgba(168,85,247,.15) 0%,rgba(14,0,5,.95) 55%);
  border:1px solid rgba(168,85,247,.50);
  box-shadow:0 0 18px rgba(168,85,247,.2);
}
/* в–і йҖЈдёӢ в”Җв”Җ blue */
.horse-hero.h-delta{
  background:linear-gradient(140deg,rgba(100,160,255,.10) 0%,rgba(14,0,5,.95) 55%);
  border:1px solid rgba(100,160,255,.35);
  box-shadow:0 0 14px rgba(100,160,255,.12);
}

/* mark label floating top-right */
.horse-hero-mark{position:absolute;top:14px;right:16px;font-size:28px;font-weight:900;line-height:1;opacity:.9;}
.h-honmei .horse-hero-mark{color:#E8003D;text-shadow:0 0 20px rgba(232,0,61,.9);}
.h-taikou .horse-hero-mark{color:#fff;text-shadow:0 0 18px rgba(255,255,255,.7);}
.h-sangen .horse-hero-mark{color:#f0c040;text-shadow:0 0 16px rgba(240,192,64,.8);}
.h-star   .horse-hero-mark{color:#d8b4fe;text-shadow:0 0 14px rgba(168,85,247,.7);}
.h-delta  .horse-hero-mark{color:#93c5fd;text-shadow:0 0 12px rgba(100,160,255,.6);}

/* rank label pill */
.hero-rank-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:900;letter-spacing:.1em;padding:2px 8px;border-radius:4px;text-transform:uppercase;margin-bottom:8px;}
.h-honmei .hero-rank-pill{background:rgba(232,0,61,.25);color:#ff6b8a;border:1px solid rgba(232,0,61,.4);}
.h-taikou .hero-rank-pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.25);}
.h-sangen .hero-rank-pill{background:rgba(240,192,64,.18);color:#f0c040;border:1px solid rgba(240,192,64,.35);}
.h-star   .hero-rank-pill{background:rgba(168,85,247,.18);color:#d8b4fe;border:1px solid rgba(168,85,247,.35);}
.h-delta  .hero-rank-pill{background:rgba(100,160,255,.15);color:#93c5fd;border:1px solid rgba(100,160,255,.30);}

/* horse num circle */
.horse-num-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:900;flex-shrink:0;margin-right:6px;}
.h-honmei .horse-num-badge{background:rgba(232,0,61,.3);color:#fff;border:1px solid rgba(232,0,61,.6);}
.h-taikou .horse-num-badge{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);}
.h-sangen .horse-num-badge{background:rgba(240,192,64,.2);color:#f0c040;border:1px solid rgba(240,192,64,.5);}
.h-star   .horse-num-badge{background:rgba(168,85,247,.2);color:#d8b4fe;border:1px solid rgba(168,85,247,.4);}
.h-delta  .horse-num-badge{background:rgba(100,160,255,.15);color:#93c5fd;border:1px solid rgba(100,160,255,.35);}

/* horse name */
.horse-hero-name{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:900;line-height:1.15;display:flex;align-items:center;gap:4px;padding-right:48px;}
.h-honmei .horse-hero-name{color:#fff;text-shadow:0 0 20px rgba(232,0,61,.5);}
.h-taikou .horse-hero-name{color:#fff;text-shadow:0 0 16px rgba(255,255,255,.3);}
.h-sangen .horse-hero-name{color:#fff8e0;text-shadow:0 0 14px rgba(240,192,64,.3);}
.h-star   .horse-hero-name{color:#f0e8ff;}
.h-delta  .horse-hero-name{color:#e8f0ff;}

/* jockey/trainer line */
.horse-hero-info{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.info-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap;}
.info-jockey{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);}
.info-trainer{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);}
.info-pt{font-size:13px;font-weight:900;color:var(--gold);margin-left:auto;text-shadow:0 0 8px rgba(240,192,64,.5);}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   COMPACT TABLE (non-marked / lower marks)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.compact-table-wrap{overflow-x:auto;margin-bottom:16px;}
table.horse-tbl{width:100%;border-collapse:collapse;font-size:12px;}
table.horse-tbl th{background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:7px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap;}
table.horse-tbl td{padding:8px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;color:rgba(255,255,255,.7);}
table.horse-tbl td.tbl-name{text-align:left;font-weight:700;color:var(--text);}
table.horse-tbl tr:last-child td{border-bottom:none;}
table.horse-tbl tr:hover td{background:rgba(255,255,255,.02);}

.mark-badge{display:inline-block;font-size:14px;font-weight:900;width:22px;text-align:center;}
.mark-в—Һ{color:#E8003D;text-shadow:0 0 6px rgba(232,0,61,.6);}
.mark-в—Ӣ{color:#fff;}
.mark-в–І{color:var(--gold);text-shadow:0 0 6px rgba(240,192,64,.5);}
.mark-в–і{color:#93c5fd;}
.mark-вҳҶ{color:#d8b4fe;}
.mark-Г—{color:var(--muted);}
.pt-val{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;}

/* divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(232,0,61,.25),transparent);margin:18px 0;}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BETS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.bets-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.bet-row{display:flex;align-items:baseline;gap:10px;padding:9px 14px;border-radius:10px;background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);}
.bet-type{font-size:10px;font-weight:900;color:var(--gold);min-width:52px;white-space:nowrap;letter-spacing:.05em;}
.bet-val{font-size:13px;font-weight:700;color:#fff;}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   COMMENTS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.comment-area{display:flex;flex-direction:column;gap:10px;}

/* в–  жңҖзөӮзөҗи«– в”Җв”Җ гӮҙгғјгғ«гғүгғҚгӮӘгғі */
.final-card{
  background:linear-gradient(140deg,rgba(240,192,64,.12),rgba(10,0,3,.95));
  border:2px solid rgba(240,192,64,.65);
  border-radius:14px;padding:16px 18px;
  box-shadow:0 0 28px rgba(240,192,64,.25),inset 0 0 20px rgba(240,192,64,.05);
}
.final-card .clabel{
  font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  color:#f0c040;text-shadow:0 0 10px rgba(240,192,64,.9);margin-bottom:8px;
}
.final-card .ctext{font-size:14px;line-height:1.75;color:#fff8d0;font-weight:600;}

/* вҡ пёҸ гғӘгӮ№гӮҜ */
.risk-card{background:rgba(232,0,61,.07);border:1px solid rgba(232,0,61,.25);border-radius:12px;padding:14px 16px;}
.risk-card .clabel{font-size:10px;font-weight:900;letter-spacing:.1em;color:rgba(255,150,150,.7);margin-bottom:6px;}
.risk-card .ctext{font-size:13px;line-height:1.65;color:#ffb3c6;}

/* рҹҡЁ иЈңи¶іпјҲеҝ…й Ҳпјүв”Җв”Җ еј·иӘҝгӮӘгғ¬гғігӮё */
.extra-card{
  background:linear-gradient(140deg,rgba(255,100,0,.12),rgba(10,0,3,.95));
  border:2px solid rgba(255,140,0,.55);
  border-radius:12px;padding:14px 16px;
  box-shadow:0 0 18px rgba(255,120,0,.2);
}
.extra-card .clabel{
  font-size:11px;font-weight:900;letter-spacing:.1em;
  color:#ffb020;text-shadow:0 0 8px rgba(255,180,0,.8);margin-bottom:6px;
}
.extra-card .ctext{font-size:14px;line-height:1.65;color:#ffe8a0;font-weight:700;}

/* в”Җв”Җ Loading / Error в”Җв”Җ */
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.err{text-align:center;padding:40px 20px;color:#ffb3c6;font-size:13px;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <a href="../index.html" class="hdr-back">вҶҗ гғҲгғғгғ—</a>
    <div>
      <div class="hdr-sub">UGеј·еҘӘз«¶йҰ¬ж–°иҒһ / йҮҚиіһжңҖзөӮдәҲжғі</div>
      <div class="hdr-logo">рҹҺҜ FINAL PICK</div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="content"><div class="loading">вҸі гғҮгғјгӮҝиӘӯгҒҝиҫјгҒҝдёӯ...</div></div>
</div>

<script>
// еҚ°гҒ®е„Әе…Ҳй ҶдҪҚ
const MARK_ORDER = ['в—Һ','в—Ӣ','в–І','вҳҶ','в–і','Г—',''];

const MARK_META = {
  'в—Һ': { cls:'h-honmei', label:'в—Һ жң¬е‘Ҫ',    icon:'в—Һ' },
  'в—Ӣ': { cls:'h-taikou', label:'в—Ӣ еҜҫжҠ—',    icon:'в—Ӣ' },
  'в–І': { cls:'h-sangen', label:'в–І 3з•ӘжүӢ',   icon:'в–І' },
  'вҳҶ': { cls:'h-star',   label:'вҳҶ з©ҙйҰ¬',    icon:'вҳҶ' },
  'в–і': { cls:'h-delta',  label:'в–і йҖЈдёӢ',    icon:'в–і' },
};

// йҰ¬з•ӘвҶ’жһ иүІ
const WAKU_COLORS = ['','#111','#fff','#e44','#44c','#f80','#090','#e0e','#e00'];

function gradeStyle(g) {
  if (g==='G1') return 'background:#f0c040;color:#000;';
  if (g==='G2') return 'background:#c0c0c0;color:#000;';
  if (g==='G3') return 'background:#cd7f32;color:#fff;';
  return 'background:rgba(34,197,94,.3);color:#22c55e;';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// в”Җв”Җ гғ’гғјгғӯгғјгӮ«гғјгғүпјҲв—Һв—Ӣв–ІвҳҶв–із”Ёпјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderHeroCard(h) {
  const meta = MARK_META[h.mark];
  if (!meta) return '';
  const jockeyHtml = h.jockey ? `<span class="info-pill info-jockey">рҹҸҮ ${esc(h.jockey)}</span>` : '';
  const trainerHtml = h.trainer ? `<span class="info-pill info-trainer">рҹҸ  ${esc(h.trainer)}</span>` : '';
  return `
  <div class="horse-hero ${meta.cls}">
    <span class="horse-hero-mark">${meta.icon}</span>
    <div class="hero-rank-pill">${esc(meta.label)}</div>
    <div class="horse-hero-name">
      <span class="horse-num-badge">${h.num}</span>
      <span>${esc(h.name)}</span>
    </div>
    <div class="horse-hero-info">
      ${jockeyHtml}${trainerHtml}
      <span class="info-pt">${h.totalPt} pt</span>
    </div>
  </div>`;
}

// в”Җв”Җ гӮігғігғ‘гӮҜгғҲиЎҢпјҲеҚ°гҒӘгҒ—йҰ¬пјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderCompactRows(horses) {
  if (!horses.length) return '';
  const rows = horses.map(h => {
    const markDisp = h.mark
      ? `<span class="mark-badge mark-${h.mark}">${h.mark}</span>`
      : '<span style="color:var(--muted);font-size:10px;">вҖ”</span>';
    const jockey = h.jockey ? esc(h.jockey) : '<span style="color:var(--muted)">вҖ”</span>';
    const trainer = h.trainer ? esc(h.trainer) : '<span style="color:var(--muted)">вҖ”</span>';
    return `<tr>
      <td>${h.num}</td>
      <td class="tbl-name">${esc(h.name)}</td>
      <td style="font-size:11px;">${jockey}</td>
      <td style="font-size:11px;">${trainer}</td>
      <td>${markDisp}</td>
      <td class="pt-val">${h.totalPt}</td>
    </tr>`;
  }).join('');
  return `
  <div class="compact-table-wrap">
    <table class="horse-tbl">
      <thead><tr><th>йҰ¬з•Ә</th><th style="text-align:left;">йҰ¬еҗҚ</th><th style="text-align:left;">йЁҺжүӢ</th><th style="text-align:left;">еҺ©иҲҺ</th><th>еҚ°</th><th>pt</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// в”Җв”Җ гғ¬гғјгӮ№е…ЁдҪ“гғ¬гғігғҖгғӘгғігӮ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderRace(data) {
  const r = data.race || {};
  const allHorses = (data.horses || []).slice().sort((a,b) => {
    const ai = MARK_ORDER.indexOf(a.mark||'');
    const bi = MARK_ORDER.indexOf(b.mark||'');
    if (ai !== bi) return ai - bi;
    return b.totalPt - a.totalPt;
  });
  const bets = data.bets || {};
  const comments = data.comments || {};

  // еҚ°гҒӮгӮҠгғ’гғјгғӯгғјпјҲв—Һв—Ӣв–ІвҳҶв–іпјү
  const heroHorses = allHorses.filter(h => h.mark && MARK_META[h.mark]);
  // еҚ°гҒӘгҒ— or Г— гҒҜ гӮігғігғ‘гӮҜгғҲгғҶгғјгғ–гғ«
  const restHorses = allHorses.filter(h => !h.mark || !MARK_META[h.mark] || h.mark==='Г—');

  // иІ·гҒ„зӣ®
  const betTypes = ['еҚҳеӢқ','йҰ¬йҖЈ','гғҜгӮӨгғү','дёүйҖЈиӨҮ','дёүйҖЈеҚҳ','иІ·гҒ„зӣ®1'];
  const betsHtml = betTypes
    .filter(k => bets[k])
    .map(k => `<div class="bet-row"><span class="bet-type">${k}</span><span class="bet-val">${esc(bets[k])}</span></div>`)
    .join('');

  // гӮігғЎгғігғҲ
  const commentsHtml = [
    comments.final ? `<div class="final-card"><div class="clabel">в–  жңҖзөӮзөҗи«–</div><div class="ctext">${esc(comments.final).replace(/\n/g,'<br>')}</div></div>` : '',
    comments.risk  ? `<div class="risk-card"><div class="clabel">вҡ пёҸ жіўд№ұгғ•гӮЎгӮҜгӮҝгғј</div><div class="ctext">${esc(comments.risk)}</div></div>` : '',
    comments.extra ? `<div class="extra-card"><div class="clabel">рҹҡЁ иЈңи¶іпјҲеҝ…й Ҳпјү</div><div class="ctext">${esc(comments.extra)}</div></div>` : '',
  ].filter(Boolean).join('');

  const gs = gradeStyle(r.grade||'');

  return `
  <div class="race-card">
    <div class="race-head">
      <span class="race-grade-badge" style="${gs}">${esc(r.grade||'')}</span>
      <div class="race-name-wrap">
        <div class="race-name">${esc(r.name||'')}</div>
        <div class="race-meta">${esc(r.venue||'')} ${esc(r.raceNum||'')} пјҸ ${esc(r.surface||'')}${esc(r.distance||'')} пјҸ ${esc(r.condition||'')} пјҸ ${esc(r.date||'')}</div>
      </div>
    </div>
    <div class="race-body">

      ${data.raceCondNote ? `<div class="cond-note">рҹҸҹпёҸ ${esc(data.raceCondNote)}</div>` : ''}

      <!-- гғ’гғјгғӯгғјгӮ«гғјгғү -->
      ${heroHorses.length ? `<div class="sec-title">еҚ°д»ҳгҒҚйҰ¬</div>${heroHorses.map(renderHeroCard).join('')}` : ''}

      <!-- еҚ°гҒӘгҒ—йҰ¬гғҶгғјгғ–гғ« -->
      ${restHorses.length ? `<div class="sec-title" style="margin-top:16px;">е…ЁйҰ¬гӮ№гӮігӮў</div>${renderCompactRows(restHorses)}` : ''}

      <div class="divider"></div>

      <!-- иІ·гҒ„зӣ® -->
      ${betsHtml ? `<div class="sec-title">иІ·гҒ„зӣ®</div><div class="bets-grid">${betsHtml}</div><div class="divider"></div>` : ''}

      <!-- гӮігғЎгғігғҲ -->
      ${commentsHtml ? `<div class="sec-title">еҲҶжһҗгӮігғЎгғігғҲ</div><div class="comment-area">${commentsHtml}</div>` : ''}

    </div>
  </div>`;
}

async function loadAll() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('data/final-list.json?v=' + Date.now());
    if (!res.ok) throw new Error('final-list.json гҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“');
    const list = await res.json();

    content.innerHTML = '';
    const weekEl = document.createElement('div');
    weekEl.className = 'week-label';
    weekEl.textContent = 'рҹ—“пёҸ ' + (list.label || list.week);
    content.appendChild(weekEl);

    if (!list.files || list.files.length === 0) {
      content.innerHTML += '<div class="err">д»ҠйҖұгҒ®жңҖзөӮдәҲжғігҒҜгҒҫгҒ е…¬й–ӢгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“</div>';
      return;
    }

    for (const file of list.files) {
      try {
        const r2 = await fetch(`data/${file}.json?v=` + Date.now());
        if (!r2.ok) { content.innerHTML += `<div class="err">вҡ пёҸ ${file}.json гҒҢиӘӯгҒҝиҫјгӮҒгҒҫгҒӣгӮ“</div>`; continue; }
        const data = await r2.json();
        if (data.published === false) continue;
        const div = document.createElement('div');
        div.innerHTML = renderRace(data);
        content.appendChild(div);
      } catch(e) {
        content.innerHTML += `<div class="err">вҡ пёҸ ${file} иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғјпјҡ${e.message}</div>`;
      }
    }

    if (content.querySelectorAll('.race-card').length === 0) {
      content.innerHTML += '<div class="err" style="padding:40px 20px;">д»ҠйҖұгҒ®жңҖзөӮдәҲжғігҒҜгҒҫгҒ е…¬й–ӢгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“ рҹҷҸ</div>';
    }
  } catch(e) {
    content.innerHTML = `<div class="err">иӘӯгҒҝиҫјгҒҝгӮЁгғ©гғјпјҡ${e.message}</div>`;
  }
}

loadAll();
</script>

</html>
