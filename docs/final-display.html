<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>最終予想アーカイブ | UG強奪競馬新聞</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Public+Sans:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2D9B0;--bg-dk:#E8C898;--bg-md:#EDD9A3;
  --pink:#E8003D;--pink-dk:#B5002E;--gold:#8B1A1A;
  --green:#22c55e;
  --text:#1C2B4A;--muted:rgba(28,43,74,0.55);
  --card:rgba(255,255,255,0.75);--border:rgba(232,0,61,0.22);
}
html,body{background:var(--bg);color:var(--text);font-family:'Public Sans',sans-serif;min-height:100vh;}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#EDD9A3,#E8C898 60%,#EDD9A3);border-bottom:2px solid rgba(232,0,61,.5);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(232,0,61,.2);}
.hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:18px;background:rgba(0,0,0,.06);color:var(--muted);font-size:11px;font-weight:700;text-decoration:none;border:1px solid rgba(0,0,0,0.12);}
.hdr-back:hover{background:rgba(0,0,0,.1);}
.hdr-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:#1C2B4A;text-shadow:none;letter-spacing:.05em;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

/* ── Race Selector ── */
.selector-wrap{padding:14px 12px 0;max-width:780px;margin:0 auto;}
.week-label{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;text-shadow:0 0 10px rgba(139,26,26,.5);padding-left:2px;}
.race-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}

.race-btn{
  background:linear-gradient(140deg,rgba(232,208,162,.5),rgba(242,217,176,.8));
  border:1px solid rgba(232,0,61,.25);
  border-radius:14px;
  padding:12px 14px;
  cursor:pointer;
  text-align:left;
  color:#1C2B4A;
  transition:all .18s ease;
  position:relative;
  overflow:hidden;
}
.race-btn:active{transform:scale(.97);}
.race-btn.active{
  background:linear-gradient(140deg,rgba(232,0,61,.15),rgba(242,217,176,.8));
  border:2px solid rgba(232,0,61,.75);
  box-shadow:0 0 20px rgba(232,0,61,.3),inset 0 0 16px rgba(232,0,61,.08);
}
.race-btn .btn-grade{
  font-size:9px;font-weight:900;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:5px;letter-spacing:.06em;
}
.race-btn .btn-name{
  font-family:'Noto Serif JP',serif;font-size:14px;font-weight:900;color:#1C2B4A;line-height:1.25;margin-bottom:4px;
}
.race-btn .btn-meta{
  font-size:10px;color:rgba(28,43,74,.55);line-height:1.4;
}
.race-btn.active .btn-name{color:#fff;text-shadow:0 0 12px rgba(232,0,61,.5);}
.race-btn .active-dot{
  position:absolute;top:10px;right:10px;
  width:7px;height:7px;border-radius:50%;
  background:var(--pink);
  box-shadow:0 0 8px rgba(232,0,61,.8);
  display:none;
}
.race-btn.active .active-dot{display:block;}

/* ── Detail Panel ── */
.detail-wrap{max-width:780px;margin:0 auto;padding:14px 12px 100px;}

/* Race card */
.race-card{background:linear-gradient(160deg,rgba(232,208,162,.5),rgba(242,217,176,.85));border:1px solid rgba(232,0,61,.30);border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(232,0,61,.10);}
.race-head{background:linear-gradient(120deg,rgba(232,0,61,.12) 0%,rgba(242,217,176,.9) 55%,rgba(139,26,26,.04) 100%);border-bottom:1px solid rgba(232,0,61,.35);padding:16px 20px;display:flex;align-items:flex-start;gap:12px;}
.race-grade-badge{font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;white-space:nowrap;margin-top:2px;letter-spacing:.06em;flex-shrink:0;}
.race-name{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:900;color:#1C2B4A;letter-spacing:.04em;line-height:1.1;}
.race-meta{font-size:12px;color:rgba(28,43,74,.75);margin-top:5px;letter-spacing:.04em;font-weight:600;}
.race-body{padding:18px 18px 22px;}

/* Condition note */
.cond-note{background:rgba(139,26,26,.07);border:1px solid rgba(139,26,26,.2);border-left:3px solid rgba(139,26,26,.5);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:12px;line-height:1.65;color:#1C2B4A;}

/* Section title */
.sec-title{font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:rgba(28,43,74,.5);margin-bottom:10px;margin-top:2px;padding-left:4px;}

/* Hero cards */
.horse-hero{border-radius:16px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden;}
.horse-hero.h-honmei{background:linear-gradient(140deg,rgba(232,0,61,.15) 0%,rgba(242,217,176,.9) 55%);border:2px solid rgba(232,0,61,.75);box-shadow:0 0 32px rgba(232,0,61,.35),inset 0 0 20px rgba(232,0,61,.08);}
.horse-hero.h-taikou{background:linear-gradient(140deg,rgba(28,43,74,.08) 0%,rgba(242,217,176,.9) 55%);border:2px solid rgba(255,255,255,.45);box-shadow:0 0 24px rgba(255,255,255,.12),inset 0 0 16px rgba(255,255,255,.04);}
.horse-hero.h-sangen{background:linear-gradient(140deg,rgba(139,26,26,.10) 0%,rgba(242,217,176,.9) 55%);border:1px solid rgba(139,26,26,.55);box-shadow:0 0 20px rgba(139,26,26,.2),inset 0 0 14px rgba(139,26,26,.05);}
.horse-hero.h-star{background:linear-gradient(140deg,rgba(168,85,247,.12) 0%,rgba(242,217,176,.9) 55%);border:1px solid rgba(168,85,247,.50);box-shadow:0 0 18px rgba(168,85,247,.2);}
.horse-hero.h-delta{background:linear-gradient(140deg,rgba(100,160,255,.10) 0%,rgba(242,217,176,.9) 55%);border:1px solid rgba(100,160,255,.35);box-shadow:0 0 14px rgba(100,160,255,.12);}

.horse-hero-mark{position:absolute;top:12px;right:14px;font-size:28px;font-weight:900;line-height:1;opacity:.9;}
.h-honmei .horse-hero-mark{color:#E8003D;text-shadow:0 0 20px rgba(232,0,61,.9);}
.h-taikou .horse-hero-mark{color:#1C2B4A;text-shadow:0 0 18px rgba(255,255,255,.7);}
.h-sangen .horse-hero-mark{color:#8B1A1A;text-shadow:0 0 16px rgba(139,26,26,.8);}
.h-star   .horse-hero-mark{color:#7c3aed;text-shadow:0 0 14px rgba(168,85,247,.5);}
.h-delta  .horse-hero-mark{color:#2563eb;text-shadow:0 0 12px rgba(100,160,255,.4);}

.hero-rank-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:900;letter-spacing:.1em;padding:2px 8px;border-radius:4px;text-transform:uppercase;margin-bottom:7px;}
.h-honmei .hero-rank-pill{background:rgba(232,0,61,.25);color:#c0002a;border:1px solid rgba(232,0,61,.4);}
.h-taikou .hero-rank-pill{background:rgba(28,43,74,.12);color:#1C2B4A;border:1px solid rgba(28,43,74,.35);}
.h-sangen .hero-rank-pill{background:rgba(139,26,26,.15);color:#7a1010;border:1px solid rgba(139,26,26,.45);}
.h-star   .hero-rank-pill{background:rgba(168,85,247,.18);color:#7c3aed;border:1px solid rgba(168,85,247,.45);}
.h-delta  .hero-rank-pill{background:rgba(100,160,255,.15);color:#2563eb;border:1px solid rgba(100,160,255,.40);}

.horse-num-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:900;flex-shrink:0;margin-right:5px;}
.h-honmei .horse-num-badge{background:rgba(232,0,61,.3);color:#fff;border:1px solid rgba(232,0,61,.6);}
.h-taikou .horse-num-badge{background:rgba(28,43,74,.15);color:#1C2B4A;border:1px solid rgba(28,43,74,.4);}
.h-sangen .horse-num-badge{background:rgba(139,26,26,.2);color:#7a1010;border:1px solid rgba(139,26,26,.5);}
.h-star   .horse-num-badge{background:rgba(168,85,247,.22);color:#6d28d9;border:1px solid rgba(168,85,247,.5);}
.h-delta  .horse-num-badge{background:rgba(100,160,255,.18);color:#1d4ed8;border:1px solid rgba(100,160,255,.45);}

.horse-hero-name{font-family:'Noto Serif JP',serif;font-size:21px;font-weight:900;line-height:1.15;display:flex;align-items:center;gap:4px;padding-right:44px;}
.h-honmei .horse-hero-name{color:#1C2B4A;text-shadow:0 0 20px rgba(232,0,61,.5);}
.h-taikou .horse-hero-name{color:#1C2B4A;text-shadow:0 0 16px rgba(255,255,255,.3);}
.h-sangen .horse-hero-name{color:#1C2B4A;text-shadow:0 0 14px rgba(139,26,26,.3);}
.h-star   .horse-hero-name{color:#1C2B4A;}
.h-delta  .horse-hero-name{color:#1C2B4A;}

.horse-hero-top{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.info-pt{font-size:14px;font-weight:900;color:var(--gold);text-shadow:0 0 8px rgba(139,26,26,.5);}

/* ── 馬情報グリッド（枠番・外厩・騎手・厩舎・前走・父名） ── */
.horse-info-rows{margin-top:10px;display:flex;flex-direction:column;gap:6px;border-top:1px solid rgba(0,0,0,.15);padding-top:10px;}
.horse-info-row{display:flex;align-items:center;gap:8px;min-height:22px;}
.info-lbl{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:rgba(28,43,74,.65);min-width:34px;flex-shrink:0;}
.info-val{font-size:13px;font-weight:700;color:#1C2B4A;}
.info-val-muted{font-size:13px;color:rgba(28,43,74,.45);}
/* 枠番カラー */
.waku-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:900;}
.waku-1{background:#111;color:#fff;border:1px solid #444;}
.waku-2{background:#fff;color:#111;}
.waku-3{background:#e44;color:#fff;}
.waku-4{background:#44c;color:#fff;}
.waku-5{background:#f80;color:#fff;}
.waku-6{background:#090;color:#fff;}
.waku-7{background:#e0e;color:#fff;}
.waku-8{background:#e00;color:#fff;}
/* 外厩バッジ */
.gaiku-badge{font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;color:#fff;letter-spacing:.02em;}
.gaiku-northern{background:#1a6b1a;}
.gaiku-shadai  {background:#1a4fa0;}
.gaiku-champ   {background:#6b2d8b;}
.gaiku-yamamoto{background:#8b5500;}
.gaiku-zaichu  {background:#555;color:rgba(255,255,255,.8);}
.gaiku-other   {background:#2d7d7d;}

/* Compact table */
.compact-table-wrap{overflow-x:auto;margin-bottom:14px;}
table.horse-tbl{width:100%;border-collapse:collapse;font-size:12px;}
table.horse-tbl th{background:rgba(0,0,0,.05);color:rgba(28,43,74,.6);font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:7px 6px;text-align:center;border-bottom:1px solid rgba(0,0,0,.1);white-space:nowrap;}
table.horse-tbl td{padding:7px 6px;border-bottom:1px solid rgba(0,0,0,.07);text-align:center;color:#1C2B4A;}
table.horse-tbl td.tbl-name{text-align:left;font-weight:700;color:#1C2B4A;font-size:13px;white-space:nowrap;}
table.horse-tbl td.tbl-sub{font-size:11px;color:rgba(28,43,74,.75);}
table.horse-tbl tr:last-child td{border-bottom:none;}
table.horse-tbl tr:hover td{background:rgba(0,0,0,.03);}
.mark-badge{display:inline-block;font-size:14px;font-weight:900;width:22px;text-align:center;}
.mark-◎{color:#E8003D;text-shadow:0 0 6px rgba(232,0,61,.6);}
.mark-○{color:#1C2B4A;}
.mark-▲{color:#7a1010;text-shadow:0 0 4px rgba(139,26,26,.3);}
.mark-△{color:#1d4ed8;}
.mark-☆{color:#7c3aed;}
.mark-×{color:var(--muted);}
.pt-val{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;}

/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(232,0,61,.3),transparent);margin:16px 0;}

/* ── 前日人気・オッズ行 ── */
.odds-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:6px 0 4px;}
.odds-pop{font-size:11px;font-weight:900;color:#fff;background:rgba(232,0,61,.8);padding:2px 8px;border-radius:10px;letter-spacing:.03em;}
.odds-sep{font-size:10px;color:rgba(28,43,74,.45);font-weight:700;}
.odds-tan{font-size:12px;font-weight:900;color:#8B1A1A;letter-spacing:.02em;}
.odds-fuku{font-size:12px;font-weight:700;color:rgba(28,43,74,.7);letter-spacing:.02em;}

/* ── 馬コメント ── */
.horse-comment-block{margin-top:10px;display:flex;flex-direction:column;gap:5px;border-top:1px solid rgba(0,0,0,.12);padding-top:8px;}
.hcmt-ability{font-size:12px;color:#1C2B4A;line-height:1.75;padding:6px 10px;background:rgba(139,26,26,.05);border-left:3px solid rgba(139,26,26,.45);border-radius:0 6px 6px 0;}
.hcmt-lap{font-size:11px;color:#1C2B4A;line-height:1.75;padding:5px 10px;background:rgba(59,130,246,.05);border-left:3px solid rgba(59,130,246,.4);border-radius:0 6px 6px 0;}
.hcmt-prev{font-size:11px;color:#1C2B4A;line-height:1.75;padding:5px 10px;background:rgba(16,185,129,.05);border-left:3px solid rgba(16,185,129,.4);border-radius:0 6px 6px 0;}
/* 全馬コメントリスト */
.all-horse-comments{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
.horse-cmt-item{border-radius:12px;padding:13px 15px;background:rgba(255,255,255,.55);border:1px solid rgba(28,43,74,.1);}
.horse-cmt-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.horse-cmt-num{font-size:11px;font-weight:900;padding:2px 7px;border-radius:4px;background:rgba(28,43,74,.07);color:rgba(28,43,74,.7);}
.horse-cmt-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:900;color:#1C2B4A;}

/* Bets */
.bets-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.bet-row{display:flex;align-items:baseline;gap:10px;padding:9px 14px;border-radius:10px;background:rgba(139,26,26,.06);border:1px solid rgba(139,26,26,.18);}
.bet-type{font-size:10px;font-weight:900;color:var(--gold);min-width:52px;white-space:nowrap;letter-spacing:.05em;}
.bet-val{font-size:13px;font-weight:700;color:#1C2B4A;}
/* 1頭軸検知バッジ */
.jiku-detect-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;margin-bottom:8px;
  background:linear-gradient(135deg,rgba(232,0,61,.14),rgba(139,26,26,.08));
  border:2px solid rgba(232,0,61,.45);box-shadow:0 0 16px rgba(232,0,61,.15);}
.jiku-detect-icon{font-size:16px;line-height:1;flex-shrink:0;}
.jiku-detect-text{font-size:11px;font-weight:900;color:#c0002a;letter-spacing:.04em;line-height:1.4;}
.jiku-detect-sub{font-size:10px;font-weight:700;color:rgba(28,43,74,.55);margin-top:1px;}
.bet-row.bet-row-jiku{background:linear-gradient(135deg,rgba(232,0,61,.12),rgba(242,217,176,.9));border:2px solid rgba(232,0,61,.55);box-shadow:0 0 12px rgba(232,0,61,.15);}
.bet-row.bet-row-jiku .bet-type{color:#c0002a;}
.bet-row.bet-row-jiku .bet-val{color:#1C2B4A;font-weight:900;}
/* 2頭軸バナー（ゴールド） */
.jiku-2-banner{background:linear-gradient(135deg,rgba(139,26,26,.10),rgba(180,120,0,.10));
  border-color:rgba(180,130,0,.60);box-shadow:0 0 16px rgba(180,130,0,.15);}
.jiku-2-banner .jiku-detect-text{color:#7a5500;}
.jiku-2-banner .jiku-detect-sub{color:rgba(28,43,74,.55);}
.bet-row.bet-row-2jiku{background:linear-gradient(135deg,rgba(180,130,0,.12),rgba(242,217,176,.9));border:2px solid rgba(180,130,0,.55);box-shadow:0 0 12px rgba(180,130,0,.12);}
.bet-row.bet-row-2jiku .bet-type{color:#7a5500;}
.bet-row.bet-row-2jiku .bet-val{color:#1C2B4A;font-weight:900;}

/* Comments */
.comment-area{display:flex;flex-direction:column;gap:10px;}
.final-card{background:linear-gradient(140deg,rgba(139,26,26,.08),rgba(242,217,176,.9));border:2px solid rgba(139,26,26,.5);border-radius:14px;padding:15px 17px;box-shadow:0 0 28px rgba(139,26,26,.25),inset 0 0 20px rgba(139,26,26,.05);}
.final-card .clabel{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#8B1A1A;text-shadow:none;margin-bottom:7px;}
.final-card .ctext{font-size:14px;line-height:1.75;color:#1C2B4A;font-weight:600;}
.risk-card{background:rgba(232,0,61,.07);border:1px solid rgba(232,0,61,.25);border-radius:12px;padding:13px 15px;}
.risk-card .clabel{font-size:10px;font-weight:900;letter-spacing:.1em;color:rgba(232,0,61,.7);margin-bottom:6px;}
.risk-card .ctext{font-size:13px;line-height:1.65;color:#1C2B4A;}
.extra-card{background:linear-gradient(140deg,rgba(255,100,0,.10),rgba(242,217,176,.9));border:2px solid rgba(255,140,0,.55);border-radius:12px;padding:13px 15px;box-shadow:0 0 18px rgba(255,120,0,.2);}
.extra-card .clabel{font-size:11px;font-weight:900;letter-spacing:.1em;color:#C05A00;text-shadow:none;margin-bottom:6px;}
.extra-card .ctext{font-size:14px;line-height:1.65;color:#1C2B4A;font-weight:700;}
.betmemo-card{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:11px 14px;}
.betmemo-card .clabel{font-size:9px;font-weight:900;letter-spacing:.12em;color:rgba(28,43,74,.5);margin-bottom:5px;}
.betmemo-card .ctext{font-size:12px;line-height:1.6;color:#1C2B4A;}

/* Loading / Error */
.loading{text-align:center;padding:50px 20px;color:var(--muted);}
.err{text-align:center;padding:30px 20px;color:#ffb3c6;font-size:13px;}

/* fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.race-card{animation:fadeUp .22s ease both;}

/* ══ グレード別ネオン点滅 ══ */
@keyframes neonG1{
  0%,100%{box-shadow:0 0 6px rgba(139,26,26,.5),0 0 14px rgba(139,26,26,.2);}
  50%{box-shadow:0 0 18px rgba(139,26,26,1),0 0 38px rgba(139,26,26,.7),0 0 65px rgba(139,26,26,.3);}
}
@keyframes neonG2{
  0%,100%{box-shadow:0 0 6px rgba(34,197,94,.5),0 0 14px rgba(34,197,94,.2);}
  50%{box-shadow:0 0 18px rgba(34,197,94,1),0 0 38px rgba(34,197,94,.7),0 0 65px rgba(34,197,94,.3);}
}
@keyframes neonG3{
  0%,100%{box-shadow:0 0 6px rgba(59,130,246,.5),0 0 14px rgba(59,130,246,.2);}
  50%{box-shadow:0 0 18px rgba(59,130,246,1),0 0 38px rgba(59,130,246,.7),0 0 65px rgba(59,130,246,.3);}
}

/* ─ ボタン：グレード別ネオン枠線 ─ */
.race-btn.grade-g1{border-color:rgba(139,26,26,.55);animation:neonG1 2s ease-in-out infinite;}
.race-btn.grade-g2{border-color:rgba(34,197,94,.55);animation:neonG2 2s ease-in-out infinite;}
.race-btn.grade-g3{border-color:rgba(59,130,246,.55);animation:neonG3 2s ease-in-out infinite;}
.race-btn.active.grade-g1{border-width:2px;border-color:rgba(139,26,26,.9);background:linear-gradient(140deg,rgba(139,26,26,.15),rgba(10,0,3,.95));}
.race-btn.active.grade-g2{border-width:2px;border-color:rgba(34,197,94,.9);background:linear-gradient(140deg,rgba(34,197,94,.12),rgba(10,0,3,.95));}
.race-btn.active.grade-g3{border-width:2px;border-color:rgba(59,130,246,.9);background:linear-gradient(140deg,rgba(59,130,246,.12),rgba(10,0,3,.95));}
.race-btn.active.grade-g1 .active-dot{background:#f0c040;box-shadow:0 0 8px rgba(139,26,26,.9);}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function gaikuBadge(gaiku) {

// ── SABC期待値ランキング ──
function sortRankWithTiebreak(rank, horses) {
  return [...rank].sort((a, b) => {
    if (b.total !== a.total) return b.total - a.total;
    const ha = horses[a.name] || {}, hb = horses[b.name] || {};
    return (hb.sabcZI || 0) - (ha.sabcZI || 0);
  });
}

function sabcRankHtml(notes, horses) {
  if (!notes || !notes.sabcRankTan || !notes.sabcRankFuku) return '';
  if (!notes.sabcRankTan[0] || !notes.sabcRankFuku[0]) return '';
  const nh = notes.horses || {};
  const rankTan  = sortRankWithTiebreak(notes.sabcRankTan,  nh);
  const rankFuku = sortRankWithTiebreak(notes.sabcRankFuku, nh);
  const RANK_CLS = ['r1','r2','r3'];
  function numOf(name) {
    const h = (horses||[]).find(x => x.name === name);
    return h ? h.num : '—';
  }
  function rankRow(entry, i, dim) {
    const hn = nh[entry.name] || {};
    const popInfo = hn.popularity ? `${hn.popularity}番人気` : '';
    return `<div class="sabc-rank-row">
      <div class="sabc-rank-badge ${RANK_CLS[i]||''}">${i+1}</div>
      <div class="sabc-rank-name-block">
        <div class="sabc-rank-name">${numOf(entry.name)}番 ${esc(entry.name)}</div>
        ${popInfo ? `<div class="sabc-rank-pop">${popInfo}</div>` : ''}
      </div>
      <div class="sabc-rank-score ${dim}">${entry.total}<span>pt</span></div>
    </div>`;
  }
  function rankBlock(dim, rank, label) {
    const rows = rank.slice(0,3).map((e,i) => rankRow(e,i,dim)).join('');
    return `<div class="sabc-rank-block">
      <div class="sabc-rank-header ${dim}">${label}</div>
      <div class="sabc-rank-list">${rows}</div>
    </div>`;
  }
  return `<div class="sabc-rank-wrap">
    ${rankBlock('tan',  rankTan,  '単勝期待値ランキング')}
    ${rankBlock('fuku', rankFuku, '複勝期待値ランキング')}
  </div>`;
}

// SACBランキングから「最も人気のない馬（穴馬）」を推奨買い目として表示
function sabcBetsHtml(notes, horses) {
  if (!notes || !notes.sabcRankTan || !notes.sabcRankFuku) return '';
  const nh = notes.horses || {};

  // ランキング上位3位以内から popularity が最大（=最も人気薄）の馬を選ぶ
  function pickLeastFavorite(rankList) {
    const top3 = sortRankWithTiebreak(rankList, nh).slice(0, 3);
    if (!top3.length) return null;
    const withPop = top3.filter(e => nh[e.name] && nh[e.name].popularity);
    if (!withPop.length) return top3[0]; // fallback: 1位
    return withPop.reduce((best, e) =>
      (nh[e.name].popularity > (nh[best.name]?.popularity || 0)) ? e : best
    , withPop[0]);
  }

  const pickTan  = pickLeastFavorite(notes.sabcRankTan);
  const pickFuku = pickLeastFavorite(notes.sabcRankFuku);
  if (!pickTan && !pickFuku) return '';

  function horseInfo(name) {
    const h  = (horses||[]).find(x => x.name === name) || {};
    const hn = nh[name] || {};
    const num    = h.num  || '—';
    const mark   = h.mark || '';
    const pop    = hn.popularity ? `${hn.popularity}番人気` : '';
    const odds   = hn.odds       ? `単${hn.odds}倍`         : '';
    const fuku   = hn.fuku_odds  ? `複${hn.fuku_odds}`      : '';
    return { num, mark, pop, odds, fuku };
  }

  function betBanner(labelText, pick) {
    const { num, mark, pop, odds, fuku } = horseInfo(pick.name);
    const markHtml = mark ? `<span class="sabc-bet-mark">${mark}</span>` : '';
    const metaHtml = [pop, odds, fuku].filter(Boolean)
      .map(t => `<span class="sabc-bet-meta-chip">${t}</span>`).join('');
    return `<div class="sabc-bet-banner">
      <span class="sabc-bet-icon">🥇</span>
      <div class="sabc-bet-body">
        <div class="sabc-bet-label">${labelText}</div>
        <div class="sabc-bet-name">${markHtml}${num}番 ${esc(pick.name)}</div>
        ${metaHtml ? `<div class="sabc-bet-meta">${metaHtml}</div>` : ''}
      </div>
      <span class="sabc-bet-sub">${pick.total}pt</span>
    </div>`;
  }

  const rows = [];
  if (pickTan)  rows.push(betBanner('単勝期待値', pickTan));
  if (pickFuku) rows.push(betBanner('複勝期待値', pickFuku));
  return rows.join('');
}

// コメントを1〜2文に要約（句点で区切り最大maxChars文字）
function summarizeComment(text, maxChars) {
  if (!text) return '';
  const sentences = text.split('。').filter(s => s.trim());
  let result = '';
  for (const s of sentences) {
    const next = result ? result + '。' + s : s;
    if (next.length > (maxChars || 100)) break;
    result = next;
  }
  if (!result) result = sentences[0] || '';
  return result + '。';
}

// ── 投資額自動計算（統一買い目：単勝/馬単マルチ/三連複/三連単フォーメーション）
function calcInvestment(horses) {
  const A = [], B = [], C = []; // 列1:◎○ / 列2:◎○▲☆ / 列3:◎○▲☆△
  (horses || []).forEach((h, i) => {
    const m = h.mark || '';
    if (m === '◎' || m === '○')    { A.push(i); B.push(i); C.push(i); }
    else if (m === '▲' || m === '☆') { B.push(i); C.push(i); }
    else if (m === '△')              { C.push(i); }
  });
  const allMarked = B.length + C.filter(i => !B.includes(i)).length; // 全印馬数
  const inba = allMarked - 1; // ◎を除いた印馬数（○▲☆△）
  const tansho  = 100;
  const batan   = inba * 2 * 100; // 馬単マルチ（◎↔印馬）
  // 三連複フォーメーション
  let fuku = 0;
  for (let i = 0; i < C.length; i++)
    for (let j = i+1; j < C.length; j++)
      for (let k = j+1; k < C.length; k++) {
        const combo = [C[i],C[j],C[k]];
        if (combo.some(x=>A.includes(x)) && combo.filter(x=>B.includes(x)).length>=2) fuku++;
      }
  // 三連単フォーメーション
  let tan = 0;
  for (const a of A) for (const b of B) { if (b===a) continue;
    for (const c of C) { if (c===a||c===b) continue; tan++; } }
  return { tansho, batan, sanrenpuku: fuku*100, sanrentan: tan*100,
           total: tansho + batan + fuku*100 + tan*100 };
}

// ── ◎抜け判定（他の印馬最高ptより7pt以上高ければ「抜け」）
function isHonmeiDetached(horses) {
  const honmei = horses.find(h => h.mark === '◎');
  if (!honmei || honmei.totalPt == null) return false;
  const othersWithMark = horses.filter(h => h.mark && h.mark !== '◎' && h.totalPt != null);
  if (othersWithMark.length === 0) return false;
  const secondBest = Math.max(...othersWithMark.map(h => parseFloat(h.totalPt) || 0));
  return (parseFloat(honmei.totalPt) - secondBest) >= 7;
}

// n頭から2頭選ぶ組み合わせ数
function comb2(n) { return n >= 2 ? Math.floor(n * (n - 1) / 2) : 0; }

// 1頭軸モードの投資額（単勝 + 馬単◎流し + 三連複1頭軸）
function calcInvestmentJiku(horses) {
  const opponents = horses.filter(h => h.mark && h.mark !== '◎' && ['○','▲','☆','△'].includes(h.mark));
  const N = opponents.length;
  const pts = comb2(N);
  return { total: 100 + N * 100 + pts * 100, jiku: '1', pts, opponentCount: N };
}

// ◎○2頭抜け判定（min(◎,○) − 3位pt ≥ 7）
function isTop2Detached(horses) {
  const honmei = horses.find(h => h.mark === '◎');
  const taikou = horses.find(h => h.mark === '○');
  if (!honmei || !taikou || honmei.totalPt == null || taikou.totalPt == null) return false;
  const minTop2 = Math.min(parseFloat(honmei.totalPt)||0, parseFloat(taikou.totalPt)||0);
  const others = horses.filter(h => h.mark && !['◎','○'].includes(h.mark) && h.totalPt != null);
  if (others.length === 0) return false;
  const top3rd = Math.max(...others.map(h => parseFloat(h.totalPt) || 0));
  return (minTop2 - top3rd) >= 7;
}

// 2頭軸モードの投資額（単勝 + 馬連◎○ + 馬単◎○マルチ + 三連複2頭軸 + 三連単2頭軸マルチ）
function calcInvestment2jiku(horses) {
  const opponents = horses.filter(h => ['▲','☆','△'].includes(h.mark||''));
  const N = opponents.length;
  // 単勝100 + 馬連100 + 馬単200 + 三連複N×100 + 三連単6N×100
  return { total: 100 + 100 + 200 + N * 100 + 6 * N * 100, jiku: '2', pts3renpuku: N, pts3rentan: 6 * N, opponentCount: N };
}

function renderResult(data) {
  const res = data.result;
  if (!res) return '';
  const isHit = res.hitFlag;
  const r = data.race || {};
  const medals = ['🥇','🥈','🥉'];
  const markClsMap = {'◎':'mark-◎','○':'mark-○','▲':'mark-▲','☆':'mark-☆','△':'mark-△','×':'mark-×'};
  const numMark = {};
  (data.horses||[]).forEach(h => { if(h.mark) numMark[h.num] = h.mark; });

  // 着順リスト
  const orderRows = (res.top3||[]).map((h,i) => {
    const mk = numMark[h.num] || '';
    const wc = h.num ? `waku-${Math.min(h.gate||Math.ceil(h.num/2),8)}` : '';
    const rankBadgeCls = ['order-1st','order-2nd','order-3rd'][i] || 'order-other';
    return `<div class="result-order-row">
      <span class="result-medal">${medals[i]||''}</span>
      <span class="result-num-badge ${wc}" style="font-size:11px;">${h.num}</span>
      <span class="result-mark ${mk ? markClsMap[mk] : ''}">${mk||'　'}</span>
      <span class="result-horse-name">${esc(h.name)}</span>
      <span class="result-rank-badge ${rankBadgeCls}">${i+1}着</span>
    </div>`;
  }).join('');

  // 払い戻し（hitBetsと照合してゴールドハイライト）
  const BET_ALIASES = {
    '単勝':['単勝'],'馬単':['馬単'],'馬連':['馬連'],
    '複勝':['複勝'],'枠連':['枠連'],'ワイド':['ワイド'],
    '三連複':['三連複','３連複','3連複'],'三連単':['三連単','３連単','3連単'],
  };
  const hitSet = new Set((res.hitBets||[]).flatMap(b => BET_ALIASES[b]||[b]));
  const isPayoutHit = key => [...hitSet].some(alias => key.replace(/\s/g,'').startsWith(alias));
  const payoutRows = Object.entries(res.payouts||{}).map(([k,v]) => {
    const hit = isPayoutHit(k);
    return `<div class="result-payout-row${hit?' is-hit':''}">
      <span class="result-payout-type">${esc(k)}</span>
      <span class="result-payout-amt">${esc(v)}</span>
    </div>`;
  }).join('');

  // 回収率（3分岐で投資額を自動選択）
  const inv = isHonmeiDetached(data.horses || [])
    ? calcInvestmentJiku(data.horses || [])
    : isTop2Detached(data.horses || [])
      ? calcInvestment2jiku(data.horses || [])
      : calcInvestment(data.horses || []);
  const rtn = res.returnAmount || 0;
  const pct = inv.total > 0 ? Math.round(rtn / inv.total * 100) : 0;
  const kaishuriHtml = inv.total > 0 ? `
    <div class="result-kaishuri">
      <div class="result-kaishuri-nums">
        <span class="result-kaishuri-item">投資 <strong>¥${inv.total.toLocaleString()}</strong></span>
        <span class="result-kaishuri-item">回収 <strong>¥${rtn.toLocaleString()}</strong></span>
      </div>
      <span class="result-kaishuri-pct ${pct>=100?'hit':'miss'}">${pct}%</span>
    </div>` : '';

  // 的中バナー内容
  const hitBetsLine = (res.hitBets||[]).map(b =>
    `<span class="result-hit-bet">✅ ${esc(b)}的中</span>`
  ).join('');

  if (isHit) {
    return `<div class="result-wrap">
      <div class="result-banner-hit">
        <span style="font-size:20px;">🎯</span>
        <span class="result-banner-title">UG予想 的中！</span>
      </div>
      ${hitBetsLine ? `<div class="result-hit-bets-banner">${hitBetsLine}</div>` : ''}
      <div class="result-order-head">${esc(r.name||'')} ${esc(r.grade||'')} 着順</div>
      <div class="result-order-list">${orderRows}</div>
      ${payoutRows ? `<div class="result-payout-head">払い戻し</div><div class="result-payout-list">${payoutRows}</div>` : ''}
      ${kaishuriHtml}
      ${res.note ? `<div class="result-note-wrap">${esc(res.note)}</div>` : ''}
    </div>`;
  } else {
    return `<div class="result-wrap">
      <div class="result-banner-miss">
        <span style="font-size:18px;">❌</span>
        <span class="result-banner-title" style="color:rgba(255,255,255,.6);font-size:14px;">不的中</span>
      </div>
      <div class="result-order-head">${esc(r.name||'')} ${esc(r.grade||'')} 着順</div>
      <div class="result-order-list">${orderRows}</div>
      ${payoutRows ? `<div class="result-payout-head">払い戻し</div><div class="result-payout-list">${payoutRows}</div>` : ''}
      ${kaishuriHtml}
      ${res.note ? `<div class="result-note-wrap">${esc(res.note)}</div>` : ''}
    </div>`;
  }
}

  const rankClsArr = ['order-1st','order-2nd','order-3rd'];
  const rows = horses.map(h => {
    const markDisp = h.mark
      ? `<span class="mark-badge mark-${h.mark}">${h.mark}</span>`
      : '<span style="color:rgba(255,255,255,.25);font-size:10px;">—</span>';
    const wc = wakuClass(h.gate);
    const wakuDisp = h.gate ? `<span class="waku-badge ${wc}" style="font-size:9px;width:18px;height:18px;">${h.gate}</span>` : dash;
    const gaikuDisp = h.gaiku ? gaikuBadge(h.gaiku) : dash;
    const rank = orderMap && orderMap[h.num];
    const rankDisp = rank
      ? `<span class="order-badge ${rankClsArr[rank-1]||'order-other'}" style="font-size:9px;padding:1px 6px;">${rank}着</span>`
      : (hasResult ? `<span style="color:rgba(255,255,255,.25);font-size:10px;">—</span>` : '');
    return `<tr>
      <td>${wakuDisp}</td>
      <td style="font-weight:700;color:rgba(255,255,255,.8);">${h.num}</td>
      <td class="tbl-name">${esc(h.name)}</td>
      <td class="tbl-sub">${gaikuDisp}</td>
      <td class="tbl-sub">${h.jockey ? esc(h.jockey) : dash}</td>
      <td class="tbl-sub">${h.trainer ? esc(h.trainer) : dash}</td>
      <td class="tbl-sub" style="font-size:10px;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${h.lastRace ? esc(h.lastRace) : dash}</td>
      <td>${markDisp}</td>
      <td class="pt-val" style="color:var(--gold);font-weight:900;">${h.totalPt}</td>
      ${hasResult ? `<td>${rankDisp}</td>` : ''}
    </tr>`;
  }).join('');
  const resultTh = hasResult ? '<th>着順</th>' : '';
  return `
  <div class="compact-table-wrap">
    <table class="horse-tbl">
      <thead><tr><th>枠</th><th>番</th><th style="text-align:left;">馬名</th><th style="text-align:left;">外厩</th><th style="text-align:left;">騎手</th><th style="text-align:left;">厩舎</th><th style="text-align:left;">前走</th><th>印</th><th>pt</th>${resultTh}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderRaceDetail(data, notes) {
  const r = data.race || {};
  const allHorses = (data.horses || []).slice().sort((a,b) => {
    const ai = MARK_ORDER.indexOf(a.mark||'');
    const bi = MARK_ORDER.indexOf(b.mark||'');
    return ai !== bi ? ai - bi : b.totalPt - a.totalPt;
  });
  const bets = data.bets || {};
  const comments = data.comments || {};

  const heroHorses = allHorses.filter(h => h.mark && MARK_META[h.mark]);
  const restHorses = allHorses.filter(h => !h.mark || !MARK_META[h.mark] || h.mark==='×');

  // 着順マップ: {馬番 → 順位}（全着順対応）
  const orderMap = {};
  if (data.result) {
    if (data.result.finishOrder) {
      data.result.finishOrder.forEach((num, i) => {
        if (num) orderMap[num] = i + 1;
      });
    } else if (data.result.top3) {
      data.result.top3.forEach((entry, i) => {
        if (entry && entry.num) orderMap[entry.num] = i + 1;
      });
    }
  }

  // 統一買い目を印から自動生成（◎抜け時は1頭軸に切替）
  const betsHtml = (() => {
    const A=[], B=[], C=[];
    allHorses.forEach((h,i) => {
      const m = h.mark||'';
      if(m==='◎'||m==='○'){A.push(i);B.push(i);C.push(i);}
      else if(m==='▲'||m==='☆'){B.push(i);C.push(i);}
      else if(m==='△'){C.push(i);}
    });
    if(A.length===0){
      const betTypes=['単勝','馬単','馬連','ワイド','三連複','三連単','買い目1'];
      return betTypes.filter(k=>bets[k])
        .map(k=>`<div class="bet-row"><span class="bet-type">${k}</span><span class="bet-val">${esc(bets[k])}</span></div>`).join('');
    }

    const betRow = (k, v, cls='') =>
      `<div class="bet-row${cls}"><span class="bet-type">${k}</span><span class="bet-val">${esc(v)}</span></div>`;

    // ── 優先度1: ◎1頭抜け → 1頭軸
    if (isHonmeiDetached(allHorses)) {
      const honmei   = allHorses.find(h => h.mark === '◎');
      const opponents = allHorses.filter(h => ['○','▲','☆','△'].includes(h.mark||''));
      const opMarks  = opponents.map(h => h.mark).join('');
      const N        = opponents.length;
      const pts      = comb2(N);
      const secondBest = Math.max(...opponents.map(h => parseFloat(h.totalPt)||0));
      const gap      = (parseFloat(honmei.totalPt) - secondBest).toFixed(1);
      const banner = `<div class="jiku-detect-banner">
        <span class="jiku-detect-icon">🎯</span>
        <div>
          <div class="jiku-detect-text">◎指数1頭抜け → 1頭軸ロジック適用</div>
          <div class="jiku-detect-sub">2位との差 +${gap}pt ／ 2連系は◎流し・3連複は1頭軸</div>
        </div>
      </div>`;
      return banner
        + betRow('馬単',  `◎→${opMarks} 流し ${N}点`)
        + betRow('三連複', `◎1頭軸 → 相手${N}頭（${opMarks}） ${pts}点`, ' bet-row-jiku')
        + (bets['三連単1着固定'] ? betRow('三連単1着固定', bets['三連単1着固定']) : '');
    }

    // ── 優先度2: ◎○2頭抜け → 2頭軸
    if (isTop2Detached(allHorses)) {
      const honmei   = allHorses.find(h => h.mark === '◎');
      const taikou   = allHorses.find(h => h.mark === '○');
      const opponents = allHorses.filter(h => ['▲','☆','△'].includes(h.mark||''));
      const opMarks  = opponents.map(h => h.mark).join('');
      const N        = opponents.length;
      const top3rd   = Math.max(...opponents.map(h => parseFloat(h.totalPt)||0));
      const minTop2  = Math.min(parseFloat(honmei.totalPt)||0, parseFloat(taikou.totalPt)||0);
      const gap      = (minTop2 - top3rd).toFixed(1);
      const banner = `<div class="jiku-detect-banner jiku-2-banner">
        <span class="jiku-detect-icon">🏆</span>
        <div>
          <div class="jiku-detect-text">◎○2頭抜け検出 → 2頭軸ロジック適用</div>
          <div class="jiku-detect-sub">3位との差 +${gap}pt ／ 2連系は◎○固定・3連系は2頭軸</div>
        </div>
      </div>`;
      return banner
        + betRow('馬連',  `◎○ 1点`)
        + betRow('馬単',  `◎○マルチ 2点`)
        + betRow('三連複', `◎○2頭軸 → 相手${N}頭（${opMarks}） ${N}点`, ' bet-row-2jiku')
        + betRow('三連単', `◎○2頭軸マルチ → 相手${N}頭 ${6*N}点`,       ' bet-row-2jiku')
        + (bets['三連単1着固定'] ? betRow('三連単1着固定', bets['三連単1着固定']) : '');
    }

    // ── 優先度3: 混戦 → フォーメーション
    const inv  = calcInvestment(allHorses);
    const col1 = A.map(i=>allHorses[i].mark).join('');
    const col2 = B.map(i=>allHorses[i].mark).join('');
    const col3 = C.map(i=>allHorses[i].mark).join('');
    const inba     = [...B,...C.filter(i=>!B.includes(i))].filter(i=>allHorses[i].mark!=='◎').map(i=>allHorses[i].mark).join('');
    const batanPts = inba.length * 2;
    const fukuPts  = inv.sanrenpuku / 100;
    const tanPts   = inv.sanrentan  / 100;
    const extra1 = bets['三連単1着固定']
      ? betRow('三連単1着固定', bets['三連単1着固定'])
      : '';
    return betRow('馬単',  `◎↔${inba} マルチ${batanPts}点`)
      + betRow('三連複', `1列${col1}×2列${col2}×3列${col3} フォーメーション${fukuPts}点`)
      + betRow('三連単', `1列${col1}×2列${col2}×3列${col3} フォーメーション${tanPts}点`)
      + extra1;
  })();

  const commentsHtml = [
    comments.final ? `<div class="final-card"><div class="clabel">■ 最終結論</div><div class="ctext">${esc(comments.final).replace(/\n/g,'<br>')}</div></div>` : '',
    comments.risk  ? `<div class="risk-card"><div class="clabel">⚠️ 波乱ファクター</div><div class="ctext">${esc(comments.risk)}</div></div>` : '',
    data.betMemo   ? `<div class="betmemo-card"><div class="clabel">📝 買い目メモ</div><div class="ctext">${esc(data.betMemo)}</div></div>` : '',
    comments.extra ? `<div class="extra-card"><div class="clabel">🚨 補足</div><div class="ctext">${esc(comments.extra)}</div></div>` : '',
  ].filter(Boolean).join('');

  const gs = gradeStyle(r.grade||'');
  const gradeClass = r.grade ? 'grade-' + r.grade.toLowerCase() : '';

  return `
  <div class="race-card ${gradeClass}">
    <div class="race-head">
      <span class="race-grade-badge" style="${gs}">${esc(r.grade||'')}</span>
      <div>
        <div class="race-name">${esc(r.name||'')}</div>
        <div class="race-meta">${esc(r.venue||'')} ${esc(r.raceNum||'')} ／ ${esc(r.surface||'')}${esc(r.distance||'')} ／ ${esc(r.condition||'')} ／ ${esc(r.date||'')}</div>
      </div>
    </div>
    <div class="race-body">
      ${renderResult(data)}
      ${data.result ? '<div class="divider"></div>' : ''}
      ${data.raceCondNote ? `<div class="cond-note">🏟️ ${esc(data.raceCondNote).replace(/\n/g,'<br>')}</div>` : ''}
      ${notes ? `<div class="sec-title">単複期待値ランキング</div>${sabcRankHtml(notes, data.horses)}` : ''}
      ${heroHorses.length ? `<div class="sec-title">印付き馬</div>${heroHorses.map(h => renderHeroCard(h, orderMap, notes && notes.horses && notes.horses[h.name])).join('')}` : ''}
      ${restHorses.length ? `<div class="sec-title" style="margin-top:14px;">全馬スコア</div>${renderCompactRows(restHorses, orderMap)}` : ''}
      ${notes ? `<div class="sec-title" style="margin-top:14px;">全馬コメント</div>${allHorseCommentsHtml(notes, allHorses)}` : ''}
      <div class="divider"></div>
      ${notes ? `<div class="sec-title">推奨買い目（期待値ランキング1位）</div><div class="bets-grid">${sabcBetsHtml(notes, data.horses)}</div>` : ''}
      ${betsHtml ? `<div class="sec-title" style="margin-top:10px;">印順フォーメーション</div><div class="bets-grid">${betsHtml}</div>` : ''}
      <div class="divider"></div>
      ${commentsHtml ? `<div class="sec-title">分析コメント</div><div class="comment-area">${commentsHtml}</div>` : ''}
      ${notes ? `
      <div class="divider"></div>
      ${outlookHtml(notes) ? `<div class="section-head">展望</div>${outlookHtml(notes)}` : ''}
      ${lapAnalysisHtml(notes) ? `<div class="section-head">ラップ分析</div>${lapAnalysisHtml(notes)}` : ''}
      ${wetPickHtml(notes, data.horses) ? `<div class="section-head">重馬場メモ</div>${wetPickHtml(notes, data.horses)}` : ''}
      ` : ''}
      ${data.postRaceLesson ? `
      <div class="lesson-wrap">
        <div class="lesson-header">📝 今後への教訓</div>
        <div class="lesson-body">${data.postRaceLesson.split('\n\n').map(p => `<p>${esc(p)}</p>`).join('')}</div>
      </div>` : ''}
    </div>
  </div>`;
}

// ── ボタン生成 ─────────────────────────────────
function gradeLabel(g) {
  if (g==='G1') return `<span class="btn-grade" style="background:#f0c040;color:#000;">G1</span>`;
  if (g==='G2') return `<span class="btn-grade" style="background:#c0c0c0;color:#000;">G2</span>`;
  if (g==='G3') return `<span class="btn-grade" style="background:#cd7f32;color:#fff;">G3</span>`;
  return `<span class="btn-grade" style="background:rgba(34,197,94,.3);color:#22c55e;border:1px solid rgba(34,197,94,.4);">${g||'OP'}</span>`;
}

// キャッシュ
const cache = {};

async function showRace(file, btnEl) {
  document.querySelectorAll('.race-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const detailWrap = document.getElementById('detailWrap');
  const detail = document.getElementById('detail');
  detailWrap.style.display = 'block';
  detail.innerHTML = '<div class="loading">⏳ 読み込み中...</div>';

  try {
    if (!cache[file]) {
      const r = await fetch(`data/${file}.json?v=` + Date.now());
      if (!r.ok) throw new Error(`${file}.json が見つかりません`);
      cache[file] = await r.json();
    }
    const data = cache[file];
    // race-notes を並行フェッチ（notesFile フィールドがある場合）
    let notes = null;
    if (data.notesFile) {
      const nkey = data.notesFile;
      if (!cache[nkey]) {
        try {
          const nr = await fetch(`data/${nkey}.json?v=` + Date.now());
          if (nr.ok) cache[nkey] = await nr.json();
        } catch(e2) { /* notesなくても続行 */ }
      }
      notes = cache[nkey] || null;
    }
    detail.innerHTML = renderRaceDetail(data, notes);
    detail.scrollIntoView({behavior:'smooth', block:'start'});
  } catch(e) {
    detail.innerHTML = `<div class="err">⚠️ 読み込みエラー：${e.message}</div>`;
  }
}

function buildRaceButtons(buttons) {
  return buttons.map(({ file, data }) => {
    const r = data.race || {};
    const honmei = (data.horses || []).find(h => h.mark === '◎');
    const taikou = (data.horses || []).find(h => h.mark === '○');
    const picksLine = [
      honmei ? `◎${honmei.name}` : null,
      taikou ? `○${taikou.name}` : null,
    ].filter(Boolean).join(' / ');
    const gradeClass = r.grade ? 'grade-' + r.grade.toLowerCase() : '';
    const res = data.result;
    const resultBadge = res
      ? `<span class="btn-result ${res.hitFlag ? 'btn-result-hit' : 'btn-result-miss'}">${res.hitFlag ? '✅ HIT' : '❌ MISS'}</span>`
      : '';
    return `<button class="race-btn ${gradeClass}" data-file="${esc(file)}" onclick="handleBtnClick(this)">
      <span class="active-dot"></span>
      ${gradeLabel(r.grade)}
      <div class="btn-name">${esc(r.name||file)}</div>
      <div class="btn-meta">${esc(r.venue||'')} ${esc(r.distance||'')} ／ ${esc(r.date||'')}</div>
      ${picksLine ? `<div class="btn-picks" style="margin-top:5px;font-size:10px;font-weight:700;color:rgba(139,26,26,.8);">${esc(picksLine)}</div>` : ''}
      ${resultBadge}
    </button>`;
  }).join('');
}

function toggleWeekAcc(header) {
  const body  = header.nextElementSibling;
  const arrow = header.querySelector('.week-acc-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

async function loadWeek(weekId, files, isCurrent) {
  const buttons = [];
  for (const file of files) {
    try {
      if (!cache[file]) {
        const r = await fetch(`data/${file}.json?v=` + Date.now());
        if (!r.ok) continue;
        const data = await r.json();
        if (data.published === false) continue;
        cache[file] = data;
      }
      buttons.push({ file, data: cache[file] });
    } catch(e) { /* スキップ */ }
  }
  return buttons;
}

async function loadAll() {
  const weekList = document.getElementById('weekList');

  try {
    const res = await fetch('data/final-index.json?v=' + Date.now());
    if (!res.ok) throw new Error('final-index.json が見つかりません');
    const index = await res.json();
    const weeks = index.weeks || [];

    if (weeks.length === 0) {
      weekList.innerHTML = '<div class="err">最終予想データがありません</div>';
      return;
    }

    weekList.innerHTML = '';

    // 各週を並行ロード
    const weekData = await Promise.all(
      weeks.map(w => loadWeek(w.weekId, w.files || [], w.weekId === index.currentWeek))
    );

    weeks.forEach((week, wi) => {
      const buttons = weekData[wi];
      const isCurrent = week.weekId === index.currentWeek;
      const hitCount  = buttons.filter(b => b.data.result?.hitFlag).length;
      const missCount = buttons.filter(b => b.data.result && !b.data.result.hitFlag).length;

      const hitChips = [
        hitCount  > 0 ? `<span class="week-hit-chip chip-hit">✅ 的中 ${hitCount}レース</span>`  : '',
        missCount > 0 ? `<span class="week-hit-chip chip-miss">❌ 不的中 ${missCount}レース</span>` : '',
      ].join('');

      const accEl = document.createElement('div');
      accEl.className = `week-accordion${isCurrent ? ' is-current' : ''}`;
      accEl.innerHTML = `
        <div class="week-acc-header" onclick="toggleWeekAcc(this)">
          <div class="week-acc-left">
            <div>
              <div class="week-acc-label">
                ${esc(week.label)}
                ${isCurrent ? ' <span class="week-current-badge">最新</span>' : ''}
              </div>
              <div class="week-acc-meta">${buttons.length}レース</div>
            </div>
          </div>
          <span class="week-acc-arrow${isCurrent ? ' open' : ''}">▼</span>
        </div>
        <div class="week-acc-body${isCurrent ? ' open' : ''}">
          ${hitChips ? `<div class="week-hit-summary">${hitChips}</div>` : ''}
          <div class="race-btns" id="btns-${esc(week.weekId)}">
            ${buttons.length > 0 ? buildRaceButtons(buttons) : '<div class="loading" style="padding:20px 0;">レースデータなし</div>'}
          </div>
        </div>
      `;
      weekList.appendChild(accEl);
    });

    // URLパラメータで週指定があればそちらを優先、なければ最新週
    const urlWeek = new URLSearchParams(location.search).get('week');
    const targetWeekId = (urlWeek && weeks.find(w => w.weekId === urlWeek))
      ? urlWeek
      : index.currentWeek;

    // 指定週のアコーディオンを開く
    if (urlWeek && urlWeek !== index.currentWeek) {
      const targetAcc = document.querySelector(
        `.week-accordion:not(.is-current) #btns-${CSS.escape(targetWeekId)}`
      )?.closest('.week-accordion');
      if (targetAcc) {
        targetAcc.querySelector('.week-acc-body').classList.add('open');
        targetAcc.querySelector('.week-acc-arrow').classList.add('open');
      }
    }

    // 対象週の1番目を自動表示（showRace経由でnotesも取得）
    const firstBtn = document.querySelector(`#btns-${CSS.escape(targetWeekId)} .race-btn`);
    if (firstBtn) {
      document.getElementById('detailWrap').style.display = 'block';
      showRace(firstBtn.dataset.file, firstBtn);
    }

  } catch(e) {
    weekList.innerHTML = `<div class="err">読み込みエラー：${e.message}</div>`;
  }
}

function handleBtnClick(btn) {
  showRace(btn.dataset.file, btn);
}

loadAll();
</script>
