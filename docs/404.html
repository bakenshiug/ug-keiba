<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>参道の先に何も無し｜404 | UG競馬神宮</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#FAFAFA;color:#1A1A1A;font-family:'Shippori Mincho','Noto Serif JP',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.torii{font-size:64px;margin-bottom:16px;color:#9B2D30;}
.num{font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:78px;font-weight:900;color:#9B2D30;text-shadow:0 2px 0 #C9A961;line-height:1;letter-spacing:.04em;}
.title{font-size:20px;font-weight:800;color:#7A1E1E;margin-top:10px;letter-spacing:.08em;}
.msg{font-size:14px;color:rgba(26,26,26,.65);margin:18px 0 32px;line-height:1.9;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:24px;background:rgba(155,45,48,.08);border:1px solid rgba(155,45,48,.4);color:#9B2D30;font-size:13px;font-weight:700;text-decoration:none;transition:background .18s;font-family:'Shippori Mincho','Noto Serif JP',serif;}
.btn:hover{background:rgba(155,45,48,.18);}
</style>
</head>
<body>
  <div class="torii">⛩</div>
  <div class="num">404</div>
  <div class="title">参道の先に、何も無し</div>
  <div class="msg">此の御神託は見当たりませぬ。<br>移築、若しくは撤去されたものと存じます。</div>
  <a href="/ug-keiba/" class="btn">⛩ 鳥居へ戻る</a>
</body>
</html>
