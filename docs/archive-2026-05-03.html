<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>言霊神宮アーカイブ 2026-05-03（天皇賞・春週） ｜ UG競馬神宮</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFA;--bg-soft:#F5F2EB;--paper:#FBF7EE;--paper-deep:#F0EADB;
    --ink:#2c1f12;--ink-soft:#5a4a3a;--shu:#a44a3f;--gold:#c9a84c;
    --border:rgba(164,74,63,.25);--ok:#5fa85c;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:0;background:var(--bg);color:var(--ink);
       font-family:'Noto Sans JP',sans-serif;line-height:1.7}
  .mincho{font-family:'Shippori Mincho',serif;letter-spacing:.05em}
  header{padding:32px 16px 24px;text-align:center;
         background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);
         border-bottom:1px solid var(--border)}
  .h-title{font-size:28px;color:var(--shu);font-weight:700;letter-spacing:.4em}
  .h-sub{font-size:13px;color:var(--ink-soft);margin-top:8px;letter-spacing:.15em}
  .h-rule{font-size:13px;color:var(--shu);margin-top:12px;font-weight:700}
  .home-link{display:inline-block;margin-top:14px;padding:6px 16px;
             border:1px solid var(--shu);color:var(--shu);text-decoration:none;
             font-size:12px;letter-spacing:.2em;border-radius:4px}
  .home-link:hover{background:var(--shu);color:#fff}
  main{max-width:920px;margin:0 auto;padding:24px 16px}
  .race{margin-bottom:14px;padding:0;border:1px solid var(--border);
        background:var(--paper);border-radius:8px;
        box-shadow:0 1px 6px rgba(164,74,63,.08);overflow:hidden}
  .race[open]{margin-bottom:24px}
  .race.race-win{border-color:var(--gold);
                 box-shadow:0 0 16px rgba(201,168,76,.4),0 1px 6px rgba(164,74,63,.08);
                 animation:racePulse 2.6s ease-in-out infinite}
  @keyframes racePulse{
    0%,100%{box-shadow:0 0 16px rgba(201,168,76,.4),0 1px 6px rgba(164,74,63,.08)}
    50%   {box-shadow:0 0 26px rgba(201,168,76,.65),0 1px 6px rgba(164,74,63,.12)}
  }
  .race-summary{padding:14px 18px;cursor:pointer;list-style:none;
                display:flex;align-items:center;gap:10px;flex-wrap:wrap;
                background:var(--paper);transition:background .15s ease}
  .race-summary:hover{background:var(--paper-deep)}
  .race-summary::-webkit-details-marker{display:none}
  .race-fold-icon{color:var(--shu);font-size:13px;transition:transform .2s ease;flex-shrink:0}
  .race[open] .race-fold-icon{transform:rotate(90deg)}
  .race-summary .race-name{font-size:16px;color:var(--shu);font-weight:700;flex:1;min-width:0}
  .race-summary .race-meta{font-size:11px;color:var(--ink-soft);flex-shrink:0}
  .race-hit-mark{display:inline-block;font-size:18px;margin-left:6px;
                 animation:bounce 1.4s ease-in-out infinite;vertical-align:middle}
  .race.race-win .race-summary{background:linear-gradient(135deg,rgba(212,175,55,.22) 0%,rgba(212,175,55,.08) 50%,rgba(212,175,55,.18) 100%)}
  .race.race-win .race-summary:hover{background:linear-gradient(135deg,rgba(212,175,55,.3) 0%,rgba(212,175,55,.12) 50%,rgba(212,175,55,.25) 100%)}
  .race.race-win .race-summary .race-name{color:var(--shu-dk,#7A1E1E)}
  .race.race-win .race-fold-icon{color:var(--gold-dk,#b8860b)}
  /* 🔒 有料ロック表示 */
  .race.race-locked{border-color:#2b6cb0;border-style:dashed;opacity:.95}
  .race.race-locked .race-summary{background:linear-gradient(135deg,rgba(43,108,176,.08) 0%,rgba(43,108,176,.03) 100%)}
  .race.race-locked .race-fold-icon{color:#2b6cb0;font-size:18px}
  .race.race-locked .race-name{color:#2b6cb0}
  .lock-card{text-align:center;padding:28px 20px;background:linear-gradient(135deg,#fbf7ee 0%,#e8f0f8 100%);border-radius:8px}
  .lock-icon{font-size:42px;margin-bottom:8px}
  .lock-title{font-size:18px;font-weight:700;color:#2b6cb0;margin-bottom:12px}
  .lock-desc{font-size:13px;color:var(--ink-soft);margin-bottom:14px;line-height:1.7}
  .lock-price{font-size:15px;font-weight:700;color:var(--shu);margin-bottom:14px}
  .lock-cta{display:inline-block;padding:12px 32px;background:#2b6cb0;color:#fff;
            text-decoration:none;border-radius:6px;font-size:15px;font-weight:700;
            transition:all .2s ease;letter-spacing:.05em}
  .lock-cta:hover{background:#1e4d80;transform:translateY(-2px);box-shadow:0 4px 12px rgba(43,108,176,.3)}
  .lock-note{font-size:11px;color:var(--ink-soft);margin-top:12px}
  .race-body{padding:18px 20px 20px}
  .race-body .race-betting-pair,.race-body .picks-table{margin-top:0}
  /* 折り畳みサマリー（神宮ボード）*/
  .summary-board.sb-fold{padding:0;overflow:hidden}
  .summary-board.sb-fold > .sb-fold-summary{padding:18px;cursor:pointer;list-style:none;
                                             text-align:center;transition:background .15s ease}
  .summary-board.sb-fold > .sb-fold-summary::-webkit-details-marker{display:none}
  .summary-board.sb-fold > .sb-fold-summary:hover{background:rgba(164,74,63,.04)}
  .summary-board.sb-fold > *:not(.sb-fold-summary){padding-left:18px;padding-right:18px}
  .summary-board.sb-fold > *:last-child{padding-bottom:18px}
  .sb-fold-hint{font-size:11px;color:var(--ink-soft);letter-spacing:.2em;margin-top:6px;
                opacity:.7;transition:opacity .2s ease}
  .summary-board.sb-fold[open] .sb-fold-hint{opacity:0;height:0;margin:0;overflow:hidden}
  .sb-total-detail{text-align:center;font-size:12px;color:var(--ink-soft);margin-bottom:10px}
  .sb-total-detail.win{color:var(--ok)}
  .sb-total-detail small{font-size:12px}
  .race-header{display:flex;justify-content:space-between;align-items:baseline;
               border-bottom:1px dashed var(--border);padding-bottom:10px;margin-bottom:14px;
               flex-wrap:wrap;gap:8px}
  .race-name{font-size:18px;color:var(--shu);font-weight:700}
  .race-meta{font-size:12px;color:var(--ink-soft)}
  /* 他場ジャンプ */
  .cross-jump{display:flex;gap:6px;flex-wrap:wrap;width:100%;margin-top:4px}
  .cross-jump-label{font-size:10px;color:var(--ink-soft);letter-spacing:.1em;align-self:center;margin-right:4px}
  .cj-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;
          background:#fff;border:1px solid var(--border);border-radius:4px;
          font-size:11px;color:var(--shu);cursor:pointer;letter-spacing:.05em;
          font-family:'Shippori Mincho',serif;text-decoration:none;transition:all .15s ease}
  .cj-btn:hover{background:var(--shu);color:#fff;border-color:var(--shu)}
  .picks-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  .picks-table th{background:var(--paper-deep);padding:8px;text-align:left;
                  color:var(--shu);border-bottom:1px solid var(--border);font-weight:700}
  .picks-table td{padding:12px 8px;border-bottom:1px dashed var(--border);
                  vertical-align:middle;color:var(--ink)}
  .picks-table td.jockey-c,.picks-table td.trainer-c{font-size:12px;color:var(--ink-soft);width:70px}
  .mark{font-size:22px;font-weight:700;color:var(--shu);width:36px;text-align:center;vertical-align:middle}
  .mark.dou{color:#b8902f}
  .name{font-weight:700;color:var(--ink);width:160px}
  .name-row1{display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.3}
  .name-num{display:inline-block;min-width:28px;padding:2px 6px;background:#fff;
            border:1px solid var(--border);border-radius:3px;font-size:11px;
            color:var(--ink-soft);font-weight:700;text-align:center}
  .name-text{font-size:14px;font-weight:700;color:var(--ink)}
  .name-row2{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
  .grade{display:inline-block;padding:2px 7px;background:var(--shu);color:#fff;
         font-weight:700;font-size:10px;border-radius:3px;letter-spacing:.05em}
  .comment{color:var(--ink-soft);font-size:12px;line-height:1.65}
  details{margin-top:14px;padding:10px;background:var(--bg-soft);border-radius:4px;
          border:1px solid var(--border)}
  summary{cursor:pointer;color:var(--shu);font-size:12px;letter-spacing:.1em;font-weight:700}
  details ul{margin:8px 0 0;padding-left:18px;font-size:12px;color:var(--ink-soft)}
  .fatal{margin-top:10px;padding:10px;background:rgba(164,74,63,.08);
         border-left:3px solid var(--shu);font-size:12px;color:var(--ink)}
  .fatal-h{color:var(--shu);font-weight:700;margin-bottom:6px}
  .result{margin-top:14px;padding:12px;background:rgba(95,168,92,.1);
          border-left:3px solid var(--ok);font-size:13px;color:#2d5530;font-weight:700}
  .pending{color:var(--ink-soft);font-style:italic;font-weight:400;
           background:var(--bg-soft);border-left-color:var(--border)}
  footer{text-align:center;padding:24px;color:var(--ink-soft);font-size:11px;
         border-top:1px solid var(--border);margin-top:24px;background:var(--paper-deep)}
  /* タブ */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
        max-width:920px;margin:24px auto 0;padding:0 16px}
  .tab{padding:10px 20px;background:var(--paper);color:var(--ink-soft);
       border:1px solid var(--border);border-radius:6px;cursor:pointer;
       font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:.12em;
       transition:all .2s ease}
  .tab:hover{border-color:var(--shu);color:var(--shu)}
  .tab.active{background:var(--shu);color:#fff;border-color:var(--shu);font-weight:700}
  .tab-count{font-size:11px;opacity:.85;margin-left:6px}

  /* ════════ スマホ版（≤700px）：テーブル → カード型レイアウト ════════ */
  @media (max-width:700px){
    .race{padding:14px}
    .race-name{font-size:15px}
    .race-meta{font-size:11px}
    /* テーブルをブロック化 */
    .picks-table,.picks-table tbody{display:block;width:100%}
    .picks-table thead{display:none}
    /* テーブルヘッダ行（<tr><th>印</th>...）をモバイルで非表示 */
    .picks-table tr:has(th){display:none !important}
    /* 馬券絡み行の金サイドバー削除（モバイルではグリッドレイアウトで不要） */
    .picks-table tr.hit-row td.name{padding-left:0 !important}
    .picks-table tr.hit-row td.name::before{display:none !important}
    .picks-table tr{
      display:grid;
      grid-template-columns:42px 1fr;
      column-gap:10px;
      background:#fff;border:1px solid var(--border);border-radius:8px;
      padding:10px 12px;margin-bottom:10px;
      align-items:start;
    }
    .picks-table tr.hit-row{
      background:linear-gradient(90deg,rgba(212,175,55,.10),rgba(212,175,55,.02));
      border-color:var(--gold);
    }
    .picks-table td{
      display:block;border:none !important;padding:0 !important;
      background:transparent !important
    }
    /* マーク：左列、上下中央 */
    .picks-table td.mark{
      grid-column:1;grid-row:1/span 3;
      font-size:26px;text-align:center;align-self:center;
      width:auto;
    }
    /* 名前：右列1段目 */
    .picks-table td.name{
      grid-column:2;grid-row:1;width:auto;
    }
    /* 騎手：右列2段目 */
    .picks-table td.jockey-c{
      grid-column:2;grid-row:2;
      font-size:11px;color:var(--ink-soft);width:auto;
    }
    .picks-table td.jockey-c::before{content:'騎 ';color:var(--shu);font-weight:700;margin-right:3px}
    /* 厩舎：右列3段目 */
    .picks-table td.trainer-c{
      grid-column:2;grid-row:3;
      font-size:11px;color:var(--ink-soft);width:auto;
      margin-bottom:4px;
    }
    .picks-table td.trainer-c::before{content:'厩 ';color:var(--shu);font-weight:700;margin-right:3px}
    /* コメント：全幅・最下段・朱左バー */
    .picks-table td.comment{
      grid-column:1/span 2;grid-row:4;
      font-size:12.5px;line-height:1.75;
      padding:10px 12px !important;
      background:var(--bg-soft) !important;
      border-radius:6px;
      border-left:3px solid var(--shu) !important;
      margin-top:6px;
    }
    /* マーク行スパン拡張 */
    .picks-table td.mark{grid-row:1/span 3 !important}
    .name-text{font-size:15px}
    .name-row2{margin-top:5px}
    .race-betting{font-size:11px}
  }
  /* 結果反映 */
  .pop{display:inline-block;padding:2px 7px;background:#eee;color:#555;
       font-size:10px;border-radius:3px;font-weight:600}
  /* 着外：薄いアウトラインで「絡まなかった」感を表現 */
  .finish{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;font-weight:600;font-size:11px;
          border-radius:5px;color:#888;background:#fff;border:1px dashed #ccc;letter-spacing:.03em}
  .finish.r1{background:linear-gradient(135deg,#fff4b8 0%,#f4d03f 35%,#d4af37 70%,#b8860b 100%);
             box-shadow:0 0 14px rgba(212,175,55,.8),inset 0 1px 0 rgba(255,255,255,.5);
             color:#3a2a00;text-shadow:0 1px 0 rgba(255,255,255,.5);border:none;
             font-weight:700;font-size:12px;padding:3px 10px;
             animation:pulseGold 1.6s ease-in-out infinite}
  .finish.r2{background:linear-gradient(135deg,#fafafa 0%,#c8d4dc 40%,#8ea0ac 100%);
             box-shadow:0 0 10px rgba(142,160,172,.7),inset 0 1px 0 rgba(255,255,255,.6);
             color:#1a2530;text-shadow:0 1px 0 rgba(255,255,255,.5);border:none;
             font-weight:700;font-size:12px;padding:3px 10px}
  .finish.r3{background:linear-gradient(135deg,#f5b78a 0%,#d49a6a 40%,#a16235 100%);
             box-shadow:0 0 10px rgba(168,117,68,.7),inset 0 1px 0 rgba(255,255,255,.4);
             color:#3a1f00;text-shadow:0 1px 0 rgba(255,220,180,.4);border:none;
             font-weight:700;font-size:12px;padding:3px 10px}
  @keyframes pulseGold{
    0%,100%{box-shadow:0 0 12px rgba(212,175,55,.7),inset 0 1px 0 rgba(255,255,255,.4)}
    50%   {box-shadow:0 0 22px rgba(212,175,55,1),inset 0 1px 0 rgba(255,255,255,.5)}
  }
  .hit-mark{display:inline-block;font-size:14px;animation:bounce 1.4s ease-in-out infinite}
  @keyframes bounce{
    0%,100%{transform:translateY(0)}
    50%   {transform:translateY(-2px)}
  }
  /* 馬券絡み行のハイライト */
  tr.hit-row td{background:linear-gradient(90deg,rgba(212,175,55,.12) 0%,rgba(212,175,55,.02) 100%)}
  tr.hit-row td.name{position:relative;padding-left:14px}
  tr.hit-row td.name::before{content:'';position:absolute;left:4px;top:12px;bottom:12px;
                              width:3px;background:linear-gradient(180deg,var(--gold) 0%,#b8860b 100%);
                              border-radius:2px}
  /* 回収率ボード */
  .summary-board{max-width:920px;margin:0 auto 20px;padding:18px;
                 background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);
                 border:2px solid var(--shu);border-radius:8px}
  /* ◎軸流し版：BOX版と同じデザイン、囲み枠だけ金色＋ネオングロー */
  .summary-board.neon{
    border:2px solid var(--gold);
    box-shadow:0 0 18px rgba(201,168,76,.45),0 0 36px rgba(201,168,76,.18);
    position:relative;
  }
  .summary-board.neon .sb-title{color:var(--gold-dk,#b8860b);
                                text-shadow:0 0 8px rgba(201,168,76,.5)}
  .summary-board.neon .sb-total{color:var(--gold-dk,#b8860b)}
  .summary-board.neon .sb-total.win{color:var(--ok)}
  @keyframes neonPulse{
    0%,100%{box-shadow:0 0 18px rgba(201,168,76,.45),0 0 36px rgba(201,168,76,.18)}
    50%   {box-shadow:0 0 24px rgba(201,168,76,.7),0 0 48px rgba(201,168,76,.3)}
  }
  .summary-board.neon{animation:neonPulse 2.4s ease-in-out infinite}
  .sb-title{font-size:14px;color:var(--shu);font-weight:700;letter-spacing:.2em;
            text-align:center;margin-bottom:10px}
  .sb-total{text-align:center;font-size:28px;color:var(--shu);font-weight:700;margin:6px 0}
  .sb-total small{font-size:12px;color:var(--ink-soft);font-weight:400;margin-left:8px}
  .sb-meta{text-align:center;font-size:11px;color:var(--ink-soft);margin-bottom:12px}
  .sb-kinds{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .sb-kind{background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px;
           text-align:center;font-size:11px}
  .sb-kind .k-name{color:var(--ink-soft);font-size:10px;letter-spacing:.1em}
  .sb-kind .k-rec{font-size:18px;color:var(--shu);font-weight:700;margin-top:2px}
  .sb-kind .k-rec.win{color:var(--ok)}
  .sb-kind .k-amt{color:var(--ink-soft);font-size:10px;margin-top:2px}
  .sb-kind .k-hit{color:var(--ink-soft);font-size:10px;margin-top:2px}
  .sb-kind .k-hit.win{color:var(--ok);font-weight:700}
  .venue-boards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:14px}
  .vb{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px}
  .vb-h{font-size:13px;color:var(--shu);font-weight:700;text-align:center;
        padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;letter-spacing:.15em}
  .vb-total{text-align:center;font-size:18px;color:var(--shu);font-weight:700;margin:4px 0}
  .vb-total.win{color:var(--ok)}
  .vb-meta{text-align:center;font-size:10px;color:var(--ink-soft);margin-bottom:6px}
  .vb-table{width:100%;font-size:10.5px;border-collapse:collapse}
  .vb-table th{text-align:left;color:var(--ink-soft);font-weight:400;padding:2px 3px;border-bottom:1px dashed var(--border)}
  .vb-table td{padding:3px;border-bottom:1px dashed var(--border)}
  .vb-table .v-rec{text-align:right;font-weight:700;color:var(--shu)}
  .vb-table .v-rec.win{color:var(--ok)}
  .vb-table .v-hit{text-align:right;color:var(--ink-soft);font-size:10px}
  .vb-table .v-hit.win{color:var(--ok);font-weight:700}
  details.summary-d{margin-top:14px}
  details.summary-d summary{padding:8px;background:var(--paper-deep);border-radius:4px;
                            color:var(--shu);font-weight:700;font-size:12px;letter-spacing:.15em}
  /* ご祝儀レース */
  .goshugi{margin-top:14px;padding:14px;background:linear-gradient(135deg,#fff6e8 0%,#fff0d0 100%);
           border:2px solid var(--gold);border-radius:8px;
           box-shadow:0 2px 10px rgba(201,168,76,.3)}
  .goshugi-h{text-align:center;color:#b8860b;font-weight:700;font-size:14px;
             letter-spacing:.2em;margin-bottom:10px;
             text-shadow:0 1px 0 rgba(255,255,255,.5)}
  .goshugi-list{display:grid;gap:8px}
  .goshugi-row{display:grid;grid-template-columns:36px 1fr auto auto;gap:10px;
               align-items:center;padding:10px 12px;background:#fff;
               border:1px solid rgba(212,175,55,.4);border-radius:6px}
  .goshugi-rank{font-size:22px;text-align:center}
  .goshugi-name{font-weight:700;color:var(--ink);font-size:13px}
  .goshugi-name .gn-meta{color:var(--ink-soft);font-size:11px;font-weight:400;margin-left:6px}
  .goshugi-rec{font-size:18px;font-weight:700;color:#b8860b;
               text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .goshugi-pay{font-size:11px;color:var(--ink-soft)}
  .sb-learn{text-align:center;margin-top:14px;padding:8px;background:var(--bg-soft);
            border-radius:4px;color:var(--ink-soft);font-size:11px;font-style:italic}
  /* 各レース結果（2カラム並列） */
  .race-betting-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  @media (max-width:700px){.race-betting-pair{grid-template-columns:1fr}}
  .race-betting{padding:10px;background:#fff;
                border:1px dashed var(--border);border-radius:6px;font-size:12px}
  .race-betting.axis{border:2px solid var(--gold);
                     background:linear-gradient(135deg,#fff8e8 0%,#fff5dc 100%);
                     box-shadow:0 0 10px rgba(201,168,76,.2)}
  .rb-head{font-family:'Shippori Mincho',serif;font-size:11px;color:var(--shu);
           font-weight:700;letter-spacing:.08em;

<body>
<div style="background:linear-gradient(135deg,#f5f2eb,#fbf7ee);border-bottom:2px solid #8a7a3a;
            padding:14px 20px;text-align:center;font-family:'Shippori Mincho',serif;letter-spacing:.05em">
  📜 <b style="color:#7A1E1E">言霊神宮アーカイブ</b>
  ｜ 2026-05-03（天皇賞・春週） 全レース picks
  ｜ <a href="kotodama.html" style="color:#a44a3f;font-weight:700;text-decoration:underline">最新週へ戻る ▶</a>
  ｜ <a href="kotodama-archive.html" style="color:#a44a3f;font-weight:700;text-decoration:underline">アーカイブ一覧 📚</a>
</div>

<header>
  <div class="h-title mincho">言　霊　神　宮</div>
  <div class="h-sub mincho">⛩ ギーニョ・青龍・クロード（神主）</div>
  <div class="h-rule">全レース予想公開中</div>
  <a class="home-link mincho" href="index.html">⛩ 神宮に戻る</a>

</header>

<div id="summary-board-axis"></div>

<main id="races"></main>
<footer class="mincho">⛩ UG 競馬神宮 ／ 言霊実験室 ⛩</footer>

<script>
const FILES = ['data/kotodama-test/2026-05-03.json'];
const MARK_CLASS = {'◎':'mark','○':'mark','▲':'mark dou','△':'mark dou'};

// 曜日表示
const DOW = ['日','月','火','水','木','金','土'];
function fmtDate(dateStr){
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`;
}

let ALL_RACES = [];
let SUMMARY = null;
let CURRENT_TAB = '';

const KIND_LABEL = {
  tan:'単勝', fuku:'複勝', wide:'ワイドBOX', umaren:'馬連BOX',
  umatan:'馬単BOX', sanrenpuku:'3連複BOX', sanrentan:'3連単BOX'
};

async function load(){
  for (const f of FILES){
    try{
      const r = await fetch(f+'?_='+Date.now());
      const d = await r.json();
      const paidDay = false; /* アーカイブ：全公開 */
      d.races.forEach(race => {
        if (paidDay) {
          const rn = parseInt(String(race.raceNum).replace('R',''), 10);
          // 1-3R は無料、4R以降はロック
          race._paidLocked = rn >= 4;
        }
        ALL_RACES.push(race);
      });
      if (d.summary) SUMMARY = d.summary;
    }catch(e){console.error(e)}
  }
  renderSummary();
  renderSummaryAxis();
  buildTabs();
  render();
}

// ◎軸流し戦略の計算
const AXIS_INVEST = {tan:100,fuku:100,wide:300,umaren:300,umatan:600,sanrenpuku:300,sanrentan:1800};
const AXIS_KIND_LABEL = {tan:'単勝◎',fuku:'複勝◎',wide:'ワイド流',umaren:'馬連流',umatan:'馬単流マ',sanrenpuku:'3連複流',sanrentan:'3連単流マ'};

function calcAxis(race){
  const picks = race.picks || [];
  const payouts = race.result && race.result.payouts;
  if (picks.length < 4 || !payouts) return null;
  const axis = String(parseInt(picks[0].num,10));
  const aite = picks.slice(1,4).map(p => String(parseInt(p.num,10)));
  const invest = {...AXIS_INVEST};
  const payout = {tan:0,fuku:0,wide:0,umaren:0,umatan:0,sanrenpuku:0,sanrentan:0};
  // 単勝
  (payouts.tan||[]).forEach(p => { if ((p.combo||[]).includes(axis)) payout.tan += p.amount||0; });
  // 複勝
  (payouts.fuku||[]).forEach(p => { if ((p.combo||[]).includes(axis)) payout.fuku += p.amount||0; });
  // ワイド・馬連 ◎軸-相手3頭
  ['wide','umaren'].forEach(k => {
    (payouts[k]||[]).forEach(p => {
      const c = p.combo||[]; if (!c.includes(axis)) return;
      const other = c.filter(x => x!==axis);
      if (other.some(o => aite.includes(o))) payout[k] += p.amount||0;
    });
  });
  // 馬単マルチ
  (payouts.umatan||[]).forEach(p => {
    const c = p.combo||[]; if (c.length<2 || !c.includes(axis)) return;
    const other = c.filter(x => x!==axis);
    if (other.some(o => aite.includes(o))) payout.umatan += p.amount||0;
  });
  // 3連複
  (payouts.sanrenpuku||[]).forEach(p => {
    const c = p.combo||[]; if (!c.includes(axis)) return;
    const other = c.filter(x => x!==axis);
    if (other.length>=2 && aite.includes(other[0]) && aite.includes(other[1])) payout.sanrenpuku += p.amount||0;
  });
  // 3連単マルチ
  (payouts.sanrentan||[]).forEach(p => {
    const c = p.combo||[]; if (c.length<3 || !c.includes(axis)) return;
    const other = c.filter(x => x!==axis);
    if (other.length>=2 && aite.includes(other[0]) && aite.includes(other[1])) payout.sanrentan += p.amount||0;
  });
  const investTotal = Object.values(invest).reduce((a,b)=>a+b,0);
  const payoutTotal = Object.values(payout).reduce((a,b)=>a+b,0);
  return {invest,payout,investTotal,payoutTotal,recovery:investTotal?Math.round(payoutTotal/investTotal*1000)/10:0};
}

function aggregateAxis(races){
  const KINDS = Object.keys(AXIS_INVEST);
  const per = {}; KINDS.forEach(k => per[k]={inv:0,pay:0,hit:0,races:0});
  let totInv=0, totPay=0, hit=0;
  races.forEach(r => {
    const b = calcAxis(r); if (!b) return;
    totInv += b.investTotal; totPay += b.payoutTotal;
    if (b.payoutTotal>0) hit++;
    KINDS.forEach(k => {
      per[k].inv += b.invest[k]; per[k].pay += b.payout[k];
      if (b.invest[k]>0) per[k].races++;
      if (b.payout[k]>0) per[k].hit++;
    });
  });
  const n = races.filter(r => calcAxis(r)).length;
  return {
    racesWithResult:n, racesHit:hit, raceHitRate:n?Math.round(hit/n*1000)/10:0,
    totalInvest:totInv, totalPayout:totPay,
    totalRecovery:totInv?Math.round(totPay/totInv*1000)/10:0,
    byKind: Object.fromEntries(KINDS.map(k => [k,{
      invest:per[k].inv, payout:per[k].pay,
      recovery:per[k].inv?Math.round(per[k].pay/per[k].inv*1000)/10:0,
      hit:per[k].hit, races:per[k].races,
      hitRate:per[k].races?Math.round(per[k].hit/per[k].races*1000)/10:0,
    }])),
  };
}

function venueBoardAxis(name, s){
  return `
    <div class="vb">
      <div class="vb-h mincho">${name}</div>
      <div class="vb-total ${s.totalRecovery>=100?'win':''}"><span style="font-size:12px;font-weight:400;letter-spacing:.1em;margin-right:6px">回収率</span>${s.totalRecovery}%</div>
      <div class="vb-meta">${s.racesHit}/${s.racesWithResult}R的中 (${s.raceHitRate}%) ／ 投資¥${s.totalInvest.toLocaleString()} 払戻¥${s.totalPayout.toLocaleString()}</div>
      <table class="vb-table">
        <tr><th>券種</th><th style="text-align:right">的中率</th><th style="text-align:right">回収率</th></tr>
        ${Object.entries(s.byKind).map(([k,v])=>`
          <tr>
            <td>${AXIS_KIND_LABEL[k]||k}</td>
            <td class="v-hit ${v.hitRate>=50?'win':''}">${v.hit}/${v.races} (${v.hitRate}%)</td>
            <td class="v-rec ${v.recovery>=100?'win':''}">${v.recovery}%</td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function renderSummaryAxis(){
  const el = document.getElementById('summary-board-axis');
  if (!el) return;
  const races = ALL_RACES.filter(r => r.result && r.result.payouts);
  if (!races.length) { el.innerHTML = ''; return; }
  // 全体
  const all = aggregateAxis(races);
  // 場別
  const venueOrder = ['東京','京都','新潟','中山','阪神','中京','福島','小倉','札幌','函館'];
  const byV = {};
  races.forEach(r => { (byV[r.venue]=byV[r.venue]||[]).push(r); });
  const venues = Object.entries(byV).sort((a,b)=>{
    const ai=venueOrder.indexOf(a[0]), bi=venueOrder.indexOf(b[0]);
    return (ai<0?99:ai)-(bi<0?99:bi);
  }).map(([v,rs]) => [v, aggregateAxis(rs)]);

  el.innerHTML = `
    <details class="summary-board neon sb-fold">
      <summary class="sb-fold-summary">
        <div class="sb-title mincho">⛩ 言霊神宮 日曜全36R 集計　単勝/複勝◎1点購入&◎1頭軸流しの場合</div>
        <div class="sb-total ${all.totalRecovery>=100?'win':''}">
          総合回収率 ${all.totalRecovery}%
        </div>
        <div class="sb-fold-hint mincho">▼ クリックで詳細を展開</div>
      </summary>
      <div class="sb-total-detail ${all.totalRecovery>=100?'win':''}">
        <small>${all.racesHit}/${all.racesWithResult}R的中 (${all.raceHitRate}%) ／ 投資¥${all.totalInvest.toLocaleString()} 払戻¥${all.totalPayout.toLocaleString()}</small>
      </div>
      <div class="sb-meta">単勝◎/複勝◎/ワイド・馬連・3連複は◎軸→相手3頭流し／馬単・3連単はマルチ（1Rあたり35点 ¥3,500）</div>
      <div class="sb-kinds">
        ${Object.entries(all.byKind).map(([k,v])=>`
          <div class="sb-kind">
            <div class="k-name">${AXIS_KIND_LABEL[k]||k}</div>
            <div class="k-rec ${v.recovery>=100?'win':''}">${v.recovery}%</div>
            <div class="k-hit ${v.hitRate>=50?'win':''}">的中${v.hit}/${v.races} (${v.hitRate}%)</div>
            <div class="k-amt">¥${v.payout.toLocaleString()} / ¥${v.invest.toLocaleString()}</div>
          </div>
        `).join('')}
      </div>
      <details class="summary-d" open>
        <summary>場別 集計（東京 / 京都 / 新潟）</summary>
        <div class="venue-boards">
          ${venues.map(([v,sv])=>venueBoardAxis(v,sv)).join('')}
        </div>
      </details>
      <div class="sb-learn">🔬 ベスト馬券種分析学習中... ／ ◎軸流しは投資効率重視型</div>
    </details>`;
}

function venueBoard(name, s){
  return `
    <div class="vb">
      <div class="vb-h mincho">${name}</div>
      <div class="vb-total ${s.totalRecovery>=100?'win':''}"><span style="font-size:12px;color:var(--ink-soft);font-weight:400;letter-spacing:.1em;margin-right:6px">回収率</span>${s.totalRecovery}%</div>
      <div class="vb-meta">${s.racesHit}/${s.racesWithResult}R的中 (${s.raceHitRate}%) ／ 投資¥${s.totalInvest.toLocaleString()} 払戻¥${s.totalPayout.toLocaleString()}</div>
      <table class="vb-table">
        <tr><th>券種</th><th style="text-align:right">的中率</th><th style="text-align:right">回収率</th></tr>
        ${Object.entries(s.byKind).map(([k,v])=>`
          <tr>
            <td>${KIND_LABEL[k]||k}</td>
            <td class="v-hit ${v.hitRate>=50?'win':''}">${v.hit}/${v.races} (${v.hitRate}%)</td>
            <td class="v-rec ${v.recovery>=100?'win':''}">${v.recovery}%</td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function renderSummary(){
  const el = document.getElementById('summary-board');
  if (!SUMMARY) { el.innerHTML = ''; return; }
  const s = SUMMARY;
  const venueOrder = ['東京','京都','新潟','中山','阪神','中京','福島','小倉','札幌','函館'];
  const venues = Object.entries(s.byVenue || {}).sort((a,b)=>{
    const ai = venueOrder.indexOf(a[0]), bi = venueOrder.indexOf(b[0]);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });
  el.innerHTML = `
    <details class="summary-board sb-fold">
      <summary class="sb-fold-summary">
        <div class="sb-title mincho">⛩ 言霊神宮 日曜全36R 集計　単勝/複勝4頭購入&全馬券種4頭BOX購入の場合</div>
        <div class="sb-total ${s.totalRecovery>=100?'win':''}">
          総合回収率 ${s.totalRecovery}%
        </div>
        <div class="sb-fold-hint mincho">▼ クリックで詳細を展開</div>
      </summary>
      <div class="sb-total-detail ${s.totalRecovery>=100?'win':''}">
        <small>${s.racesHit}/${s.racesWithResult}R的中 (${s.raceHitRate}%) ／ 投資¥${s.totalInvest.toLocaleString()} 払戻¥${s.totalPayout.toLocaleString()}</small>
      </div>
      <div class="sb-meta">各レース4頭 × 7券種BOX購入（1Rあたり60点6,000円）</div>
      <div class="sb-kinds">
        ${Object.entries(s.byKind).map(([k,v])=>`
          <div class="sb-kind">
            <div class="k-name">${KIND_LABEL[k]||k}</div>
            <div class="k-rec ${v.recovery>=100?'win':''}">${v.recovery}%</div>
            <div class="k-hit ${v.hitRate>=50?'win':''}">的中${v.hit}/${v.races} (${v.hitRate}%)</div>
            <div class="k-amt">¥${v.payout.toLocaleString()} / ¥${v.invest.toLocaleString()}</div>
          </div>
        `).join('')}
      </div>
      <details class="summary-d" open>
        <summary>場別 集計（東京 / 京都 / 新潟）</summary>
        <div class="venue-boards">
          ${venues.map(([v,sv])=>venueBoard(v, sv)).join('')}
        </div>
      </details>
      <div class="sb-learn">🔬 ベスト馬券種分析学習中...</div>
      ${renderGoshugi()}
    </details>`;
}

function renderGoshugi(){
  const RANK_EMOJI = ['🥇','🥈','🥉','🎖','🎖','🎖','🎖','🎖','🎖'];
  const hits = ALL_RACES
    .filter(r => r.result && r.result.betting && r.result.betting.recovery >= 300)
    .map(r => ({
      venue: r.venue, raceNum: r.raceNum, raceName: r.raceName,
      rec: r.result.betting.recovery,
      pay: r.result.betting.payoutTotal,
      inv: r.result.betting.investTotal,
    }))
    .sort((a,b) => b.rec - a.rec);
  if (hits.length === 0) return '';
  return `
    <div class="goshugi">
      <div class="goshugi-h mincho">🧧 日曜日のご祝儀レース 🧧</div>
      <div class="goshugi-list">
        ${hits.map((h,i) => `
          <div class="goshugi-row">
            <div class="goshugi-rank">${RANK_EMOJI[i]||'🎖'}</div>
            <div class="goshugi-name">
              ${h.venue}${h.raceNum} ${h.raceName}
              <span class="gn-meta">投資¥${h.inv.toLocaleString()} → 払戻¥${h.pay.toLocaleString()}</span>
            </div>
            <div class="goshugi-rec">${h.rec}%</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function buildTabs(){
  // 日付×場でグルーピング
  const groups = new Map();
  ALL_RACES.forEach(r => {
    const key = `${r.date}|${r.venue}`;
    if (!groups.has(key)) groups.set(key, {date:r.date,venue:r.venue,count:0});
    groups.get(key).count++;
  });
  const tabs = [...groups.values()];
  if (tabs.length === 0) return;
  CURRENT_TAB = `${tabs[0].date}|${tabs[0].venue}`;
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabs.map(t => {
    const key = `${t.date}|${t.venue}`;
    const active = key === CURRENT_TAB ? 'active' : '';
    return `<button class="tab ${active}" data-key="${key}">${fmtDate(t.date)} ${t.venue}<span class="tab-count">${t.count}R</span></button>`;
  }).join('');
  tabsEl.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      CURRENT_TAB = btn.dataset.key;
      tabsEl.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.key === CURRENT_TAB));
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function render(){
  const races = ALL_RACES.filter(r => `${r.date}|${r.venue}` === CURRENT_TAB);
  const root = document.getElementById('races');
  root.innerHTML = races.map(r => {
    // 他場の同じR
    const others = ALL_RACES.filter(x =>
      x.date === r.date && x.venue !== r.venue && x.raceNum === r.raceNum
    );
    const crossJump = others.length ? `
      <div class="cross-jump">
        <span class="cross-jump-label mincho">同${r.raceNum} ▶</span>
        ${others.map(o => `<button class="cj-btn" data-jump-key="${o.date}|${o.venue}" data-jump-rnum="${o.raceNum}">${o.venue}${o.raceNum}</button>`).join('')}
      </div>` : '';
    // 的中判定（pickの中で1-3着が居れば🎯マーク）
    const raceHit = (r.picks || []).some(p => {
      const rk = p.finalRank ? Number(p.finalRank) : null;
      return rk && rk>=1 && rk<=3;
    });
    // 勝ちレース判定（BOXまたは◎軸流しのどちらかで回収率100%超 → 金グロー）
    const boxRec = (r.result && r.result.betting) ? r.result.betting.recovery : 0;
    const axisBetCheck = calcAxis(r);
    const axisRec = axisBetCheck ? axisBetCheck.recovery : 0;
    const raceWin = boxRec >= 100 || axisRec >= 100;
    // 🔒 有料ロック表示
    if (r._paidLocked) {
      return `
      <details class="race race-locked" data-rnum="${r.raceNum}">
        <summary class="race-summary">
          <span class="race-fold-icon">🔒</span>
          <span class="race-name mincho">${r.date} ${r.venue}${r.raceNum} ${r.raceName}</span>
          <span class="race-meta">${r.surface}${r.distance}m / ${r.numHorses}頭 / 発走${r.startTime}</span>
        </summary>
        <div class="race-body locked-body">
          <div class="lock-card">
            <div class="lock-icon">📜</div>
            <div class="lock-title mincho">このレースは神宮NOTEパックで公開中</div>
            <div class="lock-desc">
              4R〜12Rは <b>${r.venue}競馬場パック</b> をご購入のお客様向けです。<br>
              全12R picks＋推奨買い目（5券種）＋致命ワード検出馬リスト付き。
            </div>
            <div class="lock-price mincho">🎉 ローンチキャンペーン ¥200／場（通常 ¥800）</div>
            <a href="https://note.com/gaikyukeiba_ace" target="_blank" rel="noopener" class="lock-cta mincho">▶ NOTE で購入する</a>
            <div class="lock-note">📺 結果速報は X @acekeiba_gaikyu でリアタイ更新</div>
          </div>
        </div>
      </details>`;
    }
    return `
    <details class="race ${raceWin?'race-win':''}" data-rnum="${r.raceNum}">
      <summary class="race-summary">
        <span class="race-fold-icon">▶</span>
        <span class="race-name mincho">${r.date} ${r.venue}${r.raceNum} ${r.raceName}${raceHit?' <span class="race-hit-mark">🎯</span>':''}</span>
        <span class="race-meta">${r.surface}${r.distance}m / ${r.numHorses}頭 / 発走${r.startTime}</span>
      </summary>
      <div class="race-body">
        ${crossJump}
      <table class="picks-table">
        <tr><th>印</th><th>馬名</th><th>騎手</th><th>厩舎</th><th>言霊評価</th></tr>
        ${r.picks.map(p => {
          const rk = p.finalRank ? Number(p.finalRank) : null;
          const inMoney = rk && rk>=1 && rk<=3;
          const rkCls = rk===1?'r1':rk===2?'r2':rk===3?'r3':'';
          const finBadge = rk
            ? `<span class="finish ${rkCls}">${rk}着${inMoney?'<span class="hit-mark">🎯</span>':''}</span>`
            : '';
          const popBadge = p.finalNinki ? `<span class="pop">${p.finalNinki}人気</span>` : '';
          const trCls = inMoney ? 'hit-row' : '';
          return `
        <tr class="${trCls}">
          <td class="${MARK_CLASS[p.mark]||'mark'}">${p.mark}</td>
          <td class="name">
            <div class="name-row1">
              <span class="name-num">${p.num}</span>
              <span class="name-text">${p.name}</span>
            </div>
            <div class="name-row2">
              <span class="grade">${p.kotodamaGrade}</span>
              ${popBadge}
              ${finBadge}
            </div>
          </td>
          <td class="jockey-c">${p.jockey}</td>
          <td class="trainer-c">${p.trainer}</td>
          <td class="comment">${p.comment}</td>
        </tr>`;
        }).join('')}
      </table>
      <!-- 致命ワード検出・監視リストは2026-05-09週から非表示（4頭picks専念） -->
      <!-- データはJSONに保持・将来全頭出馬表形式採用時に再活用予定 -->
      ${r.result ? `
      <div class="result">
        <strong>結果</strong>: ${r.result.summary || ''}
      </div>
      ${r.result.betting ? (() => {
        // 旧BOX
        const boxBet = r.result.betting;
        const boxHTML = `
          <div class="race-betting">
            <div class="rb-head">単複4頭購入＆4頭BOX購入</div>
            ${Object.entries(boxBet.invest).map(([k,inv])=>{
              const pay = boxBet.payout[k]||0;
              const rec = inv ? Math.round(pay/inv*1000)/10 : 0;
              const hit = pay>0 ? 'hit' : '';
              return `<div class="rb-row ${hit}"><span>${KIND_LABEL[k]||k}</span><span class="rb-amt">¥${pay.toLocaleString()} / ¥${inv.toLocaleString()} (${rec}%)</span></div>`;
            }).join('')}
            <div class="rb-row rb-total"><span>合計</span><span>¥${boxBet.payoutTotal.toLocaleString()} / ¥${boxBet.investTotal.toLocaleString()} (${boxBet.recovery}%)</span></div>
          </div>`;
        // 新◎軸流し
        const axisBet = calcAxis(r);
        const axisHTML = axisBet ? `
          <div class="race-betting axis">
            <div class="rb-head">単複◎1点購入＆◎軸流し購入</div>
            ${Object.entries(axisBet.invest).map(([k,inv])=>{
              const pay = axisBet.payout[k]||0;
              const rec = inv ? Math.round(pay/inv*1000)/10 : 0;
              const hit = pay>0 ? 'hit' : '';
              return `<div class="rb-row ${hit}"><span>${AXIS_KIND_LABEL[k]||k}</span><span class="rb-amt">¥${pay.toLocaleString()} / ¥${inv.toLocaleString()} (${rec}%)</span></div>`;
            }).join('')}
            <div class="rb-row rb-total"><span>合計</span><span>¥${axisBet.payoutTotal.toLocaleString()} / ¥${axisBet.investTotal.toLocaleString()} (${axisBet.recovery}%)</span></div>
          </div>` : '';
        return `<div class="race-betting-pair">${boxHTML}${axisHTML}</div>`;
      })() : ''}` : '<div class="result pending">結果待ち</div>'}
      </div>
    </details>
  `;
  }).join('');

  // 他場ジャンプ ボタンのイベント
  root.querySelectorAll('.cj-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const key = btn.dataset.jumpKey;
      const rnum = btn.dataset.jumpRnum;
      CURRENT_TAB = key;
      const tabsEl = document.getElementById('tabs');
      tabsEl.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.key === CURRENT_TAB));
      render();
      // 同じR番号にスクロール＆展開
      requestAnimationFrame(() => {
        const target = document.querySelector(`.race[data-rnum="${rnum}"]`);
        if (target) {
          target.open = true;
          target.scrollIntoView({behavior:'smooth', block:'start'});
        }
      });
    });
  });
}
load();
</script>
</body>
</html>
