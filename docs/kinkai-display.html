<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>今週の金塊馬 | UG強奪競馬新聞</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Public+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#130003;
  color:#f5d0d5;
  font-family:'Public Sans',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.hdr{
  background:linear-gradient(135deg,#200006,#0b0002 60%,#130003);
  border-bottom:2px solid rgba(232,0,61,.5);
  padding:14px 18px;
  display:flex;align-items:center;gap:10px;
}
.hdr-back{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border-radius:18px;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,.45);
  font-size:11px;font-weight:700;text-decoration:none;
  border:1px solid rgba(255,255,255,0.12);
}
.hdr-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(232,0,61,.8);}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

.main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}
.card{
  text-align:center;
  max-width:480px;
  padding:48px 36px;
  background:linear-gradient(135deg,rgba(240,192,64,.06),rgba(10,0,3,.95));
  border:1px solid rgba(240,192,64,.3);
  border-radius:20px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#f0c040,transparent);
}
.icon{font-size:56px;margin-bottom:20px;display:block;}
.label{
  font-size:10px;font-weight:900;letter-spacing:.25em;text-transform:uppercase;
  color:#f0c040;margin-bottom:14px;
}
.title{
  font-family:'Noto Serif JP',serif;
  font-size:26px;font-weight:900;color:#fff;
  margin-bottom:16px;line-height:1.4;
}
.desc{
  font-size:13px;color:rgba(255,255,255,.5);
  line-height:1.8;margin-bottom:28px;
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 24px;border-radius:24px;
  background:rgba(232,0,61,.15);border:1px solid rgba(232,0,61,.4);
  color:#f5d0d5;font-size:13px;font-weight:700;
  text-decoration:none;transition:background .15s;
}
.back-btn:hover{background:rgba(232,0,61,.25);}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="hdr-back">← TOP</a>
  <div style="flex:1;">
    <div class="hdr-logo">UG強奪競馬新聞</div>
    <div class="hdr-sub">今週の金塊馬</div>
  </div>
</header>

<main class="main">
  <div class="card">
    <span class="icon">🏗️</span>
    <div class="label">Coming Soon</div>
    <div class="title">準備中</div>
    <div class="desc">
      このページは現在準備中です。<br>
      近日公開予定です。<br>
      今しばらくお待ちください。
    </div>
    <a href="index.html" class="back-btn">← TOPへ戻る</a>
  </div>
</main>

</body>
</html>
