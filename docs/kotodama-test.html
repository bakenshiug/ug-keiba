<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>言霊神宮｜UG競馬ワイド神宮</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFA;--bg-soft:#F5F2EB;--paper:#FBF7EE;--paper-deep:#F0EADB;
    --ink:#2c1f12;--ink-soft:#5a4a3a;--shu:#a44a3f;--gold:#c9a84c;
    --border:rgba(164,74,63,.25);--ok:#5fa85c;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:0;background:var(--bg);color:var(--ink);
       font-family:'Noto Sans JP',sans-serif;line-height:1.7}
  .mincho{font-family:'Shippori Mincho',serif;letter-spacing:.05em}
  header{padding:32px 16px 24px;text-align:center;
         background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);
         border-bottom:1px solid var(--border)}
  .h-title{font-size:28px;color:var(--shu);font-weight:700;letter-spacing:.4em}
  .h-sub{font-size:13px;color:var(--ink-soft);margin-top:8px;letter-spacing:.15em}
  .h-rule{font-size:13px;color:var(--shu);margin-top:12px;font-weight:700}
  .home-link{display:inline-block;margin-top:14px;padding:6px 16px;
             border:1px solid var(--shu);color:var(--shu);text-decoration:none;
             font-size:12px;letter-spacing:.2em;border-radius:4px}
  .home-link:hover{background:var(--shu);color:#fff}
  main{max-width:920px;margin:0 auto;padding:24px 16px}
  .race{margin-bottom:32px;padding:20px;border:1px solid var(--border);
        background:var(--paper);border-radius:8px;
        box-shadow:0 1px 6px rgba(164,74,63,.08)}
  .race-header{display:flex;justify-content:space-between;align-items:baseline;
               border-bottom:1px dashed var(--border);padding-bottom:10px;margin-bottom:14px}
  .race-name{font-size:18px;color:var(--shu);font-weight:700}
  .race-meta{font-size:12px;color:var(--ink-soft)}
  .picks-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  .picks-table th{background:var(--paper-deep);padding:8px;text-align:left;
                  color:var(--shu);border-bottom:1px solid var(--border);font-weight:700}
  .picks-table td{padding:10px 8px;border-bottom:1px dashed var(--border);
                  vertical-align:top;color:var(--ink)}
  .mark{font-size:20px;font-weight:700;color:var(--shu);width:30px;text-align:center}
  .mark.dou{color:#b8902f}
  .name{font-weight:700;color:var(--ink);width:120px}
  .grade{display:inline-block;padding:2px 8px;background:var(--shu);color:#fff;
         font-weight:700;font-size:11px;border-radius:3px;margin-left:6px}
  .comment{color:var(--ink-soft);font-size:12px;line-height:1.6}
  details{margin-top:14px;padding:10px;background:var(--bg-soft);border-radius:4px;
          border:1px solid var(--border)}
  summary{cursor:pointer;color:var(--shu);font-size:12px;letter-spacing:.1em;font-weight:700}
  details ul{margin:8px 0 0;padding-left:18px;font-size:12px;color:var(--ink-soft)}
  .fatal{margin-top:10px;padding:10px;background:rgba(164,74,63,.08);
         border-left:3px solid var(--shu);font-size:12px;color:var(--ink)}
  .fatal-h{color:var(--shu);font-weight:700;margin-bottom:6px}
  .result{margin-top:14px;padding:12px;background:rgba(95,168,92,.1);
          border-left:3px solid var(--ok);font-size:13px;color:#2d5530;font-weight:700}
  .pending{color:var(--ink-soft);font-style:italic;font-weight:400;
           background:var(--bg-soft);border-left-color:var(--border)}
  footer{text-align:center;padding:24px;color:var(--ink-soft);font-size:11px;
         border-top:1px solid var(--border);margin-top:24px;background:var(--paper-deep)}
  /* タブ */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
        max-width:920px;margin:24px auto 0;padding:0 16px}
  .tab{padding:10px 20px;background:var(--paper);color:var(--ink-soft);
       border:1px solid var(--border);border-radius:6px;cursor:pointer;
       font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:.12em;
       transition:all .2s ease}
  .tab:hover{border-color:var(--shu);color:var(--shu)}
  .tab.active{background:var(--shu);color:#fff;border-color:var(--shu);font-weight:700}
  .tab-count{font-size:11px;opacity:.85;margin-left:6px}
  /* 結果反映 */
  .pop{display:inline-block;padding:1px 6px;background:#eee;color:#555;
       font-size:10px;border-radius:3px;margin-left:4px;font-weight:400}
  .finish{display:inline-block;padding:2px 7px;font-weight:700;font-size:11px;
          border-radius:3px;margin-left:4px;color:#fff;background:#999}
  .finish.r1{background:#d4af37}
  .finish.r2{background:#7a7a7a}
  .finish.r3{background:#a87544}
  /* 回収率ボード */
  .summary-board{max-width:920px;margin:0 auto 20px;padding:18px;
                 background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);
                 border:2px solid var(--shu);border-radius:8px}
  .sb-title{font-size:14px;color:var(--shu);font-weight:700;letter-spacing:.2em;
            text-align:center;margin-bottom:10px}
  .sb-total{text-align:center;font-size:28px;color:var(--shu);font-weight:700;margin:6px 0}
  .sb-total small{font-size:12px;color:var(--ink-soft);font-weight:400;margin-left:8px}
  .sb-meta{text-align:center;font-size:11px;color:var(--ink-soft);margin-bottom:12px}
  .sb-kinds{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .sb-kind{background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px;
           text-align:center;font-size:11px}
  .sb-kind .k-name{color:var(--ink-soft);font-size:10px;letter-spacing:.1em}
  .sb-kind .k-rec{font-size:18px;color:var(--shu);font-weight:700;margin-top:2px}
  .sb-kind .k-rec.win{color:var(--ok)}
  .sb-kind .k-amt{color:var(--ink-soft);font-size:10px;margin-top:2px}
  .sb-kind .k-hit{color:var(--ink-soft);font-size:10px;margin-top:2px}
  .sb-kind .k-hit.win{color:var(--ok);font-weight:700}
  .venue-boards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:14px}
  .vb{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px}
  .vb-h{font-size:13px;color:var(--shu);font-weight:700;text-align:center;
        padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;letter-spacing:.15em}
  .vb-total{text-align:center;font-size:18px;color:var(--shu);font-weight:700;margin:4px 0}
  .vb-total.win{color:var(--ok)}
  .vb-meta{text-align:center;font-size:10px;color:var(--ink-soft);margin-bottom:6px}
  .vb-table{width:100%;font-size:10.5px;border-collapse:collapse}
  .vb-table th{text-align:left;color:var(--ink-soft);font-weight:400;padding:2px 3px;border-bottom:1px dashed var(--border)}
  .vb-table td{padding:3px;border-bottom:1px dashed var(--border)}
  .vb-table .v-rec{text-align:right;font-weight:700;color:var(--shu)}
  .vb-table .v-rec.win{color:var(--ok)}
  .vb-table .v-hit{text-align:right;color:var(--ink-soft);font-size:10px}
  .vb-table .v-hit.win{color:var(--ok);font-weight:700}
  details.summary-d{margin-top:14px}
  details.summary-d summary{padding:8px;background:var(--paper-deep);border-radius:4px;
                            color:var(--shu);font-weight:700;font-size:12px;letter-spacing:.15em}
  .sb-learn{text-align:center;margin-top:14px;padding:8px;background:var(--bg-soft);
            border-radius:4px;color:var(--ink-soft);font-size:11px;font-style:italic}
  /* 各レース結果 */
  .race-betting{margin-top:12px;padding:10px;background:#fff;
                border:1px dashed var(--border);border-radius:4px;font-size:12px}
  .rb-row{display:flex;justify-content:space-between;align-items:center;
          padding:3px 0;color:var(--ink-soft)}
  .rb-row .rb-amt{color:var(--ink);font-weight:700}
  .rb-row.hit .rb-amt{color:var(--ok)}
  .rb-total{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);
            font-weight:700;color:var(--shu);font-size:13px}
</style>
</head>
<body>
<header>
  <div class="h-title mincho">言　霊　神　宮</div>
  <div class="h-sub mincho">⛩ ギーニョ・青龍・クロード（神主）</div>
  <div class="h-rule">全レース予想公開中</div>
  <a class="home-link mincho" href="index.html">⛩ 神宮に戻る</a>
</header>
<div id="summary-board"></div>
<div class="tabs" id="tabs"></div>
<main id="races"></main>
<footer class="mincho">⛩ UG 競馬ワイド神宮 ／ 言霊実験室 ⛩</footer>

<script>
const FILES = ['data/kotodama-test/2026-05-03.json'];
const MARK_CLASS = {'◎':'mark','○':'mark','▲':'mark dou','△':'mark dou'};

// 曜日表示
const DOW = ['日','月','火','水','木','金','土'];
function fmtDate(dateStr){
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`;
}

let ALL_RACES = [];
let SUMMARY = null;
let CURRENT_TAB = '';

const KIND_LABEL = {
  tan:'単勝', fuku:'複勝', wide:'ワイドBOX', umaren:'馬連BOX',
  umatan:'馬単BOX', sanrenpuku:'3連複BOX', sanrentan:'3連単BOX'
};

async function load(){
  for (const f of FILES){
    try{
      const r = await fetch(f+'?_='+Date.now());
      const d = await r.json();
      d.races.forEach(race => ALL_RACES.push(race));
      if (d.summary) SUMMARY = d.summary;
    }catch(e){console.error(e)}
  }
  renderSummary();
  buildTabs();
  render();
}

function venueBoard(name, s){
  return `
    <div class="vb">
      <div class="vb-h mincho">${name}</div>
      <div class="vb-total ${s.totalRecovery>=100?'win':''}">${s.totalRecovery}%</div>
      <div class="vb-meta">${s.racesHit}/${s.racesWithResult}R的中 (${s.raceHitRate}%) ／ 投資¥${s.totalInvest.toLocaleString()} 払戻¥${s.totalPayout.toLocaleString()}</div>
      <table class="vb-table">
        <tr><th>券種</th><th style="text-align:right">的中率</th><th style="text-align:right">回収率</th></tr>
        ${Object.entries(s.byKind).map(([k,v])=>`
          <tr>
            <td>${KIND_LABEL[k]||k}</td>
            <td class="v-hit ${v.hitRate>=50?'win':''}">${v.hit}/${v.races} (${v.hitRate}%)</td>
            <td class="v-rec ${v.recovery>=100?'win':''}">${v.recovery}%</td>
          </tr>`).join('')}
      </table>
    </div>`;
}

function renderSummary(){
  const el = document.getElementById('summary-board');
  if (!SUMMARY) { el.innerHTML = ''; return; }
  const s = SUMMARY;
  const venueOrder = ['東京','京都','新潟','中山','阪神','中京','福島','小倉','札幌','函館'];
  const venues = Object.entries(s.byVenue || {}).sort((a,b)=>{
    const ai = venueOrder.indexOf(a[0]), bi = venueOrder.indexOf(b[0]);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });
  el.innerHTML = `
    <div class="summary-board">
      <div class="sb-title mincho">⛩ 言霊神宮 日曜全36R 集計</div>
      <div class="sb-total ${s.totalRecovery>=100?'win':''}">
        総合回収率 ${s.totalRecovery}%
        <small>${s.racesHit}/${s.racesWithResult}R的中 (${s.raceHitRate}%) ／ 投資¥${s.totalInvest.toLocaleString()} 払戻¥${s.totalPayout.toLocaleString()}</small>
      </div>
      <div class="sb-meta">各レース4頭 × 7券種BOX購入（1Rあたり60点6,000円）</div>
      <div class="sb-kinds">
        ${Object.entries(s.byKind).map(([k,v])=>`
          <div class="sb-kind">
            <div class="k-name">${KIND_LABEL[k]||k}</div>
            <div class="k-rec ${v.recovery>=100?'win':''}">${v.recovery}%</div>
            <div class="k-hit ${v.hitRate>=50?'win':''}">的中${v.hit}/${v.races} (${v.hitRate}%)</div>
            <div class="k-amt">¥${v.payout.toLocaleString()} / ¥${v.invest.toLocaleString()}</div>
          </div>
        `).join('')}
      </div>
      <details class="summary-d" open>
        <summary>場別 集計（東京 / 京都 / 新潟）</summary>
        <div class="venue-boards">
          ${venues.map(([v,sv])=>venueBoard(v, sv)).join('')}
        </div>
      </details>
      <div class="sb-learn">🔬 ベスト馬券種分析学習中...</div>
    </div>`;
}

function buildTabs(){
  // 日付×場でグルーピング
  const groups = new Map();
  ALL_RACES.forEach(r => {
    const key = `${r.date}|${r.venue}`;
    if (!groups.has(key)) groups.set(key, {date:r.date,venue:r.venue,count:0});
    groups.get(key).count++;
  });
  const tabs = [...groups.values()];
  if (tabs.length === 0) return;
  CURRENT_TAB = `${tabs[0].date}|${tabs[0].venue}`;
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabs.map(t => {
    const key = `${t.date}|${t.venue}`;
    const active = key === CURRENT_TAB ? 'active' : '';
    return `<button class="tab ${active}" data-key="${key}">${fmtDate(t.date)} ${t.venue}<span class="tab-count">${t.count}R</span></button>`;
  }).join('');
  tabsEl.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      CURRENT_TAB = btn.dataset.key;
      tabsEl.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.key === CURRENT_TAB));
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function render(){
  const races = ALL_RACES.filter(r => `${r.date}|${r.venue}` === CURRENT_TAB);
  const root = document.getElementById('races');
  root.innerHTML = races.map(r => `
    <div class="race">
      <div class="race-header">
        <div class="race-name mincho">${r.date} ${r.venue}${r.raceNum} ${r.raceName}</div>
        <div class="race-meta">${r.surface}${r.distance}m / ${r.numHorses}頭 / 発走${r.startTime}</div>
      </div>
      <table class="picks-table">
        <tr><th>印</th><th>馬名</th><th>騎手</th><th>厩舎</th><th>言霊評価</th></tr>
        ${r.picks.map(p => {
          const rk = p.finalRank ? Number(p.finalRank) : null;
          const rkCls = rk===1?'r1':rk===2?'r2':rk===3?'r3':'';
          const finBadge = rk ? `<span class="finish ${rkCls}">${rk}着</span>` : '';
          const popBadge = p.finalNinki ? `<span class="pop">${p.finalNinki}人気</span>` : '';
          return `
        <tr>
          <td class="${MARK_CLASS[p.mark]||'mark'}">${p.mark}</td>
          <td class="name">${p.num}番<br>${p.name}<span class="grade">${p.kotodamaGrade}</span>${popBadge}${finBadge}</td>
          <td>${p.jockey}</td>
          <td>${p.trainer}</td>
          <td class="comment">${p.comment}</td>
        </tr>`;
        }).join('')}
      </table>
      ${r.fatalWords && r.fatalWords.length ? `
      <div class="fatal">
        <div class="fatal-h">⚠ 致命ワード検出</div>
        ${r.fatalWords.map(f => `<div>・${f.horse}：「${f.word}」 → ${f.type}</div>`).join('')}
      </div>` : ''}
      <details>
        <summary>監視リスト（B〜D級）</summary>
        ${r.watchList ? Object.entries(r.watchList).map(([g,hs])=>`
          <div style="margin-top:8px"><strong>${g}級</strong>: ${hs.join('・')}</div>
        `).join('') : ''}
      </details>
      ${r.result ? `
      <div class="result">
        <strong>結果</strong>: ${r.result.summary || ''}
      </div>
      ${r.result.betting ? `
      <div class="race-betting">
        ${Object.entries(r.result.betting.invest).map(([k,inv])=>{
          const pay = r.result.betting.payout[k]||0;
          const rec = inv ? Math.round(pay/inv*1000)/10 : 0;
          const hit = pay>0 ? 'hit' : '';
          return `<div class="rb-row ${hit}"><span>${KIND_LABEL[k]||k}</span><span class="rb-amt">¥${pay.toLocaleString()} / ¥${inv.toLocaleString()} (${rec}%)</span></div>`;
        }).join('')}
        <div class="rb-row rb-total"><span>合計</span><span>¥${r.result.betting.payoutTotal.toLocaleString()} / ¥${r.result.betting.investTotal.toLocaleString()} (${r.result.betting.recovery}%)</span></div>
      </div>` : ''}` : '<div class="result pending">結果待ち</div>'}
    </div>
  `).join('');
}
load();
</script>
</body>
</html>
