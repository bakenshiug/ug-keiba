<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>УеђжюіуЦът««№йюUGуФХждгсЃ»сѓцсЃЅуЦът««</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAFA;--bg-soft:#F5F2EB;--paper:#FBF7EE;--paper-deep:#F0EADB;
    --ink:#2c1f12;--ink-soft:#5a4a3a;--shu:#a44a3f;--gold:#c9a84c;
    --border:rgba(164,74,63,.25);--ok:#5fa85c;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:0;background:var(--bg);color:var(--ink);
       font-family:'Noto Sans JP',sans-serif;line-height:1.7}
  .mincho{font-family:'Shippori Mincho',serif;letter-spacing:.05em}
  header{padding:32px 16px 24px;text-align:center;
         background:linear-gradient(135deg,var(--paper) 0%,var(--paper-deep) 100%);
         border-bottom:1px solid var(--border)}
  .h-title{font-size:28px;color:var(--shu);font-weight:700;letter-spacing:.4em}
  .h-sub{font-size:13px;color:var(--ink-soft);margin-top:8px;letter-spacing:.15em}
  .h-rule{font-size:13px;color:var(--shu);margin-top:12px;font-weight:700}
  .home-link{display:inline-block;margin-top:14px;padding:6px 16px;
             border:1px solid var(--shu);color:var(--shu);text-decoration:none;
             font-size:12px;letter-spacing:.2em;border-radius:4px}
  .home-link:hover{background:var(--shu);color:#fff}
  main{max-width:920px;margin:0 auto;padding:24px 16px}
  .race{margin-bottom:32px;padding:20px;border:1px solid var(--border);
        background:var(--paper);border-radius:8px;
        box-shadow:0 1px 6px rgba(164,74,63,.08)}
  .race-header{display:flex;justify-content:space-between;align-items:baseline;
               border-bottom:1px dashed var(--border);padding-bottom:10px;margin-bottom:14px}
  .race-name{font-size:18px;color:var(--shu);font-weight:700}
  .race-meta{font-size:12px;color:var(--ink-soft)}
  .picks-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  .picks-table th{background:var(--paper-deep);padding:8px;text-align:left;
                  color:var(--shu);border-bottom:1px solid var(--border);font-weight:700}
  .picks-table td{padding:10px 8px;border-bottom:1px dashed var(--border);
                  vertical-align:top;color:var(--ink)}
  .mark{font-size:20px;font-weight:700;color:var(--shu);width:30px;text-align:center}
  .mark.dou{color:#b8902f}
  .name{font-weight:700;color:var(--ink);width:120px}
  .grade{display:inline-block;padding:2px 8px;background:var(--shu);color:#fff;
         font-weight:700;font-size:11px;border-radius:3px;margin-left:6px}
  .comment{color:var(--ink-soft);font-size:12px;line-height:1.6}
  details{margin-top:14px;padding:10px;background:var(--bg-soft);border-radius:4px;
          border:1px solid var(--border)}
  summary{cursor:pointer;color:var(--shu);font-size:12px;letter-spacing:.1em;font-weight:700}
  details ul{margin:8px 0 0;padding-left:18px;font-size:12px;color:var(--ink-soft)}
  .fatal{margin-top:10px;padding:10px;background:rgba(164,74,63,.08);
         border-left:3px solid var(--shu);font-size:12px;color:var(--ink)}
  .fatal-h{color:var(--shu);font-weight:700;margin-bottom:6px}
  .result{margin-top:14px;padding:12px;background:rgba(95,168,92,.1);
          border-left:3px solid var(--ok);font-size:13px;color:#2d5530;font-weight:700}
  .pending{color:var(--ink-soft);font-style:italic;font-weight:400;
           background:var(--bg-soft);border-left-color:var(--border)}
  footer{text-align:center;padding:24px;color:var(--ink-soft);font-size:11px;
         border-top:1px solid var(--border);margin-top:24px;background:var(--paper-deep)}
  /* сѓ┐сЃќ */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
        max-width:920px;margin:24px auto 0;padding:0 16px}
  .tab{padding:10px 20px;background:var(--paper);color:var(--ink-soft);
       border:1px solid var(--border);border-radius:6px;cursor:pointer;
       font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:.12em;
       transition:all .2s ease}
  .tab:hover{border-color:var(--shu);color:var(--shu)}
  .tab.active{background:var(--shu);color:#fff;border-color:var(--shu);font-weight:700}
  .tab-count{font-size:11px;opacity:.85;margin-left:6px}
</style>
</head>
<body>
<header>
  <div class="h-title mincho">УеђсђђжюісђђуЦъсђђт««</div>
  <div class="h-sub mincho">РЏЕ сѓ«сЃ╝сЃІсЃДсЃ╗жЮњжЙЇсЃ╗сѓ»сЃГсЃ╝сЃЅ№╝ѕуЦъСИ╗№╝Ѕ</div>
  <div class="h-rule">тЁесЃгсЃ╝сѓ╣С║ѕТЃ│тЁгжќІСИГ</div>
  <a class="home-link mincho" href="index.html">РЏЕ уЦът««сЂФТѕ╗сѓІ</a>
</header>
<div class="tabs" id="tabs"></div>
<main id="races"></main>
<footer class="mincho">РЏЕ UG уФХждгсЃ»сѓцсЃЅуЦът«« №╝Ј Уеђжюіт«ЪжеЊт«ц РЏЕ</footer>

<script>
const FILES = ['data/kotodama-test/2026-05-03.json'];
const MARK_CLASS = {'РЌј':'mark','РЌІ':'mark','Рќ▓':'mark dou','Рќ│':'mark dou'};

// ТЏюТЌЦУАеуц║
const DOW = ['ТЌЦ','Тюѕ','уЂФ','Т░┤','Тюе','жЄЉ','тюЪ'];
function fmtDate(dateStr){
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`;
}

let ALL_RACES = [];
let CURRENT_TAB = '';

async function load(){
  for (const f of FILES){
    try{
      const r = await fetch(f+'?_='+Date.now());
      const d = await r.json();
      d.races.forEach(race => ALL_RACES.push(race));
    }catch(e){console.error(e)}
  }
  buildTabs();
  render();
}

function buildTabs(){
  // ТЌЦС╗ў├Ќта┤сЂДсѓ░сЃФсЃ╝сЃћсЃ│сѓ░
  const groups = new Map();
  ALL_RACES.forEach(r => {
    const key = `${r.date}|${r.venue}`;
    if (!groups.has(key)) groups.set(key, {date:r.date,venue:r.venue,count:0});
    groups.get(key).count++;
  });
  const tabs = [...groups.values()];
  if (tabs.length === 0) return;
  CURRENT_TAB = `${tabs[0].date}|${tabs[0].venue}`;
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabs.map(t => {
    const key = `${t.date}|${t.venue}`;
    const active = key === CURRENT_TAB ? 'active' : '';
    return `<button class="tab ${active}" data-key="${key}">${fmtDate(t.date)} ${t.venue}<span class="tab-count">${t.count}R</span></button>`;
  }).join('');
  tabsEl.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      CURRENT_TAB = btn.dataset.key;
      tabsEl.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.key === CURRENT_TAB));
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function render(){
  const races = ALL_RACES.filter(r => `${r.date}|${r.venue}` === CURRENT_TAB);
  const root = document.getElementById('races');
  root.innerHTML = races.map(r => `
    <div class="race">
      <div class="race-header">
        <div class="race-name mincho">${r.date} ${r.venue}${r.raceNum} ${r.raceName}</div>
        <div class="race-meta">${r.surface}${r.distance}m / ${r.numHorses}жаГ / уЎ║Ух░${r.startTime}</div>
      </div>
      <table class="picks-table">
        <tr><th>тЇ░</th><th>ждгтљЇ</th><th>жејТЅІ</th><th>тјЕУѕј</th><th>УеђжюіУЕЋСЙА</th></tr>
        ${r.picks.map(p => `
        <tr>
          <td class="${MARK_CLASS[p.mark]||'mark'}">${p.mark}</td>
          <td class="name">${p.num}уЋф<br>${p.name}<span class="grade">${p.kotodamaGrade}</span></td>
          <td>${p.jockey}</td>
          <td>${p.trainer}</td>
          <td class="comment">${p.comment}</td>
        </tr>`).join('')}
      </table>
      ${r.fatalWords && r.fatalWords.length ? `
      <div class="fatal">
        <div class="fatal-h">Рџа УЄ┤тЉйсЃ»сЃ╝сЃЅТцютЄ║</div>
        ${r.fatalWords.map(f => `<div>сЃ╗${f.horse}№╝џсђї${f.word}сђЇ Рєњ ${f.type}</div>`).join('')}
      </div>` : ''}
      <details>
        <summary>уЏБУдќсЃфсѓ╣сЃѕ№╝ѕBсђюDу┤џ№╝Ѕ</summary>
        ${r.watchList ? Object.entries(r.watchList).map(([g,hs])=>`
          <div style="margin-top:8px"><strong>${g}у┤џ</strong>: ${hs.join('сЃ╗')}</div>
        `).join('') : ''}
      </details>
      ${r.result ? `
      <div class="result">
        <strong>ухљТъю</strong>: ${r.result.summary || JSON.stringify(r.result)}
      </div>` : '<div class="result pending">ухљТъютЙЁсЂА</div>'}
    </div>
  `).join('');
}
load();
</script>
</body>
</html>
